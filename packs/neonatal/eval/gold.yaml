    question: "新生儿感染性肺炎用什么影像学检查？需要做CT吗？"
    expected_domain: [pneumonia]
    expected_topics:
      - 胸部X线是主要诊断方法
      - 肺部超声有良好灵敏度和特异度
      - CT不常规用于新生儿肺炎
      - CT仅在临床与常规影像学不一致或怀疑气道畸形时考虑
