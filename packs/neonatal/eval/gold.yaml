      - CSF培养阳性者48~72h后复查
    consensus_refs: [S16]
    must_not:
      - 推荐具体剂量
      - 建议万古霉素+美罗培南作为非院内感染的一线方案

  - id: SE12
    question: "新生儿败血症什么情况下需要转诊到上级医院？"
    expected_domain: [sepsis]
