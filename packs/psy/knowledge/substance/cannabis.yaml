specialty: substance
specialty_zh: 物质相关及成瘾障碍
disease: cannabis
disease_zh: 大麻使用障碍
source: 《精神障碍诊断与统计手册（第五版，DSM-5-TR）》
entries:
- id: CUD_DEFINITION
  title: 核心特征与定义
  source_page: 568
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 大麻使用障碍指的是使用大麻制品（包括植物大麻、浓缩物、合成大麻素）导致的临床显著损害或痛苦。
  - 诊断基于12个月内出现至少2条行为与生理症状标准，涉及失控、社交损害、冒险使用、耐受和戒断。
  - 滥用模式可能持续数月或数年，平均每周使用4天或更多，但使用者常不认为自己的使用有问题。
  must_warn: []
- id: CUD_CRITERIA
  title: 主要诊断标准（11条）
  source_page: 568
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 常用量或时间超过预期；长期想戒或控制失败；花大量时间获取、使用或从大麻效应中恢复。
  - 强烈渴求；因使用导致工作、学习或家庭角色失败；明知造成社交/人际关系问题仍继续。
  - 放弃重要活动；在危险情况下使用（如开车）；明知身体或心理问题仍继续。
  - 耐受（需要更大剂量或效果减弱）；戒断（出现典型戒断综合征或为缓解戒断而使用）。
  must_warn: []
- id: CUD_PREVALENCE
  title: 患病率与流行病学
  source_page: 571
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 美国12-17岁青少年过去一年患病率2.7%-3.1%；成人1.5%-2.9%。
  - DSM-5成人12个月患病率约2.5%（轻度1.4%，中度0.6%，重度0.6%）。
  - 全球年龄标准化患病率2016年为289.7/10万，较1990年增加25.6%。
  - 男性高于女性（3.5% vs 1.7%），18-29岁最高（6.9%），45岁以上最低（0.8%）。
  must_warn: []
- id: CUD_DEVELOPMENT
  title: 起病与病程
  source_page: 572
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 常起病于青少年或成年早期，也可能在任何年龄发生。
  - 通常渐进发展，频率和用量逐渐增加；青少年进展可能更快。
  - 早期使用（如15岁前）是发展为使用障碍和其他精神障碍的强烈预测因素。
  - 成年病例多为每日使用的长期模式，尽管有明确问题仍继续；中老年使用率在上升。
  must_warn: []
- id: CUD_RISK
  title: 风险与预后因素
  source_page: 573
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 童年或青少年期的品行障碍、反社会人格障碍是重要风险因素。
  - 家庭不稳定、家庭成员使用大麻、情绪或身体虐待史、低社会经济地位增加风险。
  - 大麻易获得性（如州合法化）也显著增加患病风险。
  - 遗传贡献30%-80%的风险，且与其它物质使用障碍有共同的遗传基础。
  must_warn: []
- id: CUD_DIFFERENTIAL
  title: 鉴别诊断要点
  source_page: 575
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 需与无害使用区分：20%-30%的使用者会有症状，但多数人并不认为自己的使用有问题。
  - 与大麻中毒、大麻戒断、大麻所致精神障碍不同：后者是使用后的急性或慢性综合征，而非单指使用模式。
  - 在多物质使用背景下，要仔细判断症状是否由大麻引起，而非其他物质或精神障碍。
  must_warn: []
- id: CUD_COMORBIDITY
  title: 常见共病
  source_page: 576
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 与其他物质使用障碍高度共病，如酒精、可卡因、阿片类；共病风险增加约9倍。
  - 常伴发精神障碍：重性抑郁、双相障碍、焦虑障碍、创伤后应激障碍、人格障碍。
  - 大麻使用与精神分裂症等精神病性障碍风险升高约3倍相关，尤其高频及高浓度品种。
  - 共病内科疾病包括大麻素呕吐综合征、呼吸系统疾病、部分心血管不良结局。
  must_warn: []
- id: CUD_SUICIDE
  title: 自杀/自伤风险与安全
  source_page: 575
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 大麻使用障碍与自杀及非自杀性自伤风险增加有关，尤其在退伍军人中。
  - 男性患者自杀率为79/10万人年，女性为47/10万人年。
  - 慢性（而非急性）大麻使用与自杀念头和行为存在显著关联。
  must_warn:
  - 大麻使用障碍患者自杀风险升高，需警惕自伤、自杀意念和行为，应进行安全评估及干预。
- id: CUD_INTOXICATION
  title: 大麻中毒特征
  source_page: 577
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 最近使用大麻后出现临床显著的行为或心理改变（如运动协调受损、欣快、焦虑、时间感知变慢）。
  - 2小时内出现至少2项体征：结膜充血、食欲增加、口干、心动过速。
  - 吸入后几分钟内起效，口服需数小时，作用持续3-4小时；高剂量合成大麻素更易致妄想幻觉。
  must_warn: []
- id: CUD_WITHDRAWAL
  title: 大麻戒断特征
  source_page: 580
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 在重度长期（通常每日或几乎每日使用数月）停用后约1周内出现。
  - 需具备至少3项症状：易怒/愤怒/攻击、神经质/焦虑、睡眠困难、食欲下降/体重减轻、坐立不安、情绪低落、以及至少1项身体不适（腹痛、颤抖、出汗、发烧、寒战、头痛）。
  - 戒断导致显著痛苦或功能损害，约35%-95%的规律使用者出现症状，且常导致复发。
  - 行为情绪症状（如焦虑、易怒）比身体症状更常见，睡眠困难是最易导致复发的症状。
  must_warn: []
