specialty: anxiety
specialty_zh: 焦虑障碍
disease: agoraphobia
disease_zh: 广场恐惧症
source: 《精神障碍诊断与统计手册（第五版，DSM-5-TR）》
entries:
- id: AGORAPHOBIA_DEFINITION
  title: 什么是广场恐惧症
  source_page: 246
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 广场恐惧症的核心是，对至少两种特定场景（如公共交通、开放空间、封闭空间、排队/人群、独自离家）感到强烈恐惧或焦虑。
  - 患者担心在这些场合出现惊恐样症状（如头晕、濒死感）或其他令人尴尬/失能的症状时，无法逃脱或得不到帮助。
  - 恐惧和焦虑与实际危险不成比例，且持续存在（通常≥6个月），导致明显痛苦或功能损害。
- id: AGORAPHOBIA_DIAGNOSTIC_CRITERIA
  title: 广场恐惧症诊断标准
  source_page: 247
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 必须对5类情境中至少2类有显著恐惧/焦虑：1)乘坐公共交通；2)处于开放空间；3)处于封闭空间；4)排队或处在人群中；5)独自离家。
  - 核心是担心出现惊恐样症状或其他失能/尴尬症状时无法逃脱或得不到帮助。
  - 患者几乎每次接触这些情境都会引发恐惧，因此主动回避、需要陪伴或只能忍受极度的恐惧/焦虑。
  - 这种恐惧、焦虑或回避持续至少6个月，并导致社交、职业或其他重要功能损害。
  - 这些症状不能用其他精神障碍（如特定恐惧症、惊恐障碍、PTSD等）更好地解释。
- id: AGORAPHOBIA_PREVALENCE
  title: 患病率与流行病学
  source_page: 248
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 全球每年约1%–1.7%的青少年和成人符合广场恐惧症诊断标准。
  - 女性患病率是男性的两倍。
  - 12个月患病率在65岁以上美国人群为0.4%，欧洲/北美55岁以上为0.5%。
  - 不伴惊恐障碍的广场恐惧症在成人中12个月患病率约0.2%–0.8%。
- id: AGORAPHOBIA_DEVELOPMENT_COURSE
  title: 起病与病程发展
  source_page: 248
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 三分之二患者在35岁前发病，平均发病年龄21岁；若无惊恐发作先兆，则平均发病年龄25–29岁。
  - 儿童期首发罕见，青春期和成年早期高发；40岁后可能出现第二个发病高峰。
  - 约10%老人报告65岁后首次发作。
  - 病程通常持续慢性；完全缓解罕见（10%），除非接受治疗。
  - 伴惊恐障碍且早发（<20岁）的患者缓解后更易复发；约36%缓解者最终会复发。
- id: AGORAPHOBIA_RISK_PROGNOSTIC
  title: 风险与预后因素
  source_page: 249
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 气质因素：行为抑制、消极情感（神经质）、焦虑敏感性（认为焦虑症状有害）和特质焦虑与此障碍密切相关。
  - 环境因素：童年期负性事件（如分离、父母去世）、被攻击或抢劫等应激事件，以及家庭缺乏温暖、过度保护。
  - 遗传因素：广场恐惧症的遗传度约61%，在各类恐惧症中遗传因素最强。
  - 家族焦虑障碍史与早发（<27岁）相关，特别是惊恐障碍家族史。
- id: AGORAPHOBIA_DIFFERENTIAL_DIAGNOSIS
  title: 鉴别诊断要点
  source_page: 250
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 与特定恐惧症（情境型）区分：若恐惧仅限一种情境（如坐飞机），考虑特定恐惧；广场恐惧需至少两种情境。
  - 与分离焦虑区分：分离焦虑担忧与依恋对象分离；广场恐惧则担心惊恐症状和无法获助。
  - 与社交焦虑区分：社交焦虑害怕负面评价；广场恐惧关注症状和无法获助。
  - 与惊恐障碍区分：若仅因惊恐发作回避但未扩展到两个以上情境，不诊断为广场恐惧。
  - 与创伤后应激障碍（PTSD）区分：若回避仅限于创伤相关情境，不诊断为广场恐惧。
  - 与重性抑郁区分：抑郁者回避源于缺乏精力/兴趣，而非对症状的恐惧。
- id: AGORAPHOBIA_COMORBIDITY
  title: 常见共病
  source_page: 248
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 广场恐惧症常共病其他焦虑障碍、抑郁障碍、物质使用障碍和人格障碍。
  - 约30%–50%的广场恐惧症患者伴有惊恐发作或惊恐障碍。
  - 共病惊恐障碍者病程更易复发，功能损害更重。
  - 男性患者物质使用障碍共病率高于女性。
  - 共病重性抑郁和持续性抑郁障碍的风险显著升高。
- id: AGORAPHOBIA_SUICIDE_RISK
  title: 自杀与自伤风险
  source_page: 249
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 约15%的广场恐惧症患者报告有自杀念头或行为。
  - 对惊恐障碍患者，广场恐惧症状可能是自杀念头的额外风险因素。
  must_warn:
  - 约15%的广场恐惧症患者报告有自杀念头或行为，需高度警惕。
  - 伴有惊恐障碍的广场恐惧患者，其自杀念头风险可能更高。
  - 若患者出现自杀念头或自伤表现，请立即联系心理危机干预或精神卫生专业服务。
