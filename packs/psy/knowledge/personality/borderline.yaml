specialty: personality
specialty_zh: 人格障碍
disease: borderline
disease_zh: 边缘型人格障碍
source: 《精神障碍诊断与统计手册（第五版，DSM-5-TR）》
entries:
- id: BPD_DEFINITION
  title: 核心特征：情绪与关系不稳
  source_page: 753
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 从成年早期开始，在多种情境下出现人际关系、自我形象和情感的不稳定模式，并伴有明显的冲动性。
  - 患者对真实或想象中的被抛弃极度恐惧，可能因此做出疯狂的努力。
  - 典型表现为：理想化-贬低交替的亲密关系、不稳定的自我认同、情绪爆发、空虚感和愤怒控制困难。
- id: BPD_DIAGNOSTIC_CRITERIA
  title: 主要诊断标准（9选5）
  source_page: 753
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 需要满足以下9项中的至少5项：1. 疯狂避免被抛弃；2. 不稳定且紧张的人际关系（交替理想化与贬低）；3. 身份紊乱（持续不稳定的自我形象或自我感）；4.
    至少两方面潜在自伤的冲动行为（如乱花钱、滥交、物质滥用、鲁莽驾驶、暴食）；5. 反复的自杀行为、威胁或自伤；6. 情绪不稳（如数小时到数天的强烈烦躁、易怒或焦虑）；7.
    慢性空虚感；8. 不恰当强烈愤怒或难以控制愤怒；9. 短暂的应激相关的偏执观念或严重解离症状。
  - 注意：第1条和第4条中排除已归入第5条的自杀/自伤行为。
- id: BPD_PREVALENCE
  title: 患病率：社区约2.7%
  source_page: 755
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 社区中位患病率约2.7%（基于七项流行病学研究的荟萃分析）。
  - 在初级保健机构中约6%，精神科门诊患者中约10%，住院患者中约20%。
  - 在临床样本中女性更常见，但社区样本中男女患病率无差异，可能因女性更常求助。
- id: BPD_DEVELOPMENT_COURSE
  title: 起病与病程
  source_page: 755
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 传统认为是成人期起病，但研究显示12-13岁青少年也可完全满足诊断标准。
  - 过去认为病程差，但前瞻性研究发现1-8年的稳定缓解非常常见。
  - 冲动症状缓解最快，情感症状缓解较慢；完全恢复（症状缓解+良好社会功能）较困难且不稳定。
  - 恢复不佳与依赖残疾补助及身体健康差有关。
- id: BPD_RISK_PROGNOSTIC
  title: 风险与预后因素
  source_page: 755
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 童年期虐待（包括性虐待）和情感忽视是风险因素，但既非必要也非充分条件。
  - 患者一级亲属患病风险比普通人群高约5倍。
  - 家族中物质使用障碍、焦虑障碍、反社会人格障碍及抑郁/双相障碍的风险也增高。
- id: BPD_DIFFERENTIAL_DIAGNOSIS
  title: 鉴别诊断要点
  source_page: 756
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 与抑郁/双相障碍：两者常共病，但BPD需有早期起病和长期模式，不能仅凭横断面表现诊断。
  - 与分离焦虑障碍：都怕被抛弃，但BPD还有身份、自我导向、人际功能和冲动性的核心问题。
  - 与其他人格障碍：例如表演型（无自我毁灭性）、分裂型（偏执更持久）、反社会型（为获利而操纵）、依赖型（被抛弃后更顺从）等。
  - 需排除躯体疾病、物质使用障碍以及正常青春期身份问题。
- id: BPD_COMORBIDITY
  title: 常见共病
  source_page: 756
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 常与抑郁障碍或双相障碍同时存在，若同时满足两种诊断标准应分别诊断。
  - 与物质使用障碍、焦虑障碍、躯体症状障碍和赌博障碍共病也常见。
  - 合并抑郁或物质使用障碍时自杀风险显著增高。
- id: BPD_SUICIDE_RISK
  title: 自杀/自伤风险与安全
  source_page: 756
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 反复自杀姿态、威胁或自伤行为是BPD的核心诊断标准之一，常因被抛弃或拒绝的威胁而触发。
  - 自伤（如割伤、烧伤）常在解离症状时出现，可带来短暂解脱感。
  - 纵向研究显示，住院BPD患者24年随访中约6%死于自杀，远高于其他人格障碍（1.4%）。
  - 随着时间推移，自杀企图率可从79%降至13%，但自杀死亡风险在合并物质使用或抑郁时增高。
  must_warn:
  - BPD患者反复出现自杀行为、威胁或自伤，尤其在面临分离、拒绝或期望增加责任时。
  - 约6%的住院BPD患者最终死于自杀，合并抑郁症或物质使用障碍时风险更高。
  - 自伤行为可能带来短暂解脱，但同时也增加了意外死亡和长期身体残疾的风险。
