specialty: personality
specialty_zh: 人格障碍
disease: avoidant
disease_zh: 回避型人格障碍
source: 《精神障碍诊断与统计手册（第五版，DSM-5-TR）》
entries:
- id: AVPD_CORE
  title: 回避型人格障碍核心特征
  source_page: 765
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 核心是广泛的社会抑制、能力不足感和对负性评价的过度敏感，从成年早期开始，存在于多种情境。
  - 患者害怕批评、反对或拒绝，因此回避需要人际接触的工作或社交活动。
  - 只有确定会被喜欢才愿与人交往，在亲密关系中也很克制，怕被羞辱或嘲笑。
- id: AVPD_CRITERIA
  title: 诊断标准（7条中≥4条）
  source_page: 765
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 为避免批评或拒绝，回避需要人际接触的工作活动。
  - 除非确定对方喜欢自己，否则不愿与人交往。
  - 因怕被羞辱或嘲笑，在亲密关系中保持克制。
  - 总担心在社交场合被批评或拒绝，对微小负面信号过度敏感。
  - 因觉得能力不足，在新人际情境中退缩。
  - 自我评价为社交无能、缺乏魅力或不如别人。
  - 异常不愿冒个人风险或尝试新活动，怕丢脸。
- id: AVPD_PREVALENCE
  title: 患病率（流行病学）
  source_page: 767
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 美国全国共病调查复测（NCS-R）估计患病率为5.2%。
  - 全国酒精及相关疾病流行病学调查（NESARC）为2.4%。
  - 六项流行病学研究的中位患病率为2.1%。
- id: AVPD_DEVELOPMENT
  title: 起病与病程
  source_page: 767
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 回避行为常始于婴幼儿期，表现为害羞、孤立、怕陌生人和新环境。
  - 多数人的童年害羞会随年龄增长而缓解，但回避型人格障碍者会在青春期和成年早期加重。
  - 成年后该障碍可能随年龄减轻，65岁以上患病率约0.8%。
  - 儿童和青少年需谨慎诊断，害羞行为可能是发育阶段的正常表现。
- id: AVPD_RISK
  title: 风险与预后因素
  source_page: 767
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 童年害羞是常见的先兆，但多数人会逐渐克服。
  - 不同文化对腼腆和回避的评价不同，移民后的适应困难也可能导致回避行为。
  - 在某些文化中，经历“丢脸”或重大目标失败后可能出现显著回避。
  - 社区调查中女性患病率略高于男性，差异虽小但一致。
- id: AVPD_DIFFERENTIAL
  title: 鉴别诊断要点
  source_page: 767
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 与社交焦虑障碍高度重叠，但回避型人格障碍的自卑感更稳定、更普遍。
  - 与广场恐怖症的区别：回避动机不同，广场恐怖症是害怕惊恐发作或身体伤害。
  - 与依赖型人格障碍：两者都有能力不足感，但回避型害怕社交接近，依赖型则寻求接近。
  - 与分裂型/分裂样人格障碍：回避型渴望人际关系并感到孤独，后两者安于甚至偏好独处。
  - 与偏执型人格障碍：回避型不信任源于怕丢脸，偏执型源于怕他人恶意。
- id: AVPD_COMORBIDITY
  title: 常见共病
  source_page: 768
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 常与抑郁障碍和焦虑障碍（尤其是社交焦虑障碍）同时存在。
  - 也常与分裂样人格障碍共病。
  - 物质使用障碍（如酒精滥用）的发生率与广泛型社交焦虑障碍相当。
