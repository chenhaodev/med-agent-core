specialty: personality
specialty_zh: 人格障碍
disease: narcissistic
disease_zh: 自恋型人格障碍
source: 《精神障碍诊断与统计手册（第五版，DSM-5-TR）》
entries:
- id: NPD_CORE
  title: 核心特征与定义
  source_page: 767
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 核心是持续的夸大模式、需要被赞美和缺乏共情，起于成年早期，存在于多种情境。
  - 患者常夸大自身成就和才能，期待被认可为优越，却可能低估他人贡献。
  must_warn: []
- id: NPD_CRITERIA
  title: 主要诊断标准
  source_page: 766
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 需满足以下5项或更多：夸大自我重要性、幻想无限成功、认为自身特殊并只应与高层人士交往。
  - 需要过度赞美、有特权感、人际剥削、缺乏共情、嫉妒他人或认为他人嫉妒、傲慢态度。
  must_warn: []
- id: NPD_PREVALENCE
  title: 患病率
  source_page: 771
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 流行病学调查中位患病率约1.6%，范围从0%到6.2%。
  - 在普通人群中相对少见，但男性诊断比例更高（50%-75%）。
  must_warn: []
- id: NPD_COURSE
  title: 起病与病程
  source_page: 771
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 夸大特质在青少年中常见，但未必发展为障碍。
  - 可能因破产、离婚、失业等危机首次就诊或加重。
  - 随着新关系、真实成就和可承受的挫折可改善。
  must_warn: []
- id: NPD_RISK
  title: 风险与预后因素
  source_page: 772
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 个体主义文化背景下夸大特质更突出，但社交损害可能较轻。
  - 男性占诊断人群50%-75%，对压力反应更强，共情处理更差。
  - 低自尊、羞耻感、嫉妒等脆弱性使患者对批评极其敏感。
  must_warn: []
- id: NPD_DIFFERENTIAL
  title: 鉴别诊断要点
  source_page: 773
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 核心鉴别特征：夸大的自我重要性（自恋型独有），区别于表演型的妩媚、反社会型的冷酷、边缘型的依赖。
  - 自恋型自我形象和自控相对稳定，缺乏自我毁灭、冲动和分离焦虑，与边缘型不同。
  - 与反社会型区别：自恋型不一定有冲动攻击、欺骗史或童年品行问题。
  must_warn: []
- id: NPD_COMORBIDITY
  title: 常见共病
  source_page: 774
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 常与其他人格障碍（尤其表演型、边缘型、反社会型、偏执型、依赖型）共病。
  - 物质使用障碍、持续性抑郁障碍也较常见。
  - 需与躁狂/轻躁狂发作区分，后者有情绪变化和功能损害。
  must_warn: []
- id: NPD_SUICIDE
  title: 自杀风险与安全
  source_page: 772
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 在严重压力、失败或完美主义受挫时可能产生自杀意念。
  - 自杀企图较其他人格障碍更少冲动，但致死性更高。
  must_warn:
  - 在严重压力、完美主义受挫或感到失败时，可能产生自杀念头，需认真评估风险。
  - 自恋型人格障碍的自杀企图通常计划性更强、致死性更高，不能因其较少冲动而忽视危险。
