specialty: sleep_wake
specialty_zh: 睡眠-觉醒障碍
disease: narcolepsy
disease_zh: 发作性睡病
source: 《精神障碍诊断与统计手册（第五版，DSM-5-TR）》
entries:
- id: NARCOLEPSY_FEATURES
  title: 核心特征与定义
  source_page: 424
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 发作性睡病以反复出现的不可抗拒的白天睡眠发作、猝倒、下丘脑分泌素缺乏或REM睡眠异常为特征。
  - 猝倒是短暂（数秒至2分钟）双侧肌肉张力突然丧失，意识清醒，常由积极情绪（如大笑、惊喜）诱发。
  - 在儿童或急性起病者中，猝倒可表现为持续肌张力低下而非发作性，导致步态不稳、眼睑下垂等。
  - 诊断需符合嗜睡标准（每周≥3次，持续≥3个月）并伴至少一项：猝倒、下丘脑分泌素缺乏或睡眠实验室异常。
  must_warn: []
- id: NARCOLEPSY_CRITERIA
  title: 主要诊断标准
  source_page: 422
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 标准A：过去3个月内，每周至少3次出现不可抗拒的睡眠需求、坠入睡眠或白天小睡。
  - 标准B：至少满足以下之一：1) 猝倒发作（每月至少数次）；2) 脑脊液下丘脑分泌素-1水平≤110 pg/mL或≤健康值的1/3（排除急性脑损伤等）；3)
    夜间多导睡眠图显示REM潜伏期≤15分钟，或多睡眠潜伏期测试（MSLT）平均睡眠潜伏期≤8分钟且出现≥2次睡眠起始REM期。
  - 不存在其他可解释嗜睡或肌张力丧失的疾病（如睡眠剥夺、其他睡眠障碍、癫痫等）。
  must_warn: []
- id: NARCOLEPSY_SUBTYPES
  title: 亚型分类
  source_page: 423
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 1型发作性睡病（NT1）：伴猝倒或下丘脑分泌素缺乏，脑脊液下丘脑分泌素-1低，约占85-90%的猝倒患者。
  - 2型发作性睡病（NT2）：无猝倒且下丘脑分泌素正常或未测，诊断依赖MSLT阳性结果，但可靠性较低（复测一致性<50%）。
  - 若由其他疾病（如遗传病、肿瘤、头外伤等）引起，则编码为“因躯体疾病导致的发作性睡病”，并先编码基础疾病。
  - 严重度分为轻（每日1-2次小睡、猝倒<1次/周）、中（每日多次小睡、猝倒每日或每数日）、重（几乎持续嗜睡、夜间睡眠紊乱、猝倒耐药每日多次）。
  must_warn: []
- id: NARCOLEPSY_PREVALENCE
  title: 患病率
  source_page: 425
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - NT1（伴猝倒型）在全球成人中的患病率约为0.02%-0.05%，美国年发病率约0.74/10万人。
  - 不同地区有差异，以色列较低，日本高于欧美。
  - NT2的真实患病率尚不清楚，因诊断变异性大。
  - 男女发病率大致相等，但不同人群可能存在差异。
  must_warn: []
- id: NARCOLEPSY_COURSE
  title: 起病与病程
  source_page: 425
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 起病多在儿童期、青少年期或成年早期，高峰年龄15-25岁，极少在老年。
  - 起病可突然或渐进，约90%的患者首发症状为嗜睡，随后（1年内占50%，3年内占85%）出现猝倒。
  - 病程通常为持续性且终身，但症状可能随生活事件（如怀孕、压力）波动。
  - 约50%的成人患者回忆症状始于儿童或青春期，存在诊断延迟；突然起病的儿童症状最重，但头几年可部分改善。
  - 儿童和青少年可能因嗜睡出现攻击或行为问题，退休后可有更多午睡机会从而减少刺激物需求。
  must_warn: []
- id: NARCOLEPSY_RISK
  title: 风险与预后因素
  source_page: 426
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 遗传因素：同卵双生一致率25-32%，一级亲属患病率1-2%（较普通人群高10-40倍）。
  - 强烈关联HLA DQB1*06:02（见于85-95%的NT1患者），DQB1*03:01增加风险，DQB1*05:01等降低风险。
  - 环境诱因：A组链球菌感染、流感（尤其2009年H1N1大流行）及特定疫苗接种（如Pandemrix H1N1疫苗）可能触发自身免疫，数月后出现发作性睡病。
  - 头外伤和睡眠-觉醒模式的突然改变（如换工作、压力）也可能是诱因。
  must_warn: []
- id: NARCOLEPSY_DIFFERENTIAL
  title: 鉴别诊断要点
  source_page: 428
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 与特发性嗜睡症：后者的白天小睡更长、更不易恢复精力，夜间睡眠较长且中断少，无猝倒及REM睡眠侵入。
  - 与睡眠呼吸暂停：OSA常见，但若治疗后仍持续嗜睡，需考虑发作性睡病（尤其注意隐匿的猝倒）。
  - 与重性抑郁：两者均可有白天嗜睡，但发作性睡病有猝倒且MSLT显示客观嗜睡伴多次睡眠起始REM期，抑郁者MSLT多正常且主客观不一致。
  - 与功能性神经症状障碍（伪猝倒）：后者无力发作持续时间长、诱因不典型，MSLT无SOREMP，反射正常。
  - 与ADHD：儿童中嗜睡可表现为注意力不集中和行为问题，易误诊；注意鉴别。
  - 与精神分裂症：入睡前幻觉需与精神病性幻觉区分，发作性睡病的幻觉多包含视觉、听觉、触觉等多感官形式，与睡眠相关；而精神分裂症以言语性幻听为主。
  must_warn: []
- id: NARCOLEPSY_COMORBIDITY
  title: 常见共病
  source_page: 429
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 常见的躯体共病包括肥胖（尤其儿童急性起病时）、磨牙症、遗尿症、性早熟（儿童发病者）。
  - 常见的睡眠相关共病：异态睡眠（如梦游、REM睡眠行为障碍）、阻塞性睡眠呼吸暂停、不宁腿综合征、周期性肢体运动障碍。
  - 常见的精神共病：心境障碍（抑郁等）和注意缺陷/多动障碍（ADHD）。
  - 若现有发作性睡病突然加重，应怀疑合并睡眠呼吸暂停的可能。
  must_warn: []
- id: NARCOLEPSY_DIAGNOSTIC_MARKERS
  title: 诊断标志物与检测
  source_page: 427
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 标准诊断流程：夜间多导睡眠图（PSG）后次日行多睡眠潜伏期测试（MSLT）；检测前需停用精神药物、保证充足睡眠（理想2周）。
  - MSLT阳性标准：平均睡眠潜伏期≤8分钟，且4或5次小睡机会中≥2次出现睡眠起始REM期（SOREMP）。
  - 夜间睡眠起始REM期（nSOREMP，REM潜伏期≤15分钟）对NT1高度特异（95-97%），但敏感性中等。
  - 脑脊液下丘脑分泌素-1检测：特别适用于疑似伪猝倒、非典型猝倒或难治病例；结果不受药物或昼夜节律影响。
  - HLA DQB1*06:02阳性在NT1中占85-95%，但普通人群中也有12-38%阳性，故不用于诊断NT2。
  must_warn: []
