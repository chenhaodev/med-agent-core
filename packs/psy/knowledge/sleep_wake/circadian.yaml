specialty: sleep_wake
specialty_zh: 睡眠-觉醒障碍
disease: circadian
disease_zh: 昼夜节律睡眠-觉醒障碍
source: 《精神障碍诊断与统计手册（第五版，DSM-5-TR）》
entries:
- id: CRSD_CRITERIA
  title: 核心诊断标准与亚型分类
  source_page: 443
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 因昼夜节律改变或内源性节律与所需作息不匹配，导致持续或反复的睡眠紊乱。
  - 睡眠紊乱引起过度困倦或失眠（或两者兼有）。
  - 症状造成有临床意义的痛苦或社交、职业等重要功能损害。
  - 亚型包括：延迟睡眠相型、提前睡眠相型、不规律睡眠-觉醒型、非24小时型、倒班工作型。
  - 病程标注：发作性（1~3个月）、持续性（≥3个月）、复发性（1年内≥2次发作）。
  must_warn: []
- id: DELAYED_SLEEP_PHASE
  title: 延迟睡眠相型
  source_page: 444
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 主要睡眠期比期望时间延迟≥2小时，导致入睡困难、晨间唤醒困难和早段过度困倦。
  - 如果可以自由安排作息，睡眠质量和时长正常。
  - 青少年和年轻成人患病率最高（3.3%~4.6%），成人较低（0.2%~1.7%）。
  - 典型起病于青春期或成年早期，病程持续性，部分人随年龄减轻。
  - 风险因素：长于平均的昼夜周期、对晚间光敏感、清晨光不敏感、CRY1基因突变。
  - 需与青春期正常晚睡、失眠障碍及其他昼夜节律障碍鉴别。
  - 常共病抑郁障碍、人格障碍、注意缺陷/多动障碍、孤独症谱系障碍等。
  must_warn: []
- id: ADVANCED_SLEEP_PHASE
  title: 提前睡眠相型
  source_page: 446
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 主要睡眠期比期望时间提前≥2小时，导致早晨失眠和白天过度困倦。
  - 如果可以自由安排作息，睡眠质量和时长正常。
  - 美国中年成人患病率约1%，老年人更高。
  - 通常起病于晚年，家族型可起病于儿童或成年早期；病程持续性。
  - 风险因素：清晨光暴露过多、傍晚光暴露不足、PER2或CKIδ基因突变（常染色体显性）。
  - 需与自愿早起、其他导致早醒的障碍（如抑郁、失眠）鉴别。
  - 常因反复尝试再入睡而继发失眠障碍。
  must_warn: []
- id: IRREGULAR_SLEEP_WAKE
  title: 不规律睡眠-觉醒型
  source_page: 448
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 缺乏可辨别的昼夜节律，24小时内睡眠和觉醒碎片化，无主要睡眠期。
  - 最长睡眠期在凌晨2~6点，通常<4小时；白天频繁小睡。
  - 一般人群患病率未知，多见于神经退行性疾病（如阿尔茨海默病）和神经发育障碍儿童。
  - 病程持续性，起病年龄不定，老年人更常见。
  - 风险因素：环境光线和结构化活动减少、住院、神经退行性疾病等。
  - 需与自愿的不规律作息及不良睡眠卫生鉴别。
  - 常共病阿尔茨海默病、帕金森病、智力发育障碍、创伤性脑损伤等。
  must_warn: []
- id: NON24_SLEEP_WAKE
  title: 非24小时睡眠-觉醒型
  source_page: 449
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 睡眠-觉醒周期与24小时光暗周期不同步，入睡和觉醒时间每天持续后移。
  - 表现为交替的失眠、过度困倦和无症状期，取决于试图睡眠的时相。
  - 在盲人中患病率约50%，在视正常个体中罕见。
  - 病程持续性，起病取决于视觉受损时间；视正常者常起病于青春期。
  - 风险因素：盲（减少光感知）、光线和社交活动减少、累及昼夜节律的脑外伤。
  - 需与延迟睡眠相型（可能进展为此型）及抑郁障碍鉴别。
  - 常共病盲、抑郁障碍、双相障碍，伴社交隔离。
  must_warn: []
- id: SHIFT_WORK_TYPE
  title: 倒班工作型
  source_page: 450
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 因常规倒班工作（非加班）导致主要睡眠期失眠和主要清醒期过度困倦。
  - 恢复正常白天工作时症状可缓解。
  - 美国夜班工人患病率约5%~10%，随年龄增长上升。
  - 任何年龄均可出现，但>50岁更常见且随时间加重。
  - 风险因素：晨型倾向、需要长睡眠、育儿等社交需求压力。
  - 需与倒班正常困难、其他睡眠障碍（如呼吸相关、发作性睡病）鉴别。
  - 常共病酒精使用障碍、其他物质使用障碍、抑郁及多种身体疾病（心血管、糖尿病等）。
  must_warn: []
