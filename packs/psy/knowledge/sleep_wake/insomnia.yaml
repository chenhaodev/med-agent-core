specialty: sleep_wake
specialty_zh: 睡眠-觉醒障碍
disease: insomnia
disease_zh: 失眠障碍
source: 《精神障碍诊断与统计手册（第五版，DSM-5-TR）》
entries:
- id: INSOMNIA_DEFINITION
  title: 什么是失眠障碍
  source_page: 410
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 失眠障碍的核心是对睡眠数量或质量持续不满，伴有入睡困难、维持睡眠困难或早醒。
  - 这种睡眠问题会引发显著的痛苦，或损害社会、职业、学业等功能。
  - 诊断要求在有充足睡眠机会的情况下仍出现上述困难。
  must_warn: []
- id: DIAGNOSTIC_CRITERIA
  title: 主要诊断标准
  source_page: 410
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 至少符合以下一项：入睡困难、维持睡眠困难（频繁醒来或醒后难入睡）、早醒且无法再入睡。
  - 睡眠困难每周至少发生3晚，持续至少3个月。
  - 困难在足够睡眠机会下仍出现，且不能用其他睡眠障碍、物质使用或精神障碍更好解释。
  - 症状引起临床显著痛苦或功能损害。
  must_warn: []
- id: PREVALENCE
  title: 患病率与流行情况
  source_page: 413
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 约三分之一成年人报告失眠症状，10%-15%伴白天功能损害。
  - 符合失眠障碍诊断标准的成人约4%-22%，平均约10%，是所有睡眠障碍中最常见的。
  - 女性患病率高于男性，性别比约1.3:1，45岁后升至1.7:1。
  must_warn: []
- id: ONSET_COURSE
  title: 起病与发展过程
  source_page: 413
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 首次发作多见于青年期，也可始于儿童或青少年；女性更年期后新发病增多。
  - 失眠可为情境性（数天至数周）、持续性（≥3个月）或复发性（一年内两次以上）。
  - 约45%-75%患者1-7年随访仍持续存在，但夜间睡眠模式可有波动。
  must_warn: []
- id: RISK_FACTORS
  title: 风险与预后因素
  source_page: 414
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 易感因素包括焦虑/忧虑人格、高应激反应性、情绪压抑倾向。
  - 环境因素（噪音、光线、不适温度、高海拔）增加脆弱性。
  - 女性、高龄、家族史（35%-70%患者有一级亲属失眠史）显著相关。
  - 不良睡眠卫生（如咖啡因过量、不规律作息）是维持失眠的恶化因素。
  must_warn: []
- id: DIFFERENTIAL_DIAGNOSIS
  title: 鉴别诊断要点
  source_page: 416
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 需与正常短睡眠者区分：后者无入睡或维持困难，也无白天症状。
  - 昼夜节律睡眠-觉醒障碍（如睡眠时相延迟型）仅在试图按社会时间睡觉时出现失眠。
  - 不宁腿综合征特点为腿部不适和活动冲动；呼吸相关睡眠障碍常有打鼾和呼吸暂停。
  - 发作性睡病以白天过度嗜睡、猝倒等为主；物质引起的失眠可归因于特定物质使用。
  must_warn: []
- id: COMORBIDITY
  title: 常见共病
  source_page: 417
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 常与癌症、糖尿病、冠心病、慢性疼痛等医疗状况共病，且风险关系双向。
  - 约七分之一失眠障碍患者伴有中度至重度阻塞性睡眠呼吸暂停。
  - 约40%-50%失眠障碍患者共病精神障碍，尤其是抑郁、焦虑和物质使用障碍。
  - 持续性失眠是后续发生抑郁、焦虑、双相及物质使用障碍的风险因素或早期症状。
  must_warn: []
- id: FUNCTIONAL_CONSEQUENCES
  title: 功能后果与长期影响
  source_page: 416
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 白天常见疲劳、注意力不集中、易怒，增加事故风险。
  - 持续性失眠使新发重性抑郁障碍、焦虑障碍、物质使用障碍风险增加2倍以上。
  - 失眠障碍（尤其客观睡眠<6小时）显著增加高血压、冠心病、心衰、脑血管病风险。
  - 导致缺勤、生产力下降、生活质量和经济负担恶化。
  must_warn: []
- id: SUICIDE_RISK
  title: 自杀/自伤风险与安全
  source_page: 410
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 失眠症状可能独立增加自杀念头、自杀行为及死亡的风险，即使控制抑郁后仍如此。
  - 一项大学生研究中，有睡眠问题者31.3%有自杀念头，有自杀念头者82.7%存在睡眠问题。
  - 美国睡眠医学会共识：青少年睡眠<8小时与自伤、自杀念头和行为风险增加相关。
  must_warn:
  - 失眠症状可能显著增加自杀念头和自杀行为的风险，尤其在青少年中睡眠不足8小时与自伤相关。
  - 若出现自杀想法或行为，请立即联系专业心理危机干预或拨打紧急电话。
