# category_index.yaml — extracted from a fork's bin/router.sh by
# engine/tools/extract_router.py (data-driven routing). tier 2 = specialty
# `:general` fallback, only tried when tier 1 (disease-level) misses.
fallback: cardiology:general
max_domains: 2
domains:
  - domain: "depressive:pmdd"
    patterns: "经前烦躁|经前期烦躁|经前.*情绪|月经前.*情绪|月经前.*烦躁|经前综合征|经前易怒"
  - domain: "depressive:dmdd"
    patterns: "破坏性心境失调|心境失调|频繁.*暴怒|经常.*发脾气|易怒.*儿童|孩子.*暴怒|儿童.*脾气暴"
  - domain: "depressive:pdd"
    patterns: "持续性抑郁|恶劣心境|心境恶劣|长期抑郁|慢性抑郁|长年.*情绪低|多年.*抑郁"
  - domain: "depressive:mdd"
    patterns: "抑郁症|重性抑郁|重度抑郁|抑郁障碍|抑郁发作|情绪低落|心情低落|心情差|高兴不起来|兴趣减退|兴趣丧失|快感缺失|提不起劲|抑郁"
  - domain: "anxiety:panic"
    patterns: "惊恐|惊恐发作|惊恐障碍|濒死感|突然.*心慌.*害怕|突然.*极度.*恐惧|panic"
  - domain: "anxiety:social_anxiety"
    patterns: "社交焦虑|社交恐惧|社恐|怕见人|害怕.*社交|当众.*紧张|社交场合.*紧张|被人注视.*害怕"
  - domain: "anxiety:agoraphobia"
    patterns: "广场恐惧|不敢出门|害怕.*人多|人多.*害怕|公共场所.*恐惧|不敢.*坐车|不敢.*乘车|害怕.*封闭空间"
  - domain: "anxiety:specific_phobia"
    patterns: "特定恐惧|恐惧症|恐高|怕高|怕动物|幽闭恐惧|密闭.*害怕|怕打针|怕血|特定.*害怕|害怕.*特定"
  - domain: "anxiety:separation"
