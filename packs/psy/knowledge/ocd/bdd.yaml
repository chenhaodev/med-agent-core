specialty: ocd
specialty_zh: 强迫及相关障碍
disease: bdd
disease_zh: 躯体变形障碍
source: 《精神障碍诊断与统计手册（第五版，DSM-5-TR）》
entries:
- id: BDD_CORE_FEATURES
  title: 核心特征与定义
  source_page: 272
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 患者过分关注一处或多处外表细微缺陷，别人看不出或仅轻微存在。
  - 这种关注侵入性、耗时（平均每天3-8小时），难控制。
  - 患者常重复照镜子、过度修饰、抠皮肤或与他人比较外貌。
  must_warn: []
- id: BDD_DIAGNOSTIC_CRITERIA
  title: 主要诊断标准
  source_page: 272
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 标准A：持续关注别人看不到或仅轻微的外表缺陷。
  - 标准B：因担忧进行重复行为或心理活动（如比较）。
  - 标准C：引起显著痛苦或社交、工作等重要功能损害。
  - 标准D：若符合进食障碍标准，则不与体重担忧混同。
  - 可注明伴肌肉变形或洞察力水平（良好/差/缺如）。
  must_warn: []
- id: BDD_PREVALENCE
  title: 患病率与流行病学
  source_page: 274
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 美国成人点患病率2.4%（女2.5%，男2.2%）。
  - 国际范围同类似，约为1.7%-2.9%。
  - 在皮肤科患者中达11-13%，美容手术患者中13-15%。
  - 青少年及大学生中女孩/年轻女性患病率相对更高。
  must_warn: []
- id: BDD_DEVELOPMENT_COURSE
  title: 起病与病程
  source_page: 274
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 平均发病年龄16-17岁，中位15岁，最常见12-13岁。
  - 约三分之二患者在18岁前起病，多逐渐发展。
  - 通常为慢性病程，但接受循证治疗可改善。
  - 儿童/青少年与成人表现相似，老年发病知之甚少。
  must_warn: []
- id: BDD_RISK_PROGNOSIS
  title: 风险与预后因素
  source_page: 274
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 童年忽视、虐待、创伤以及受嘲弄经历与BDD相关。
  - BDD在OCD患者的一级亲属中患病率升高。
  - BDD症状遗传度估计37%-49%，与OCD有共享遗传易感性。
  - 女性可能遗传度更高。
  must_warn: []
- id: BDD_SUICIDALITY
  title: 自杀思想与行为风险
  source_page: 275
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - BDD患者出现自杀意念的风险约是健康对照的4倍。
  - BDD患者出现自杀未遂的风险约是对照的2.6倍。
  - BDD严重程度与自杀风险正相关，且独立于共病。
  - 许多患者将自杀念头主要归因于外表担忧。
  must_warn:
  - BDD患者有较高自杀思想和行为风险，需高度警惕。
  - 严重症状、共病抑郁或物质滥用时风险更高。
  - 患者常因外表痛苦而求医，应主动评估自杀风险。
- id: BDD_DIFFERENTIAL_DIAGNOSIS
  title: 鉴别诊断要点
  source_page: 276
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 与正常外表担忧区分：BDD关注过度、耗时、痛苦。
  - 与进食障碍区分：若担忧仅为体重/脂肪，则不诊断BDD。
  - 与OCD区分：BDD仅限于外表，洞察力更差，自杀风险更高。
  - 与疾病焦虑障碍区分：BDD不担心患病，无躯体化增加。
  - 与重性抑郁区分：BDD突出外表担忧和重复行为可助区分。
  - 与社交焦虑区分：BDD的社交回避源于外表缺陷恐惧。
  - 与妄想障碍/精神分裂区分：BDD无其他精神病症状。
  must_warn: []
- id: BDD_COMORBIDITY
  title: 常见共病障碍
  source_page: 275
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - BDD常共病重性抑郁障碍、进食障碍和物质使用障碍。
  - 男性更易共病物质使用障碍，女性更易共病进食障碍。
  - BDD与OCD有显著共病，且共享遗传风险。
  - 也常共病社交焦虑障碍、拔毛症、抠皮障碍等。
  must_warn: []
