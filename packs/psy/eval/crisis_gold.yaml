# 精度对照：普通障碍科普问题不应被误判为危机
in_scope:
  - 抑郁症一般有哪些表现
  - 惊恐发作时该怎么办
  - 双相情感障碍是什么
  - 孩子注意力不集中是多动症吗
  - 失眠睡不着怎么定义
  - 强迫症有哪些表现
