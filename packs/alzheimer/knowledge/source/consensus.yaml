  - id: 22
    domain: care
    title: BPSD 照护管理
    source_page: 158
    evidence_quality: 高
    recommendation_strength: 强推荐
    applicable_stages: [轻度, 中度, 重度]
    recommendation: >
      推荐根据患者 BPSD 的症状、认知水平、身体状态、生活能力状况制定个体化方案，
      优先使用非药物干预，确保安全并尊重患者的情感需求。
    key_points:
      - 非药物优先：音乐疗法、社交活动、宠物疗法、怀旧疗法等缓解焦虑和躁动症状
      - 轻度症状：减少嘈杂声、强光等外界刺激，保持生活空间简单有序；通过兴趣爱好设计简单活动
      - 遵循"三不"原则（不解释、不反驳、不对抗）应对固执、妄想、拒绝护理行为
      - 严重焦虑/抑郁/幻觉/攻击行为 → 可对症应用抗抑郁药物和抗精神病药物，需从低剂量起始
      - 抗精神病药物通常超说明书使用，不良事件发生率高，应避免过度依赖
    warning_flags:
      - 抗精神病药物使用必须就医，需密切监测副作用
      - 任何症状突然加重（感染、脱水、代谢失衡等）需及时就医
    evidence_summary: >
      国际指南推荐非药物方法作为管理 AD BPSD 的一线选择；音乐疗法和社交活动可减少激越和攻击行为；
      系统评价：整体干预（怀旧/音乐/认知/多感官）对 BPSD 疗效优于单独应用任一疗法。

  - id: 23
    domain: care
    title: AD 晚期照护
    source_page: 159
    evidence_quality: 低
    recommendation_strength: 弱推荐
    applicable_stages: [重度]
    recommendation: >
      AD 晚期患者的认知功能和运动功能均严重下降，ADL 完全依赖。
      照护应以人为本，满足其生活需求，减少并发症，维持患者的生存质量。
    key_points:
      - 通过爱抚、微笑、温和的语气传达关爱和安全感
      - 提供安全、熟悉和舒适的生活环境
      - 安宁疗护：给予身体护理和健康维护
      - 电动肢体按摩仪或徒手肢体按摩延缓肌肉萎缩，进行关节被动活动预防关节挛缩
      - 定时翻身预防压疮
      - 轻度吞咽障碍：尽量进食均质糊样食物，避免进食清水清汤以防误吸
      - 严重者需给予鼻饲或胃造瘘补充营养
      - 安宁疗护教育有助于为 AD 晚期患者实施以人为本的照护
    warning_flags:
      - 吞咽困难时严禁给予稀薄液体，必须是均质糊状食物
      - 严重吞咽障碍需就医评估鼻饲/胃造瘘
      - 定期评估皮肤、口腔、营养状态
    evidence_summary: >
      荟萃分析：安宁疗护可为 AD 晚期患者提供临终舒适度；
      RCT：对护理提供者进行安宁疗护教育有助于为 AD 晚期患者实施以人为本的照护。
