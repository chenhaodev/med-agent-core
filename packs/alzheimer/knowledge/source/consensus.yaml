# 阿尔茨海默病多元康复干预中国专家共识（2025）
# 来源：Chinese Journal of Alzheimer's Disease and Related Disorders 2025,8(3):147-165
# 共 23 条共识意见，覆盖预防/治疗/康复/照护 4 个领域

domain_map:
  prevention: "2.1 预防（社区）"
  treatment: "2.2 治疗（医疗机构）"
  rehabilitation: "2.3 康复（医疗机构及社区）"
  care: "2.4 照护（家庭及养老机构）"

consensus:

  # ───────────────────────────────────────────────
  # 2.1 预防
  # ───────────────────────────────────────────────

  - id: 1
    domain: prevention
    title: AD 不可控危险因素分级
    source_page: 150
    evidence_quality: 高
    recommendation_strength: 强推荐
    applicable_stages: [预防期]
    recommendation: >
      应根据年龄、性别、家族遗传史和早年受教育水平评估 AD 危险程度，进行量化分级（低危/中危/高危），
      以便制定个体化防控方案。
    key_points:
      - 年龄：65 岁以上每增加 5 岁，患病风险翻倍
      - 女性患病率约为男性 1.8 倍，死亡率是男性 2 倍
      - 遗传率约 58%～79%；携带 APOE ε4 基因风险显著升高
      - 受教育年限 < 6 年显著增加患病风险
    evidence_summary: >
      多项大样本前瞻性队列研究证实上述因素与 AD 发病率的独立相关性。
    see_also: [risk_factors#uncontrollable]

  - id: 2
    domain: prevention
    title: AD 可调控并存疾病危险因素分级
    source_page: 151
    evidence_quality: 高
    recommendation_strength: 强推荐
    applicable_stages: [预防期]
    recommendation: >
      推荐根据可调控的并存疾病种类和程度制定个体化防控方案。
    key_points:
      - 高血压控制不良 → 高危；良好控制后风险可降低
      - 糖尿病患者 AD 风险是非糖尿病者 2 倍（70 岁前每提早 5 年发病风险增 24%）
      - 抑郁有自杀念头、明显影响生活 → 高危
      - 听力受损严重（无法正常交流）→ 高危；助听器可降低风险
      - LDL 每增加 1 mmol/L，全因痴呆风险增加 8%；LDL >5 mmol/L → 高危
      - 高同型半胱氨酸 >30 μmol/L → 高危
      - 直立性低血压严重影响生活 → 高危
      - 视力重度损伤（无法看清物体）→ 高危
    evidence_summary: >
      多项 RCT 和系统综述证实上述疾病的危险程度量化分级。
    see_also: [risk_factors#controllable]

  - id: 3
    domain: prevention
    title: AD 可改变生活方式危险因素分级
    source_page: 152
    evidence_quality: 高
    recommendation_strength: 强推荐
    applicable_stages: [预防期]
    recommendation: >
      推荐根据可改变的生活方式和危险程度进行防控指导。
    key_points:
      - 社交孤立（基本无社会支持）→ 高危
      - 体力活动极少（每次 <20 分钟，每周 <3 次）→ 高危
      - 睡眠 <5 小时/日 → 高危（推荐 6～6.5 小时并增加慢波睡眠）
      - 每天吸烟 ≥20 支 → 高危（吸烟者 AD 风险高 56%）
      - BMI >30 kg/m²（过度肥胖）或 <16 kg/m²（过度消瘦）→ 高危
      - 酗酒（≥250 mL 40% 白酒/日）→ 高危
      - 长期高污染环境（PM2.5、铅、汞等有毒物质）→ 高危
    evidence_summary: >
      多项队列和系统综述显示社交孤立、低认知活动、体力不足等可通过干预降低风险。
    see_also: [risk_factors#lifestyle]

  # ───────────────────────────────────────────────
  # 2.2 治疗
  # ───────────────────────────────────────────────

  - id: 4
    domain: treatment
    title: 西药治疗（ChEIs / NMDA / DMT）
    source_page: 152
    evidence_quality: 高
    recommendation_strength: 强推荐
    applicable_stages: [轻度, 中度, 重度]
    recommendation: >
      推荐根据 AD 的不同严重程度针对性应用 ChEIs、NMDA 受体拮抗剂、调节脑-肠轴的药物和 DMT，
      以改善认知功能或延缓病程。
    key_points:
      - 轻中度：多奈哌齐等 ChEIs → 改善认知、日常生活能力，长期使用可延缓进展
      - 甘露特钠（GV-971）→ 重塑肠道菌群，抑制神经炎症，适合轻中度
      - 中重度：美金刚单用或联合 ChEIs → 改善整体认知和精神行为
      - 早期：仑卡奈单抗（Lecanemab）/ 多纳奈单抗（Donanemab）→ 延缓疾病进展
      - 注意：A β 单抗类药物需要在专科医生指导下使用，有 ARIA 风险
    warning_flags:
      - 抗精神病药物超说明书使用，从低剂量起始，密切监测副作用
      - 任何西药调整均需就医，家属不可自行增减
    evidence_summary: >
      多项 RCT 证实 ChEIs（多奈哌齐）显著改善认知；美金刚 RCT 证实中重度有效；
      GV-971 三期 RCT 证实改善轻中度认知；Lecanemab/Donanemab 3 期 RCT 延缓早期 AD 进展。

  - id: 5
    domain: treatment
    title: 传统中医药
    source_page: 153
    evidence_quality: 中
    recommendation_strength: 强推荐
    applicable_stages: [轻度, 中度, 重度]
    recommendation: >
      推荐根据 AD 不同阶段应用相应的中药和针灸，以改善患者认知功能及生活质量、延缓疾病进展。
    key_points:
      - 早期（肾精亏虚、脾肾两虚）→ 补肾填精、健脾益气，可选复方茯蓉益智胶囊或人参归脾丸
      - 中期（痰蒙清窍、瘀阻脑络）→ 化痰开窍、活血通络，可选补阳还五汤、红景天胶囊、天麻钩藤颗粒、天智颗粒
      - 晚期（虚极寒盛）→ 以解毒化浊、拔毒立本为主，可用黄连解毒汤加减
      - 针灸：益智四项针刺疗法、智三针等，刺激相关穴位
      - 天智颗粒 → 改善记忆力、执行力及 ADL
    evidence_summary: >
      多项初步研究和 RCT 显示中药复方和针灸对 AD 认知功能有一定改善，但证据质量较西药低。

  - id: 6
    domain: treatment
    title: 无创神经调控技术（TMS / tES）
    source_page: 153
    evidence_quality: 高
    recommendation_strength: 强推荐
    applicable_stages: [轻度, 中度]
    recommendation: >
      推荐应用经颅磁刺激（TMS）或经颅电刺激（tES）改善 MCI 及轻中度 AD 患者的认知功能、
      焦虑和抑郁情绪及睡眠障碍。
    key_points:
      - 靶点：左侧背外侧前额叶（DLPFC）或额顶回
      - rTMS 高频（≥5 Hz）→ 兴奋性干预，改善认知；20 次以上高频 rTMS 可显著改善轻中度 AD
      - tDCS 阳极（1.5～2 mA）刺激左侧 DLPFC → 改善认知和 MCI 短时训练成功率
      - tACS γ 波段（40 Hz, 1～1.5 mA）→ 改善认知、语言流利性
      - HD-tDCS / HD-tES → 高精度版，改善延迟记忆
    protocol_ref: protocols#neuromodulation
    warning_flags:
      - 有癫痫史、植入金属/起搏器者禁用 TMS
      - 需在具备资质的医疗机构实施
    evidence_summary: >
      多项系统综述和荟萃分析显示 rTMS 和 tDCS 对轻中度 AD 认知功能有显著改善效果，
      rTMS 联合认知训练效果优于单一应用。

  # ───────────────────────────────────────────────
  # 2.3 康复 — 认知疗法
  # ───────────────────────────────────────────────

  - id: 7
    domain: rehabilitation
    subdomain: cognitive
    title: 认知训练（CT）
    source_page: 154
    evidence_quality: 高
    recommendation_strength: 强推荐
    applicable_stages: [轻度, 中度]
    recommendation: >
      推荐轻中度 AD 患者根据评定结果中认知功能受损的范围及程度，开展个化和针对性认知训练，
      优先选择计算机化认知训练；有条件者可与神经调控技术联合或同步应用。
    key_points:
      - 评估工具：MMSE、MoCA、LOTCA、NCSE（综合）+ 单项认知域评估
      - 优先计算机化认知训练（CCT）：具难度自适应优势
      - 6 个认知域：复合性注意、知觉性运动、学习和记忆、语言、执行功能、社会认知
      - rTMS / 阳极 tDCS 联合 CT → 效果更优
    protocol_ref: protocols#cognitive_training
    evidence_summary: >
      30 例 RCT 证实计算机化认知训练可改善 AD 患者记忆力、执行力及 ADL；
      rTMS 联合 CCT 优于单一 rTMS；阳极 tDCS 同步认知训练可提升 MCI 短时训练成功率和长期记忆。

  - id: 8
    domain: rehabilitation
    subdomain: cognitive
    title: 认知刺激（CS）
    source_page: 154
    evidence_quality: 中
    recommendation_strength: 强推荐
    applicable_stages: [轻度, 中度]
    recommendation: >
      推荐轻中度 AD 患者参与小组形式的认知刺激治疗，以改善一般性认知功能和日常生活活动能力。
    key_points:
      - 形式：集体社交活动（回忆往昔、讨论时事、词语联想、自然娱乐、使用物品等）
      - 主要通过非特异性刺激认知功能，有娱乐性
    protocol_ref: protocols#cognitive_stimulation
    evidence_summary: >
      纳入 236 例 AD 的多盲多中心 RCT：连续 24 周 CS 可改善生活质量（QoL-AD）评分，
      提高口服多奈哌齐患者认知。系统综述显示 CS 可提升 AD 老年人整体认知、情绪、IADL 和生活质量。

  - id: 9
    domain: rehabilitation
    subdomain: cognitive
    title: 认知康复（CR）
    source_page: 155
    evidence_quality: 低
    recommendation_strength: 强推荐
    applicable_stages: [轻度, 中度]
    recommendation: >
      推荐轻中度 AD 患者早期介入认知康复干预手段，以改善患者的日常生活活动能力和生活质量。
    key_points:
      - 以目标为导向的个体化策略：学习相关知识并在日常生活中应用
      - 获得或维持最佳功能状态，改善生活质量、自我效能感、情绪和认知功能
      - 多在社区或家中进行
    protocol_ref: protocols#cognitive_rehabilitation
    evidence_summary: >
      RCT 显示 CR 联合 AChE-I 在改善认知方面优于 AChE-I 单药；
      1 年观察性研究中虽整体认知明显下降，但 CR 组 ADL 较对照组有所提高。

  # ───────────────────────────────────────────────
  # 2.3 康复 — 生活方式干预
  # ───────────────────────────────────────────────

  - id: 10
    domain: rehabilitation
    subdomain: lifestyle_nutrition
    title: 营养干预
    source_page: 155
    evidence_quality: 中
    recommendation_strength: 强推荐
    applicable_stages: [轻度, 中度, 重度]
    recommendation: >
      推荐 AD 患者摄入 ω-3 多不饱和脂肪酸、维生素、益生菌、膳食纤维等具有改善脑作用的营养物质，
      或进行饮食结构调整，以减缓认知下降速度或改善认知功能。
    key_points:
      - ω-3 PUFAs（DHA + EPA）→ 改善语言能力和运动认知功能
      - 大量维生素 E 可显著降低患 AD 风险
      - 益生菌（双歧杆菌、乳酸菌）→ 改善肠道菌群、减轻炎症反应，改善 MCI 认知
      - 石榴籽油 → 对中老年人整体认知和言语情景记忆有一定帮助
      - MIND 饮食 / 地中海饮食 → 维持或改善认知功能
    protocol_ref: protocols#nutrition
    evidence_summary: >
      163 例 MCI/AD 多中心双盲 RCT：2 年 DHA 或 EPA 可改善语言能力和运动认知；
      荟萃分析：大量维生素 E 显著降低 AD 风险；MIND 饮食 N Engl J Med 试验证实降低认知下降。

  - id: 11
    domain: rehabilitation
    subdomain: lifestyle_exercise
    title: 有氧运动
    source_page: 155
    evidence_quality: 高
    recommendation_strength: 强推荐
    applicable_stages: [轻度, 中度]
    recommendation: >
      推荐中等强度有氧运动作为 AD 患者改善整体认知功能和心肺功能的核心干预措施。
    key_points:
      - 运动形式：慢跑、快走、骑车、游泳、球类运动等
      - 强度：60%～75% 最大心率（约 220 - 年龄）
      - 时长：每次 30～60 分钟
      - 频率：每周 3～5 次
      - 有平衡障碍者在监护下进行或采用座椅式功率自行车
      - 主要机制：提高 BDNF 表达、降低炎症水平、减缓认知下降
    protocol_ref: protocols#aerobic_exercise
    evidence_summary: >
      27 项 RCT 系统综述和荟萃分析：有氧运动可显著改善 AD 认知功能；
      96 例轻中度 AD RCT：延缓整体认知衰退；对执行功能（抑制控制、工作记忆）和逻辑/情景/短期记忆均有改善。

  - id: 12
    domain: rehabilitation
    subdomain: lifestyle_exercise
    title: 力量运动及心身运动
    source_page: 156
    evidence_quality: 中
    recommendation_strength: 强推荐
    applicable_stages: [轻度, 中度]
    recommendation: >
      推荐轻中度 AD 患者进行中等强度的力量运动以及太极拳、瑜伽等心身运动，
      可以改善认知功能、肌肉功能、平衡功能及情绪状态。
    key_points:
      - 力量运动：哑铃、弹力带、等速器械或自身体重，每周 2 次以上
      - 太极拳：改善早期痴呆老人短期认知功能和心理健康；可降低跌倒风险
      - 八段锦、瑜伽、静态拉伸等 → 提高平衡协调能力、降低跌倒风险
      - 综合运动（有氧 + 力量 + 心身）→ 减缓 ADL 下降的有效预防方式
    protocol_ref: protocols#strength_exercise
    evidence_summary: >
      33 项 RCT 荟萃分析：力量运动可延缓 AD 整体认知和记忆功能下降；
      系统综述：力量运动通过提高海马中类胰岛素生长因子 IGF-1、BDNF 表达水平减缓认知衰退。

  # ───────────────────────────────────────────────
  # 2.3 康复 — 人工干预（怀旧/沉浸式）
  # ───────────────────────────────────────────────

  - id: 13
    domain: rehabilitation
    subdomain: humanistic
    title: 怀旧疗法
    source_page: 156
    evidence_quality: 高
    recommendation_strength: 强推荐
    applicable_stages: [轻度, 中度, 重度]
    recommendation: >
      推荐给予 AD 患者怀旧疗法，鼓励家属、亲友及护理人员参与，帮助改善记忆、情绪，提高生活质量。
    key_points:
      - 通过引导患者回忆过去的事件、感受和想法，激活长期记忆
      - 轻中度：减轻抑郁情绪、改善认知功能、改善 ADL
      - 中重度：增加社会参与度，改善生活质量
      - 推荐方案：连续 8～12 周，每周 1～2 次，每次 30～60 分钟
    protocol_ref: protocols#reminiscence
    evidence_summary: >
      多项多中心 RCT：怀旧疗法可改善 AD 整体认知、记忆、执行功能及情绪，提高生活质量。
      荟萃分析：提高 AD 认知和生活质量，减少抑郁和神经精神症状；显著改善中重度 AD 生活质量。

  - id: 14
    domain: rehabilitation
    subdomain: humanistic
    title: 沉浸式技术（VR / AR / MR）
    source_page: 156
    evidence_quality: 高
    recommendation_strength: 强推荐
    applicable_stages: [轻度, 中度, 重度]
    recommendation: >
      推荐给予 AD 患者沉浸式技术疗法，帮助改善认知功能障碍、执行功能障碍及抑郁焦虑等情绪障碍，
      提高日常生活能力。
    key_points:
      - VR（虚拟现实）：早期 AD → 模拟熟悉生活场景，改善即刻记忆和延迟记忆、视觉记忆和空间记忆及 ADL
      - AR / MR：中重度 AD → 创建沉浸式环境，吸引注意、激发大脑活动
      - VR 还能改善患者抑郁焦虑心理状态
      - 基于 VR 的认知训练对 MCI 和 AD 患者 ADL 尤其 IADL 有显著改善
    protocol_ref: protocols#vr_immersive
    evidence_summary: >
      系统综述：VR 干预对 AD 患者认知和身体平衡有显著改善；
      纳入 3 项 RCT 的试验：VR 干预对 AD 患者记忆力有显著改善作用；可改善认知和身体功能。

  # ───────────────────────────────────────────────
  # 2.3 康复 — 艺术疗法
  # ───────────────────────────────────────────────

  - id: 15
    domain: rehabilitation
    subdomain: art_therapy
    title: 音乐疗法
    source_page: 156
    evidence_quality: 中
    recommendation_strength: 强推荐
    applicable_stages: [轻度, 中度, 重度]
    recommendation: >
      推荐只要有可能，AD 患者均应优先选择唱歌或演奏等主动音乐干预；
      重度 AD 患者可选择听音乐等被动音乐干预。
    key_points:
      - 轻中度：主动干预（唱歌、乐器演奏、音乐创作、音乐问答、记忆音乐旋律与歌词等）
      - 重度：被动干预（听适合音乐或有放松催眠效果的音乐，每天 0.5～1 小时）
      - 形式：小组为主（3～5 人），每周 1～3 次，每次 20 分钟～2 小时
      - 主动音乐干预提高 MMSE 评分，改善工作记忆和情景记忆
      - 被动音乐治疗可稳定重度 AD 患者 BPSD
    protocol_ref: protocols#music_therapy
    evidence_summary: >
      90 例轻中度 AD RCT：每周 2 次，每次 45 分钟，连续 3 个月的主动团体音乐干预可显著改善认知、
      减轻 BPSD；系统综述：主动音乐预提高 MMSE 评分；被动音乐治疗稳定重度 AD BPSD。

  - id: 16
    domain: rehabilitation
    subdomain: art_therapy
    title: 舞蹈疗法
    source_page: 157
    evidence_quality: 中
