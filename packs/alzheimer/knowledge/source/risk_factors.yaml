# AD 危险因素量化分级表
# 来源：《阿尔茨海默病多元康复干预中国专家共识（2025）》表 1/2/3（第 150-152 页）
# 对应共识意见 1/2/3

# ───────────────────────────────────────────────
# 表 1：AD 不可控危险因素及其量化分级（共识 1）
# ───────────────────────────────────────────────
uncontrollable:
  - factor: 年龄
    low_risk: "< 45 岁"
    medium_risk: "45 ~ 65 岁"
    high_risk: "> 65 岁（每增加 5 岁，患病风险翻倍）"
    note: "年龄是 AD 不可控因素中影响最大的；65 岁以后每增加 5 岁，AD 患病风险翻倍"

  - factor: 性别
    low_risk: "男性"
    medium_risk: "—"
    high_risk: "女性（患病率约为男性 1.8 倍，死亡率是男性 2 倍）"
    note: "女性绝经后雌激素水平下降可能是部分原因"

  - factor: 家族遗传史
    low_risk: "无或仅有一名二级亲属（祖父母、叔伯姑舅姨等）为 AD 患者"
    medium_risk: "1 名一级亲属（父母、兄弟姐妹）为 AD 患者"
    high_risk: "多名一级或二级亲属为 AD 患者，或携带 APOE ε4 基因"
    note: "AD 遗传率约 58%～79%；携带 APOE ε4 基因者到 65 岁时绝大多数出现脑脊液 Aβ 水平异常，且 75% 出现 Aβ 扫描阳性"

  - factor: 早年受教育水平
    low_risk: "12 年以上"
    medium_risk: "6 ~ 12 年"
    high_risk: "< 6 年（受教育不足 6 年者痴呆发病率和患病率显著增高）"
    note: "早年教育水平可能与智力水平和认知储备有关"

# ───────────────────────────────────────────────
# 表 2：AD 可调控的并存疾病危险因素及其量化分级（共识 2）
# ───────────────────────────────────────────────
controllable:
  - factor: 直立性低血压
    low_risk: "偶有，伴或不伴轻度头晕"
    medium_risk: "常有直立性低血压伴头晕"
    high_risk: "直立性低血压严重，影响生活"
    note: "亚临床直立性低血压与痴呆风险增加相关；高血压控制良好后风险可降低"

  - factor: 听力障碍
    low_risk: "正常或轻度受损"
    medium_risk: "中度受损（高音量或安静时可正常交流）"
    high_risk: "严重受损以致难以正常交流"
    note: "听力障碍时间越长，痴呆风险越高；助听器可使风险降低"

  - factor: 低密度脂蛋白（LDL）增高
    low_risk: "< 3 mmol/L"
    medium_risk: "3 ~ 5 mmol/L"
    high_risk: "> 5 mmol/L 或伴动脉粥样硬化斑块"
    note: "LDL 每增加 1 mmol/L，全因痴呆风险增加 8%；高 LDL（>3 mmol/L）与痴呆风险增加相关"

  - factor: 抑郁
    low_risk: "无或轻度情绪低落，不影响生活"
    medium_risk: "症状较重，影响生活"
    high_risk: "有自杀念头，明显影响生活"
    note: "抑郁与认知功能下降密切相关；可能与海马萎缩或神经炎症有关"

  - factor: 创伤性颅脑损伤
    low_risk: "轻度脑震荡"
    medium_risk: "中度颅脑损伤伴短期认知障碍"
    high_risk: "重度颅脑损伤导致长期或永久性认知障碍"
    note: "5 次及以上脑震荡 AD 风险增加 2.8 倍"

  - factor: 糖尿病
    low_risk: "无糖尿病"
    medium_risk: "有糖尿病但控制良好"
    high_risk: "有糖尿病且控制不良"
    note: "糖尿病患者 AD 风险是非糖尿病患者的 2 倍；70 岁前每提早 5 年罹患 2 型糖尿病，痴呆风险增加 24%"

  - factor: 高血压
    low_risk: "无高血压"
    medium_risk: "有高血压但控制良好"
    high_risk: "有高血压且控制不良"
    note: "高血压可导致大脑低灌注、组织缺氧、白质损伤、海马萎缩等；控制良好后风险可下降"

  - factor: 视力障碍
    low_risk: "视力正常或轻度损伤但不影响日常活动"
    medium_risk: "中度损伤，影响阅读和驾驶等日常活动"
    high_risk: "重度视力损伤或盲，无法看清物体"
    note: "视力障碍者 AD 风险增加 40%～60%；白内障手术后视力障碍患者 AD 风险显著降低"

  - factor: 高同型半胱氨酸血症
    low_risk: "正常（5 ~ 15 μmol/L）"
    medium_risk: "轻度升高（> 15 且 ≤ 30 μmol/L）"
    high_risk: "重度升高（> 30 且 ≤ 100 μmol/L）"
    note: "高同型半胱氨酸每增加 5 μmol/L，AD 患病风险增加 15%；可能与神经元突触和神经递质传递障碍密切相关"

# ───────────────────────────────────────────────
# 表 3：AD 可改变的生活方式危险因素及其量化分级（共识 3）
# ───────────────────────────────────────────────
lifestyle:
  - factor: 社交活动少
    low_risk: "每周 2 次以上"
    medium_risk: "每周少于 1 次"
    high_risk: "基本无社会支持"
    note: "社交孤立与脑内 Aβ 沉积增加相关；蜘蛛、额叶和其他脑区的灰质量减少"

  - factor: 认知活动少
    low_risk: "职业复杂度高且脑力活动多"
    medium_risk: "职业复杂度中等和脑力活动一般"
    high_risk: "职业复杂度低且脑力活动少"
    note: "低认知活动水平导致认知储备降低，使 AD 的发病风险增加"

  - factor: 空气污染（PM2.5、铅、汞、农药等）
    low_risk: "无或低污染"
    medium_risk: "有一定污染但暴露时间较短"
    high_risk: "长期高污染环境或接触有毒有害物质"
    note: "PM2.5 每增加 10 μg/m³，AD 患病风险增加 15%～25%；长期暴露于高浓度二氧化氮增加 40%～50%"

  - factor: 体力活动不足
    low_risk: "中高强度（每次 40 分钟，每周 5 次以上）"
    medium_risk: "低强度活动（每次 20～40 分钟，每周 3～5 次）"
    high_risk: "缺乏体力活动（每次少于 20 分钟，每周少于 3 次）"
    note: "低体力活动可能与低灌注、神经元丢失、Aβ 和 Tau 蛋白沉积等有关"

  - factor: 吸烟
    low_risk: "不吸烟或每日少于 5 支"
    medium_risk: "每天吸烟 5～20 支"
    high_risk: "每天吸烟 20 支以上"
    note: "吸烟者比不吸烟者发生 AD 的风险升高 56%；可能与自由基、氧化应激、炎症反应、脑白质微结构损伤等有关"

  - factor: 睡眠时长（小时/日）
    low_risk: "7 ~ 8 小时"
    medium_risk: "5 ~ 6 小时"
    high_risk: "< 5 小时"
    note: "睡眠时间维持 6～6.5 小时并增加 <1 Hz 慢波睡眠有助于延缓或稳定 MCI 或 AD 早期群体认知功能"

  - factor: 体形过肥或过瘦（BMI）
    low_risk: "正常（18.5 ~ 24.9 kg/m²）"
    medium_risk: "肥胖（25 ~ 29.9 kg/m²）或消瘦（16 ~ 18 kg/m²）"
    high_risk: "过度肥胖（高于 30.0 kg/m²）或过度消瘦（低于 16.0 kg/m²）"
    note: "肥胖或超重可造成间歇性缺氧、高碳酸血症、肠道菌群失衡等；65 岁以上消瘦 AD 风险明显增加"

  - factor: 饮酒（40% 酒精含量的白酒）
    low_risk: "适量（少于 100 mL/日）"
    medium_risk: "过量（≥ 100 mL 但 ≤ 250 mL/日）"
    high_risk: "酗酒（≥ 250 mL/日以上）"
    note: "持续多量饮酒（>30 g/天）AD 风险增加；饮酒量减少后风险降低；酒精的神经元毒性作用导致大脑结构和功能损伤"
