insomnia_recommendations:

  - id: INS-1
    domain: insomnia
    title: "失眠的定义与慢性失眠诊断标准"
    source: "《中国成人失眠诊断与治疗指南（2023版）》"
    source_page: 561
    evidence_quality: A（高级证据）
    recommendation_strength: GPS（良好实践主张）
    applicable_population: "成人及6岁以上青少年"
    recommendation: >
      失眠是指尽管有合适的睡眠机会和睡眠环境，依然对睡眠时间和（或）
      睡眠质量感到不满意，并且影响日间功能或引起躯体不适的一种主观体验。
      慢性失眠的诊断须同时满足 A-F 全部标准。
    key_points:
      - "定义：有合适睡眠机会+环境，仍对睡眠时间/质量不满意，影响日间功能"
      - "主要症状：入睡困难（成人入睡潜伏期超过 30 min）/ 睡眠维持障碍（整夜觉醒次数≥2 次）/ 早醒 / 睡眠质量下降 / 总睡眠时间减少（通常少于 6.5 h）"
      - "A项：患者报告入睡困难/维持睡眠困难/早醒；B项：日间功能损害（疲劳/情绪低落/易激惹/躯体不适/认知障碍/焦虑/行为问题等）"
      - "C项：睡眠机会不当不能解释；D项：每周至少出现3次睡眠紊乱及日间症状；E项：症状至少已持续3个月"
      - "F项：失眠/觉醒困难不能由其他睡眠障碍更好地解释"
      - "慢性失眠：满足A-F全部 + ≥3次/周 + ≥3个月；短期失眠：满足A-C+F但持续不足3个月"
      - "部分人群虽睡眠时间短但没有日间症状，不应诊断为失眠"
    evidence_summary: >
      基于 ICSD-3（国际睡眠障碍分类第三版），该诊断标准已被国际上多个
      失眠指南采用（欧洲、美国 AASM、韩国等）。指南参考 2017-2023 年间
      新发表文献更新而来。

  - id: INS-2
    domain: insomnia
    title: "失眠的临床评估框架（3P 模型+量表+客观检查）"
    source: "《中国成人失眠诊断与治疗指南（2023版）》"
    source_page: 562
    evidence_quality: GPS
    recommendation_strength: GPS
    applicable_population: "失眠患者初次评估"
    recommendation: >
      失眠的临床评估包括病史采集、体格检查、主观评估和客观评估等手段。
      3P 模型（诱发因素/易感因素/维持因素）是失眠心理治疗技术选择的框架。
    key_points:
      - "3P 模型：诱发因素（负性生活事件、遗传因素、性格特征）/ 易感因素（认知偏差/睡前焦虑/在床上娱乐/卧床时间过长/作息不规律/运动过少）/ 维持因素（各类行为和认知维持失眠）"
      - "病史采集7项：失眠表现形式/严重程度/病程/诱发和加重因素/治疗情况/睡眠觉醒节律/用药情况/共病情况"
      - "主观量表：PSQI（总体质量）/ ISI（失眠严重程度）/ ESS（日间嗜睡）/ PSAS（睡前唤醒状态）/ DBAS（睡眠信念和态度）/ 情绪评估（HAMA/HAMD/BDI/STAI/GAD-7）"
      - "客观评估：PSG（鉴别诊断/疗效评价）/ MSLT（日间嗜睡/发作性睡病鉴别）/ 体动记录仪（昼夜节律评估/CBT-I 疗效监测）/ 可穿戴设备（多参数监测，不能替代 PSG）"
      - "实验室检查：排除系统性疾病（甲状腺/肾/肝/血红蛋白/铁/维生素 B12/D 等）"
    evidence_summary: >
      基于 GPS 级别，参考 OCEBM 2011 证据分级标准，综合国内外临床实践。

  - id: INS-3
    domain: insomnia
    title: "失眠治疗总体目标与序贯干预策略"
    source: "《中国成人失眠诊断与治疗指南（2023版）》"
    source_page: 563
    evidence_quality: A
    recommendation_strength: 强（I 级推荐）
    applicable_population: "慢性失眠成人患者"
    recommendation: >
      失眠的干预方式主要包括药物治疗、心理治疗、物理治疗和中国民族医药
      治疗等。CBT-I 是慢性失眠的初始治疗和一线治疗。短期失眠患者在无法
      完成 CBT-I 时，应积极寻找诱因，同时可药物治疗。
    key_points:
      - "五个总体目标：(1)改善睡眠质量和/或增加有效睡眠时间；(2)防止短期失眠转化为慢性失眠；(3)减少与失眠相关的躯体/精神障碍风险；(4)恢复日间社会功能；(5)尽可能避免包括药物在内各种干预带来的负面效应"
      - "序贯策略：CBT-I 一线 → 药物辅助 → 物理治疗/中医药作为添加或替代"
      - "干预方式不是互斥的：CBT-I 联合 non-BZDs 比单独使用任意一种能获得更多优势"
      - "CBT-I 对慢性失眠短期疗效与药物相当，长期疗效优于药物治疗"
    evidence_summary: >
      基于 A 级证据，指南工作组回顾 2017-2023 年 8 月文献，CBT-I 的一线
      地位已被美国 AASM、欧洲睡眠协会、美国医师学会（ACP）等多个权威
      机构推荐。

  - id: INS-4
    domain: insomnia
    title: "失眠药物治疗分类与序贯推荐方案（7条）"
    source: "《中国成人失眠诊断与治疗指南（2023版）》"
    source_page: 566
    evidence_quality: A
    recommendation_strength: 强（I 级推荐）
    applicable_population: "慢性或短期失眠成人患者（需药物干预时）"
    recommendation: >
      失眠药物分为 5 大类：苯二氮䓬受体激动剂（BZRAs，含 BZDs 和 non-BZDs
      及新型 BZRAs）、双重食欲素受体拮抗剂（DORA）、褪黑素及受体激动剂、
      抗组胺 H1 受体药物、具有镇静作用的抗抑郁药。序贯推荐方案 7 条。
    key_points:
      - "药物推荐第1条（A级 I级）：首选 non-BZDs/新型 BZRAs（唑吡坦、佐匹克隆、右佐匹克隆、扎来普隆、地达西尼）"
      - "药物推荐第2条（A级 I级）：首选双重食欲素受体拮抗剂（苏沃雷生/莱博雷生/达利雷生），因其无成瘾性已成为失眠治疗的新靶点药物"
      - "药物推荐第3条（B级 I级）：非处方药（多西拉敏/苯海拉明等）抗组胺药，临床上不推荐作为处方药使用"
      - "药物推荐第4条（B级 I级）：添加具有镇静作用的抗抑郁药（多塞平/曲唑酮/米氮平），尤其适于伴焦虑和抑郁失眠患者"
      - "药物推荐第5条（C级 I级）：抗精神病药不作为首选，仅适用于某些特殊情况（C级 I级推荐）"
      - "药物推荐第6条（A级 I级）：对长期应用 BZRAs 类慢性失眠患者至少每4周进行1次临床评估"
      - "药物推荐第7条（B级 I级）：推荐慢性失眠患者在医师指导下采用间歇治疗或按需治疗方式服用 non-BZDs"
      - "BZDs 禁用：重度 OSA 患者（A级 I级）；不作为慢性失眠一线用药"
      - "DORA 无次日残留，对认知及呼吸影响小，可用于轻中度 COPD 和 OSA 患者"
      - "停药原则：逐步减量（每2周减少1/4），不可突然停药；变更为间歇治疗"
    evidence_summary: >
      基于指南工作组系统综述，纳入多个 RCT 和网络 meta 分析结果。DORA 类
      药物近年在多项高质量 RCT 中证实安全性和有效性（A级证据）。

  - id: INS-5
    domain: insomnia
    title: "失眠心理行为治疗（CBT-I 8种核心技术）"
    source: "《中国成人失眠诊断与治疗指南（2023版）》"
    source_page: 568
    evidence_quality: A
    recommendation_strength: 强（I 级推荐）
    applicable_population: "慢性失眠成人患者（及适用的青少年/老年人）"
    recommendation: >
      CBT-I 是认知治疗和行为治疗的组合，是慢性失眠的初始治疗和一线治疗。
      CBT-I 8种核心技术详见表4，具体内容各有适应人群和推荐级别差异。
    key_points:
      - "CBT-I 核心技术1：睡眠卫生（I级推荐）- 提供与促进良好睡眠的环境因素/行为/习惯相关的一般建议"
      - "CBT-I 核心技术2：刺激控制法（I级推荐）- 重建睡眠与床之间积极联系；若15-20分钟内无法入睡则离床；避免在卧室里进行非睡眠活动"
      - "CBT-I 核心技术3：睡眠限制法（II级推荐）- 限制卧床时间以增加睡眠驱动力；允许在床的时间最初被限制为每晚平均睡眠时间；待睡眠效率≥85%后逐步增加"
      - "CBT-I 核心技术4：认知矫正（I级推荐）- 改变识别和取代关于睡眠和失眠功能失调的信念和态度"
      - "CBT-I 核心技术5：正念放松（I级推荐）- 任何有效的放松技术都可用；具体技巧包括冥想、肌肉放松、正念和呼吸技巧"
      - "CBT-I 核心技术6：矛盾意向（II级推荐）- 行为指导；通过在就寝时进行相反的意念控制，努力让自己保持清醒，避免睡着的方法"
      - "CBT-I 核心技术7：强化睡眠再训练（II级推荐）- 行为干预，通过在夜间监测在5分钟内增加睡眠驱动力；次日患者每30分钟尝试入睡，并在入睡后3分钟被唤醒"
      - "CBT-I 核心技术8：音乐疗法（II级推荐）- 心理调节，通过轻柔舒缓的音乐/白噪音可以使患者交感神经兴奋降低，缓解失眠症状"
      - "CBT-I 模式：个体和团体（传统式）+ 数字化网络式（dCBT-I）"
      - "CBT-I 标准疗程：6-8 次治疗，每次50分钟，每周1次"
    evidence_summary: >
      美国及欧洲推荐所有成年慢性失眠患者接受 CBT-I（A级）。CBT-I 可减轻
      失眠严重程度、缩短睡眠潜伏时间、减少入睡后清醒时间、提高睡眠质量
      和效率，且无明显不良反应。长期疗效优于药物治疗。

  - id: INS-6
    domain: insomnia
    title: "失眠物理治疗（rTMS/TES/ta-VNS/生物反馈/光照/声音6种）"
    source: "《中国成人失眠诊断与治疗指南（2023版）》"
    source_page: 569
    evidence_quality: B
    recommendation_strength: 弱（I-II 级推荐）
    applicable_population: "适合物理治疗的失眠患者（尤其不耐受药物者）"
    recommendation: >
      物理治疗相对安全、无创、操作简便、可接受度高，可作为失眠的一种
      治疗选择，单用或与药物治疗/心理治疗联合应用，尤其适合青少年、
      孕产期妇女、合并多种慢病的老年人群。
    key_points:
      - "rTMS：推荐作为单一疗法或辅助疗法改善失眠症状（B级 I级）；低频（≤1 Hz）rTMS 抑制大脑皮质兴奋性，是治疗慢性失眠的安全有效手段；国内推荐采用低频刺激双侧背外侧前额叶皮质（DLPFC）和顶枕区域改善睡眠质量"
      - "TES（经颅电刺激）：TES 可通过增加慢波改善睡眠质量（B级 I级）；tDCS：2 mA，治疗时间 20-60 分钟；tACS：在特定设备下可采用 77.5 Hz，强度 15 mA，30 min/d；注意不良反应（头皮不适/头晕/恶心/视觉现象）"
      - "ta-VNS：ta-VNS 可作为辅助治疗方式改善失眠（C级 不推荐）；注意机制尚不明确"
      - "生物反馈：生物反馈治疗可联合其他疗法改善失眠，疗效尚不明确（C级 II级）"
      - "光照疗法：光照治疗作为辅助疗法用于改善睡眠质量可能有用，最佳参数尚未确定（C级 II级）；通常使用 2500-10000 Lux，持续 30 min 至 2 h"
      - "声音疗法（音乐/白噪声/粉红噪声）：音乐对失眠患者睡眠质量有中到大的有益影响（A级 I级推荐）；噪声疗法疗效待进一步研究（C级 II级）"
    evidence_summary: >
      物理治疗研究目前多来自小样本研究，在慢性失眠治疗中证据存在争议。
      rTMS 目前累积多中心高质量证据最多（B级），光照、tDCS/tACS 等仍需
      进一步验证。

  - id: INS-7
    domain: insomnia
    title: "失眠中医药治疗（中成药/中医非药物/其他）"
    source: "《中国成人失眠诊断与治疗指南（2023版）》"
    source_page: 571
    evidence_quality: B（中级证据）
    recommendation_strength: 弱（II 级推荐）
    applicable_population: "失眠患者（尤其希望中医治疗者）"
    recommendation: >
      对于失眠患者，可考虑中成药单用或联合其他治疗改善睡眠质量，建议
      根据所属证型选用中药及中成药；可考虑针灸疗法或联合其他中医外治法；
      可考虑其他中医疗法或联合其他治疗改善睡眠质量。
    key_points:
      - "中成药方向（需辨证施治，由中医师处方）：代表性中成药包括酸枣仁类制剂（养血安神）、乌灵胶囊（补肾宁心）、甜梦口服液（益气安神）；联合其他治疗优于单用 non-BZDs"
      - "中医非药物治疗（C级 II级）：基于16项RCT系统评价，针刺、推拿、艾灸、耳穴压豆等可显著提高PSQI总分，可显著改善失眠抑郁程度"
      - "其他中医疗法（C级 II级）：穴位按压/穴位注射/中药足浴/推拿等有效改善睡眠质量且无明确不良反应，但仍需更多RCT证据"
      - "中医传统功法（II级）：八段锦、太极拳、五禽戏、六字诀、太极、气功等在临床亦有应用，其疗效有待进一步研究"
      - "植物提取物（C级 II级）：缬草、南非醉茄（ashwagandha）等，长期安全性数据有限，需谨慎"
    evidence_summary: >
      一项包含 27 项 RCT 的系统评价结果显示，中成药联合治疗优于单用
      non-BZDs，能有效改善失眠症状，安全性高。针灸及推拿的系统评价
      纳入多项 RCT，证据质量参差不齐。

  - id: INS-8
    domain: insomnia
    title: "老年人失眠治疗推荐（5条 A级I级）"
    source: "《中国成人失眠诊断与治疗指南（2023版）》"
    source_page: 572
    evidence_quality: A
    recommendation_strength: 强（I 级推荐）
    applicable_population: "≥65 岁老年失眠患者"
    recommendation: >
      老年失眠患者首选非药物疗法，尤其强调CBT-I为首选；药物治疗时更
      需加强注意药物相互作用和不良反应的发生可能；合理使用非苯二氮䓬
      类助眠药、食欲素受体拮抗剂、褪黑素受体激动剂。
    key_points:
      - "推荐(1)：老年失眠患者首选非药物疗法，尤其是CBT-I（A级 I级推荐）"
      - "推荐(2)：药物治疗推荐选择 non-BZDs、食欲素受体拮抗剂（DORA）、褪黑素受体激动剂和小剂量多塞平（A级 I级推荐）"
      - "推荐(3)：镇静催眠药物采用最低有效剂量开始，尽可能短期应用，密切观察药物不良反应（A级 I级推荐）"
      - "推荐(4)：长期间歇性用药时，在维持疗效的前提下推荐间歇疗法（D级 II级推荐）"
      - "推荐(5)：CBT-I 能缓解老年患者的失眠且耐受性好（A级 I级推荐）；药物治疗时更需注意药物相互作用和不良反应（如跌倒风险/认知障碍/谵妄/骨折）"
      - "BZDs 在老年人中使用需谨慎：增加跌倒、骨折和车祸的风险，使用时需谨慎（A级 I级推荐）"
      - "老年人食欲素受体拮抗剂（苏沃雷生/莱博雷生）有效，耐受性良好（A级 I级推荐）"
    evidence_summary: >
      基于 AGS Beers 标准（2023版）和多项针对老年人的 RCT 研究，老年人
      用 BZDs 风险显著高于年轻人。DORA 类药物在老年人中的安全性数据较好。

  - id: INS-9
    domain: insomnia
    title: "妊娠期/哺乳期+围绝经/绝经期+儿童青少年失眠"
    source: "《中国成人失眠诊断与治疗指南（2023版）》"
    source_page: 573
    evidence_quality: A-D
    recommendation_strength: 强-弱
    applicable_population: "特殊人群（孕妇/哺乳期/围绝经/绝经/儿童青少年）"
    recommendation: >
      妊娠期/哺乳期失眠患者首选睡眠卫生教育，推荐CBT-I；不满意者可选
      non-BZDs（D级 II级）。围绝经/绝经期需关注激素水平，针灸、CBT-I、
      睡眠卫生等均有效。儿童青少年首选CBT-I。
    key_points:
      - "妊娠期/哺乳期(1)：首选睡眠卫生教育，推荐CBT-I（A级 I级）"
      - "妊娠期/哺乳期(2)：CBT-I不满意时可考虑non-BZDs（D级 II级）；苯海拉明为B级可用于妊娠期；所有non-BZDs均为美国FDA妊娠用药分级中的C级"
      - "围绝经/绝经期：需关注激素水平，离激素替代治疗需多学科协同；非药物包括CBT-I/睡眠卫生/运动/冥想/针灸/芳香等（B级 I级）"
      - "儿童青少年(1)：首先尝试CBT-I（A级 I级）"
      - "儿童青少年(2)：CBT-I效果不佳时，考虑药物治疗（D级 II级）；BZDs过量风险高于成人，应限制其在儿童青少年中的应用"
    evidence_summary: >
      特殊人群的失眠研究相对不足，药物安全性数据尤其匮乏，指南推荐
      以 CBT-I 为首选，药物治疗需权衡风险/获益。

  - id: INS-10
    domain: insomnia
    title: "倒班人群失眠的管理（6条 A级 I级推荐）"
    source: "《中国成人失眠诊断与治疗指南（2023版）》"
    source_page: 573
    evidence_quality: A
    recommendation_strength: 强（I 级推荐）
    applicable_population: "轮班工作者（医护/运输/工厂等）"
    recommendation: >
      倒班人群经常存在睡眠不足、睡眠质量降低和昼夜节律紊乱。管理重点
      为睡眠环境优化、光照干预调节昼夜节律、合理午睡储备，并避免娱乐
      活动加重昼夜节律紊乱。
    key_points:
      - "推荐(1)：倒班结束后睡眠环境应避免光照及噪声污染（A级 I级）"
      - "推荐(2)：倒班前1小时内避免持续娱乐活动（A级 I级）"
      - "推荐(3)：为避免睡眠惯性影响，可在夜班前接受模拟晨光照射（A级 I级）；凌晨2-3点增加1次光照，并在凌晨增加4次高光照"
      - "推荐(4)：避免倒班频率过快，夜班时间尽量不超过16 h/周（A级 I级）"
      - "推荐(5)：所有条件者在轮班时小睡10-20分钟（A级 I级）"
      - "推荐(6)：值班前适当地储备睡眠（A级 I级）"
      - "白天小睡是倒班人群健康和幸福的重要措施，推荐有条件者小睡10-20 min（1-2次）"
    evidence_summary: >
      基于 Cochrane 系统评价（2023）及多项 RCT，光照干预是调节倒班人群
      昼夜节律的最有效方法之一。储备睡眠和环境优化有助于减少健康损害。

  - id: INS-11
    domain: insomnia
    title: "失眠伴 OSA（COMISA）及失眠+RLS 的治疗策略"
    source: "《中国成人失眠诊断与治疗指南（2023版）》"
    source_page: 573
    evidence_quality: A-C
    recommendation_strength: 强-弱
    applicable_population: "失眠合并 OSA（COMISA）或合并 RLS 的患者"
    recommendation: >
      失眠共病 OSA 被称为 COMISA。COMISA 患者 PAP 依从性差，建议 CBT-I
      优先治疗失眠，以提高 PAP 依从性。失眠共病 RLS 时总体原则是针对
      RLS 病因干预及诊治，BZDs 慎用。
    key_points:
      - "COMISA 定义：失眠与 OSA 同时共病，二者互相加重睡眠片段化及日间功能损害"
      - "COMISA 治疗(1)：PAP 依从性差时优先治疗失眠，首选 CBT-I；对 PAP 依从性好者，将 PAP 作为初始治疗（A级 I级）"
      - "COMISA 治疗(2)：BZDs 慎用于 COMISA 患者——加重 OSA（A级 I级）；DORA（苏沃雷生）可改善重度 COPD 和 OSA 患者呼吸功能"
      - "COMISA 中 CBT-I 可有效改善失眠症状，同时可能改善 PAP 的依从性，继而可能改善 OSA"
      - "失眠共病 RLS(1)：总体原则针对 RLS 病因干预及诊治，导致 RLS 的病因需要查找（C级 I级）"
      - "失眠共病 RLS(2)：失眠症状明显者可添加 GABA 活性睡眠药物或 α2δ 钙通道配体药物巴喷丁（BZDs 慎用）"
    evidence_summary: >
      COMISA 研究（Sweetman 等 2023）显示 CBT-I 可有效改善 COMISA 患者
      失眠，同时可能改善 PAP 依从性。RLS 共病失眠的管理需神经科协同。

  - id: INS-12
    domain: insomnia
    title: "失眠伴脑血管病/COPD/精神障碍的治疗策略"
    source: "《中国成人失眠诊断与治疗指南（2023版）》"
    source_page: 574
    evidence_quality: A-D
    recommendation_strength: 强-弱
    applicable_population: "失眠合并脑血管病/COPD/精神障碍的患者"
    recommendation: >
      对失眠合并各种躯体/精神障碍的患者，在治疗躯体/精神障碍的同时应
      对失眠进行评估及治疗。CBT-I 适用于大多数合并症情境。COPD 患者
      禁用 BZDs。
    key_points:
      - "失眠+脑血管病(1)：首选 CBT-I 和非药物治疗（经颅刺激/晨间光照/针灸）（A级 I级）"
      - "失眠+脑血管病(2)：常用药物为 BZRAs / 褪黑素受体激动剂 / 中药等；唑吡坦可改善脑血管病患者睡眠质量和血压波动"
      - "失眠+COPD(1)：适用于 CBT-I（C级 I级）"
      - "失眠+COPD(2)：推荐 non-BZDs（唑吡坦/右佐匹克隆）/ 食欲素受体拮抗剂（褪黑素受体激动剂/雷美替胺）改善 COPD 失眠"
      - "失眠+COPD(3)：**COPD 患者禁用 BZDs**（A级 I级推荐）——会增加高碳酸血症风险，急性加重期重症患者和限制性通气功能障碍失代偿期禁用"
      - "失眠+精神障碍(1)：精神科专业医师会诊，同时对精神疾病和失眠进行干预（D级 I级）"
      - "失眠+精神障碍(2)：首选 CBT-I，无效时用药物；若仍无效，联合治疗（A级 I级）"
      - "失眠+抑郁/焦虑药物治疗：推荐具有镇静作用的抗抑郁剂（阿戈美拉汀）或辅以镇静安眠药（A级 I级）"
      - "失眠+焦虑：以失眠为主时选具有抗焦虑作用的 BZDs；焦虑突出时选具有镇静作用的抗焦虑药（A级 I级）"
    evidence_summary: >
      对 COPD 患者 BZDs 禁用基于 A 级证据，多项系统评价证实 BZDs 会增加
      COPD 患者发生呼吸衰竭的风险（HR 约 1.5-1.8）。DORA 类（莱博雷生）
      被证实对重度 COPD 和 OSA 患者呼吸功能无负面影响。
      - "随访效果好者：可继续维持原方案或减少干预频次；效果差者：调整于预手段，必要时转诊"
