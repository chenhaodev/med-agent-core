# 睡眠指南结构化知识库 — 共识/推荐意见条目
# 来源：
#   PDF1：《成人阻塞性睡眠呼吸暂停诊断和外科治疗指南（2024）》
#          中华耳鼻咽喉头颈外科杂志，2025年7月，第60卷第7期，pp.716-758
#   PDF2：《社区老年人睡眠健康与康复管理中国专家共识（2025年版）》
#          中国全科医学，2025年10月，第28卷第29期，pp.3608-3618
#   PDF3：《中国成人失眠诊断与治疗指南（2023版）》
#          中华神经科杂志，2024年6月，第57卷第6期，pp.560-584
#          中国全科医学，2025年10月，第28卷第29期，pp.3608-3618

domain_map:
  osa_diagnosis:   "OSA 诊断、筛查与严重程度分级"
  osa_surgery:     "OSA 外科治疗（手术）"
  osa_nonsurgery:  "OSA 非手术治疗（CPAP/MAD/体位/减重）"
  elderly_sleep:   "社区老年人睡眠健康与康复管理"
  sleep_hygiene:   "睡眠卫生与行为干预（CBT-I/光照/运动）"
  comorbidity:     "睡眠障碍合并慢性疾病"
  medication:      "助眠药物与药物相关睡眠问题"

# ════════════════════════════════════════════════════════
# PDF1：OSA 诊断和外科治疗指南（2024）推荐意见
# 编号规则：指南推荐意见第 N 条（N=1-8，对应8个临床问题）
# ════════════════════════════════════════════════════════

osa_recommendations:

  - id: 1
    domain: osa_diagnosis
    title: "OSA 筛查：关注的临床症状、体征及合并病理生理损害"
    source: "《成人阻塞性睡眠呼吸暂停诊断和外科治疗指南（2024）》"
    source_page: 718
    evidence_quality: B
    recommendation_strength: 强推荐
    applicable_population: "疑似 OSA 的成人患者（≥18 岁）"
    recommendation: >
      推荐首先关注是否打鼾及打鼾的强度、频率和时间间隔；推荐关注
      睡眠憋气、呼吸暂停等临床表现。在体征方面，推荐重点关注颈围、
      腰围、腰臀比（WHR）、体质量指数（BMI）以及是否存在颌面畸形
      或咽腔狭窄。在生化指标方面，推荐重点关注血糖、胰岛素、血脂、
      血脂替代谢指标及甲状腺激素（GPS）。
    key_points:
      - "打鼾是 OSA 最常见症状（70%～95% OSA 患者有明显打鼾症状）"
      - "打鼾时间间隔指数（STII）与 AHI 相关性最强（r=0.89, P<0.01）"
      - "日间嗜睡是 OSA 重要危险因素（15%～50% OSA 患者有日间嗜睡）"
      - "肥胖（较粗颈围/腰围/BMI/WHR）是重要体征，颈围与 OSA 严重程度相关"
      - "颌面畸形和咽腔狭窄是 OSA 发生的解剖学基础"
      - "单一症状或体征不能可靠诊断 OSA，需结合临床症状和睡眠中异常呼吸的客观表现"
    evidence_summary: >
      制订工作组共提取 3 篇系统评价，原始研究 20 篇。打鼾时长占比与 AHI
      相关性（r=0.39，P=0.17），打鼾强度（r=0.82，P<0.01）和 STII（r=0.89，
      P<0.01）与 AHI 相关性更强。

  - id: 2
    domain: osa_diagnosis
    title: "OSA 筛查工具推荐"
    source: "《成人阻塞性睡眠呼吸暂停诊断和外科治疗指南（2024）》"
    source_page: 721
    evidence_quality: B
    recommendation_strength: 弱推荐
    applicable_population: "疑似 OSA 的一般成人及特殊人群"
    recommendation: >
      一般人群中常用的 OSA 筛查工具推荐意见：筛查可使用 STOP-Bang
      问卷（SBQ）和 NoSAS 评分分类筛查 OSA 患者；ESS 和 BQ 也可用于
      OSA 筛查，但实用价值较低。商用机动车辆驾驶员推荐进行 OSA 早期
      评估，推荐使用 SBQ 等客观或主观筛查手段。妊娠期推荐对所有孕妇
      进行 OSA 症状筛查。III 型便携式监测（PM）可作为 AF、CHF 患者中
      OSA 筛查的可靠工具。
    key_points:
      - "SBQ≥3 分：识别轻/中/重度 OSA 灵敏度分别为 92%/95%/96%，特异度 35%/27%/28%"
      - "ESS 灵敏度 49%，BQ 灵敏度较低，两者作为一线筛查工具证据不足"
      - "NoSAS 评分可识别潜在 OSA，灵敏度 79.80%，特异度 58.20%"
      - "III 型 PM 诊断 OSA 灵敏度 86.70%，特异度 76.50%，适用于 AF/CHF 患者中筛查"
      - "SBQ 是目前识别 OSA 灵敏度最高的筛查工具，适合 OSA 风险分层"
      - "DM 常与 OSA 共病，建议对 DM 患者进行 OSA 筛查（GPS）"
    evidence_summary: >
      制订工作组提取 4185 篇文献，筛选 3 篇证据纳入指南，包括 1 部指南和
      2 篇系统评价。Chen 等茎分析（10 项研究，n=14510）发现 NoSAS 识别
      可能 OSA 患者灵敏度 79.80%、特异度 58.20%。

  - id: 3
    domain: osa_diagnosis
    title: "OSA 诊断、鉴别诊断与严重程度分级"
    source: "《成人阻塞性睡眠呼吸暂停诊断和外科治疗指南（2024）》"
    source_page: 724
    evidence_quality: B
    recommendation_strength: 强推荐
    applicable_population: "疑似 OSA 患者"
    recommendation: >
      推荐使用 2023 年 AASM 国际睡眠障碍分类-第 3 版（ICSD-3-TR）中的诊断
      标准对疑似 OSA 患者进行诊断及 2018 年成人阻塞性睡眠呼吸暂停多学科
      诊疗指南中的标准进行严重程度分级。推荐将疑似 OSA 患者与单纯性打鼾、
      CSA 等疾病进行鉴别。建议将 ODI 作为判断 OSA 严重程度的一种重要参考
      指标。SASHB 和 REM-AHI 可用于 OSA 诊断及分级参考（GPS）。
    key_points:
      - "AHI 5～15 次/h 为轻度 OSA；15～30 次/h 为中度 OSA；≥30 次/h 为重度 OSA"
      - "PSG 诊断标准（ICSD-3-TR）：存在 A+B 或 C+D，AHI≥5 次/h"
      - "A：存在症状（嗜睡/憋气/觉醒/打鼾/夜间窒息/QOL受损）"
      - "B：PSG 或 OCST 证实 AHI≥5 次/h；C：PSG/OCST AHI≥15 次/h；D：无法用其他原因解释"
      - "ODI 比 AHI 更简便，对中重度 OSA 诊断准确性较高"
      - "重度 OSA（AHI≥30 次/h）可进一步按 AHI 30～55 次/h 和 AHI≥55 次/h 分层分析"
    evidence_summary: >
      制订工作组提取 6 篇 OSA 诊断标准相关指南（n=5，71，95-98）。AASM 2017
      推荐 5 次/h≤AHI<15 次/h 为轻度、15 次/h≤AHI<30 次/h 为中度、AHI≥30
      次/h 为重度 OSA，以最低血氧饱和度（LSaO2）作为辅助依据。

  - id: 4
    domain: osa_nonsurgery
    title: "OSA 的常用治疗方法（非手术部分）"
    source: "《成人阻塞性睡眠呼吸暂停诊断和外科治疗指南（2024）》"
    source_page: 726
    evidence_quality: A
    recommendation_strength: 强推荐
    applicable_population: "各严重程度 OSA 成人患者"
    recommendation: >
      推荐 BMI≥25 kg/m² 者减重；推荐改变生活方式：戒烟、避免过度疲劳、
      戒酒及慎用镇静安眠类药物。推荐体位性 OSA 患者行体位治疗。推荐
      无创气道正压通气（NPPV）作为 OSA 一线治疗，个体化选择 NPPV
      治疗模式。推荐持续气道正压通气（CPAP）为 OSA 首选治疗。推荐
      APAP 及 BiPAP 为 CPAP 不耐受患者的备选方案。口腔矫治器（MAD）
      推荐用于单纯鼾症、轻中度 OSA，或与手术联合治疗中重度 OSA。
    key_points:
      - "CPAP：首选治疗，证据等级 A，强推荐；建议首次佩戴前进行压力滴定"
      - "APAP/BiPAP：CPAP 不耐受患者的备选，证据等级 B，强推荐"
      - "MAD：适用于单纯鼾症、轻中度 OSA（BMI<32 kg/m² 的轻中度优先）"
      - "减重：BMI≥25 减重，体重每减轻 10%，AHI 将降低 26%；证据 B，强推荐"
      - "体位治疗：适用于体位相关性 OSA（POSA），依从性优于 CPAP；证据 C，弱推荐"
      - "戒烟戒酒：证据 B（戒烟）强推荐；酒精相关证据 D，弱推荐"
      - "CPAP 治疗建议首次佩戴前压力滴定，确定能消除所有睡眠时相及不同体位的呼吸事件"
    evidence_summary: >
      制订工作组提取 PAP 相关国内外指南 14 篇，高质量系统评价 10 篇（166-175）。
      最新 AASM 茎分析纳入 184 项原始研究，结果显示 PAP 可有效缓解呼吸暂停
      发生频率和持续时长。体重每增加 10%，AHI 将升高 32%；体重每减轻 10%，
      AHI 将降低 26%（n=1420，RCT 研究）。

  - id: 5
    domain: osa_surgery
    title: "OSA 外科治疗方法（手术选择）"
    source: "《成人阻塞性睡眠呼吸暂停诊断和外科治疗指南（2024）》"
    source_page: 727
    evidence_quality: B
    recommendation_strength: 强推荐
    applicable_population: "存在解剖异常或 CPAP 不耐受的 OSA 患者"
    recommendation: >
      推荐气道解剖结构异常或不耐受 NPPV 患者进行相应外科治疗。OSA
      外科治疗方案选择见表 4（具体术式及适应症按解剖平面分级）。上气道
      手术治疗应根据患者情况选择性地实施手术治疗。
    key_points:
      - "鼻腔平面：鼻腔成形术（鼻中隔/鼻甲/鼻息肉）→ 适用于鼻腔通气道解剖异常患者（B，强推荐）"
      - "UPPP（悬雍垂腭咽成形术）→ 非严重肥胖的轻中度 OSA，扁桃体 II 级以上肥大（B，强推荐）"
      - "软腭植入术 → BMI<32 kg/m² 的轻度 OSA 或单纯鼾症（B，强推荐）"
      - "扁桃体切除术 → 扁桃体 II 级以上肥大的轻中度 OSA（B，强推荐）"
      - "舌下神经刺激（HNS）→ 咽区非向心性塌陷的中重度 OSA，CPAP 不耐受（B，强推荐）"
      - "颌骨前移术（MMA）→ 合并颌面部畸形的中重度 OSA，或已行其他手术但失败的患者（A，强推荐）"
      - "气管切开 → 无其他治疗选择或临床紧急情况（A，强推荐）"
      - "减重代谢手术 → BMI≥32.5 kg/m² 的重度 OSA（B，强推荐）"
    evidence_summary: >
      UPPP：最新茎分析纳入 59 项原始研究（n=2715），腭咽成形术可有效缓解 AHI
      （MD=19.90，P<0.01）。HNS：茎分析纳入 44 项原始研究（n=8670），3年随访
      AHI 降低 MD=20.61（P<0.01）。MMA：茎分析纳入 87 篇原始研究，结果显示
      AHI 降低 MD=-33.36，P<0.01（f²=77%）。

  - id: 6
    domain: osa_surgery
    title: "OSA 外科手术适应证、禁忌证及主要并发症"
    source: "《成人阻塞性睡眠呼吸暂停诊断和外科治疗指南（2024）》"
    source_page: 730
    evidence_quality: B
    recommendation_strength: 强推荐
    applicable_population: "考虑接受 OSA 上气道手术的患者"
    recommendation: >
      上气道手术治疗应根据患者情况选择性地实施手术治疗。上气道手术
      适应证、禁忌证及主要并发症详见表 5。
    key_points:
      - "适应证一：不耐受 PAP，拒绝 PAP，存在 PAP 禁忌证或因 PAP 压力相关不良反应无法适用（B，强推荐）"
      - "适应证二：PAP 依从性差或明确存在解剖异常，推荐上气道手术为初始治疗（B，强推荐）"
      - "禁忌证：全身状况差/妊娠/急性感染期/药酒依赖/精神疾病/不接受手术风险/智力障碍"
      - "主要并发症（全身）：窒息、出血、水肿、肺炎、心律失常、尿潴留"
      - "鼻腔平面：出血、鼻中隔穿孔、粘连、鼻甲缺失"
      - "软腭平面：腭咽关闭不全、吞咽困难、咽异物感、口鼻瘘"
      - "舌根平面：血管/神经损伤"
      - "会厌平面：吞咽功能损伤、误吸"
      - "颌面矫形手术：口周/下颌区感觉异常等"
    evidence_summary: >
      制订工作组尚未提取到 OSA 手术相关禁忌证的直接证据，推荐意见参考
      既往手术相关指南及专家共识总结。并发症系统评价提取 5 篇（262-266），
      茎分析纳入 10 项原始研究（n=1836）。

  - id: 7
    domain: osa_surgery
    title: "OSA 上气道手术前评估方法"
    source: "《成人阻塞性睡眠呼吸暂停诊断和外科治疗指南（2024）》"
    source_page: 731
    evidence_quality: B
    recommendation_strength: 强推荐
    applicable_population: "拟行 OSA 上气道手术的患者"
    recommendation: >
      推荐上气道手术前进行上气道评估，明确上气道的狭窄塌陷部位及
      性质；可用的评估方法包括 Friedman 分型、TCM 系统评分、纤维鼻
      咽喉镜、药物诱导睡眠内镜（DISE）、上气道 CT、X 线头影测量等。
    key_points:
      - "Friedman 分型：预测腭咽手术（尤其 UPPP）疗效；I/II/III/IV 型手术成功率分别为 80.60%/37.90%/8.10%/0%"
      - "DISE：识别塌陷部位，指导联合多平面手术；68.2% 患者存在多平面阻塞"
      - "X 线头影测量：判断无上气道骨性狭窄，指导颌骨手术设计和开展"
      - "对考虑 HNS 治疗的患者，术前还需进行 DISE 检查"
      - "对考虑颌骨前移手术的患者，术前还需行全颌曲面断层片及头影测量"
    evidence_summary: >
      制订工作组提取 6 篇系统评价（24，302-306），2 篇原始研究，探讨了
      OSA 手术的影像学评估。Friedman 分型接受 UPPP 患者 I/II/III 型手术
      成功率为 80.60%/37.90%/8.10%，IV 型无显著变化（n=254，n=275）。

  - id: 8
    domain: osa_surgery
    title: "OSA 上气道手术围手术期注意事项"
    source: "《成人阻塞性睡眠呼吸暂停诊断和外科治疗指南（2024）》"
    source_page: 733
    evidence_quality: A
    recommendation_strength: 强推荐
    applicable_population: "接受 OSA 上气道手术的患者（术前、术中、术后）"
    recommendation: >
      围手术期使用 CPAP 治疗可减轻上气道水肿，改善肺功能。OSA 患者
      应准备困难气道预防和应急措施。术后建议采取半卧位或侧卧位，使用
      脉搏血氧仪及心电监护设备监测氧合。
    key_points:
      - "困难气道预防：建议准备困难气道预防和应急措施（A，强推荐）；OSA 插管困难风险升高 2-4 倍"
      - "围手术期 CPAP：中度 OSA 术前使用 1-3 晚（C，弱推荐）；重度 OSA 术前 3-5 晚（C，弱推荐）"
      - "术后体位：建议采取半卧位或侧卧位，避免仰卧位（B，弱推荐）"
      - "微创手术（RP/TBRF等）：术后无需长时间监测（D，弱推荐）"
      - "颈/舌前移术、舌中线切除术、会厌部分切除术、MMA 患者需延长监测时间"
      - "重度 OSA 患者可能需延长监测，合并 CVD 患者应情增延长监测时间"
    evidence_summary: >
      制订工作组提取 OSA 手术相关监测相关指南 2 篇（90，274），共识 2 篇，
      系统评价 2 篇，原始研究 22 篇。围手术期 CPAP 系统评价（6 研究，
      n=904）发现行上气道手术 OSA 患者围手术期使用 CPAP 与术后不良事件
      发生方面无显著差异，但 CPAP 组术后 AHI 明显降低，时间缩短。

  - id: 9
    domain: osa_surgery
    title: "OSA 上气道手术疗效评价标准"
    source: "《成人阻塞性睡眠呼吸暂停诊断和外科治疗指南（2024）》"
    source_page: 735
    evidence_quality: A
    recommendation_strength: 强推荐
    applicable_population: "接受 OSA 上气道手术后随访的患者"
    recommendation: >
      建议根据 PSG、主观症状、CVD 风险等多维指标的改善综合评估。
      治疗显效的客观标准为 AHI<20 次/h 且降低幅度≥50%；LSaO2>85%
      且日增加值≥3% 也作为参考。
    key_points:
      - "有效标准（主要）：AHI<20 次/h 且降低幅度≥50%（证据等级：A；强推荐）"
      - "辅助有效标准：LSaO2>85% 且日增加值≥3%（证据等级：C；弱推荐）"
      - "综合评估维度：PSG 指标 + 主观症状（ESS/打鼾/日间嗜睡）+ CVD 风险改善"
    evidence_summary: >
      上述有效标准是国内外指南和临床研究中常用的疗效评价标准，沿用
      AASM 指南及我国 2018 年多学科诊疗指南的定义。

# ════════════════════════════════════════════════════════
# PDF2：社区老年人睡眠健康与康复管理共识（2025年版）推荐意见
# 编号规则：共识第 N 条（N=1-11）
# ════════════════════════════════════════════════════════

elderly_sleep_recommendations:

  - id: 10
    domain: elderly_sleep
    title: "共识第1条：老年人睡眠健康管理目标与纳入范围"
    source: "《社区老年人睡眠健康与康复管理中国专家共识（2025年版）》"
    source_page: 3611
    evidence_quality: GPS（专家共识）
    recommendation_strength: 推荐
    applicable_population: "基层医疗卫生机构接受健康管理服务的 65 岁及以上老年人"
    recommendation: >
      建议基层医疗卫生机构将所有接受健康管理服务的老年人纳入睡眠健康
      与康复管理对象范围，并以家庭医生签约团队为核心组建老年人睡眠健康
      康复管理团队。该团队应根据实际条件配置相关医务人员，理想情况下
      应包括全科医生、康复科医生、中医科医生、精神（心理）科医生、
      内分泌科医生、骨科医生、营养科医生、康复治疗师、心理治疗师及
      护士，同时建立完善的"上下转诊、双向转诊"机制。
    key_points:
      - "管理对象：65 岁及以上老年社区居民（在基层医疗机构接受健康管理服务）"
      - "核心团队：家庭医生签约团队（全科医生主导）"
      - "转诊机制：基层首诊 + 双向转诊（与上级专科医院建立协作）"
      - "老年人睡眠障碍患病率 46.0%，1.36 亿 60 岁及以上老年人存在不同程度睡眠问题"

  - id: 11
    domain: elderly_sleep
    title: "共识第2条：老年人睡眠健康基本信息采集"
    source: "《社区老年人睡眠健康与康复管理中国专家共识（2025年版）》"
    source_page: 3612
    evidence_quality: GPS
    recommendation_strength: 推荐
    applicable_population: "社区老年人初次评估"
    recommendation: >
      全科医生在初次评估时应系统采集老年人的睡眠相关基本信息，包括
      主观睡眠症状、既往史、精神心理状态、体格检查结果及药物使用情况，
      初步区分原发性与继发性睡眠障碍，为后续的干预决策、分级管理和
      必要的转诊提供依据。
    key_points:
      - "睡眠史：了解睡眠障碍相关症状及诱因、日间功能受损情况、睡眠习惯、睡眠时间/环境"
      - "体格检查：评估高血压、糖尿病、呼吸系统疾病、心血管疾病、神经系统疾病等"
      - "用药情况：了解可能影响睡眠的药物（利尿剂、糖皮质激素、镇静催眠药、抗抑郁药、抗精神病药等）"

  - id: 12
    domain: elderly_sleep
    title: "共识第3条：主观评估——推荐使用 PSQI"
    source: "《社区老年人睡眠健康与康复管理中国专家共识（2025年版）》"
    source_page: 3612
    evidence_quality: GPS
    recommendation_strength: 推荐
    applicable_population: "社区老年人睡眠质量评估"
    recommendation: >
      基层医务人员可采用简便、易行的量表工具评估老年人睡眠状况。推荐
      使用匹兹堡睡眠质量指数（PSQI）对老年人整体睡眠质量进行评估。
      PSQI 共 7 个维度、9 个条目，完成时间 5～10 分钟，总分 0～21 分。
      根据 PSQI 评分结果给予相应干预举措。
    key_points:
      - "PSQI ≤5 分：正常睡眠质量，日间功能不受影响 → 每年常规体检时随访 1 次"
      - "PSQI 6～10 分：轻度睡眠障碍，日间功能影响较轻 → 健康教育 + 睡眠卫生行为干预"
      - "PSQI 11～15 分：中度睡眠障碍，日间功能明显受损 → 康复治疗 + 心理干预"
      - "PSQI >15 分：重度睡眠障碍，可能合并其他精神障碍 → 转专业机构，制订个体康复计划"
      - "其他量表：失眠严重程度指数（ISI）可用于失眠评估；OSA-50 筛查问卷可用于 OSA 风险筛查"
      - "RU-SATED 量表：6 个条目，0-2 分 Likert 3 级评分，总分 12 分，用于睡眠健康评估"

  - id: 13
    domain: elderly_sleep
    title: "共识第4条：客观评估——睡眠监测方法选择"
    source: "《社区老年人睡眠健康与康复管理中国专家共识（2025年版）》"
    source_page: 3613
    evidence_quality: GPS
    recommendation_strength: 推荐
    applicable_population: "有条件的基层医疗机构"
    recommendation: >
      建议有条件的基层医疗机构优先配备并使用腕式体动记录仪、经临床
      研究验证的毫米波雷达睡眠监测仪/床垫及其他可穿戴睡眠监测设备等
      简便、可及的工具对老年人的睡眠进行客观评估，必要时可结合便携式
      PSG 或做进一步诊断。
    key_points:
      - "PSG：金标准，适用于医院睡眠中心（准确性最高，但成本高、老年人依从性有挑战）"
      - "便携式 PSG：适合居家或社区使用，费用较低，可普及，无法分别非阻塞性睡眠阶段"
      - "腕式体动记录仪：非侵入性，操作简单，适合老年人；无法分辨睡眠阶段，易受静坐干扰"
      - "可穿戴/非接触式设备：总体睡眠评估评分、干预随访（精度依赖算法，不能替代 PSG 诊断）"
      - "多次睡眠潜伏期试验：评估日间嗜睡、诊断发作性睡病，需专科使用"

  - id: 14
    domain: elderly_sleep
    title: "共识第5条：建立健康档案"
    source: "《社区老年人睡眠健康与康复管理中国专家共识（2025年版）》"
    source_page: 3613
    evidence_quality: GPS
    recommendation_strength: 推荐
    applicable_population: "社区老年人"
    recommendation: >
      建议在现有《国家基本公共卫生服务规范》要求建立的居民健康档案
      基础上加入老年人睡眠状况相关内容，包括睡眠史、睡眠障碍相关评估
      结果、用药情况、心理状态、合并症、睡眠辅助工具使用情况、生活
      自理能力等。
    key_points:
      - "档案内容：睡眠史、PSQI 评估结果、用药情况、合并症、生活自理能力等"

  - id: 15
    domain: sleep_hygiene
    title: "共识第6条：基于分级管理的睡眠康复管理原则"
    source: "《社区老年人睡眠健康与康复管理中国专家共识（2025年版）》"
    source_page: 3613
    evidence_quality: GPS
    recommendation_strength: 推荐
    applicable_population: "不同程度睡眠障碍的社区老年人"
    recommendation: >
      基层医疗机构应根据老年人睡眠状况和健康风险制订差异化的睡眠康复
      管理策略。对于无明显睡眠障碍者，应以促进健康睡眠和预防为主；
      对于初步判断为原发性睡眠障碍者，开展非药物疗法的初步管理；
      对于初步判断为继发性睡眠障碍者，应优先识别和干预相关基础疾病、
      药物及心理因素，必要时转诊至上级医疗机构。
    key_points:
      - "无明显睡眠障碍：促进健康睡眠 + 预防为主（睡眠卫生教育 + 每 6 个月常规随访）"
      - "轻度睡眠障碍（PSQI 6-10）：非药物疗法优先（睡眠卫生 + CBT + 运动 + 光照等），4-8 周"
      - "中度睡眠障碍（PSQI 11-15）：康复治疗 + 心理干预"
      - "重度睡眠障碍（PSQI>15）：及时转诊至上级医院"
      - "继发性睡眠障碍：优先处理基础疾病/药物因素/心理因素"

  - id: 16
    domain: sleep_hygiene
    title: "共识第7条：睡眠卫生健康教育"
    source: "《社区老年人睡眠健康与康复管理中国专家共识（2025年版）》"
    source_page: 3613
    evidence_quality: GPS
    recommendation_strength: 推荐
    applicable_population: "所有社区老年人"
    recommendation: >
      建议对所有老年人进行睡眠卫生健康教育，告知老年人正常的睡眠
      生理变化，避免过分担忧，协助营造良好的睡眠环境，建立规律的
      作息时间，接受一定时间的自然光照、日间适量的运动，予以睡前
      行为指导。
    key_points:
      - "行为调节：咖啡因和酒精的摄入管理、运动/体力活动的时机选择、维持规律睡眠时间/午休控制"
      - "环境优化：光线调节、噪声控制、温度调节及舒适的寝具等物理空间调节"
      - "心理因素：影响睡眠的心理因素调节（减少对失眠的过度担忧）"
      - "注意：老年人随年龄增长睡眠时间减少属正常生理变化（每增加 10 岁总睡眠时间减少约 10 分钟）"

  - id: 17
    domain: sleep_hygiene
    title: "共识第8条：心理治疗——CBT 及数字化干预"
    source: "《社区老年人睡眠健康与康复管理中国专家共识（2025年版）》"
    source_page: 3614
    evidence_quality: RCT 支持
    recommendation_strength: 推荐
    applicable_population: "有条件的基层医疗机构，老年失眠患者"
    recommendation: >
      有条件的基层医疗机构可开展 CBT（认知行为疗法）以及基于数字化
      干预等心理干预手段的服务，用于改善老年人的睡眠质量。
    key_points:
      - "CBT-I 是改善老年人失眠最有效的非药物治疗方法（多项 Meta 分析和 RCT 研究支持）"
      - "CBT 对降低老年人失眠严重程度的疗效最为显著，同时提高睡眠效率、缩短入睡潜伏期、减少 WASO"
      - "数字化 CBT（dCBT）：可作为基层卫生资源有限时的有效替代手段，能有效改善 65 岁及以上老年人失眠、焦虑和抑郁症状"
      - "正念疗法：可有效降低 PSQI 和失眠严重程度指数评分，改善入睡潜伏期和 WASO 等客观睡眠指标"
      - "CBT 核心技术：刺激控制疗法、睡眠限制疗法、放松训练、认知重构、睡眠卫生教育"
    evidence_summary: >
      多项 Meta 分析及 RCT 研究表明，CBT 可有效改善老年人的睡眠质量与
      失眠症状。其中 CBT 对降低老年人失眠严重程度的疗效最为显著，同时
      提高睡眠效率、缩短入睡潜伏期和减少 WASO，并减少助眠药物的使用
      （文献 29-30）。数字化 CBT 可作为基层卫生资源有限时的有效替代手段
      （文献 31-32，Lancet Digit Health 2020）。

  - id: 18
    domain: sleep_hygiene
    title: "共识第9条：多种康复治疗手段（运动、rTMS、VR、音乐、光照等）"
    source: "《社区老年人睡眠健康与康复管理中国专家共识（2025年版）》"
    source_page: 3614
    evidence_quality: Meta 分析 / RCT
    recommendation_strength: 推荐
    applicable_population: "社区老年睡眠障碍患者，根据资源条件和老年人具体状况选择"
    recommendation: >
      基层医疗机构可根据资源条件和老年人具体状况，采用多种康复治疗
      手段改善睡眠问题。优先推荐安全性高、证据充分的干预方式，包括
      个体化运动疗法、个体化音乐疗法、睡眠卫生联合运动干预；在具备
      专业设备和人员条件的情况下，可开展重复经颅磁刺激（rTMS）、
      经皮耳迷走神经电刺激（ta-VNS）以及虚拟现实（VR）疗法等新兴技术。
    key_points:
      - "运动疗法：Meta 分析（3937 名老年人）显示可显著增强睡眠质量、降低失眠严重程度、提高睡眠效率、减少 WASO；有氧运动改善总体 PSQI 效果最好"
      - "rTMS：刺激双侧背外侧前额叶皮质（DLPFC）和顶叶皮质/优势侧初级运动皮质（M1）可治疗原发性失眠；具体参数见 protocols.yaml"
      - "ta-VNS：RCT 研究表明为期 2 周的 ta-VNS 能改善社区居民的 PSQI 评分"
      - "VR 疗法：纳入 63 例慢性失眠患者的 RCT 研究显示，VR 法能显著改善睡眠质量"
      - "音乐疗法：Meta 分析显示柔和/镇静类音乐（60-80 拍/分钟，以缓慢节奏和流畅的旋律为特点）可改善老年人睡眠质量，干预时长超 4 周效果更好"
      - "光照疗法：Meta 分析显示可有效改善长期居住在护理机构老年人的睡眠效率（由 73% 提升到 86%）；晨间强光照射（7:00-12:00）为优先方案"
      - "传统功法：太极拳、八段锦（每周≥3 次有氧运动）可显著改善老年人总体睡眠质量；12 周以上的八段锦可改善老年人失眠严重程度"

  - id: 19
    domain: medication
    title: "共识第10条：中医保健（针刺、中药、传统功法、耳穴）"
    source: "《社区老年人睡眠健康与康复管理中国专家共识（2025年版）》"
    source_page: 3615
    evidence_quality: GPS（基于临床证据，但质量参差不齐）
    recommendation_strength: 推荐（基于地方资源情况）
    applicable_population: "社区老年睡眠障碍患者，尤其在中医资源丰富地区"
    recommendation: >
      建议基层医疗机构根据本地中药资源与服务能力，因地制宜扩展中医药
      在老年人睡眠健康管理中的应用，如针刺、中药、传统功法锻炼及耳穴
      疗法等。
    key_points:
      - "针刺：基于数据挖掘研究发现，针刺治疗老年睡眠障碍常选穴规律：心脾两虚、肝郁化火、心肾不交、胃气失和证型对应不同穴位配伍（核心穴位：神门、百会、三阴交、内关、四神聪）"
      - "中药：对于失眠，中西医结合临床实践指南推荐酸枣仁胶囊、乌灵胶囊、甜梦口服液等中成药缓解相应症状；老年人中西药合用需注意相互作用"
      - "传统功法：Meta 分析显示每周≥3 次的传统功法训练与有氧运动均可显著改善老年人总体睡眠质量"
      - "耳穴疗法：RCT 研究显示，相较于王不留行磁珠疗法，在神门/心/肾/肝/脾/皮质下/交感 7 个耳部穴位进行磁珠按压 3 周，可进一步改善老年人睡眠质量，并维持长期效果（文献 52-53）"

  - id: 20
    domain: elderly_sleep
    title: "共识第11条：社区老年人睡眠康复管理流程"
    source: "《社区老年人睡眠健康与康复管理中国专家共识（2025年版）》"
    source_page: 3615
    evidence_quality: GPS
    recommendation_strength: 推荐
    applicable_population: "基层医疗卫生机构"
    recommendation: >
      基层医疗卫生机构应依据本共识提供的老年人睡眠健康与康复管理流程
      图（图1），制订适用于辖区实际情况的管理流程，应包括初筛与建档、
      评估与分级管理、动态随访与效果评估等关键环节。
    key_points:
      - "初筛：询问睡眠抱怨 + PSQI 评估；PSQI≥5 分或主诉失眠≥3 次/周且持续≥3 个月 → 纳入重点管理"
      - "轻度（PSQI 6-10）：优先采用非药物疗法进行个体化干预，建议干预周期 4-8 周"
      - "中度（PSQI 11-15）及以上/疑似 OSA/合并其他躯体/精神疾病 → 及时转诊至上级医疗机构"
      - "动态随访：睡眠质量良好者每 6 个月随访 1 次；重点管理群者每 1-3 个月随访 1 次"
      - "随访内容：患者主观反馈 + 主观量表评估 + 可穿戴设备监测数据"
      - "随访效果好者：可继续维持原方案或减少干预频次；效果差者：调整干预手段，必要时转诊"

