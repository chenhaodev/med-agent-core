# 睡眠指南问答系统 — In-Scope 金标评估题集
# 格式：id / domain / question / expected_topics / expected_protocol / must_warn / consensus_refs / must_not

questions:

  # ─── OSA 诊断 (10 题) ────────────────────────────────────────

  - id: D01
    domain: osa_diagnosis
    question: "AHI 是什么意思？AHI 多少算重度？"
    expected_topics:
      - "AHI 定义（每小时呼吸暂停低通气次数）"
      - "AHI 5-15 轻度 / 15-30 中度 / ≥30 重度"
      - "只有 PSG 或 OCST 才能测量 AHI"
    expected_protocol:
      mild_ahi: "5～15 次/h"
      moderate_ahi: "15～30 次/h"
      severe_ahi: "≥30 次/h"
    must_warn:
      - "仅凭症状描述不能判断 AHI 数值"
      - "需要 PSG 或睡眠监测才能确定"
    consensus_refs: ["推荐意见第 3 条"]
    must_not:
      - "从家属描述推算具体 AHI 数值"
      - "不做检查就确认诊断"

  - id: D02
    domain: osa_diagnosis
    question: "打鼾一定是睡眠呼吸暂停吗？怎么判断需不需要检查？"
    expected_topics:
      - "打鼾是 OSA 最常见症状（70-95%），但不等于 OSA"
      - "需要结合憋气/夜间觉醒/日间嗜睡等症状"
      - "单一症状或体征不能可靠诊断 OSA"
      - "建议用 STOP-Bang 问卷初步筛查"
    expected_protocol:
      sbq_positive: "SBQ≥3 分"
    must_warn:
      - "打鼾不能排除 OSA，也不能确认 OSA"
      - "明确诊断需要 PSG 或便携式监测"
    consensus_refs: ["推荐意见第 1 条", "推荐意见第 2 条"]
    must_not:
      - "仅凭打鼾确诊或排除 OSA"

  - id: D03
    domain: osa_diagnosis
    question: "什么是 STOP-Bang 问卷？怎么用它筛查睡眠呼吸暂停？"
    expected_topics:
      - "STOP-Bang 8 个问题（打鼾/疲劳/观察到呼吸暂停/高血压/BMI/年龄/颈围/性别）"
      - "SBQ≥3 分为筛查阳性"
      - "灵敏度高（92-96%），特异度较低（27-35%）"
      - "SBQ 是目前推荐的最佳一线 OSA 筛查工具"
    expected_protocol:
      threshold: "≥3 分"
      sensitivity_moderate: "95%"
      sensitivity_severe: "96%"
    must_warn:
      - "SBQ 阳性不等于确诊，仍需 PSG 或监测"
    consensus_refs: ["推荐意见第 2 条"]
    must_not:
      - "说 SBQ≥3 就可以确诊 OSA"

  - id: D04
    domain: osa_diagnosis
    question: "多导睡眠监测（PSG）和便携式监测有什么区别？哪个更准？"
    expected_topics:
      - "PSG 是诊断 OSA 的金标准"
      - "便携式监测（III 型 PM）可居家完成，适合筛查和中重度 OSA"
      - "PSG 监测指标更全（脑电/眼电/心电等）"
      - "PM 无法分辨睡眠阶段，可能低估 AHI"
    expected_protocol:
      psq_duration: "整晚（7-8 小时）"
      pm_ahi_sensitivity: "86.70%"
    must_warn:
      - "便携式监测结果不确定时仍需 PSG 确认"
    consensus_refs: ["推荐意见第 2 条", "推荐意见第 3 条"]
    must_not:
      - "说便携式监测可以完全替代 PSG"

  - id: D05
    domain: osa_diagnosis
    question: "日间嗜睡一定是睡眠呼吸暂停吗？"
    expected_topics:
      - "日间嗜睡是 OSA 的重要危险因素（15-50% OSA 患者有）"
      - "但 OSA 患者中部分无日间嗜睡症状，不能以此排除"
      - "需要 ESS 量表（≥10 提示明显嗜睡）综合评估"
      - "其他原因：睡眠不足、药物、甲状腺功能减退等"
    expected_protocol:
      ess_threshold: "≥10 提示明显日间嗜睡"
    must_warn:
      - "不能单凭嗜睡确诊或排除 OSA"
      - "驾驶员日间嗜睡需立即就医"
    consensus_refs: ["推荐意见第 1 条"]
    must_not:
      - "直接将日间嗜睡等同于 OSA"

  - id: D06
    domain: osa_diagnosis
    question: "肥胖的人更容易得睡眠呼吸暂停吗？颈围多粗算危险？"
    expected_topics:
      - "肥胖（BMI≥25）是 OSA 主要危险因素"
      - "体重每增加 10%，AHI 升高 32%"
      - "颈围粗大与 OSA 严重程度相关"
      - "腹部脂肪堆积减少肺容积，增加气道塌陷风险"
    expected_protocol:
      weight_ahi_relation: "体重增加 10% → AHI 升高 32%"
    must_warn:
      - "单靠 BMI 或颈围不能确诊 OSA"
    consensus_refs: ["推荐意见第 1 条"]
    must_not:
      - "给出具体颈围阈值作为诊断标准（指南未对成人颈围给出统一阈值）"

  - id: D07
    domain: osa_diagnosis
    question: "心房颤动患者需要筛查睡眠呼吸暂停吗？用什么工具？"
    expected_topics:
      - "OSA 与房颤密切相关，建议筛查"
      - "III 型便携式监测推荐用于 AF 患者中 OSA 筛查（B，强推荐）"
      - "PM 对中重度 OSA 灵敏度 86.70%，特异度 76.50%"
    expected_protocol:
      pm_sensitivity: "86.70%"
      pm_specificity: "76.50%"
    must_warn:
      - "确诊 OSA 仍需医生综合判读"
    consensus_refs: ["推荐意见第 2 条"]
    must_not: []

  - id: D08
    domain: osa_diagnosis
    question: "OSA 诊断标准是什么？AHI 多少才算确诊？"
    expected_topics:
      - "ICSD-3-TR 诊断标准"
      - "满足 A+B 或 C+D 且 AHI≥5 次/h"
      - "A：症状（嗜睡/憋气/觉醒等）；B：PSG 证实 AHI≥5"
      - "C：PSG 证实 AHI≥15；D：无法用其他疾病解释"
    expected_protocol:
      diagnosis_ahi: "AHI≥5 次/h（有症状）或 AHI≥15 次/h（无症状）"
    must_warn:
      - "必须结合症状和客观监测，不能单凭 AHI 数值诊断"
    consensus_refs: ["推荐意见第 3 条"]
    must_not:
      - "说 AHI≥5 就能确诊（需有症状或 AHI≥15）"

  - id: D09
    domain: osa_diagnosis
    question: "打鼾要不要去做睡眠检查？去哪里检查？"
    expected_topics:
      - "有以下情况建议做检查：打鼾+憋醒/日间嗜睡/家人观察到呼吸暂停"
      - "检查机构：医院睡眠中心（PSG）或可居家便携式监测"
      - "STOP-Bang 问卷可作为去检查前的初步自评"
    expected_protocol:
      sbq_threshold: "SBQ≥3 分建议进一步检查"
    must_warn:
      - "单纯打鼾（无憋醒/嗜睡）可先用 STOP-Bang 评估风险等级"
    consensus_refs: ["推荐意见第 1 条", "推荐意见第 2 条"]
    must_not: []

  - id: D10
    domain: osa_diagnosis
    question: "重度 OSA 和中度 OSA 的治疗有什么区别？"
    expected_topics:
      - "重度 OSA（AHI≥30）首选 CPAP（A，强推荐）"
      - "中度 OSA（15-30）首选 CPAP，也可考虑 MAD 或手术"
      - "重度 OSA 不建议单独用 MAD 或体位治疗"
      - "重度 OSA 有更高 CVD/认知并发症风险，需更积极治疗"
    expected_protocol:
      severe_first_line: "CPAP（A，强推荐）"
    must_warn:
      - "重度 OSA 患者如驾驶需告知医生，治疗前评估驾驶安全"
    consensus_refs: ["推荐意见第 4 条"]
    must_not:
      - "建议重度 OSA 仅靠生活方式改善"

  # ─── OSA 手术 (6 题) ─────────────────────────────────────────

  - id: S01
    domain: osa_surgery
    question: "UPPP 手术是什么？成功率高吗？"
    expected_topics:
      - "UPPP = 悬雍垂腭咽成形术，切除悬雍垂/部分软腭/扁桃体"
      - "Friedman 分型影响成功率：I/II/III/IV 型分别为 80.60%/37.90%/8.10%/0%"
      - "适合：非严重肥胖 + 扁桃体 II 级以上肥大 + 轻中度 OSA"
      - "有效标准：AHI<20 次/h 且降低幅度≥50%"
    expected_protocol:
      success_rate_friedman1: "80.60%"
      success_rate_friedman2: "37.90%"
      success_criteria: "AHI<20 次/h 且降低≥50%"
    must_warn:
      - "手术前需要 DISE 评估塌陷平面，不适合所有人"
      - "最常见并发症：腭咽关闭不全（31.20%）"
    consensus_refs: ["推荐意见第 5 条", "推荐意见第 9 条"]
    must_not:
      - "说 UPPP 适合所有 OSA 患者"
      - "不提及 Friedman 分型对成功率的影响"

  - id: S02
    domain: osa_surgery
    question: "MMA（颌骨前移手术）是什么？什么人适合做？"
    expected_topics:
      - "MMA = 上下颌骨前移术，通过前移颌骨扩大上气道"
      - "适合：合并颌面部畸形的中重度 OSA，或其他手术失败后"
      - "最有效的手术之一（A，强推荐），AHI 降低 MD=-33.36"
      - "主要并发症：下颌区感觉异常"
    expected_protocol:
      ahi_reduction: "MD=-33.36（P<0.01）"
      evidence: "A，强推荐"
    must_warn:
      - "需要专科医生综合评估是否适合手术"
      - "手术前需全颌曲面断层片及头影测量"
    consensus_refs: ["推荐意见第 5 条"]
    must_not:
      - "说 MMA 适合所有人"

  - id: S03
    domain: osa_surgery
    question: "OSA 手术有哪些禁忌证？什么情况不能做手术？"
    expected_topics:
      - "全身状况差、无法耐受全麻"
      - "妊娠期"
      - "急性感染期"
      - "药物/酒精依赖/难以控制的精神疾病"
      - "智力障碍或行为能力不成熟"
    expected_protocol: {}
    must_warn:
      - "这些禁忌证是指南明确规定的，不可忽视"
    consensus_refs: ["推荐意见第 6 条"]
    must_not:
      - "建议禁忌证患者尝试手术"

  - id: S04
    domain: osa_surgery
    question: "OSA 手术前需要做什么评估？"
    expected_topics:
      - "上气道评估：确定狭窄/塌陷部位和性质"
      - "评估方法：Friedman 分型、DISE（药物诱导睡眠内镜）、X 线头影测量等"
      - "DISE 可识别多平面阻塞（68.2% 患者存在）"
    expected_protocol:
      multilevel_obstruction: "68.2% 患者存在多平面阻塞"
    must_warn:
      - "术前评估由专科医生完成，不能自行判断"
    consensus_refs: ["推荐意见第 7 条"]
    must_not: []

  - id: S05
    domain: osa_surgery
    question: "OSA 手术治好了算什么标准？怎么知道手术有没有效果？"
    expected_topics:
      - "主要有效标准：AHI<20 次/h 且降低幅度≥50%（A，强推荐）"
      - "辅助标准：LSaO2>85% 且日增加值≥3%（C，弱推荐）"
      - "综合评估：PSG + 主观症状 + CVD 风险改善"
      - "通常术后 3 个月复查 PSG 评估"
    expected_protocol:
      success_primary: "AHI<20 次/h 且降低≥50%"
      success_secondary: "LSaO2>85% 且日增加值≥3%"
    must_warn:
      - "手术不保证 100% 治愈，需要复查评估"
    consensus_refs: ["推荐意见第 9 条"]
    must_not: []

  - id: S06
    domain: osa_surgery
    question: "OSA 手术后需要注意什么？还需要用 CPAP 吗？"
    expected_topics:
      - "术后体位：半卧位或侧卧位，避免仰卧（B，弱推荐）"
      - "围手术期 CPAP：重度 OSA 术前 3-5 晚，术后 1-3 晚"
      - "困难气道风险：OSA 患者插管困难风险升高 2-4 倍，需做好预案"
      - "监测：脉搏血氧仪 + 心电监护"
    expected_protocol:
      severe_preop_cpap: "术前 3-5 晚"
      postop_cpap: "术后 1-3 晚"
    must_warn:
      - "颌面部手术后不宜使用 CPAP（可引起皮下气肿）"
      - "术后出现大量出血或呼吸困难立即就医"
    consensus_refs: ["推荐意见第 8 条"]
    must_not: []

  # ─── OSA 非手术 (6 题) ───────────────────────────────────────

  - id: N01
    domain: osa_nonsurgery
    question: "CPAP 怎么用？每晚要用多久？"
    expected_topics:
      - "CPAP = 持续气道正压通气，戴面罩入睡，机器送气保持气道畅通"
      - "首次使用前须压力滴定（在睡眠中心）"
      - "每晚≥4 小时为有效使用，理想≥6 小时"
      - "CPAP 是首选治疗（A，强推荐）"
    expected_protocol:
      min_use: "每晚≥4 小时"
      ideal_use: "每晚≥6 小时"
    must_warn:
      - "不要自行调压，压力需要医生滴定"
    consensus_refs: ["推荐意见第 4 条"]
    must_not:
      - "建议患者自行设定 CPAP 压力"

  - id: N02
    domain: osa_nonsurgery
    question: "CPAP 戴不住，有没有替代方案？"
    expected_topics:
      - "APAP（自动调压）：依从性更好（每晚多约 11 分钟）"
      - "BiPAP：呼气阻力更低，适合 CPAP 不耐受"
      - "MAD（口腔矫治器）：适合轻中度 OSA，BMI<32"
      - "手术治疗：CPAP 不耐受是手术适应证之一"
    expected_protocol:
      mad_ahi_improvement: "AHI 改善 MD=13.40（F=74%）"
    must_warn:
      - "中重度 OSA 不能仅靠 MAD，疗效不如 CPAP"
    consensus_refs: ["推荐意见第 4 条"]
    must_not:
      - "说停止 CPAP 没关系"

  - id: N03
    domain: osa_nonsurgery
    question: "口腔矫治器适合什么人？效果怎么样？"
    expected_topics:
      - "适合：单纯鼾症、轻中度 OSA、BMI<32 kg/m²、CPAP 不耐受"
      - "机制：下颌前移，扩大腭咽到舌平面气道"
      - "有效证据：AHI 降低 MD=13.40，F=74%；效果不如 CPAP"
      - "需要口腔科医生定制，不能自购通用型"
    expected_protocol:
      ahi_improvement: "MD=13.40（F=74%）"
      bmi_limit: "BMI<32 kg/m²（轻中度 OSA 优先）"
    must_warn:
      - "有颞下颌关节紊乱者需先口腔科评估"
    consensus_refs: ["推荐意见第 4 条"]
    must_not:
      - "说口腔矫治器可以完全代替 CPAP 用于重度 OSA"

  - id: N04
    domain: osa_nonsurgery
    question: "减肥能治好睡眠呼吸暂停吗？"
    expected_topics:
      - "减重是 OSA 重要辅助治疗（B，强推荐）"
      - "体重减轻 10%，AHI 降低约 26%"
      - "对轻度 OSA 可能有显著改善，但单靠减重通常不能治愈中重度 OSA"
      - "BMI≥32.5 的重度 OSA 可考虑减重代谢手术"
    expected_protocol:
      weight_loss_effect: "减轻 10% → AHI 降低 26%"
      bariatric_criteria: "BMI≥32.5 kg/m² 重度 OSA"
    must_warn:
      - "减重是辅助手段，不能替代中重度 OSA 的 CPAP 治疗"
    consensus_refs: ["推荐意见第 4 条"]
    must_not:
      - "建议仅靠减肥治疗重度 OSA"

  - id: N05
    domain: osa_nonsurgery
    question: "侧着睡觉能改善打鼾吗？什么是体位治疗？"
    expected_topics:
      - "体位相关性 OSA（POSA）：仰卧位 AHI 至少是侧卧位 2 倍"
      - "体位治疗：使用体位枕强制侧卧睡眠（C，弱推荐）"
      - "POSA 的体位治疗效果优于重度 POSA；依从性比 CPAP 好"
      - "长期依从性缺乏高质量证据"
    expected_protocol:
      posa_criteria: "仰卧 AHI / 侧卧 AHI ≥ 2"
    must_warn:
      - "不是所有打鼾都是 POSA，需要 PSG 确认"
    consensus_refs: ["推荐意见第 4 条"]
    must_not: []

  - id: N06
    domain: osa_nonsurgery
    question: "睡眠呼吸暂停患者可以喝酒和用安眠药吗？"
    expected_topics:
      - "酒精会加重上气道肌肉松弛，加重 OSA（B，强推荐戒酒）"
      - "镇静安眠类药物（苯二氮䓬类）也会加重气道塌陷（D，弱推荐慎用）"
      - "建议睡前 4 小时内避免饮酒"
      - "如需助眠，应告知医生自己有 OSA"
    expected_protocol:
      alcohol_avoidance: "睡前 4 小时内"
    must_warn:
      - "OSA 患者使用任何镇静药物需告知医生"
    consensus_refs: ["推荐意见第 4 条"]
    must_not:
      - "建议 OSA 患者使用苯二氮䓬类助眠"

  # ─── 老年睡眠 (8 题) ─────────────────────────────────────────

  - id: E01
    domain: elderly_sleep
    question: "老年人正常每天睡多久？睡 5 小时算失眠吗？"
    expected_topics:
      - "总睡眠时长随年龄增长每 10 年减少约 10.1 分钟，60 岁后趋于稳定"
      - "老年期睡眠时间减少属正常生理变化，不等于失眠"
      - "关键是日间功能是否受损（不是睡多少小时）"
      - "良好睡眠参考：入睡≤30 分钟，夜间觉醒 0-2 次，睡眠效率≥75%"
    expected_protocol:
      sleep_latency: "≤30 分钟"
      night_awakenings: "0-2 次"
      sleep_efficiency: "≥75%"
    must_warn:
      - "不要因为睡得少就自行服用助眠药"
    consensus_refs: ["共识第 3 条"]
    must_not:
      - "说老年人必须睡 8 小时"
      - "把正常生理性睡眠减少等同于失眠"

  - id: E02
    domain: elderly_sleep
    question: "PSQI 是什么？怎么用来评估老人睡眠？"
    expected_topics:
      - "PSQI = 匹兹堡睡眠质量指数，7 维度 9 条目，0-21 分，核心评估工具"
      - "PSQI≤5：正常；6-10：轻度（健康教育）；11-15：中度（康复+心理）；>15：重度（转专科）"
      - "完成时间 5-10 分钟，回顾最近 1 个月的睡眠"
    expected_protocol:
      normal: "≤5 分"
      mild: "6-10 分"
      moderate: "11-15 分"
      severe: ">15 分"
    must_warn:
