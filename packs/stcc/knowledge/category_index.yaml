    patterns: "妊娠|怀孕|宫缩|胎动|孕妇|孕周|孕[0-9]|[0-9]周.*孕|妊高|早产|破水|羊水|胎儿|剖宫产|产后|产前|流产|宫外孕|我在孕"
  - domain: "abdominal_pain"
    patterns: "腹痛|腹部疼痛|肚子痛|肚痛|腹部不适|腹部胀痛|肚子不舒服|腹绞痛|腹部压痛"
  - domain: "fever"
    patterns: "发热|发烧|体温|高烧|低烧|退烧|体温升高|烧到|烧了|度.*发烧|发烧.*度|热度"
