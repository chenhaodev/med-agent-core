protocols:
- id: fever_001
  topic_zh: 成人发热
  topic_en: Fever Adult
  source_file: STCC/Fever_Adult.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 体温及测量方法
  - 过敏史
  - 用药情况
  - 既往病史
  - 伴随症状
  triage_levels:
    A:
      criteria:
      - 意识混乱，谵妄，难以唤醒或呼吸困难
      - 老年人或免疫抑制者（如艾滋病、化疗、服用类固醇）脱水迹象：
      - 尿量减少
      - 眼窝凹陷
      - 皮肤弹性差
      - 极度口渴，口腔干燥
      - 快速呼吸，吞咽困难或喘息声
      - 头痛，颈部僵硬和/或对光线敏感
      - 皮肤上有紫色或血色斑点
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 老年人或免疫抑制者体温>101°F（38.3°C）
      - 体温>104°F（40°C）且对退热措施无反应
      - 频繁或疼痛性排尿及背部或腰部疼痛
      - 糖尿病，使用类固醇，癌症，艾滋病，高龄，心脏病，肾脏或肝脏疾病，慢性病史，移植手术史，或怀孕
      - 静脉注射药物滥用，存在PICC线或外周静脉导管
      action: 立即前往急诊室
    C:
      criteria:
      - 发热持续>72小时且无已知原因
      - 咳嗽伴彩色痰液
      - 频繁或疼痛性排尿
      - 阴道出血，疼痛或分泌物
      - 呕吐，腹泻或腹痛
      - 耳痛，咽痛及淋巴结肿大
      - 近期手术史或分娩史
      - 家庭护理措施无法缓解的脱水迹象
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 充血、打喷嚏或酸痛
      - 其他家庭成员也生病了
      - 发热对自我护理措施有反应
      action: 居家观察，按家庭护理指导
  home_care:
  - 增加液体摄入量（除非患者处于限液饮食状态或患有充血性心力衰竭）。
  - 服用常规药物（阿司匹林、对乙酰氨基酚或布洛芬）以缓解发热和酸痛。不要给儿童使用阿司匹林。<20岁者避免使用类似阿司匹林的产品。如存在肝病，避免使用对乙酰氨基酚。如果存在肾病或胃部问题，或怀孕中，请勿使用布洛芬。请按照标签上的说明服用。
  - 用温水擦浴或浸泡；不要使用酒精擦拭或加入水中。
  - 穿着轻便衣物并使用薄被。
  - 每2至4小时检查一次体温。如果没有改善，通知PCP或回电。
  - 限制活动；休息。
  callback_criteria:
  - 3天内无好转或情况恶化
  - 持续发热对退热措施无反应
  - 呕吐、腹泻、疲劳、嗜睡或颈部僵硬
  - 发热或肿胀
  - 【立即急诊】无响应
  - 【立即急诊】呼吸困难
  - 【立即急诊】免疫抑制且有脱水迹象
  - 【立即急诊】头痛、颈部僵硬和/或畏光
  - 【立即急诊】皮肤上出现紫色或血色斑点
  related_protocols:
  - 精神状态改变
  - 成人腹痛
  - 普通感冒症状
  - 流脓
  - 成人腹泻
  - 头痛
  - 热暴露问题
  - 术后问题
  - 咽痛
  - 成人呕吐
  - 缝线或钉合
- id: fever_002
  topic_zh: 发热，儿童
  topic_en: Fever Child
  source_file: STCC/Fever_Child.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 持续时间
  - 体温
  - 过敏史
  - 用药情况
  - 病史
  - 伴随症状
  triage_levels:
    A:
      criteria:
      - 呼吸困难（非因阻塞）
      - 皮肤或嘴唇变蓝
      - 新出现的流涎
      - 无法吞咽
      - 皮肤上出现紫色或血色斑点
      - 首次发作且无热性惊厥史的新发抽搐
      - 皮疹、红舌和淋巴结肿大
      - 儿童看起来非常病态、迟钝或极度烦躁
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 前倾头部时颈部疼痛
      - 严重头痛或腹痛
      - 呼吸困难或急促，吞咽困难，或喘息
      - 3个月以下婴儿（近期未接种疫苗）体温>100.4°F (38.0°C)
      - 发热发生在最近一次接种后超过48小时
      - 2至6个月大的婴儿体温>105°F (40.6°C) 或有腹泻和呕吐
      - 体温>104°F (40°C)，对退热措施无反应（服药两小时后体温下降2°C到3°C）
      - 抽搐（有热性惊厥史）
      - 脱水迹象：
      - 尿量减少
      - 眼球凹陷
      - 捏起的皮肤无法迅速恢复
      - 极度口渴，口腔干燥
      - 哭泣无泪
      - 难以饮用“足够”液体
      - 触痛性的红疹
      - 有使用类固醇、癌症、艾滋病或囊性纤维化的病史
      action: 立即前往急诊室
    C:
      criteria:
      - 发热>24小时，年龄>2岁且无其他症状
      - 发热>72小时对退热措施无反应或无其他症状
      - 尿频或排尿疼痛
      - 病情恶化或3天后未见改善
      - 脱水迹象
      - 发热持续48小时且无其他症状
      action: 当天内联系医生/诊所
  home_care:
  - 将儿童穿轻便衣物。不要用毯子包裹婴儿。尽量保持室内温度为70°F。
  - 每2到4小时检查一次儿童的体温。如果无改善，通知主治医生或回电。
  - 遵循退热药物剂量指南：对乙酰氨基酚，每次15 mg/kg，每隔4小时；布洛芬，每次10 mg/kg，每隔6小时。如果儿童有腹痛、呕吐或脱水，请勿给予布洛芬。
  - 记住发热是身体对抗感染的正常反应；即使不治疗，发热也很少超过104°F到105°F (40°C到40.6°C)。
  - 建议当体温恢复正常后返回幼儿园或学校，并参与正常活动。
  callback_criteria:
  - 体温>104°F (40°C)
  - 皮疹、颈部疼痛或严重头痛
  - 尿频或排尿疼痛
  - 病情恶化或3天后未见改善
  - 脱水迹象
  - 发热持续48小时且无其他症状
  - 【立即急诊】无反应
  - 【立即急诊】呼吸困难
  - 【立即急诊】颈部僵硬
  - 【立即急诊】皮肤上出现紫色/红色斑点
  - 【立即急诊】皮肤或嘴唇变蓝
  - 【立即急诊】新出现的流涎
  - 【立即急诊】无法吞咽
  - 【立即急诊】首次发作且无热性惊厥史的新发抽搐
  - 【立即急诊】皮疹、红舌和淋巴结肿大
  related_protocols:
  - 腹痛
  - 普通感冒症状
  - 耳痛及分泌物
  - 腹泻
  - 头痛
  - 热暴露问题
  - 术后问题
  - 皮疹
  - 咽喉痛
  - 多汗症
  - 呕吐
  - 缝合或钉子
- id: fever_003
  topic_zh: 多汗
  topic_en: Sweating Excessive
  source_file: STCC/Sweating_Excessive.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 过敏史
  - 用药情况
  - 既往病史
  triage_levels:
    A:
      criteria:
      - 皮肤苍白、发冷和脉搏加快
      - 胸腔、喉咙、颈部、下颌、肩膀或手臂疼痛
      - 呼吸困难
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 长时间暴露于高温环境，伴有疲劳、虚弱、头晕或恶心
      - 年轻人、老年人或免疫力低下者出现脱水迹象：
      - 8小时以上尿量减少
      - 眼睛凹陷
      - 哭泣时无泪
      - 皮肤被捏后无法迅速恢复原状
      - 极度口渴
      - 口腔干燥
      - 异常的嗜睡
      action: 立即前往急诊室
    C:
      criteria:
      - 夜间多汗、体重下降、持续咳嗽、痰中带血
      - 持续发热和疲劳
      - 最近突然停止使用药物（非处方药、处方药或街头药物）、酒精或咖啡因
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 体重下降、食欲增加、无力、睡眠困难
      - 年龄超过38岁，无发热多汗，月经不规律或停经
      - 体温 >100°F (37.8°C)
      - 饮酒后或多剂量服用阿司匹林后出汗
      - 穿着合成材料衣物时出汗
      - 仅手和脚出汗
      - 近期压力增加
      - 脱水的早期迹象
      - 体味问题
      action: 居家观察，按家庭护理指导
  home_care:
  - 请记住，出汗通常是发烧、荷尔蒙变化、运动和压力的自然反应。
  - 肥胖会导致出汗增多。减重应减少出汗量。
  - 服用常规止痛药（阿司匹林、对乙酰氨基酚、布洛芬）以降低体温。不要给儿童服用阿司匹林。如果年龄<20岁，避免使用类似阿司匹林的产品。如果有肝病，避免使用对乙酰氨基酚。如果有肾病或胃部问题，或者处于孕期时，避免使用布洛芬。请按照标签上的指示操作。
  - 如果出汗与热暴露有关，请用冷敷、冷水浴或淋浴降温，并穿轻薄的棉质衣物，喝凉爽的饮料。
  - 对于脱水迹象，增加液体摄入：给幼儿服用Lytren、Pedialyte或Rehydralyte；较大儿童和成人应饮用运动饮料、水、果汁或软饮料。
  - 频繁清洗并擦干手和脚以减少过度出汗。穿棉质或其他天然纤维的衣物和袜子。
  - 如果出汗与饮酒有关，请避免酒精和阿司匹林。
  callback_criteria:
  - 【立即急诊】胸腔、喉咙、颈部、下颌、肩膀或手臂疼痛
  - 【立即急诊】皮肤苍白、发冷和脉搏加快
  - 【立即急诊】呼吸困难
  related_protocols: []
