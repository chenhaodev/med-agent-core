- id: pregnancy_009
  topic_zh: 妊娠问题
  topic_en: Pregnancy Problems
  source_file: STCC/Pregnancy_Problems.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 妊娠期
  - 孕次
  - 病史
  - 用药情况
  triage_levels:
    A:
      criteria:
      - 即将分娩，胎儿头部露出
      - 严重头痛、视力重影或模糊、方向感丧失、头晕或易怒
      - 二尖瓣区域先前受过创伤、跌倒、腹部受到撞击等
      - 排出大血块
      - 剧烈腹痛
      - 阴道流液伴随脐带脱垂
      - 诊断为子痫前期并出现新症状
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 无胎动
      - 面部、手部、腿部或腰部突然肿胀
      - 头痛、眼前黑点、头晕、昏厥或呕吐
      - 规律宫缩或阴道流液
      action: 立即前往急诊室
    C:
      criteria:
      - 已知高血压且血压升高
      - 腿痛、肿胀、发红或负重时疼痛加剧
      - 疼痛、阴道出血或发热
      - 对止痛药无反应的持续头痛
      - 所有食物和液体及/或腹痛持续呕吐
      - 1小时内少于10次胎动
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 急迫的排尿感、疼痛或困难
      - 尿液颜色异常（如深黄、红色或棕色）
      - 无法解释的体重减轻
      - 疲劳或虚弱加剧
      - 阴道出血量增多
      - 持续性头痛、头晕或视力问题
      - 呼吸困难或气短
      - 胸痛或不适
      - 心悸或心跳加速
      - 极度焦虑或情绪波动
      action: 居家观察，按家庭护理指导
  home_care: []
