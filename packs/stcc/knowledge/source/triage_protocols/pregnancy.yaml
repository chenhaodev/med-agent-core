- id: pregnancy_010
  topic_zh: 妊娠，疑似早产 <36周
  topic_en: Pregnancy Suspected Labor 36 Weeks
  source_file: STCC/Pregnancy_Suspected_Labor_36_Weeks.md
  key_questions:
  - 姓名
  - 年龄
  - 起始时间
  - 原因
  - 预产期
  - 妊娠次数
  - 孕龄
  - 药物使用情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 剧烈腹痛
      - 流液及脐带脱垂
      - 大量鲜红色阴道出血
      - 胎儿头部已显露即将分娩
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 无胎动
      - 有宫颈环扎术史
      - 1小时内宫缩6次或更多
      - 阴道流液
      - 多胎妊娠且1小时宫缩4次或更多
      - 已知前置胎盘或部分剥离情况下任何宫缩
      action: 立即前往急诊室
    C:
      criteria:
      - 1小时内宫缩4至5次
      - 发热/寒战
      - 尿频、急迫性或疼痛性排尿
      - 首次出现宫缩时有当前的疱疹发作
      - 已知胎儿为臀位或横位情况下任何宫缩
      - 1小时胎动少于10次
      - 类似月经痛的痉挛
      - 骨盆压力感
      - 新发下背痛
      - 任何规律性疼痛
      - 阴道分泌物增多
      - 腹股沟疼痛
      - 有早产药物使用史
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 丢失黏液栓
      - 1小时少于4次无痛宫缩
      action: 居家观察，按家庭护理指导
  home_care:
  - 左侧卧休息，并监测宫缩。
  - 补充水分。
  - 监测胎动。
  - 排空膀胱。
  - 避免乳头刺激和性生活。
  callback_criteria:
  - 【立即急诊】胎儿头部显露即将分娩
  - 【立即急诊】阴道流液及脐带脱垂
  - 【立即急诊】大量阴道出血
  - 【立即急诊】剧烈腹痛
  related_protocols: []
- id: pregnancy_011
  topic_zh: 妊娠，排尿问题
  topic_en: Pregnancy Urination Problems
  source_file: STCC/Pregnancy_Urination_Problems.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 妊娠周数
  - 妊娠次数
  - 用药情况
  - 既往史
  triage_levels:
    A:
      criteria:
      - 体温 >100°F (37.8°C)
      - 寒战或头痛
      - 腰部疼痛
      - 血尿（尿液中有血液）
      - 早产症状（<37 周妊娠）：
      - 骨盆压迫感
      - 下背部疼痛
      - 任何有规律的疼痛
      - 腹股沟疼痛
      - 类似月经的绞痛
      - 粉色分泌物
      - 胎动减少
      - 强烈且规律的宫缩
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 排尿时疼痛或灼热感
      - 尿液浑浊或颜色深
      - 排尿困难
      - 频繁、急迫或疼痛性排尿
      action: 立即前往急诊室
    C:
      criteria:
      - 性交后排尿困难
      action: 当天内联系医生/诊所
  home_care:
  - 多喝水。
  - 每天喝3次蔓越莓汁或每天3次服用500毫克维生素C。
  - 性交前后排尿。
  - 使用卫生间后从前向后擦拭。
  - 使用卫生间后洗手。
  - 穿棉质内裤。
  - 监测体温、胎动和宫缩情况。
  - 对于排尿启动困难，可打开水龙头（流水声有助于刺激排尿），并在如厕时坐在马桶上用温水淋在会阴部。
  - 状况恶化或无改善
  callback_criteria: []
  related_protocols: []
