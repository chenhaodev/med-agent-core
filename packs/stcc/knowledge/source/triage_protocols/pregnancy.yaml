protocols:
- id: pregnancy_001
  topic_zh: 妊娠，疑似临产
  topic_en: Pregnancy Suspected Labor
  source_file: STCC/Pregnancy_Suspected_Labor.md
  key_questions:
  - 姓名
  - 年龄
  - 起始时间
  - 原因
  - 孕周
  - 妊娠次数
  - 用药情况
  - 既往史
  triage_levels:
    A:
      criteria:
      - 即将分娩，胎儿头部已露出
      - 大量阴道出血
      - 抽搐或惊厥
      - 剧烈腹痛
      - 羊膜破裂伴脐带脱垂
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 严重头痛
      - 已知胎儿为臀位或横位，在首次出现宫缩或流液时
      - 流出棕色或绿色阴道液体
      - 当前有疱疹发作，并伴有规律且强烈的宫缩
      - 宫缩和孕周<37周
      - 无胎动
      action: 立即前往急诊室
    C:
      criteria:
      - 第一次怀孕，强烈且规律的宫缩（每5分钟一次，持续45至60秒，持续1到2小时）
      - 非首次怀孕，强烈且规律的宫缩（每5到10分钟一次，持续45至60秒，持续1到2小时）
      - 流出清澈阴道液体
      - 已知有高血压、糖尿病或其他妊娠并发症史
      - 快速分娩史
      - 前往分娩机构路程较长
      - 1小时内少于10次胎动
      - 宫缩强度或频率增加
      - 骨盆压力
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 不规律的宫缩
      - 点状出血
      - 背部、脚部或腹股沟疼痛
      - 排尿时有急迫感、频次增加或疼痛
      action: 居家观察，按家庭护理指导
  home_care:
  - 散步、淋浴、按摩、背部使用热敷或冷敷以缓解不适，改变体位或进行骨盆摇摆运动帮助早期分娩。
  - 吃清淡的食物。
  - 监测宫缩：频率 = 从一次宫缩的开始到下一次宫缩的开始（即5分钟）；持续时间 = 宫缩持续的时间（即30至45秒）。
  - 监测胎动；如果1小时内少于10次胎动，请寻求医疗帮助。
  - 若阴道流液且脐带脱垂：
  - 将电话交给他人拨打急救电话
  - 采取膝胸位，头部向下，臀部向上
  - 增加液体摄入量；避免咖啡因。如有宫缩，喝32盎司的水，左侧卧位，并监测宫缩。如果1小时内宫缩超过4次，请回电。保持膀胱排空。
  callback_criteria: []
  related_protocols:
  - 腹痛
  - 胎动异常
  - 阴道流液
  - 妊娠并发症
  - 36周
  - 排尿问题
  - 阴道出血
- id: pregnancy_002
  topic_zh: 妊娠，阴道出血
  topic_en: Pregnancy Vaginal Bleeding
  source_file: STCC/Pregnancy_Vaginal_Bleeding.md
  key_questions:
  - 姓名
  - 年龄
  - 起始时间
  - 原因
  - 孕周
  - 妊娠次数
  - 湿透的卫生巾数量
  - 用药情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 严重腹痛
      - 胎儿头部即将娩出
      - 胎膜破裂伴有疑似脐带脱垂
      - 意识水平下降
      - 1小时内湿透的卫生巾多于一片并伴有无力感
      - 连续2小时每小时湿透的卫生巾多于一片或12小时内超过6片卫生巾被湿透
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 无胎动且妊娠已超过20周
      - 中等程度的阴道出血（需要使用卫生巾但不会完全湿透）
      - 鲜红色血液，沿腿流下
      - 已知前置胎盘或胎盘早剥并伴有出血
      - 近期有外伤史
      action: 立即前往急诊室
    C:
      criteria:
      - 1小时内少于10次的胎动
      - 强而规律的宫缩
      - 清澈羊水渗漏
      - 卫生巾、内衣、床单或衣物上有少量鲜红色血液
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 有少许暗褐色或粉红色血迹，擦拭时可见或内裤上少量出现
      action: 居家观察，按家庭护理指导
  home_care:
  - 近期性交后或进行过阴道检查后可能出现暗褐色或粉红色血迹。
  - 监测胎动；如果1小时内少于10次的胎动，请寻求医疗援助。
  - 监测宫缩。
  callback_criteria:
  - 擦拭时或内裤上出现暗褐色或粉红色斑点
  - 没有改善或情况恶化
  related_protocols:
  - 妊娠问题
  - 疑似36周前早产
  - 妊娠期间排尿问题
- id: pregnancy_003
  topic_zh: 产后问题
  topic_en: Postpartum Problems
  source_file: STCC/Postpartum_Problems.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 分娩日期
  - 用药情况
  - 既往史
  triage_levels:
    A:
      criteria:
      - 呼吸困难或呼吸急促
      - 阴道出血需要每小时使用超过一片全尺寸卫生巾并伴有虚弱、头晕
      - 意识改变
      - 皮肤苍白、湿润且发凉
      - 分娩后48小时内下腹部剧烈疼痛
      - 有伤害婴儿或自己的想法
      - 剖宫产切口裂开
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 体温>100°F (37.8°C) 在分娩后4到10天内
      - 伴有发热或腹痛的出血
      - 分娩第一周内出血量增加和腹部痉挛（<1小时内一片卫生巾被鲜红血液浸透）
      - 异常阴道分泌物伴有出血、发热、疼痛，或分泌物有恶臭
      - 呕吐、腹泻、发热或皮疹
      - 小腿肿胀、疼痛或发红
      - 比柠檬大的血块
      - 家庭护理措施无法缓解的头痛
      - 肌肉酸痛、发热和乳房上有红热疼痛区域
      - 寒战、发热和头痛
      - 阴道出血需要每小时使用超过一片全尺寸卫生巾
      action: 立即前往急诊室
    C:
      criteria:
      - 持续抑郁>2到3周
      - 排尿时的急迫感、频尿或疼痛
      - 无发热的异常阴道分泌物
      - 会阴切开术伤口处疼痛增加
      - 剖宫产伤口部位疼痛加剧、肿胀、恶臭引流、红热或温暖
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 乳房充血、触痛、硬结
      - 子宫收缩痛
      - 会阴切开术部位的拉伸或牵拉感
      action: 居家观察，按家庭护理指导
  home_care:
  - 产后头两周平衡活动和休息。
  - 通常在6周检查后（剖宫产为8周）如果得到医生许可可以返回工作。
  - 记住，产后3到4天的子宫收缩是正常的，并且是由哺乳刺激产生的。
  - 排便可能在产后1到2天内不发生。每天喝6到8杯水和果汁并增加水果、蔬菜和麸皮的摄入量。轻泻剂（Metamucil）可能有帮助。请遵循说明书使用。
  - 直到引流停止前，每日更换敷料。
  - 移除无菌条带需在7到10天后进行。
  - 尽可能多休息，在婴儿睡觉时也休息。
  - 如散步等适度运动。
  - 保持均衡饮食。
  - 鼓励家人和朋友帮助准备餐食、家务劳动、婴儿照顾及清洁工作。
  - 谈论你的感受。
  callback_criteria:
  - 家庭护理措施无效或状况恶化
  - 发热、腹痛或异常阴道分泌物
  - 感染迹象：红肿加剧、疼痛、从伤口延伸出的红线、温暖感、恶臭或浓绿引流，或发热
  - 持续抑郁
  - 【立即急诊】呼吸困难或急促
  - 【立即急诊】每小时需要使用超过一片全尺寸卫生巾的阴道出血并伴有虚弱或头晕
  - 【立即急诊】意识改变
  - 【立即急诊】皮肤苍白且湿润
  related_protocols: []
- id: pregnancy_004
  topic_zh: 孕期，感冒症状
  topic_en: Pregnancy Cold Symptoms
  source_file: STCC/Pregnancy_Cold_Symptoms.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 孕周
  - 怀孕次数
  - 用药情况
  - 既往病史
  triage_levels:
    A:
      criteria:
      - 呼吸急促，说话困难或无法讲话
      - 体温 >39.5°C (103°F)
      - 非鼻塞原因引起的呼吸困难
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 无胎动
      action: 立即前往急诊室
    C:
      criteria:
      - 强烈且规律的宫缩
      - 体温 >38.4°C (101°F)
      - 呼吸频率 >每分钟20次
      - 减少的胎动
      - 喘息声，对家庭护理措施无反应
      - 1小时内少于10次胎动
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 绿色或棕色痰液或鼻分泌物
      - 严重咽喉痛
      - 哮喘、糖尿病、心脏病或免疫抑制病史
      - 耳痛或流脓
      - 喉咙痛
      - 体温 <38.4°C (101°F)
      action: 居家观察，按家庭护理指导
  home_care:
  - 每4小时测量体温一次。
  - 增加每日饮水量至6到8杯。
  - 使用温湿气雾化器，并每天更换水。
  - 用盐水漱口；喝热鸡汤或吸吮冰冻硬糖以缓解不适。
  - 限制活动；多休息。
  - 监测胎动；如果1小时内少于10次胎动，请就医。
  - 监测宫缩情况。
  - 在鼻孔涂抹凡士林，以防感染。
  - 根据需要使用生理盐水滴鼻液缓解鼻塞。
  callback_criteria:
  - 绿色或棕色痰液或鼻分泌物
  - 严重咽喉痛
  - 体温 >38.4°C (101°F)
  - 情况恶化或家庭护理措施后无改善
  - 无胎动或减少的胎动
  - 【立即急诊】呼吸急促，说话困难或无法讲话
  - 【立即急诊】大量阴道出血
  - 【立即急诊】体温 >39.5°C (103°F)
  related_protocols:
  - 呼吸困难
  - 鼻塞
  - 咳嗽
  - 流脓
  - 成人发热
  - 孕期问题
  - 咽喉疼痛
- id: pregnancy_005
  topic_zh: 妊娠，胎动问题
  topic_en: Pregnancy Fetal Movement Problems
  source_file: STCC/Pregnancy_Fetal_Movement_Problems.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 孕周
  - 妊娠次数
  - 病史
  - 用药情况
  triage_levels:
    A:
      criteria: []
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 严重的腹痛
      - 无胎动
      - 剧烈头痛
      - 近期腹部受创
      - 羊水破裂，流出绿色、棕色或红色的液体
      action: 立即前往急诊室
    C:
      criteria:
      - 1小时内少于10次胎动
      - 阴道流液透明
      - 强烈的规律性宫缩
      - 家庭护理措施不能缓解的头痛
      - 上腹部疼痛（右上象限痛）
      - 呕吐且无法摄入液体
      - 卫生巾、内衣、床上或衣物上有少量鲜红色血液
      - 视觉障碍
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 胎动减少，低于正常日常活动量
      action: 居家观察，按家庭护理指导
  home_care:
  - 排空膀胱。
  - 喝一杯果汁。
  - 左侧卧位，并将手放在腹部。计算任何胎动（踢、戳或滚动）。如果1小时内少于10次胎动，请就医。
  callback_criteria:
  - 胎动减少，低于正常日常活动模式
  - 状况持续或恶化
  - 【立即急诊】严重的腹痛
  - 【立即急诊】显著的阴道流血
  related_protocols:
  - 妊娠高血压
  - 妊娠阴道流液
  - 妊娠问题
  - 疑似早产
  - 36周前疑似早产
  - 妊娠期阴道出血
- id: pregnancy_006
  topic_zh: 妊娠，高血压
  topic_en: Pregnancy Hypertension
  source_file: STCC/Pregnancy_Hypertension.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 病因
  - 孕周
  - 妊娠次数
  - 病史
  - 用药情况
  triage_levels:
    A:
      criteria:
      - 抽搐活动
      - 无反应
      - 孕20周以上且有：
      - 剧烈腹痛
      - 显著阴道出血
      - 即将分娩，胎儿头部露出
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 鲜红色阴道出血
      - 剧烈头痛
      - 无胎动
      - 手、脸、腿或腰部突然肿胀加剧
      - 上腹痛（右上象限）
      - 视觉障碍（视物模糊或双重视觉，眼前有黑点，或看到星点或物体周围光环）
      action: 立即前往急诊室
    C:
      criteria:
      - 家庭护理措施无法缓解的头痛
      - 1小时内胎动少于10次
      - 规律性强收缩
      - 血压升高（在家监测后休息时）
      - 呕吐且不能摄入液体
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 脚或腿逐渐肿胀
      - 家庭护理措施可缓解的头痛
      - 每周体重增加>2磅
      action: 居家观察，按家庭护理指导
  home_care:
  - 左侧卧休息。
  - 监测胎动；如果1小时内胎动少于10次，寻求医疗帮助。
  callback_criteria:
  - 【立即急诊】抽搐活动
  - 【立即急诊】无反应
  - 【立即急诊】显著阴道出血
  - 【立即急诊】剧烈腹痛
  - 【立即急诊】即将分娩，胎儿头部露出
  related_protocols:
  - 胎动异常
  - 妊娠并发症
  - 疑似临产
  - 小于36周疑似临产
- id: pregnancy_007
  topic_zh: 妊娠，阴道流液
  topic_en: Pregnancy Leaking Vaginal Fluid
  source_file: STCC/Pregnancy_Leaking_Vaginal_Fluid.md
  key_questions:
  - 姓名
  - 年龄
  - 起始时间
  - 原因
  - 孕周
  - 妊娠次数
  - 既往史
  - 用药情况
  triage_levels:
    A:
      criteria:
      - 羊膜破裂伴有脐带脱垂
      - 胎儿头部即将娩出，临产迫在眉睫
      - 明显阴道出血（每小时浸湿1片卫生巾超过2小时或12小时内浸湿6片）
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 剧烈腹痛
      - 无胎动
      - 绿色、棕色或红色液体
      - 已知胎儿为臀位或横位
      - 孕期<37周
      - 当前有疱疹爆发，伴有规律且强烈的宫缩或阴道流液
      action: 立即前往急诊室
    C:
      criteria:
      - 阴道流出清澈液体
      - 强烈、规律的宫缩
      - 发热或寒战
      - 1小时内少于10次胎动
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 丧失黏液栓
      - 不规则宫缩
      - 阴道分泌物增多，呈黏液状
      - 如果出现阴道流液且脐带脱垂，平静地告诉患者：
      - 将电话交给他人拨打救护车
      - 采取膝胸位，头低臀高
      action: 居家观察，按家庭护理指导
  home_care:
  - 请记住，在真正临产前几周丧失黏液栓并不罕见。
  - 监测胎动；如果1小时内少于10次胎动，请就医。
  - 监测宫缩；如果宫缩强烈、持续45至60秒，并且以每5分钟一次的规律模式持续1到2小时，或宫缩强度增加，请前往分娩机构。
  - 排空膀胱。
  - 更换干净、干燥的卫生巾。1小时后重新评估。如果卫生巾湿润、阴道流液继续，或不确定情况，请就医。
  callback_criteria:
  - 点滴出血
  - 1小时内少于10次胎动
  - 强烈规律宫缩
  - 发热或寒战
  - 阴道流出清澈液体
  - 【立即急诊】羊膜破裂伴有脐带脱垂
  - 【立即急诊】胎儿头部即将娩出，临产迫在眉睫
  - 【立即急诊】剧烈腹痛
  - 【立即急诊】绿色或棕色分泌物
  - 【立即急诊】明显阴道出血
  - 【立即急诊】无胎动
  related_protocols:
  - 妊娠问题
  - 疑似临产
  - 36周疑似临产
  - 阴道出血
- id: pregnancy_008
  topic_zh: 妊娠、恶心和呕吐
  topic_en: Pregnancy Nausea and Vomiting
  source_file: STCC/Pregnancy_Nausea_and_Vomiting.md
  key_questions:
  - 姓名
  - 年龄
  - 起始时间
  - 原因
  - 频率
  - 妊娠周数
  - 妊娠次数
  - 既往史
  - 用药情况
  triage_levels:
    A:
      criteria:
      - 呼吸困难
      - 精神状态改变
      - 妊娠超过20周，且存在以下任一症状：
      - 呕吐鲜红色血液或咖啡渣样呕吐物
      - 最近头部受伤
      - 出汗或心悸
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 24周以上妊娠且无胎儿活动
      action: 立即前往急诊室
    C:
      criteria:
      - 体温 >100.4°F (38.9°C)
      - 脱水症状
      - 糖尿病
      - 阵痛或规律的强烈宫缩
      - 超过24小时无法保持水分摄入
      - 尿液呈深琥珀色
      - 上腹部疼痛（右上象限疼痛）
      - <1小时内胎儿活动少于10次
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 家庭护理措施无法缓解的恶心和呕吐或胃灼热
      - 有恶心但能保持部分水分或食物摄入
      - 尿液呈黄色
      - 胃灼热
      action: 居家观察，按家庭护理指导
  home_care:
  - 在最后一次呕吐后1小时内不要进食或饮水。
  - 在首次呕吐后的12小时内，每次只喝少量的透明液体。
  - 根据耐受情况逐渐增加水分摄入。
  - 如果12小时内无再次呕吐，尝试吃清淡食物（如饼干、干面包、香蕉）。
  - 如果12小时内未再呕吐，恢复正常饮食。
  - 晨吐：
  - 早晨起床时食用干面包、麦片或饼干。
  - 缓慢起身。
  - 睡眠或烹饪时开窗换气。
  - 一天中分多次进食；避免在餐间饮水。
  - 餐间饮用姜汁汽水或橙汁、葡萄汁。
  - 避免油腻或重口味的食物。
  - 饭后不要立即躺下。
  - 感到恶心时食用饼干、奶酪或薯片。
  callback_criteria:
  - 【立即急诊】精神状态改变
  - 【立即急诊】呕吐鲜红色血液或咖啡渣样呕吐物
  - 【立即急诊】胸痛或呼吸困难
  related_protocols:
