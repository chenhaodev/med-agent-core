  triage_levels:
    A:
      criteria:
      - 持续出血超过30分钟
      - 头部受伤的迹象：
      - 困惑/好斗
      - 说话困难
      - 视觉障碍
      - 严重头痛
      - 协调问题
      - 恶心和/或呕吐
      - 突然出现颈部疼痛、麻木、刺痛或手臂无力
      - 持续性的清澈或粉红色鼻腔引流
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 有鼻窦手术史
      - 伤口裂开、断裂或很深
      action: 立即前往急诊室
    C:
      criteria:
      - 72小时后及家庭护理措施后的畸形
      - 肿胀消退后，通过一个或两个鼻孔呼吸困难
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 鼻部肿胀
      - 已控制的鼻出血
      - 鼻子和眼睛周围的擦伤或瘀伤
      - 受伤后的最初24到72小时内，鼻子看起来变形
      action: 居家观察，按家庭护理指导
  home_care:
  - 在最初的48小时内，每2小时将冰袋敷于鼻子上20到30分钟以帮助减轻肿胀和疼痛。不要直接将冰放在皮肤上，用毛巾或洗布包裹冰块。
  - 要止住鼻血，请连续对柔软的鼻部分施压15分钟。坐起来并向前倾斜。避免吞咽血液；将其吐出。通过口呼吸。
  - 如果出血停止但随后再次出现，请再捏紧鼻子闭合15分钟。
  - 预期在最初的48到72小时内会出现肿胀、瘀伤和变形。
  callback_criteria:
