      - 穿刺部位疼痛、肿胀、流脓
      - 因穿刺撕裂导致的开放性割伤
      action: 立即前往急诊室
    C:
      criteria:
      - 服用新药后出现疼痛
      - 面部一侧疼痛
      - 舌头或口腔内持续存在的硬块
      - 持续疼痛并伴有腹泻，大便稀、恶臭且量多
      - 溃疡、裂纹、红斑及家庭护理措施3天以上仍无改善的持续性疼痛
      - 穿刺造成的轻微撕裂并且最后一次破伤风注射超过10年
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 舌头鲜红且肿胀
      - 舌尖和边缘发红
      - 舌头发毛
      - 舌头上一处有疮
      - 服用Pepto-Bismol后舌头发黑
      - 假牙、尖锐牙齿或矫正器造成的刺激
      action: 居家观察，按家庭护理指导
  home_care:
  - 通过吸管喝水以减少不适。
  - 注意特定食物与舌痛之间的关系，并避免这些食物。酒精、热食或辛辣食品、烟草、巧克力、柑橘类食品、醋、腌制品、咸坚果和薯片可能会刺激舌头。牛奶、果冻、酸奶、冰淇淋和布丁对舌头有舒缓作用。
  - 每天用盐水或小苏打溶液漱口4次。在8盎司水中加入1/2茶匙的盐或小苏打。
  - 如果刺激是由尖锐牙齿或矫正器引起的，请联系牙医。
  - 如果肿胀与药物有关，停止使用并如果是处方药则联系家庭医生。
  - 增加液体摄入量。
  - 如果刺激是由假牙造成的，移除假牙并联系牙医。
  callback_criteria:
  - 【立即急诊】呼吸困难
  - 【立即急诊】口腔后部肿胀
  related_protocols:
  - 过敏反应
  - 口腔问题
  - 穿刺问题
  - 咽喉痛
  - 吞咽困难
  - 牙痛
- id: ear_eye_nose_021
  topic_zh: 牙齿损伤
  topic_en: Tooth Injury
  source_file: STCC/Tooth_Injury.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 过敏史
  - 药物使用情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 意识改变
      - 严重颈部疼痛
      - 手臂或腿部麻木刺痛
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 牙齿（或几颗牙）被敲出
      - 牙齿松动即将脱落
      - 牙齿移位
      - 无法通过压迫止血
      action: 立即前往急诊室
    C:
      criteria:
      - 受伤区域剧烈疼痛和肿胀
      - 松动的牙齿或几颗牙
      - 牙齿从冠部断裂或延伸到牙龈线
      - 破裂或裂开的痛苦牙齿
      - 系带撕裂或割伤
      - 严重颌痛
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 牙龈、脸颊或嘴唇割伤
      - 无痛的破裂或裂开的牙齿
      action: 居家观察，按家庭护理指导
  home_care:
  - 找到牙齿；用唾液、牛奶或非氯化瓶装水轻轻冲洗，并尽快重新放入牙槽。不要移除粘附在牙齿上的物质，不要擦洗牙齿。咬住纱布垫或其他材料以帮助固定牙齿。
  - 如果无法将牙齿重新放回牙槽，可以将牙齿放在1/4茶匙盐和1杯牛奶的杯子中。如果是清醒且不是小孩的受害者，也可以将牙齿置于舌下。患者必须理解将牙齿片段保持在舌头下的重要性，以免吞咽牙齿。
  - 咬住折叠的纱布敷料或湿润的红茶包20分钟以控制出血。
  - 联系牙医。
  - 按常规服用止痛药（对乙酰氨基酚、布洛芬）缓解不适。不要给儿童使用阿司匹林。如果年龄<20岁，避免使用类似阿司匹林的产品。如果有肝病，避免使用对乙酰氨基酚。如果有肾病或胃部问题，或者在怀孕的情况下，避免使用布洛芬。请遵循标签上的说明。
  - 根据耐受程度将冰敷于受伤的牙龈上以帮助控制疼痛。
  - 持续出血、肿胀或疼痛
  callback_criteria: []
  related_protocols:
  - 背部/颈部损伤
  - 颌痛
  - 口腔问题
  - 牙痛
- id: ear_eye_nose_022
  topic_zh: 牙痛
  topic_en: Toothache
  source_file: STCC/Toothache.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 过敏史
  - 用药情况
  - 病史（如果有受伤
  - 请参阅牙外伤处理方案 (616)）
  triage_levels:
    A:
      criteria:
      - 下牙、颈部、胸部、肩部或手臂持续性疼痛
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 有心血管疾病或糖尿病史和下颌疼痛（无已知损伤或牙齿问题）
      - 体温 >100.4°F (38.0°C)
      action: 立即前往急诊室
    C:
      criteria:
      - 上下颚持续性疼痛和肿胀
      - 牙脓肿有分泌物排出
      - 非外伤性的牙齿断裂
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 疼痛影响日常活动
      - 牙龈红、肿、出血
      - 咀嚼食物时持续数日的疼痛
      - 最近补过牙且有几天的疼痛
      - 该牙齿有既往问题（如以前断裂或裂纹，冷热敏感）
      - 无创伤、骨折、发热或面部肿胀的疼痛
      - 口腔内溃疡
      - 牙齿松动、缺损或腐烂
      - 进食时或刚进食后感到疼痛
      action: 居家观察，按家庭护理指导
  home_care:
  - 每天4次，每次20分钟，用冰袋敷以减少肿胀。
  - 不要直接将冰放在皮肤上；在冰和皮肤之间放置一块布。
  - 服用常规止痛药（如阿司匹林、对乙酰氨基酚、布洛芬）来缓解不适。不要给儿童使用阿司匹林。20岁以下者避免使用类似阿司匹林的产品。肝病患者避免使用对乙酰氨基酚。肾病或胃部问题存在时，孕妇情况下避免使用布洛芬。按照标签上的指示服用。
  - 如果口腔内有溃疡，每天几次用1/2茶匙小苏打或盐溶于一杯温水中漱口。
  - 每天至少刷牙两次。
  - 预约牙医。
  callback_criteria:
  - 【立即急诊】胸、肩或手臂的疼痛
  - 【立即急诊】下牙和颈部持续性疼痛
  related_protocols: []
- id: ear_eye_nose_023
  topic_zh: 视力问题
  topic_en: Vision Problems
  source_file: STCC/Vision_Problems.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 药物
  - 病史
  triage_levels:
    A:
      criteria:
      - 突然剧烈的眼痛发作
      - 一只或两只眼睛的部分或完全视力丧失
      - 虹膜部分出血或脓液
      - 瞳孔大小不一
      - 近期头部受伤和视力变化史
      - 眼前漂浮物、闪光感或视野内出现窗帘样遮挡的突然或逐渐增多
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 突然出现的视物模糊或复视及眼痛
      - 对眼睛施压或移动眼球时疼痛加剧
      - 年龄>50岁，近期或目前有颞部疼痛/头痛
      - 眼部感染迹象：疼痛、红肿、分泌物或发热
      action: 立即前往急诊室
    C:
      criteria:
      - 对光线敏感度增加
      - 闪光感后出现头痛史
      - 新近突然发作的闪光感（过去未发生）并伴有头痛
      - 持续性视物模糊或复视
      - 更换药物后的视力变化
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 年龄>50岁，视力逐渐模糊
      - 间歇性的视物模糊发作
      - 看远处物体困难
      - 阅读困难
      - 眼睛干燥发痒
      action: 居家观察，按家庭护理指导
  home_care:
  - 如果存在分泌物流出且怀疑眼部感染，鼓励家人使用单独的毛巾和洗面巾。
  - 避免揉搓或触摸眼睛。经常洗手。
  - 用温水湿润的棉球清洁结痂或分泌物。使用后丢弃棉球。不要用同一棉球处理双眼。
  - 在干燥、发痒的眼睛中滴入生理盐水滴眼液。
  - 预约检查视力，无论是看近处还是远处物体困难时。
  callback_criteria:
  - 视力的突然变化
  - 感染迹象
  - 情况持续或恶化
  - 【立即急诊】突然剧烈的眼痛发作
  - 【立即急诊】一只或两只眼睛的部分或完全视力丧失
  - 【立即急诊】瞳孔大小不一
  - 【立即急诊】眼前漂浮物、闪光感或视野内出现窗帘样遮挡的突然或逐渐增多
  related_protocols:
  - 眼部损伤
  - 眼部问题
  - 眼内异物
  - 神经系统症状
  - 疑似中风
