  - 儿童皮疹
  - 鼻窦问题
  - 怀疑中风
  - 纹身问题
  - 牙痛
- id: ear_eye_nose_009
  topic_zh: 眼内异物
  topic_en: Foreign Body Eye
  source_file: STCC/Foreign_Body_Eye.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 用药情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 物体嵌入眼球
      - 冲洗眼睛内的化学物质后仍有剧烈疼痛
      - 突然出现视力变化
      - 眼球突出
      - 虹膜部分有血液
      - 受伤眼有透明胶状物流出
      - 移除异物后仍感剧痛
      - 瞳孔大小不等
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 异物覆盖在虹膜上
      - 肿胀、疼痛或流泪持续超过30分钟
      - 因热水、化学物质或异物造成伤害，家庭护理后仍感疼痛
      - 无法移除自由浮动的异物
      action: 立即前往急诊室
    C:
      criteria:
      - 受伤或移除异物后24小时仍有不适或刺激感
      - 伤口感染迹象：疼痛、肿胀、发红、流液或发烧
      - 无法取下隐形眼镜
      action: 当天内联系医生/诊所
  home_care:
  - 眼睛中的化学物质：立即用冷水冲洗眼睛20至30分钟。将头倾斜，使受伤的眼睛朝下，并置于流水下。分开上下眼睑，让水流过眼球内部到外部。
  - 不要尝试移除：
  - 嵌入眼内的物体
  - 金属碎片
  - 覆盖在虹膜上的异物
  - 移除异物（如绒毛、尘埃颗粒或睫毛）的方法：
  - 向下拉低眼皮，并用湿润的手帕、纸巾或棉签的一角轻轻取出异物。
  - 将上眼皮翻过下眼皮并保持片刻，放开后检查是否能看到异物；如果可以，则将其取出。
  - 不要揉眼睛。
  - 应用冰袋或冷敷以减轻不适。
  - 服用常规止痛药（如阿司匹林、对乙酰氨基酚或布洛芬）。不要给儿童服用阿司匹林。20岁以下避免使用类似阿司匹林的产品。肝病患者避免使用对乙酰氨基酚。肾病、胃部问题患者或孕妇应避免使用布洛芬。请遵循标签上的指示。
  callback_criteria: []
  related_protocols:
  - 眼部损伤
  - 眼科问题
  - 视力问题
- id: ear_eye_nose_010
  topic_zh: 鼻腔异物
  topic_en: Foreign Body Nose
  source_file: STCC/Foreign_Body_Nose.md
