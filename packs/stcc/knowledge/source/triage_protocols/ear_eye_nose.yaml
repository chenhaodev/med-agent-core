  triage_levels:
    A:
      criteria:
      - 鼻腔内有尖锐物体嵌入
      - 大量出血
      - 鼻腔内有刺激性或粘附性物质
      - 严重鼻痛
      - 年龄小于18个月
      - 异物可能是小型圆盘电池
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 皮肤红肿发热，伴有发烧或头痛
      - 呕吐和腹痛
      action: 立即前往急诊室
    C:
      criteria:
      - 多次尝试后仍无法取出异物
      - 肿胀和触痛
      - 一侧鼻孔有恶臭的绿色或黄色分泌物流出
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 已移除鼻腔内的异物，且没有其他症状
      action: 居家观察，按家庭护理指导
  home_care:
  - 在受影响的鼻孔中滴入生理盐水或使用鼻用减充血剂。
  - 捏住不受影响的鼻孔，从受影响的鼻孔呼气。
  - 如果物体可见，请不要尝试取出，除非能够完全固定头部。如果有阻力或有将物体推得更深的风险，请停止并寻求医疗帮助。
