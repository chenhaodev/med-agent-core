      - 高热且看起来或感觉不适
      - 持续声音嘶哑 >1 周
      - 有吸烟史、近期体重减轻和食欲减退
      - 皮肤或头发干燥、对寒冷敏感增加、疲劳增加或不明原因的体重增加
