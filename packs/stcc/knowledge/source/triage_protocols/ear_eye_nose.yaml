protocols:
- id: ear_eye_nose_001
  topic_zh: 耳痛，耳漏
  topic_en: Earache Drainage
  source_file: STCC/Earache_Drainage.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 用药情况
  - 疼痛程度评分
  triage_levels:
    A:
      criteria:
      - 耳痛、颈强直和发热
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 面部一侧肿胀、疼痛和红斑
      - 耳部受到撞击后出现剧烈疼痛、听力丧失、耳后淤青、耳道出血或显著肿胀
      - 对止痛药无反应的严重疼痛
      - 有糖尿病或免疫抑制史
      - 耳朵向外偏移
      - 耳后骨触痛
      action: 立即前往急诊室
    C:
      criteria:
      - 突然听力下降伴疼痛，耳漏或眩晕
      - 血液性或透明的耳漏（不同于常规耳垢）
      - 肿胀、疼痛、温暖感、耳漏或发热
      - 移动或触碰耳朵时疼痛加剧
      - 水疱或溃疡
      - 发热、鼻塞或咽痛
      - 头晕目眩
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 无法通过药物清除耳蜡栓并伴有疼痛或听力下降
      - 耳朵晒伤
      - 冷暴露后疼痛
      - 听力模糊但无痛感
      - 游泳或水接触后的疼痛
      - 突然疼痛伴随破裂声，听力下降和鼻塞
      - 使用抗生素治疗超过3天的耳部感染且耳痛持续存在
      action: 居家观察，按家庭护理指导
  home_care:
  - 如果疼痛与伤害有关或怀疑鼓膜破裂（突然疼痛、听力下降、出血或流出物、耳鸣、眩晕），不要向耳朵内滴入液体。
  - 对于晒伤的耳朵应用冷敷，对因撞击造成的肿胀区域使用冰袋。
  - 为了清除过多的耳蜡，按照说明使用Debrox（过氧化脲）最长3天，或每天在受影响的耳朵里滴两次矿物油，连续2天。
  - 用温暖的热敷布每次15到20分钟，一天4次，直到症状缓解或等待预约时。将袜子装半满米粒，打结后放入微波炉加热至温热状态，然后将其贴在耳朵上。使用前请先用手腕内侧测试温度。
  - 避免游泳直至耳痛和耳漏停止。
  - 预防游泳性耳炎：将白醋和异丙醇等量混合，在游泳前后向每只耳朵滴入5滴此混合液。
  - 通过频繁吞咽、嚼口香糖以及捏住鼻子闭气吞咽来缓解耳部充血。
  - 当出现耳痛或充血时避免飞行。如果不可避免，起飞和降落时请事先服用去充血剂，并咀嚼口香糖。
  - 服用对乙酰氨基酚以减轻耳痛或发热。不要给儿童使用阿司匹林。20岁以下者应避免使用类似阿司匹林的产品。肝病患者应避免使用对乙酰氨基酚。肾病、胃部问题患者或孕妇应避免使用布洛芬。请按照标签指示服用。
  callback_criteria:
  - 3天内无改善或病情恶化
  - 持续发热且退热措施无效
  - 呕吐、腹泻、疲劳、嗜睡或颈强直
  - 发热或肿胀
  - 【立即急诊】耳痛、颈强直、发热
  related_protocols:
  - 感冒症状
  - 婴儿过度哭闹
  - 耳部异物损伤
  - 成人发热
  - 儿童发热
  - 听力下降
  - 穿孔问题
  - 咽痛
- id: ear_eye_nose_002
  topic_zh: 眼部问题
  topic_en: Eye Problems
  source_file: STCC/Eye_Problems.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 药物
  - 病史
  triage_levels:
    A:
      criteria:
      - 突然或剧烈疼痛
      - 视力突然丧失、模糊或双重视觉
      - 瞳孔大小突然不等
      - 视野中有一块阴影
      - 眼前飞絮增多
      - 光周围有光环或彩虹
      - 虹膜部分出血
      - 红肿且无法睁开眼睛或保持睁开状态
      - 发热、畏光、双眼肿胀及红肿
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 疼痛、红肿、流泪、有分泌物，佩戴隐形眼镜
      - 发热和红肿的睫毛
      - 施加压力或眼球移动时疼痛加剧
      - 眼球或眼角有病灶
      - 眼睛完全肿胀闭合
      action: 立即前往急诊室
    C:
      criteria:
      - 家庭护理措施无效，持续疼痛
      - 持续的瘙痒、红肿、灼热感和分泌物
      - 摘除隐形眼镜并冲洗后仍然疼痛
      - 颈部淋巴结肿大，眼睛周围红肿
      - 麦粒肿复发或出血
      - 位于鼻侧下眼睑的麦粒肿对家庭护理措施无反应
      - 伴有发热>100.5°F的眼痛或分泌物
      - 持续过度流泪
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 眼球白色部分出血超过3天
      - 傍晚时分有眼痛病史
      - 长时间佩戴隐形眼镜或清洁不当的病史
      - 泪腺区域肿胀疼痛
      - 上睑或下睑小而红、肿胀和触痛的区域
      - 接触烟雾、气体、烟霾、泳池水、已知过敏原或太阳灯
      - 眼睛干涩发痒
      - 早晨眼睛结痂闭合
      action: 居家观察，按家庭护理指导
  home_care:
  - 如果有分泌物，鼓励家人使用单独的毛巾和洗脸巾。眼部感染非常容易传染。
  - 避免揉眼睛或接触眼睛。
  - 用温水浸湿的棉球清洁结痂或分泌物。使用后丢弃棉球。不要用同一个棉球清洁两只眼睛。清洁后洗手。
  - 每天4次，每次15到20分钟地对眼睛进行热敷。
  - 经常洗手。
  - 在干涩发痒的眼睛中滴入生理盐水。
  - 在问题解决前的几天内避免佩戴隐形眼镜。
  - 对于麦粒肿：参见麦粒肿协议（580）中的家庭护理指导。
  callback_criteria:
  - 48小时后情况未改善或恶化
  - 黄色或绿色分泌物
  - 红肿的眼睑
  - 【立即急诊】剧烈疼痛
  - 【立即急诊】视力突然丧失、模糊或双重视觉
  - 【立即急诊】瞳孔大小突然不等
  - 【立即急诊】虹膜部分出血
  - 【立即急诊】红肿且无法睁开眼睛或保持睁开状态
  - 【立即急诊】发热、畏光、双眼肿胀及红肿
  related_protocols:
  - 神经系统症状
  - 麦粒肿
  - 视力问题
  - 参见眼部损伤
  - 或眼内异物
  - 疑似中风
- id: ear_eye_nose_003
  topic_zh: 口臭
  topic_en: Bad Breath
  source_file: STCC/Bad_Breath.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 用药情况
  - 既往病史
  triage_levels:
    A:
      criteria:
      - 呼吸有水果味或氨味
      - 伴有腹胀和疼痛的恶臭
      - 口腔或喉咙内有发热和溃疡
      - 口腔或舌部剧烈疼痛
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 牙龈持续出血或肿胀
      - 咳嗽并伴有恶臭痰液
      - 牙齿松动、缺失或腐烂
      - 频繁使用铸铁炊具或餐具
      - 近期摄入大剂量维生素或矿物质
      - 有胃肠疾病或慢性肺部疾病的病史
      - 有过敏或鼻窦问题的病史
      action: 立即前往急诊室
  home_care:
  - 使用抗菌漱口水（如李施德林）漱口。
  - 每天刷牙、假牙、牙龈和舌头两次，并定期使用牙线。
  - 每日取下并浸泡桥冠和假牙。
  - 如果认为维生素或矿物质补充剂是导致口臭的原因，减少其剂量。
  - 减少使用铸铁炊具（除非医生建议）。
  - 减少食用大蒜、洋葱、酒精或咖啡。
  - 定期看牙医，并在出现牙齿问题时及时就诊。
  callback_criteria: []
  related_protocols:
  - 糖尿病问题
  - 胀气/打嗝
  - 消化不良
  - 口腔问题
  - 吞咽困难
  - 舌部问题
  - 牙痛
- id: ear_eye_nose_004
  topic_zh: 隐形眼镜问题
  topic_en: Contact Lens Problems
  source_file: STCC/Contact_Lens_Problems.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 隐形眼镜类型
  - 疼痛程度
  - 药物
  triage_levels:
    A:
      criteria:
      - 突然失明
      - 剧烈疼痛
      - 穿透性损伤（如硬质镜片嵌入眼球表面）
      - 佩戴未充分清洁和冲洗的隐形眼镜后出现剧烈疼痛
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 眼睛内硬质镜片破裂
      - 持续性的疼痛，家庭护理无效
      - 视力模糊或改变
      action: 立即前往急诊室
    C:
      criteria:
      - 眼部分泌物呈脓状
      - 家庭护理后状况未改善或恶化
      - 无法摘除隐形眼镜
      - 持续感觉有异物在眼中
      - 对光线极度敏感
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 不适感
      - 眼睛红肿但视力无变化
      - 沙涩感
      - 频繁流泪
      action: 居家观察，按家庭护理指导
  home_care:
  - 在进行任何眼部护理前彻底洗手。
  - 摘除硬质隐形眼镜：
  - 手电筒或放大镜有助于操作。
  - 可能需要翻转眼睑。
  - 向眼中滴入几滴生理盐水。
  - 轻轻按压通过眼睑移动镜片。
  - 摘除软性隐形眼镜：
  - 向眼中滴入几滴生理盐水。
  - 轻轻地将镜片移至眼球的白色部分。
  - 用拇指和食指抓住镜片并取出。
  - 轻轻用生理盐水或清水冲洗受影响的眼睛10到20分钟。
  - 在暗室中休息眼睛。在眼睛上敷冷敷布或冰袋以减少肿胀。
  - 服用常规止痛药（阿司匹林、对乙酰氨基酚或布洛芬）缓解不适。不要给儿童服用阿司匹林。年龄<20岁的避免使用类似阿司匹林的产品。肝病患者避免使用对乙酰氨基酚。肾病、胃问题存在者或孕妇避免使用布洛芬。请遵循标签上的说明。
  - 在问题解决后1周内，或者按照提供者的指示，逐渐增加佩戴隐形眼镜的时间。
  - 对于眼部分泌物，每天多次用温热的敷布敷眼10分钟。家庭其他成员应使用单独的毛巾和洗面巾。当存在眼部分泌物时不要佩戴隐形眼镜。经常洗手。
  - 避免揉搓或抓挠眼睛。
  - 检查隐形眼镜是否有裂痕或不规则性。
  - 在感染解决后，彻底消毒隐形眼镜后再重新佩戴。
  callback_criteria:
  - 持续的眼睛红肿或刺激感
  - 脓状分泌物或频繁流泪
  - 对光线敏感
  - 状况未改善或恶化
  - 无法摘除镜片
  - 【立即急诊】突然失明
  - 【立即急诊】一只或两只眼睛剧烈疼痛
  related_protocols:
  - 眼部伤害
  - 眼部问题
  - 异物进入眼睛
  - 视力问题
- id: ear_eye_nose_005
  topic_zh: 耳部伤害，异物
  topic_en: Ear Injury Foreign Body
  source_file: STCC/Ear_Injury_Foreign_Body.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 用药
  - 病史
  - 疼痛评分
  triage_levels:
    A:
      criteria:
      - 协调能力丧失
      - 面瘫或面部下垂
      - 天旋地转的眩晕
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 听力下降
      - 耳道出血
      - 最近头部受到撞击且耳道有清澈或带血的分泌物
      - 无法移除异物或嵌入的穿孔饰物
      - 剧烈疼痛
      - 持续性耳鸣
      - 耳垂割伤
      - 耳内有昆虫
      - 耳垂严重肿胀
      - 持续出血超过30分钟
      action: 立即前往急诊室
    C:
      criteria:
      - 持续疼痛超过48小时
      - 空气冲击、噪音或头部受到撞击后的耳痛
      - 外耳红肿
      - 最近使用了棉签
      - 小割伤且破伤风疫苗接种已超过10年
      - 家庭护理3天后没有好转
      action: 当天内联系医生/诊所
  home_care:
  - 伤后24至48小时内，每天将冰袋敷于耳朵上20分钟，每日四次。不要直接将冰放在皮肤上；在冰和皮肤之间使用毛巾或其他织物作为屏障。
  - 将耳朵朝向光源，并向上拉耳以鼓励昆虫爬向光线方向离开耳朵。
  - 如果无法通过将耳朵向下并向地面轻轻摇晃头部同时向上拉耳来移除异物，请不要尝试强行取出。
  - 为减轻不适，可服用常规止痛药（阿司匹林、对乙酰氨基酚或布洛芬）。不要给儿童使用阿司匹林。年龄小于20岁者避免使用类似阿司匹林的产品。肝病患者避免使用对乙酰氨基酚。肾病、胃部问题存在或怀孕情况下避免使用布洛芬。请遵循标签上的说明。
  - 观察感染迹象：疼痛加剧、分泌物、发热、红肿或温暖感。
  callback_criteria:
  - 【立即急诊】协调能力丧失
  - 【立即急诊】面瘫或面部下垂
  - 【立即急诊】天旋地转的眩晕
  related_protocols: []
- id: ear_eye_nose_006
  topic_zh: 耳鸣
  topic_en: Ear Ringing
  source_file: STCC/Ear_Ringing.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 药物使用情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 过量或频繁服用阿司匹林或含阿司匹林的产品
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 耳内有异物
      - 家庭护理措施无效的严重耳痛
      action: 立即前往急诊室
    C:
      criteria:
      - 近期服用过阿司匹林、含奎宁或链霉素的药物
      - 近期头部受伤或最近接受过耳部手术的历史
      - 头晕或眩晕
      - 恶心或呕吐
      - 持续性耳痛
      - 耳道分泌物
      - 持续性的听力损失
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 上呼吸道感染
      - 过敏引起的充血
      - 单侧或双侧耳朵感到堵塞
      - 耳垢过多积聚
      - 有梅尼埃病类似症状的历史
      action: 居家观察，按家庭护理指导
  home_care:
  - 服用减充血剂以缓解耳朵充血。按照标签上的说明使用。向药剂师咨询产品建议。
  - 如果正在服用含阿司匹林、奎宁或链霉素的药物，停止服用并通知家庭医生。
  - 不要用手指或棉签戳耳朵或试图取出耳垢。这些措施会加重问题。
  - 如果有梅尼埃病的历史，减少盐分、咖啡因和酒精的摄入量。
  callback_criteria:
  - 严重的听力损失或眩晕
  - 耳痛或流脓
  - 持续性呕吐、耳鸣加剧、头痛
  related_protocols:
  - 充血
  - 眩晕
  - 流脓
  - 异物进入
  - 听力丧失
- id: ear_eye_nose_007
  topic_zh: 眼部损伤
  topic_en: Eye Injury
  source_file: STCC/Eye_Injury.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 是否佩戴隐形眼镜
  - 过敏史
  - 用药情况
  - 既往病史
  triage_levels:
    A:
      criteria:
      - 眼睛或眼睑有割伤或穿透性损伤
      - 眼部受到撞击并突然失明
      - 眼球突出
      - 受损眼睛流出透明胶状物
      - 眼部钝器伤害
      - 瞳孔大小不等
      - 彩色部分的眼球内出血
      - 持续剧烈疼痛
      - 接触酸性物质，如电池酸或腐蚀性物质（下水道清洁剂、苛性钠）
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 肿胀、疼痛和流泪超过30分钟
      - 暴露于强光下，如焊接弧光或太阳灯
      - 由热水、化学品、辣椒喷雾或异物造成的伤害，在家庭护理治疗后仍持续疼痛，或者眼白变浑浊
      - 持续模糊视觉或复视
      action: 立即前往急诊室
    C:
      criteria:
      - 伤害后或移除异物后24小时仍持续不适或刺激感
      - 伤后出现感染迹象：疼痛、肿胀、发红、分泌物或发热
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 眼周区域出现青紫
      - 白眼仁出血超过3天
      action: 居家观察，按家庭护理指导
  home_care:
  - 眼内化学品：立即用冷自来水冲洗眼睛20到30分钟。将头部倾斜至受伤的眼睛下方，在拉开眼睑的同时，让水流过眼球的内部到达外侧。
  - 对于辣椒素暴露（如辣椒、辣椒喷雾），使用整盒牛奶冲洗眼睛。它会像清洁剂一样作用，去除有害物质。
  - 不要揉眼睛。
  - 在最初24小时内应用冰袋或冷敷以减轻肿胀。不要直接将冰块放在皮肤上；在冰和皮肤之间放置一条毛巾或其他布料作为屏障。
  - 对于不适感可服用对乙酰氨基酚。不要给儿童服用阿司匹林。如果年龄小于20岁，避免使用类似阿司匹林的产品。肝病患者避免使用对乙酰氨基酚。肾病、胃问题或怀孕的情况下避免使用布洛芬。遵循标签上的指示。
  callback_criteria:
  - 【立即急诊】眼睛有任何出血或胶状物排出
  - 【立即急诊】视力突然变化
  - 【立即急诊】持续剧烈疼痛
  related_protocols:
  - 化学
  - 眼部问题
  - 眼内异物
  - 头部损伤
  - 穿刺问题
  - 视力问题
- id: ear_eye_nose_008
  topic_zh: 面部问题
  topic_en: Facial Problems
  source_file: STCC/Facial_Problems.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 药物使用情况
  - 病史
  - 疼痛评分
  triage_levels:
    A:
      criteria:
      - 突发视力丧失
      - 面部一侧严重疼痛，眼周模糊视觉和红眼
      - 成人肩部、胸部、颈部或臂部疼痛
      - 青光眼病史
      - 突然出现面部一侧下垂
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 突发剧烈疼痛影响活动能力
      - 疼痛、肿胀、发红、发热或有分泌物
      action: 立即前往急诊室
    C:
      criteria:
      - 午后或弯腰时疼痛加剧
      - 鼻腔流出绿色、棕色或黄色的分泌物
      - 鼻子与下眼睑之间的棱线上疼痛
      - 体温 >101°F (38.3°C)
      - 持续肿胀
      - 面部皮疹、水泡或病变
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 近期面部出现红色水疱状皮疹
      - 面部受伤后的疼痛、肿胀或瘀伤
      - 近期感冒史
      - 食用冰冻食物或饮料后疼痛加剧
      - 鼻腔和眼部有分泌物
      action: 居家观察，按家庭护理指导
  home_care:
  - 交替使用冷热敷于前额和脸颊，每次1分钟，每天4次。袜子内装满在微波炉中加热的米粒效果很好。
  - 增加水分摄入量。
  - 对于面部伤害，在最初24小时内每天4次将冰袋敷于脸上10到20分钟以帮助减少肿胀。不要直接将冰放在皮肤上，应在冰和皮肤之间放置湿布或其他织物屏障。
  - 每天多次坐在蒸汽浴室中20分钟以促进鼻窦排液。
  - 根据需要服用非处方解充血剂以缓解充血，并遵循标签上的指示。向药剂师咨询产品建议。
  - 按照常规剂量（阿司匹林、对乙酰氨基酚、布洛芬）服用止痛药以缓解不适和发热。不要给儿童使用阿司匹林。年龄<20岁者避免使用类似阿司匹林的产品。肝病患者避免使用对乙酰氨基酚。肾病或胃部问题存在时，或怀孕情况下避免使用布洛芬。遵循标签上的指示。
  callback_criteria:
  - 持续性疼痛或病情恶化
  - 体温 >101°F (38.3°C)
  - 感染迹象：疼痛、肿胀、发红、发热、分泌物或红线
  - 持续性鼻腔分泌物
  - 视力、听力、嗅觉或味觉变化
  - 【立即急诊】突发视力丧失
  - 【立即急诊】面部一侧严重疼痛，眼周模糊视觉和红眼
  - 【立即急诊】成人肩部、胸部、颈部或臂部疼痛
  - 【立即急诊】面部一侧突然下垂
  related_protocols:
