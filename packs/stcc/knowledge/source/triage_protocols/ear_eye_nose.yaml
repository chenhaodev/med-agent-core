- id: ear_eye_nose_016
  topic_zh: 红眼病
  topic_en: Pinkeye
  source_file: STCC/Pinkeye.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 病因
  - 眼睛是否发红或粉红
  - 历史
  - 用药情况
  - 疼痛评分
  triage_levels:
    A:
      criteria:
      - 眼部受伤
      - 眼中异物
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 青光眼病史
      - 腹痛或恶心
      - 无法移动眼球
      - 视野部分丧失
      action: 立即前往急诊室
    C:
      criteria:
      - 红肿的眼睑
      - 眼球上的溃疡或灰白色斑点
      - 剧烈疼痛
      - 闪光感
      - 年龄小于5岁，且眼周严重红肿
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 持续眨眼、流泪并伴有疼痛
      - 黄绿色的眼部分泌物
      - 眼睑轻微浮肿，边缘发红
      - 视力模糊
      - 对光线敏感
      - 有眼感染的历史
      - 清晨醒来时眼睑粘连
      - 红色持续超过7天
      - 接触焊工或紫外线
      - 患红眼病一侧耳朵疼痛
      - 眼白部分出现血丝，但视力没有变化
      - 冷症状：鼻塞、耳痛、喉咙痛或咳嗽
      - 接触环境刺激物：烟雾、烟尘、泳池水、洗发水、洋葱、家用清洁剂或墨西哥辣椒
      - 有花粉症或过敏史，并伴有眼睛瘙痒
      - 清澈的眼部分泌物
      action: 居家观察，按家庭护理指导
  home_care:
  - 经常用温水冲洗眼睛，醒着时每1到2小时一次。使用柔软的温暖湿润布料清除结痂和分泌物。
  - 如果接触化学刺激物，请用温水冲洗眼睛5分钟。
  - 每隔2小时交替敷热敷和冷敷10分钟，持续24小时。
  - 不要与家庭其他成员共用毛巾或床单。
  - 为了控制瘙痒，可以尝试使用苯那君（Benadryl）24至48小时。遵循标签上的说明。
  - 鼓励孩子不要触摸眼睛，并经常洗手。
  callback_criteria:
  - 红肿的眼睑
  - 眼球上的溃疡或灰白色斑点
  - 剧烈疼痛
  - 闪光感
  - 持续眨眼、流泪或疼痛
  - 持续眼部分泌物
  - 【立即急诊】无法移动眼球
  - 【立即急诊】腹痛或恶心
  related_protocols:
