- id: ear_eye_nose_015
  topic_zh: 鼻出血
  topic_en: Nosebleed
  source_file: STCC/Nosebleed.md
  key_questions:
  - 姓名
  - 年龄
  - 起始时间
  - 原因
  - 药物使用情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 持续施压30分钟后仍无法止血
      - 意识状态改变
      - 心跳加速，皮肤苍白或呼吸困难
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - （除鼻塞外的）呼吸困难
      - 头晕、眩晕
      - 严重头痛后发生鼻出血
      - 高血压或凝血障碍病史
      - 正在服用抗凝药物、阿司匹林或非甾体抗炎药且有持续性鼻出血
      - 鼻腔内有异物并大量出血
      - 近期头部受伤且有血液或液体流出
      action: 立即前往急诊室
    C:
      criteria:
      - 最近受伤后出现持续的变形或阻塞
      - 过去48小时内发生超过3次鼻出血
      - 近期进行过鼻部手术，出血停止后又重新开始
      - 近期进行过鼻部手术且有持续性出血
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 过敏或花粉症病史
      - 频繁但可控制的鼻出血史
      - 长期使用鼻喷雾剂
      - 经常使用可卡因
      action: 居家观察，按家庭护理指导
  home_care:
  - 采取坐姿，头部前倾，用冰凉的湿布紧紧捏住鼻子15分钟。通过口呼吸。
  - 如果出血停止后又再次发生，再继续捏紧鼻子15分钟。
  - 不要擤鼻子。
  - 避免使用阿司匹林和抗炎产品。
  - 鼻出血后的24小时内避免吸烟和剧烈运动。
  - 保持黏膜湿润。每天多次使用生理盐水滴鼻或喷雾。
  - 避免热饮（如汤、咖啡或茶）。
  - 在卧室中使用加湿器以帮助保持鼻腔通道的湿度。
  callback_criteria:
  - 呼吸困难，头晕或眩晕
  - 症状持续存在或恶化
  - 【立即急诊】意识状态改变
  - 【立即急诊】心跳加速，皮肤苍白或呼吸困难
  - 【立即急诊】施压超过30分钟后出血仍然未停止
  related_protocols:
