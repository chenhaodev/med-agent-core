- id: ear_eye_nose_018
  topic_zh: 喉咙痛
  topic_en: Sore Throat
  source_file: STCC/Sore_Throat.md
  key_questions:
  - 姓名
  - 年龄
  - 起始时间
  - 过敏史
  - 用药情况
  - 既往病史
  - 疼痛评分
  - 伴随症状
  triage_levels:
    A:
      criteria:
      - 呼吸困难（非因鼻塞）
      - 小童过度流口水
      - 喘鸣音
      - 无法吞咽自己的唾液
      - 无法完全张开嘴巴
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 因疼痛导致显著的吞咽困难
      - 体温 >104°F (40°C)
      - 老年人或免疫抑制者体温 >101°F (38.3°C)
      - 脱水迹象
      action: 立即前往急诊室
    C:
      criteria:
      - 有风湿热、二尖瓣脱垂或其他心脏瓣膜问题的病史
      - 过去两周内与患有链球菌咽喉炎的人密切接触
      - 喉咙后部有黄色脓液或白色黏液
      - 红色或肿大的扁桃体
      - 持续超过3天的喉咙痛
      - 发热或寒战对退热措施无反应
      - 糖尿病、老年人或免疫抑制者
      - 头晕/昏厥
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 咳嗽或打喷嚏
      - 耳内有充盈感
      action: 居家观察，按家庭护理指导
  home_care:
  - 服用常规的止痛药（对乙酰氨基酚、阿司匹林、布洛芬）以缓解头痛或发热。不要给儿童服用阿司匹林。20岁以下者避免使用类似阿司匹林的产品。肝病患者避免使用对乙酰氨基酚。肾病或胃部问题的患者，以及孕妇避免使用布洛芬。按照标签上的指示用药。
  - 用盐水漱口（1/4茶匙普通食盐加入半杯温水中）以缓解喉咙不适，或者喝热鸡汤。如果年龄大于4岁，可以使用冷冻止咳糖或硬糖以获得额外的缓解。
  - 增加液体摄入；尝试喝加了柠檬和蜂蜜的热茶、苹果汁、果冻或吮吸有味道的冰块。如果吞咽疼痛，可以小口频繁地喝。
  - 如果您吸烟，请减少或停止吸烟。
  - 使用加湿器或蒸汽机保持空气湿润，尤其是在夜间，或者在热源附近放一壶水。
  - 服用减充血药以帮助缓解鼻塞，除非有高血压或怀孕史。与家庭医生或药师讨论后使用。
  callback_criteria:
  - 连续几天体温 >101°F (38.3°C)
  - 喉咙痛持续超过3天或症状加重
  - 没有改善或状况恶化
  - 流口水
  - 脱水迹象
  - 【立即急诊】无法吞咽自己的唾液
  - 【立即急诊】呼吸困难/喘鸣音
  - 【立即急诊】过度流口水
  - 【立即急诊】无法完全张开嘴巴
  related_protocols:
