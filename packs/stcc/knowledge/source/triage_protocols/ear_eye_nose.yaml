- id: ear_eye_nose_011
  topic_zh: 听力损失
  topic_en: Hearing Loss
  source_file: STCC/Hearing_Loss.md
  key_questions:
  - 姓名
  - 年龄
  - 起始时间
  - 已知原因
  - 过敏史
  - 用药情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 过量服用阿司匹林或含阿司匹林的产品
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 近期耳部或头部受伤并伴有听力损失、耳痛、耳朵后肿胀或淤青、耳道出血
      - 突然疼痛、听力下降、出血或分泌物，以及耳鸣
      - 头晕、眩晕或最近进行过耳部手术
      action: 立即前往急诊室
    C:
      criteria:
      - 儿童在患麻疹、腮腺炎或脑膜炎后出现听力损失迹象：
      - 对突然的声音或分散注意力的声音没有反应
      - 持续超过3天的听力下降
      - 持续耳痛或黄绿色耳部分泌物
      - 新处方药或非处方药
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 长时间暴露于噪音中
      - 突然疼痛并伴有爆裂声或咔嚓声
      - 在数周或数月内逐渐听力下降
      - 一只或两只耳朵感觉充盈
      action: 居家观察，按家庭护理指导
  home_care:
  - 如果疼痛与受伤有关，或者怀疑耳膜破裂（突然疼痛、听力下降、出血或分泌物、耳鸣、头晕），不要将液体滴入耳朵。
  - 预计会暴露于高噪音环境中时，佩戴耳塞。
  - 去除过多的耳垢：
  - 按照说明使用Debrox，最长可达3天
  - 每天两次在受影响的耳朵中滴两滴矿物油，持续2天
  - 躺下，并在受影响的耳朵下方放置一块温暖的湿布
  - 站在淋浴下，使耳朵朝向喷头
  - 通过频繁吞咽、咀嚼和捏住鼻子闭口吞咽来缓解耳部充血。
  - 服用常规止痛药（对乙酰氨基酚或布洛芬）。不要给儿童使用阿司匹林。如果年龄小于20岁，避免使用类似阿司匹林的产品。如果有肝病，请避免使用对乙酰氨基酚。如果有肾病、胃问题存在或怀孕的情况下，避免使用布洛芬。请按照标签上的指示服用。
  - 如果认为听力下降是由药物引起的，停止使用非处方药。
  - 不要使用棉签。
  callback_criteria: []
  related_protocols:
  - 流脓
  - 耳内异物损伤
  - 耳鸣
  - 头部受伤
- id: ear_eye_nose_012
  topic_zh: 声音嘶哑
