- id: ear_eye_nose_019
  topic_zh: 麦粒肿
  topic_en: Stye
  source_file: STCC/Stye.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 用药情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 肿块影响视力
      - 多个肿块突然同时出现
      - 持续疼痛，经家庭护理措施无效
      - 新发红色、触痛、肿胀区域出现在下眼睑或鼻附近
      - 病变部位有分泌物且体温 >38.1°C (100.5°F)
      - 有血性分泌物
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 上眼睑、下眼睑或附近红点状肿块在家庭治疗后 >48小时仍存在
      - 经常出现肿块
      - 肿块破裂并有分泌物
      action: 立即前往急诊室
  home_care:
  - 避免揉搓受影响的眼睛。
  - 每天4到6次，每次20分钟使用温热敷布在该区域进行热敷（尽可能多做）。
  - 不要与其他家庭成员共用毛巾和面巾。麦粒肿可能具有传染性。
  - 让麦粒肿自然破裂；不要挤压肿块。
  - 在麦粒肿愈合前避免使用眼部化妆品或隐形眼镜。
  - 使用非处方药物并遵循包装上的说明（如：麦粒肿、博士伦眼药水、科利里姆眼药水、OCuSOFT 眼睑清洁剂和 Stygiene，这些产品有膏状、溶液和药垫形式）。请向药剂师咨询其他产品建议。
  - 如果开了抗生素软膏，请在睡前涂于麦粒肿上。
  - 不要用手或眼部表面接触给药器的尖端。
  - 使用眼药水时，用两个手指拉下眼睑。将滴眼液滴入眼睑与眼球之间的区域。闭眼30到60秒。
  - 经常洗手，并在用药前洗手。
  callback_criteria: []
  related_protocols:
  - 眼睛受伤
  - 眼睛问题
- id: ear_eye_nose_020
  topic_zh: 舌头问题
  topic_en: Tongue Problems
  source_file: STCC/Tongue_Problems.md
  key_questions:
