- id: ear_eye_nose_013
  topic_zh: 口腔问题
  topic_en: Mouth Problems
  source_file: STCC/Mouth_Problems.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 过敏史
  - 用药情况
  - 既往病史
  triage_levels:
    A:
      criteria:
      - 咽喉或舌头突然肿胀
      - 下颌感觉卡住，无法张口
      - 无法吞咽自己的唾液
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 口腔被尖锐物体刺伤
      - 持续出血
      - 剧烈疼痛
      - 唇部、舌头或口腔内有裂开的伤口
      - 面部肿胀伴有疼痛
      - 感觉喉咙中有骨头或食物卡住
      action: 立即前往急诊室
    C:
      criteria:
      - 发热和口腔溃疡
      - 舌、牙龈或内颊有白色斑块
      - 全身不适感
      - 咀嚼、咬合或张口时疼痛
      - 家庭护理措施无效的持续性口腔疼痛
      - 使用苯妥英（Dilantin）的历史
      - 长期吸烟或使用咀嚼烟草
      - 尽管保持良好的卫生习惯仍有恶臭
      - 发热伴红肿、触痛的牙龈
      - 吞咽困难
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 有口腔疱疹、复发性阿弗他溃疡、近期病毒感染或新用药的历史
      - 服用大剂量维生素
      - 牙龈红肿触痛但无发热
      - 舌上有疼痛点
      - 不良饮食习惯或饮食改变
      - 最近压力增大
      action: 居家观察，按家庭护理指导
  home_care:
  - 冰镇饮料可能舒缓口腔溃疡，但会加剧牙痛。
  - 每天用温水加半茶匙盐或小苏打漱口4次，或使用抗菌漱口水。
  - 在溃疡愈合前避免食用辛辣、柑橘类或咸的食物。
  - 不要触摸溃疡。
  - 至少每日刷牙、使用牙线和漱口两次。
  - 按照常规服用止痛药（对乙酰氨基酚或布洛芬）以退烧和缓解不适。不要给儿童服用阿司匹林。20岁以下者避免使用类似阿司匹林的产品。肝病患者避免使用对乙酰氨基酚。肾病、胃部问题患者或孕妇应避免使用布洛芬。请遵循标签上的指示。
  - 使用含有Orabase的非处方产品，以形成保护层并减轻不适感。
