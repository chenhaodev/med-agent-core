protocols:
- id: environmental_condition_001
  topic_zh: 日晒伤
  topic_en: Sunburn
  source_file: STCC/Sunburn.md
  key_questions:
  - 姓名
  - 年龄
  - 起病时间
  - 过敏史
  - 用药情况
  - 破伤风免疫状态
  - 既往史
  triage_levels:
    A:
      criteria:
      - 皮肤凉、头晕、昏厥
      - 当体温 >105°F (40.6°C) 时，干燥、发热的皮肤及昏厥
      - 意识混乱
      - 尿量显著减少
      - 失去意识或精神状态改变
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 视力变化
      - 严重肿胀
      - 手部或生殖器出现水泡
      - 指端或肢体周围有烧伤圈
      - 关节处的烧伤
      action: 立即前往急诊室
    C:
      criteria:
      - 多个水泡
      - 开放性水泡
      - 破伤风免疫接种 >10 年前或无免疫史
      - 感染迹象：疼痛、肿胀、脓液，或从水疱区域延伸的红色条纹
      - 眼睛疼痛、视力下降、对光敏感
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 皮肤发红且无水泡
      - 非处方止痛药无效的疼痛
      - 疼痛 >48 小时
      - 少数几个水泡
      action: 居家观察，按家庭护理指导
  home_care:
  - 将冷敷布贴于烧伤处，或每天 4 次用凉水浸泡 10 分钟。可在水中加入 Aveeno 或半杯小苏打。注意不要让该区域变得麻木；可能会导致冻伤。不要直接在皮肤上放置冰块。
  - 预计不适感将持续长达 48 小时。使用您常用的止痛药（阿司匹林、对乙酰氨基酚、布洛芬）。不要给儿童服用阿司匹林。如果年龄 <20 岁，避免使用类似阿司匹林的产品。如果有肝病史，请勿使用对乙酰氨基酚。如果有肾病或胃部问题，或处于怀孕状态，则避免使用布洛芬。请按照药品标签上的说明服用。
  - 不要在烧伤区域涂抹油腻物质或牙膏。
  - 用水冷却后，如果没有开放性水泡，可将局部抗生素、芦荟胶，或将苯那君糖浆和氧化镁乳液等量混合物涂抹于烧伤处以达到舒缓效果。
  - 干燥阶段期间，在皮肤上涂抹保湿乳液。通常在 3 至 10 天内会出现脱皮现象。
  - 对于疼痛且肿胀的眼睛，应待在昏暗的房间中，将冷敷布贴于眼睛，并休息。
  - 增加液体摄入量。
  - 如果正在服用光敏药物（如磺胺类、四环素、吩噻嗪或噻嗪类），请避免日晒。在服药前务必阅读警告标签。
  callback_criteria:
  - 感染迹象
  - 严重肿胀
  - 没有改善或病情恶化
  - 【立即急诊】尿量显著减少
  - 【立即急诊】意识混乱
  - 【立即急诊】皮肤凉、头晕、昏厥
  related_protocols:
  - 脱水
  - 眼部问题
  - 热暴露相关问题
  - 成人皮疹
  - 儿童皮疹
  - 包块和疮
- id: environmental_condition_002
  topic_zh: 热暴露问题
  topic_en: Heat Exposure Problems
  source_file: STCC/Heat_Exposure_Problems.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 体温
  - 药物
  - 病史
  triage_levels:
    A:
      criteria:
      - 体温 >102°F (38.9°C)，皮肤灼热干燥，并且有以下任何一种情况：
      - 皮肤潮红
      - 不出汗
      - 突然头晕、头痛、虚弱、昏厥或失去意识
      - 混乱、谵妄或方向感丧失
      - 视觉障碍
      - 心跳加速
      - 呼吸急促
      - 年龄 <10 岁或 >70 岁
      - 低体温或正常体温，皮肤凉爽潮湿，并且有精神错乱或无意识的情况
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 大量出汗
      - 头晕、虚弱或昏厥
      - 严重肌肉痉挛或不协调
      - 心跳缓慢
      - 尿色深黄或橙色
      - 呕吐和无法耐受液体
      action: 立即前往急诊室
    C:
      criteria:
      - 体温 >100.5°F (38.1°C) 且年龄 >60 岁、糖尿病患者、卧床不起或免疫力低下者
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 轻微肌肉痉挛
      - 皮肤潮红
      - 轻度恶心或头晕
      - 感觉发热
      action: 居家观察，按家庭护理指导
  home_care:
  - 帮助受害者躺下在阴凉的地方，松开衣服或脱掉衣物。
  - 在等待医疗援助时保持受害者冷静。使用冷毛巾并用风扇帮助降温。不要直接将冰放在皮肤上。不要让受害者发抖，因为这会增加体温。用温水擦拭受害者。不要使用酒精擦洗。
  - 抬高双腿至高于心脏的位置。
  - 如果意识清醒，给受害者喝冷水（水、运动饮料、软饮料、果汁）。不要饮用含酒精或咖啡因的饮料。过快饮水会导致恶心。每15分钟喝一杯，如能耐受且无恶心感可继续。
  - 使用喷瓶或喷雾器喷温水到暴露的皮肤上，通过蒸发帮助降温。
  - 如果年龄 <13 岁，给予佩迪莱特或赖莱特以补充水分。
  - 在一夸脱水中加入 ¼ 茶匙盐。每15分钟给予 ½ 杯，持续 1.5 小时。不要让患者服用盐片。如果口渴持续，请给普通水。
  - 如果没有恶心感，可以尝试吃一些咸味小吃，如椒盐脆饼或薯条。
  - 遵循家庭护理指导后仍未改善
  callback_criteria:
  - 【立即急诊】警觉性下降
  - 【立即急诊】肌肉痉挛或不协调
  - 【立即急诊】持续异常缓慢的心率
  - 【立即急诊】持续呕吐和无法耐受液体
  related_protocols:
  - 意识状态改变
  - 脱水
  - 头晕
  - 昏厥
  - 成人发热
  - 儿童发热
  - 肌肉痉挛
  - 晒伤
  - 多汗症
  - 虚弱
- id: environmental_condition_003
  topic_zh: 蜂蜇
  topic_en: Bee Stings
  source_file: STCC/Bee_Stings.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 既往过敏反应
  - 既往治疗
  - 用药情况
  - 病史
  - 过敏史
  - 疼痛评分
  - 是否已开具紧急过敏性休克急救包
  triage_levels:
    A:
      criteria: []
      action: 立即呼叫救护车（120）
    B:
      criteria: []
      action: 立即前往急诊室
    C:
      criteria:
      - 既往有严重的蜂蜇反应，如呼吸困难或失去意识
      - 口腔内被蜂蜇
      - 舌头、喉咙或嘴唇肿胀
      - 已按指示使用了肾上腺素注射液且症状有所改善
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 全身性荨麻疹，对家庭治疗措施无反应
      - 身体其他部位而非蜂蜇周围出现瘙痒或皮疹，并且对家庭治疗措施无反应
      - 恶心、呕吐或乏力
      - 超过10次被蜇
      - 24小时后伤口出现感染迹象（流脓、发热、红线或化脓）
      action: 居家观察，按家庭护理指导
  home_care:
  - 如果之前已指导使用，请使用紧急蜂蜇急救包。
  - 服用非处方抗组胺药（如苯海拉明）以减少过敏反应和瘙痒。遵循标签上的说明。
  - 移除受影响肢体的所有首饰。
  - 如果手或脚因局部蜇伤而肿胀，保持四肢抬高以帮助减轻肿胀。
  - 如果蜂刺仍存在，请迅速移除以最小化接触蜂刺中的毒素。去除方法包括：
  - 使用信用卡、指甲或其他平面物体刮擦伤口部位直到所有蜂刺被清除。
  - 在伤口上贴上粘性绷带并快速撕下。
  - 不要挤压蜂刺，以免将更多毒素推入伤口。
  - 用肥皂和水清洗伤口部位。
  - 可以尝试民间家庭疗法。制作肉松酶和水的糊状物，并将其涂抹在伤口上10分钟。不要在眼睛附近使用肉松酶。
  - 在被蜇后的最初24至48小时内，冷敷可减轻肿胀和疼痛。
  - 接下来几天内注意感染迹象。
  callback_criteria:
  - 24小时内出现恶心、呕吐或乏力
  - 24小时后出现发热、头痛、荨麻疹、肿大的淋巴结、扩散的红线或关节痛
  - 被蜇部位持续疼痛和肿胀，或伤口在48小时后有恶臭分泌物
  - 没有破伤风免疫接种史，免疫接种状态未知，或最后一次破伤风免疫接种超过5年前
  - 24小时内身体其他部位而非蜂蜇周围出现瘙痒或皮疹
  related_protocols:
  - 过敏反应
  - 虫咬
  - 瘙痒
  - 成人皮疹
  - 儿童皮疹
  - 伤口愈合与感染
- id: environmental_condition_004
  topic_zh: 床虫接触或疑虑
  topic_en: Bedbug Exposure or Concerns
  source_file: STCC/Bedbug_Exposure_or_Concerns.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 过敏史
  - 用药情况
  - 是否有床虫咬痕
  - 脱皮
  - 床上用品
  - 家具或地毯上的棕色斑点或血迹等疑似床虫侵扰的迹象
  triage_levels:
    A:
      criteria:
      - 严重瘙痒、水泡或荨麻疹
      - 持续性皮疹和瘙痒干扰睡眠
      - 治疗1周后皮疹仍不消退
      - 疮口扩散或出现感染迹象
      - 皮疹消失后再复发
      - 发热、疲倦或淋巴结肿大
      - 对非处方药或处方药物产生过敏反应
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 红色或棕色斑点，中心较暗或红
      - 皮肤上成线或集群的多个斑点
      - 脸部、颈部、手臂或手部突然出现扁平或隆起的斑点
      - 正在接受床虫治疗，并对药物使用或防止床虫接触传播给他人有疑问
      - 已知或疑似暴露于床虫侵扰中
      action: 立即前往急诊室
  home_care:
  - 如果怀疑被床虫咬伤：
  - 在夜间检查昆虫，因为它们最活跃。检查墙壁裂缝、床垫和弹簧底座之间的空间以及带衬垫的家具和床头板后面。
  - 寻找深色斑点（床虫排泄物）、浅棕色空壳（脱皮前变为成虫）以及床上用品上的血迹（被咬后留下）。
  - 缓解瘙痒：
  - 短时间使用氢化可的松乳膏。不要连续使用超过3天。向药剂师咨询产品建议。
  - 在患处敷冷敷包。将布浸入冰水中。
  - 服用非处方抗组胺药（苯海拉明、Chlor-Trimeton）以缓解严重持续性瘙痒。遵循标签上的指示。向药剂师询问其他产品建议。
  - 在受影响区域涂抹小苏打糊、炉甘石洗剂或艾维诺（Aveeno）。
  - 处理家庭环境：
  - 聘请专业灭虫人员。由于床虫进食后会躲回藏身之处，可能需要多次治疗。
  - 吸尘家具、地毯、床垫和弹簧底座。彻底吸净房间内所有裂缝并立即将真空袋丢弃在密封的塑料袋中，并将其放在户外垃圾中处置。
  - 用高温（>120°F或49°C）水洗涤衣物和床单，以杀死床虫。使用中高热烘干机烘干20分钟，可以杀死床虫及其卵。
  - 在暖季月份，将不能清洗的衣物和物品放入塑料袋内，在户外或停放在阳光下的汽车内（车窗关闭），放置24小时。
  - 当气温低于冰点时，将受感染的物品放入冰箱冷冻室或户外几天。
  - 考虑丢弃严重受侵染的物品，如床垫、弹簧底座或沙发。
  - 预防床虫侵扰：
  - 睡觉时尽可能多遮盖皮肤。
  - 在将二手物品带入家中前进行检查。
  - 采取酒店预防措施：检查床垫接缝处有无深色斑点、血迹和脱皮。检查床头板后部及墙壁裂缝。将不需要的衣物放入拉链行李箱，并将其放在梳妆台上，不要将行李或衣物放在地板上。为获得进一步保护，拉链行李箱可以整晚放在浴缸中，因为床虫无法爬过浴缸边缘。
  - 记住，床虫最常出现在拥挤且人员流动频繁的地方，如宿舍、酒店房间、老年人设施等。
  - 对药物产生轻微过敏反应
  - 治疗1周后皮疹仍瘙痒
  callback_criteria: []
  related_protocols:
  - 过敏反应
  - 瘙痒
  - 虱子
  - 成人皮疹
  - 儿童皮疹
- id: environmental_condition_005
  topic_zh: 咬伤，动物/人类
  topic_en: Bites AnimalHuman
  source_file: STCC/Bites_AnimalHuman.md
  key_questions:
  - 姓名
  - 年龄
  - 起始时间
  - 原因
  - 咬伤部位
  - 破伤风状态
  - 动物类型
  - 动物的免疫状态
  - 药物使用情况
  - 疼痛评分
  - 病史
  triage_levels:
    A:
      criteria:
      - 呼吸困难
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 直接压迫无法控制出血
      - 受伤肢体畸形或无法使用
      - 头部、面部、颈部或手部撕裂伤
      - 有血友病史
      action: 立即前往急诊室
    C:
      criteria:
      - 动物未接种狂犬疫苗
      - 动物不可用于观察
      - 手臂、腿部或躯干的撕裂伤
      - 感染迹象：红肿、疼痛、发红条纹从伤口蔓延、分泌物或脓液
      - 猫咬伤
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 无破伤风免疫接种，免疫状态未知，或最后一次破伤风疫苗接种超过5年前
      - 有糖尿病史或免疫力低下
      - 小撕裂伤/擦伤/刺伤
      action: 居家观察，按家庭护理指导
  home_care:
  - 每天用肥皂布清洁受伤区域，然后用水彻底冲洗。
  - 按照标签说明，每日3次涂抹常规使用的抗生素软膏（例如：Mycitracin Triple Antibiotic [bacitracin, neomycin, and polymyxin B]、Neosporin、Polysporin）。如有需要，请向药剂师咨询其他产品建议。
  - 用干净干燥的敷料覆盖伤口2天，之后让伤口暴露于空气中，除非有血液渗出。
  - 如果敷料粘在伤口上，请用水冲洗。
  - 如果伤口看起来湿润，让伤口自然干燥5到10分钟，然后重新包扎以促进愈合。
  - 受伤后前24小时内使用冰袋减轻肿胀。24小时后对受伤部位进行热敷。不要将冰直接放在皮肤上；在冰和皮肤之间放置一层布料作为屏障。
  - 每日检查伤口是否有感染迹象。猫咬伤和人咬伤容易发生感染。
  - 观察动物两周，注意是否出现狂犬病或疾病症状。
  - 向动物管理部门或相关机构报告动物咬伤情况。
  - 报告蝙蝠和臭鼬的咬伤。
  - 在下列情况下报告狗和猫的咬伤：
  - 动物患病
  - 无明显诱因的咬伤
  - 流浪动物
  - 没有接种狂犬疫苗的迹象
  - 受伤环境可疑或不清楚/不确定
  callback_criteria:
  - 感染迹象：疼痛加剧、红肿、发热、从伤口蔓延的红色条纹或分泌物
  - 24至48小时内没有改善
  - 感觉伤口内有异物
  related_protocols:
  - 出血严重
  - 血液/体液暴露
  - 家庭暴力
  - HIV暴露
  - 破伤风免疫接种
  - 撕裂伤
  - 刺伤
  - 伤口愈合和感染
- id: environmental_condition_006
  topic_zh: 虫咬
  topic_en: Bites Insect
  source_file: STCC/Bites_Insect.md
  key_questions:
  - 姓名
  - 年龄
  - 起始时间
  - 虫类类型
  - 过敏史
  - 被咬部位
  - 用药情况
  - 疼痛评分
  - 历史
  - 是否开具了紧急过敏反应急救包
  triage_levels:
    A:
      criteria:
      - 胸部紧绷或呼吸困难或吞咽困难
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 对同种昆虫有过严重过敏反应的历史
      - 被棕色隐士蜘蛛或黑寡妇蜘蛛咬伤
      - 精神状态改变
      - 在被咬后突然出现出汗和皮肤苍白
      - 舌头、喉咙或嘴唇肿胀
      - 嘴内蜜蜂蜇伤
      - 蝎子咬伤
      action: 立即前往急诊室
    C:
      criteria:
      - 被蜇部位以外的荨麻疹、皮疹、瘙痒或肿胀突然出现
      - 肌肉僵硬、腹痛和坐立不安
      - 恶心、呕吐或腹部痉挛
      - 多处被蜇
      - 有引流液、发热、红线或者除了红肿外还有脓包
      - 剧烈疼痛
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 头痛、寒战、发热
      - 在被咬后大约48小时出现的感染迹象：加剧的疼痛、红肿、温热感、红线、引流或发热
      action: 居家观察，按家庭护理指导
  home_care: []
  callback_criteria:
  - 【立即急诊】精神状态改变
  - 【立即急诊】呼吸困难或吞咽困难（呼叫救护车）
  - 【立即急诊】胸部紧绷
  - 【立即急诊】嘴唇/舌头/喉咙肿胀
  related_protocols:
  - 过敏反应
  - 床虫接触或疑虑
  - 蜜蜂蜇伤
  - 蜱虫叮咬
  - 荨麻疹
  - 瘙痒
  - 成人皮疹
  - 儿童皮疹
  - 西尼罗河病毒
  - 伤口愈合与感染
- id: environmental_condition_007
  topic_zh: 海洋动物咬伤
  topic_en: Bites Marine Animal
  source_file: STCC/Bites_Marine_Animal.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 动物种类
  - 过敏史
  - 既往治疗
  - 咬伤部位
  - 破伤风免疫状态
  - 药物使用情况
  - 疼痛评分
  - 病史
  triage_levels:
    A:
      criteria:
      - 头晕、眩晕或混乱
      - 视力改变
      - 胸闷、呼吸困难或吞咽困难、嘴唇或舌头肿胀
      - 有被同种动物咬伤或蜇伤后出现严重全身过敏反应的历史
      - 咬伤或蜇伤后突然出现出汗和皮肤苍白
      - 心跳快/不规则
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 突发荨麻疹
      - 被僧帽水母或𫚉鱼蜇伤
      - 整只手臂或腿部肿胀
      - 剧烈疼痛影响活动能力
      - 伤口脏重且破伤风免疫状态超过5年
      action: 立即前往急诊室
    C:
      criteria:
      - 蜇伤部位的疼痛、红肿
      - 刺留在体内未取出
      - 无破伤风疫苗接种记录，免疫状态未知，或最后一次破伤风疫苗接种超过5年
      action: 当天内联系医生/诊所
  home_care:
  - 对于以下海洋脊椎动物刺伤，将受伤部位浸入热水中30至90分钟以缓解疼痛：
  - 鲶鱼、圆锥蜗牛、鲉鱼、海胆、鲨鱼、𫚉鱼、某些海星、石头鱼和锯齿鱼。
  - 僧帽水母和水母：不要刮除刺或使用冰块。用醋冲洗刺，然后用镊子拔出。可以使用专用止痛喷雾。热敷有助于减少损伤。切勿用海水清洗。
  - 蚂蟥：应用盐、酒精或醋去除。
  - 不要摩擦受伤区域。
  - 在蜇伤处涂抹由醋、小苏打或嫩肉粉溶解于水的溶液。
  - 不要直接用手接触刺。
  - 可涂抹炉甘石洗剂或氢化可的松软膏以帮助缓解疼痛和瘙痒。请遵循产品标签上的说明。
  callback_criteria:
  - 感染迹象，包括红肿加重、扩散，疼痛加剧，肿胀，渗出物，或局部温度升高
  - 症状没有改善或恶化
  - 【立即急诊】头晕、眩晕或混乱
  - 【立即急诊】视力改变
  - 【立即急诊】胸闷或呼吸困难或吞咽困难
  - 【立即急诊】咬伤或蜇伤后突然出汗和皮肤苍白
  - 【立即急诊】心跳快/不规则
  related_protocols:
  - 过敏反应
  - 撕裂伤
  - 刺伤
  - 伤口愈合及感染
- id: environmental_condition_008
  topic_zh: 蛇咬
  topic_en: Bites Snake
  source_file: STCC/Bites_Snake.md
  key_questions:
  - 姓名
  - 年龄
  - 起始时间
  - 蛇的种类
  - 被咬部位
  - 先前治疗
  - 用药情况
  - 疼痛评分
  - 病史
  triage_levels:
    A:
      criteria:
      - 有毒蛇咬伤：如响尾蛇、铜头蛇、水蝮蛇或珊瑚蛇
      - 胸闷或呼吸、吞咽困难
      - 被咬后出现紫癜、发热、口周麻木和刺痛、皮肤苍白或出汗
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 无法识别的蛇造成的穿刺伤或獠牙痕迹
      - 有对蛇咬反应的历史
      - 精神状态变化
      action: 立即前往急诊室
    C:
      criteria:
      - 突然出现荨麻疹、皮疹、瘙痒或非咬伤部位的肿胀
      - 非毒蛇造成的多处咬伤
      - 伤口感染迹象：红肿、渗出物、发热、红线或温热感
      - 伤口周围剧烈疼痛和肿胀
      - 未接种破伤风疫苗，免疫状态不明或最后一次破伤风疫苗接种超过5年
      action: 当天内联系医生/诊所
  home_care:
  - 如果在偏远地区且无法获得医疗救助，请按照紧急蛇咬急救包中的指示操作。
  - 保持冷静，不要跑动。
  - 如有可能识别蛇的种类。
  - 抬高和固定受影响部位，并立即寻求紧急医疗援助。
  - 限制受影响部位的活动。
  - 移除珠宝或其它可能造成束缚的物品。
  - 为缓解不适可服用常规止痛药（阿司匹林、对乙酰氨基酚、布洛芬）。不要给儿童服用阿司匹林。如果年龄<20岁，避免使用类似阿司匹林的产品。如有肝病，避免使用对乙酰氨基酚。如存在肾病或胃部问题，或怀孕情况下，避免使用布洛芬。请遵循药物标签上的指示。
  - 不要在伤口处敷冰或使用止血带。
  - 预计最初会有肿胀和疼痛，前24小时内可冷敷，之后根据需要热敷。
  - 注意感染迹象：增加的疼痛、红肿、温热感、红线、渗出物或发热。
  callback_criteria:
  - 【立即急诊】精神状态改变
  - 【立即急诊】呼吸或吞咽困难
  related_protocols: []
- id: environmental_condition_009
  topic_zh: 蜱虫叮咬
  topic_en: Bites Tick
  source_file: STCC/Bites_Tick.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 已知的蜱虫类型
  - 叮咬部位
  - 过敏史
  - 用药情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 叮咬部位以外突然出现荨麻疹、皮疹、瘙痒或肿胀
      - 胸闷或呼吸困难或吞咽困难
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 蜱虫叮咬后2至14天内，广泛性皮疹和流感样症状，如发热、寒战、咽喉痛或头痛
      - 感染迹象，如红肿、疼痛、伤口分泌物或局部发热
      - 有对蜱虫叮咬过敏的历史
      action: 立即前往急诊室
    C:
      criteria:
      - 不愿意或无法移除蜱虫，且蜱虫头部嵌入皮肤中
      - 无破伤风免疫接种记录、免疫状态不明或最后一次破伤风疫苗接种已超过5年
      - 蜱虫叮咬后14天以上出现皮疹或流感样症状，如发热、寒战、咽喉痛或头痛
      - 在蜱虫叮咬处周围出现靶心状皮疹
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 没有尝试移除蜱虫
      action: 居家观察，按家庭护理指导
  home_care:
  - 使用镊子，施加稳定的向上拉力直到蜱虫松开（尽量靠近皮肤抓住其头部）。如果无法使用镊子，则可以用手指、塑料包装纸或纸以相同方式操作，或者在蜱虫颚部系一根线并牢固地向上拉动。
  - 小型蜱虫可用刀刃或信用卡刮除。
  - 尝试避免在移除过程中或之后压碎蜱虫。压碎会增加疾病传播的风险。
  - 如果只移除了蜱虫身体而头部仍留在皮肤中，使用无菌针头将其取出。
  - 用肥皂和水清洗伤口和双手，并涂抹抗生素软膏。
  - 观察感染迹象，如红肿、疼痛、发热或分泌物。
  - 最近的研究显示，应用热火柴或覆盖凡士林、指甲油或酒精并不会使蜱虫自行退出。
  - 如果在移除蜱虫后的几周内出现皮疹，请联系家庭医生（PCP）。解释蜱虫叮咬发生的时间和地点。
  callback_criteria: []
  related_protocols:
  - 过敏反应
  - 皮肤
  - 成人
  - 儿童
- id: environmental_condition_010
  topic_zh: 寒冷暴露问题
  topic_en: Cold Exposure Problems
  source_file: STCC/Cold_Exposure_Problems.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 长时间寒冷暴露
  - 体温
  - 药物使用情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 意识状态改变或失去知觉
      - 持续僵硬的肌肉
      - 持续紫色的手指、脚趾和指甲床
      - 跌倒，协调能力差
      - 判断力受损，混乱，言语不清
      - 呼吸困难
      - 体温：<34.4°C（口温）；<35°C（肛温）
      - 婴儿皮肤鲜红且冰冷
      - 手脚持续麻木
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 婴儿、老年人、残疾人或免疫抑制者
      - 温暖后仍持续颤抖
      - 暴露后皮肤苍白且冰冷，家庭护理措施无效
      - 经过4小时的家庭护理后无法使体温恢复正常
      action: 立即前往急诊室
    C:
      criteria:
      - 皮肤冰冷
      - 能够说话和饮水
      action: 当天内联系医生/诊所
  home_care:
  - 缓慢地温暖身体，先从人的躯干开始，然后是手和脚。
  - 通过包裹在毯子中或松散的毯子下的皮肤接触来温暖胸部、颈部和腹股沟。
  - 避免再次暴露于寒冷环境，如果可能的话。
  - 不要在冻伤的脚上行走。
  - 如果严重暴露时间<24小时，在温水中重新温暖受影响部位10到30分钟，或使用温湿敷料。避免干热。当部分区域变暖、红润且柔韧时停止重温暖。不要将人浸入温水或温浴中。过快地温暖人体可能会引起心脏问题。
  - 不要将冻伤部位放在雪中。
  - 脱掉湿衣服，换上温暖干燥的衣物。
  - 使用自己的身体和/或毯子或睡袋保暖。
  - 如果清醒且有方向感，喝温热的饮料。
  - 吃高能量的食物，如糖果、水果和健康棒。
  - 不要饮酒精饮料或含咖啡因的饮品。
  - 不要按摩冻伤部位。
  - 不要将寒冷暴露的人放在壁炉前。
  - 一旦体温恢复正常，保持人被温暖的毯子包裹，包括头部和颈部。
  callback_criteria: []
  related_protocols:
  - 意识状态改变
  - 呼吸困难
  - 混乱
  - 头晕
  - 昏厥
  - 冻伤
  - 低血压
- id: environmental_condition_011
  topic_zh: 溺水（接近溺水）
  topic_en: Drowning Near Drowning
  source_file: STCC/Drowning_Near_Drowning.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 病史
  - 水源和温度（如果已知）
  triage_levels:
    A:
      criteria:
      - 无反应
      - 疑似受伤
      - 呼吸困难
      - 呼吸急促
      - 嘴唇或脸部发绀
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 受害人曾短暂沉入水中，但现在能够呼吸且有反应
      action: 立即前往急诊室
  home_care:
  - 对于疑似颈部受伤的受害者，除非绝对必要，否则不要移动。支撑头部和颈部，并让其在水中漂浮。如果需要移动，则作为整体支撑头部、颈部和躯干。
  - 如果出现呕吐，将受害人转至侧卧并清理口腔。
  - 不要按压腹部，这可能导致呕吐。
  - 保持受害人温暖。
  - 状况没有改善或恶化
  callback_criteria: []
  related_protocols:
