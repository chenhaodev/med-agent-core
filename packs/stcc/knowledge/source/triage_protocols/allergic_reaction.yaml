protocols:
- id: allergic_reaction_001
  topic_zh: 过敏反应
  topic_en: Allergic Reaction
  source_file: STCC/Allergic_Reaction.md
  key_questions:
  - 姓名
  - 年龄
  - 发作时间
  - 疑似原因
  - 过敏史
  - 既往病史
  - 用药情况
  triage_levels:
    A:
      criteria:
      - 呼吸困难
      - 吞咽困难
      - 舌头、口腔后部或喉咙肿胀
      - 无法说话
      - 按照医生指示使用了EpiPen或肾上腺素注射，但症状未缓解
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 头晕或眩晕
      - 有对同一过敏原的既往过敏性休克史
      - 视力改变
      - 意识混乱
      - 症状迅速进展
      - 说话时断断续续
      - 突然声嘶
      - 嘴唇肿胀
      - 心跳加快
      - 按照医生指示使用了EpiPen或肾上腺素注射，且症状已缓解
      action: 立即前往急诊室
    C:
      criteria:
      - 脸部/四肢肿胀
      - 持续的恶心、呕吐、腹泻或腹痛
      - 持续性皮疹、发热、疲劳或头痛
      - 说话时断断续续
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 反应原因未知
      - 已控制住的恶心、呕吐或腹泻
      - 轻微皮疹/瘙痒
      - 无呼吸问题
      - 正常呼吸
      - 怀疑药物过敏反应
      action: 居家观察，按家庭护理指导
  home_care:
  - 按照初级保健医生的指示，使用处方吸入器、药物或EpiPen应对已知过敏反应。如果使用了EpiPen，应立即寻求紧急护理，因为症状可能在药物作用消退后再次出现。
  - 如果服用非处方药后不久出现症状，停止使用该药物。
  - 休息。尽量睡在一个凉爽的房间内。限制运动或避免过热以防止瘙痒加剧。
  - 如果荨麻疹广泛存在，尝试用小苏打浴或燕麦浴，或使用非处方准备（如苯海拉明、Caladryl、Cortaid、Cortizone和开瑞坦）缓解瘙痒。遵循标签上的指示。向当地药剂师咨询非处方产品的建议。
  - 避免热水淋浴。热可以加剧瘙痒。
  - 在小范围的瘙痒性荨麻疹上敷冷布或冰块以帮助减少肿胀。
  callback_criteria:
  - 服用处方药后症状出现
  - 服用苯海拉明并遵循家庭护理指导后症状持续存在
  - 皮疹恶化
  - 【立即急诊】呼吸或吞咽困难
  - 【立即急诊】视力改变
  - 【立即急诊】意识混乱
  - 【立即急诊】突然声嘶且无法说话
  - 【立即急诊】嘴唇、舌头、口腔后部或喉咙肿胀
  - 【立即急诊】心跳加快
  - 【立即急诊】按照医生指示使用了EpiPen或肾上腺素注射，但症状已缓解
  related_protocols:
  - 蜜蜂蜇伤
  - 昆虫叮咬
  - 呼吸困难
  - 食物过敏
  - 花粉症问题
  - 荨麻疹
  - 瘙痒
  - 穿刺问题
  - 成人皮疹
  - 儿童皮疹
  - 肿胀
  - 纹身问题
  - 喘息
- id: allergic_reaction_002
  topic_zh: 食物过敏，已知或疑似
  topic_en: Food Allergy Known or Suspected
  source_file: STCC/Food_Allergy_Known_or_Suspected.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 已知原因
  - 过敏史
  - 用药史
  - 病史
  triage_levels:
    A:
      criteria:
      - 呼吸困难
      - 意识模糊
      - 吞咽困难
      - 严重头晕
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 嘴唇、舌头或口腔肿胀
      action: 立即前往急诊室
    C:
      criteria:
      - 广泛性荨麻疹或瘙痒
      - 喉咙痛
      - 鼻后滴漏和清嗓子
      - 充血、打喷嚏或流鼻涕
      - 持续腹泻或呕吐
      action: 当天内联系医生/诊所
  home_care:
  - 尝试确定引起问题的食物，并避免食用。鸡蛋和牛奶是最常见的婴儿食品过敏原。花生、鸡蛋、巧克力、牛乳制品、大豆、树坚果、小麦、鱼和贝类是最常见的食物过敏原因。
  - 从饮食中排除疑似食物2周，观察症状是否消失。如果症状消失了，请未来避免这种食物。如果没有，则观察其他食物与症状（荨麻疹、口腔肿胀、腹泻）之间的关系。
  - 尝试使用小苏打浴、Caladryl乳液或炉甘石治疗瘙痒，或者服用抗组胺药（苯海拉明）片剂（请遵循标签上的说明）。
  callback_criteria:
  - 【立即急诊】呼吸困难
  - 【立即急诊】意识模糊
  - 【立即急诊】吞咽困难
  - 【立即急诊】严重头晕
  related_protocols:
  - 过敏反应
  - 成人腹泻
  - 儿童腹泻
  - 荨麻疹
  - 瘙痒
  - 成人皮疹
  - 儿童皮疹
  - 成人呕吐
  - 儿童呕吐
- id: allergic_reaction_003
  topic_zh: 花粉症问题
  topic_en: Hay Fever Problems
  source_file: STCC/Hay_Fever_Problems.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 已知过敏史
  - 用药情况
  - 病史（如无花粉症病史
  - 请参阅最严重症状方案）
  triage_levels:
    A:
      criteria: []
      action: 立即呼叫救护车（120）
    B:
      criteria: []
      action: 立即前往急诊室
    C:
      criteria:
      - 4岁以下儿童喘息
      - 对家庭护理措施无反应的持续性喘息
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 头痛和肌肉痛
      - 超过24小时的绿色、棕色或黄色鼻涕或痰液
      - 耳痛或流液
      - 持续无法控制的咳嗽
      - 即使避开诱因，症状仍持续存在
      - 症状影响日常生活活动
      - 间歇性咳嗽
      - 眼睛红、痒或流泪
      - 喉咙痛
      - 清水样鼻涕
      action: 居家观察，按家庭护理指导
  home_care:
  - 服用非处方药或处方抗组胺药。不要给儿童服用阿司匹林。20岁以下避免使用类似阿司匹林的产品。肝病患者避免使用对乙酰氨基酚。肾病、胃部疾病患者或孕妇避免使用布洛芬。请按照标签上的指示操作。
  - 除非由初级保健医生开处方，否则避免使用鼻喷雾剂。如果使用了喷雾剂，不要连续使用超过5天。
  - 晚上和接触花粉、灰尘或已知刺激物后淋浴并清洗头发。
  - 当花粉浓度高时，尤其是在早晨，保持门窗关闭待在室内。
  - 对于眼睛痒的情况，在眼睑上敷冷敷布。
  - 避免使问题恶化的花粉和其他刺激物。
  callback_criteria:
  - 【立即急诊】因鼻塞以外的原因导致呼吸困难
  related_protocols: []
- id: allergic_reaction_004
  topic_zh: 免疫反应
  topic_en: Immunization Reactions
  source_file: STCC/Immunization_Reactions.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 过敏史
  - 药物使用情况
  - 病史
  - 免疫接种日期和类型
  triage_levels:
    A:
      criteria:
      - 呼吸或说话困难
      - 喉咙后部突然肿胀
      - 胸痛或晕厥
      - 混乱、烦躁或意识水平下降
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 皮疹或潮红
      - 荨麻疹
      - 体温 >105°F (40.6°C)
      action: 立即前往急诊室
    C:
      criteria:
      - 接种麻疹疫苗后7至10天内持续发热和皮疹超过24小时
      - 儿童免疫接种后持续哭泣超过3小时
      - 接种后48小时内红肿、疼痛或发热加剧
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 麻疹疫苗接种后7至10天内体温 >101°F 至 103°F (38.3°C 至 39.4°C) 和玫瑰色皮疹
      - 百白破疫苗注射部位的发热、疼痛、红肿或肿胀
      - 腮腺炎免疫接种后颈部淋巴结肿大
      - 风疹免疫接种后7至14天内出现皮疹或淋巴结肿大，并在2至4周后感到关节痛
      action: 居家观察，按家庭护理指导
  home_care:
  - 对于发热，可服用常规止痛药（阿司匹林、对乙酰氨基酚、布洛芬）。不要给儿童使用阿司匹林。20岁以下的人避免使用类似阿司匹林的产品。有肝病的患者避免使用对乙酰氨基酚。肾病或胃部问题存在时，怀孕情况下避免使用布洛芬。遵循标签上的指示。
  - 女性在接种风疹疫苗后4周内应避免怀孕。
  - 如果儿童生病或正在服用免疫抑制剂或皮质激素，请与您的初级保健医生讨论免疫的安全性。
  - 预期副作用包括发热、烦躁和注射部位发红。
  callback_criteria:
  - 【立即急诊】呼吸或说话困难
  - 【立即急诊】喉咙后部突然肿胀
  - 【立即急诊】胸痛或晕厥
  - 【立即急诊】混乱、烦躁或意识水平下降
  related_protocols:
  - 过敏反应
  - 成人发热
  - 儿童发热
  - 破伤风免疫
