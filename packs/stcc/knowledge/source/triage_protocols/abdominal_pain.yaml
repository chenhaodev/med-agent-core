protocols:
- id: abdominal_pain_001
  topic_zh: 成人腹痛
  topic_en: Abdominal Pain Adult
  source_file: STCC/Abdominal_Pain_Adult.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 正在使用的药物
  - 疼痛评分
  - 伴随症状
  - 末次月经日期
  - 既往病史
  triage_levels:
    A:
      criteria:
      - 昏厥（失去意识）或无反应
      - 严重虚弱和无法站立
      - 皮肤冷且苍白，或大量出汗
      - 剧烈的突然疼痛并向背部或腿部放射
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 呕血或暗咖啡色呕吐物
      - 新发症状迅速恶化且年龄>60岁
      - 与痔疮或铁剂补充无关的便血或黑便
      - 月经延迟超过4周的女性突然出现腹部和肩部疼痛
      - 年龄>30岁，吸烟严重，高血压，高胆固醇，或肥胖
      - 有糖尿病、心脏病、凝血问题或充血性心力衰竭病史
      action: 立即前往急诊室
    C:
      criteria:
      - 疼痛迅速加剧
      - 异常大量的阴道出血及可能怀孕的情况
      - 近期腹部手术、频繁跌倒，或腹部受伤的病史
      - 右下腹痛伴有食欲不振、恶心和/或呕吐，或发热
      - 误食植物、药物或化学品
      - 体温>101°F（38.3°C）且年龄>60岁，卧床不起，或免疫系统受损
      - 对于气体缓解，可以尝试Maalox或Mylanta，并遵循标签上的指示。如有其他建议，请咨询药剂师。
      - 避免酒精、咖啡因和油腻或辛辣的食物。
      - 如果正在服用抗生素治疗憩室炎7到14天：
      - 预期在开始的1到3天内腹痛会持续存在。
      - 摄入少量（小口）清液（肉汤、茶、姜汁汽水、苹果汁、果冻），以让肠道休息。
      - 3到4天后，引入清淡饮食（大米、土豆、面包、饼干、香蕉、燕麦）。
      - 有些抗生素可能会减少食欲或进食时引起恶心。服用药物时应遵循药房的指示与食物或液体一起使用。
      - 如果开始服用抗生素后4到5天腹痛未缓解，请联系初级保健医生。
      - 一旦憩室炎治愈，根据初级保健医生的处方开始高纤维饮食以预防便秘。
      - 如已知存在GERD（胃食管反流病），建议少量多餐，并避免辛辣或油腻食物、咖啡因和巧克力。
      - 尝试草药茶，如薄荷茶或洋甘菊茶，来缓解不适胃部。
      action: 当天内联系医生/诊所
  home_care: []
  callback_criteria:
  - 严重疼痛>2小时
  - 体温>101°F（38.3°C）且年龄>60岁，卧床不起，或免疫系统受损
  - 体温>103°F（39.4°C）
  - 持续呕吐或腹泻和减少的口服摄入量或排尿量
  - 疼痛在热敷或活动时加剧
  - 【立即急诊】异常坚硬或硬结的腹部
  - 【立即急诊】持续呕吐
  - 【立即急诊】剧烈持续性疼痛
  - 【立即急诊】昏厥/头晕
  - 【立即急诊】便血或黑便，或呕血
  related_protocols:
  - 腹部肿胀
  - 便秘
  - 成人腹泻
  - 疑似食物中毒
  - 月经问题
  - 便血
  - 排尿困难
  - 排尿疼痛
  - 成人呕吐
- id: abdominal_pain_002
  topic_zh: 腹痛，儿童
  topic_en: Abdominal Pain Child
  source_file: STCC/Abdominal_Pain_Child.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 用药情况
  - 疼痛程度评分
  - 伴随症状
  - 既往病史
  - 末次月经日期
  triage_levels:
    A:
      criteria:
      - 持续严重的疼痛 >2 小时
      - 迅速加剧的疼痛
      - 右下腹痛伴食欲不振、恶心和/或呕吐、发热、抓腹部、弯腰行走、尖叫、呻吟呼吸或蜷缩成胸膝位躺卧
      - 异常大量的阴道出血及可能怀孕的情况
      - 摄入未知化学物质、植物或药物
      - 近期有腹部创伤
      - 与痔疮或铁剂补充无关的黑色、血性或果冻状粪便
      - 体重减轻
      - 呕血或暗咖啡色样呕吐物
      - 虚弱无法行走
      - 睾丸或阴囊严重疼痛和肿胀
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 严重的恶心和呕吐
      - 持续 >2 小时且家庭护理无效的疼痛
      - 原因不明的进行性腹部膨胀
      - 排尿痛或困难
      - 年龄 <2 岁并有间歇性疼痛
      - 疼痛影响活动能力
      - 尿量减少
      - 恶心、呕吐或腹泻 >24 小时，且家庭护理无效
      - 已知疝气或鞘膜积液，疼痛或哭泣持续 >2 小时
      action: 立即前往急诊室
    C:
      criteria:
      - 阴道或尿道分泌物
      - 有腹痛病史，常规治疗无效
      - 显著增加的压力水平
      - 尿中带血
      - 体温 >101°F (38.3°C)，咳嗽或虚弱
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 有“紧张性胃”的病史且压力水平增加
      - 与空腹、吃某些食物，或使用止痛药、抗生素或抗炎药物相关的间歇性轻度疼痛
      - 偶尔的轻微腹泻
      - 其他家庭成员也生病了
      - 持续超过 24 小时的喉咙痛
      action: 居家观察，按家庭护理指导
  home_care:
  - 休息。
  - 12 至 24 小时内饮用透明液体（如用水稀释一半的果汁、淡茶、肉汤、运动饮料、冰棒、果冻、清澈软饮料）或清淡饮食（如米饭、土豆、苏打饼干、椒盐脆饼、干土司、苹果酱、香蕉）。建议为小儿童或婴儿提供电解质/矿物质补充剂或其他补水液溶液（例如
    Pedialyte）。
  - 如果有腹泻，避免饮用果汁或未经稀释的运动饮料。
  - 按照药房指示服用药物。有些应在空腹时服用，而另一些则应与食物一起服用。避免使用布洛芬和其他抗炎药物。不要给儿童服用阿司匹林。如果年龄 <2 岁，则避免使用阿司匹林。严重疼痛和肿胀在睾丸或阴囊中。
  - 记录以下问题向您的 PCP/诊所/急诊科报告
  - 持续 >1 小时的严重疼痛
  - 热敷或活动后疼痛加剧
  callback_criteria:
  - 【立即急诊】异常坚硬或硬化的腹部
  - 【立即急诊】持续呕吐
  - 【立即急诊】血便或黑便或呕血
  - 【立即急诊】虚弱无法行走
  - 【立即急诊】睾丸或阴囊严重疼痛和肿胀
  related_protocols:
  - 腹部肿胀
  - 便秘
  - 儿童
  - 疑似食物中毒
  - 月经问题
  - 排尿困难
  - 排尿痛
  - 儿童
- id: abdominal_pain_003
  topic_zh: 腹部肿胀
  topic_en: Abdominal Swelling
  source_file: STCC/Abdominal_Swelling.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 用药情况
  - 既往病史
  - 疼痛评分
  triage_levels:
    A:
      criteria: []
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 近期创伤或腹部手术史
      - 新发黑便或血便
      action: 立即前往急诊室
    C:
      criteria:
      - 肿胀在过去的24小时内突然出现，且排气或呕吐后未缓解
      - 按压不消退的疼痛或触痛区域
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 踝部肿胀
      - 尤其夜间呼吸困难
      - 尿量减少
      - 排尿后肿胀减轻
      - 新发黄疸（皮肤和眼睛变黄）
      - 按压或咳嗽时疼痛或触痛区域消失或增大
      - 持续性便秘
      - 怀孕可能性及乳房肿胀、晨吐、月经延迟>2个月
      - 1至5天经期前后的女性腹部肿胀
      - 伴随痉挛、腹泻或便秘的肿胀
      - 一周内逐渐加重的肿胀
      - 体重迅速增加
      - 排气增多
      action: 居家观察，按家庭护理指导
  home_care:
  - 每天适量饮水，根据耐受程度。
  - 饮食中包含水果和高纤维食物。
  - 建立每日排便习惯。
  - 避免产生气体的食物，如洋葱、卷心菜和豆类。
  - 根据耐受情况定期锻炼。
  - 慢慢进食。
  - 增加气体时服用抗酸药。遵循标签上的说明。
  - 考虑使用非处方温和泻药，并遵循标签上的指示。请当地药师推荐非处方泻药或大便软化剂产品。
  callback_criteria:
  - 【立即急诊】黑便或血便，呕吐物带血
  related_protocols: []
