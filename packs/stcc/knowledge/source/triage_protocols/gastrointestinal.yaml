protocols:
- id: gastrointestinal_001
  topic_zh: 成人腹泻
  topic_en: Diarrhea Adult
  source_file: STCC/Diarrhea_Adult.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 用药情况
  - 既往病史
  - 伴随症状
  triage_levels:
    A:
      criteria:
      - 腹泻伴有严重虚弱、嗜睡或昏厥
      - 严重腹痛、肿胀和发热
      - 糖尿病患者出现呼吸急促或费力
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 严重腹痛
      - 明显带血的大便
      - 脱水的迹象：
      - 尿量减少
      - 眼睛凹陷
      - 松弛干燥的皮肤
      - 极度口渴，口腔干燥
      - 粘膜干燥
      - 站立时头晕
      - 持续呕吐和腹泻
      action: 立即前往急诊室
    C:
      criteria:
      - 每30至60分钟腹泻一次超过6小时
      - 腹泻持续超过5天
      - 粘液、脓液、黄色、绿色或泡沫状大便持续超过2天
      - 持续发热
      - 新出现的大便失禁
      - 家庭护理措施后无改善
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 最近饮食变化
      - 其他家庭成员也有腹泻
      - 最近前往外国旅行
      - 过去2个月内使用过抗生素
      - 新处方药
      action: 居家观察，按家庭护理指导
  home_care:
  - 最初12至24小时内食用清澈液体饮食（小口喝水、平汽水、清汤、果冻[非红色]、调味冰）。
  - 接下来的12小时，逐渐过渡到喝汤（避免奶油汤）、干吐司、苏打饼干、白米饭、椒盐卷饼、香蕉、苹果酱和土豆。
  - 软便形成后恢复正常饮食。
  - 腹泻缓解后的2至5天内避免乳制品、柑橘类果汁、生水果和蔬菜以及油炸或辛辣食物。
  - 6小时腹泻伴腹痛，或疼痛持续不减时，可使用非处方止泻药（如易蒙停、凯佩克特、比普-必斯摩）。请遵循标签上的说明。
  - 可用对乙酰氨基酚退烧。不要给儿童服用阿司匹林。20岁以下者避免类似阿司匹林的产品。肝病患者避免使用对乙酰氨基酚。有肾病或胃部问题的患者，以及孕妇应避免使用布洛芬。请遵循标签上的说明。
  callback_criteria:
  - 家庭护理措施48小时后无改善或腹泻加重
  - 黄色、泡沫状、带血或绿色大便出现超过一次
  - 脱水的迹象
  - 发热、虚弱或嗜睡
  - 持续呕吐
  - 依赖胰岛素治疗的糖尿病患者改变饮食计划
  related_protocols:
  - 成人腹痛
  - 腹部肿胀
  - 便秘
  - 脱水
  - 糖尿病问题
  - 痔疮
  - 便血
  - 异常大便
  - 成人呕吐
  - 虚弱
- id: gastrointestinal_002
  topic_zh: 腹泻，儿童
  topic_en: Diarrhea Child
  source_file: STCC/Diarrhea_Child.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 频率
  - 用药情况
  - 既往病史
  - 伴随症状
  triage_levels:
    A:
      criteria:
      - 腹泻并伴有严重的无力、疲倦、无精打采或昏厥
      - 呕吐伴右上腹疼痛
      - 3个月以下婴儿腹泻且体温 >100.4°F (38°C)
      - 寒冷和灰白的皮肤
      - 大量血便
      - 快速而困难地呼吸
      - 剧烈疼痛，双腿屈向胸部并伴有痉挛
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 脱水迹象：
      - 尿量减少
      - 1岁以下儿童4至6小时无尿
      - 1岁以上儿童12小时以上无尿
      - 体温 >104°F (40°C)，年龄>3个月，对退热措施无反应
      - 哭泣时无泪
      - 眼睛或前囟凹陷
      - 极度口渴、口腔干燥
      - 昏昏欲睡
      - 持续呕吐和腹泻
      - 腹泻每小时超过8小时
      - 便中带血
      action: 立即前往急诊室
    C:
      criteria:
      - 脱水迹象
      - 尿量减少
      - 口腔干燥
      - 哭泣时无泪
      - 昏昏欲睡、无力或脱力
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 黄色、泡沫状、带血或绿色的大便发生不止一次
      - 体温升高、乏力或无精打采
      - 水样腹泻和呕吐清水超过3次
      action: 居家观察，按家庭护理指导
  home_care: []
  callback_criteria:
  - 【立即急诊】呼吸急促或呼吸困难
  - 【立即急诊】严重腹痛、肿胀和发热
  - 【立即急诊】2个月以下婴儿体温 >100.4°F (38.0°C)
  - 【立即急诊】大量血便
  - 【立即急诊】寒冷和灰白的皮肤
  - 【立即急诊】极度无精打采或昏厥
  related_protocols:
  - 腹痛
  - 腹部肿胀
  - 意识状态改变
  - 混淆
  - 便秘
  - 脱水
  - 发热
  - 直肠出血
  - 大便异常
  - 呕吐
- id: gastrointestinal_003
  topic_zh: 成人呕吐
  topic_en: Vomiting Adult
  source_file: STCC/Vomiting_Adult.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 病史
  - 用药情况
  - 伴随症状
  - 疑似原因
  triage_levels:
    A:
      criteria:
      - 意识状态改变
      - 呕吐鲜红色血液或类似暗咖啡色的呕吐物
      - 近期头部或腹部受伤并伴有呕吐
      - 胸痛或不适，呼吸困难，心悸或出汗
      - 持续严重的腹痛影响活动
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 脱水迹象：
      - 尿量减少
      - 深黄色尿液
      - 眼窝凹陷
      - 松弛干燥的皮肤
      - 极度口渴
      - 口腔干燥，舌头干燥，粘稠的唾液
      - 站立或坐起时头晕
      - 怀疑近期食用野生蘑菇或植物导致呕吐
      - 糖尿病病史且无法通过家庭护理措施控制呕吐
      - 虚弱或异常疲劳
      action: 立即前往急诊室
    C:
      criteria:
      - 持续超过24小时的呕吐，即使采取了家庭护理措施也未能缓解
      - 近期手术、住院或诊断程序
      - 新发黄疸
      - 持续呕吐和增加使用大麻或其他聚会/非法药物
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 腹泻或便秘
      - 腹部膨胀
      - 有出国旅行或露营的历史
      - 其他家庭成员生病
      - 过量摄入食物、酒精或液体
      - 近期服用抗生素、止痛药或新药物
      - 偶尔呕吐和使用聚会/非法药物
      - 可能怀孕
      action: 居家观察，按家庭护理指导
  home_care:
  - 最后一次呕吐后1小时内不要吃任何东西或喝水。
  - 最初12小时内，每次只喝少量的清澈液体，包括明胶、水、运动饮料、无气泡的汽水、清汤、冰块（带味）或苹果汁。不要喝柑橘类果汁。
  - 根据耐受情况逐渐增加液体摄入量。
  - 12小时后尝试吃小份的清淡食物，如米饭、土豆、苏打饼干、椒盐脆饼、干面包和苹果酱。
  - 在能够耐受清淡食物后，逐步恢复正常饮食，根据耐受情况进行调整。
  - 如果服用常规药物30分钟内出现呕吐，请重新服药。
  - 避免牛奶、柑橘类食品和果汁、辛辣和高脂肪的食物、酒精、咖啡或含咖啡因的饮料。
  - 可以服用非处方的美沙酮（如 Dramamine）或磷酸碳水化合物溶液（如 Emetrol）来缓解恶心，按照包装上的说明使用。
  - 引起恶心和呕吐的病毒很容易传播。特别注意手部卫生。避免使用感染者用过的毛巾、餐具和杯子。
  callback_criteria:
  - 发热、虚弱或腹痛
  - 48小时内没有改善或状况恶化
  - 脱水迹象
  - 【立即急诊】意识状态改变
  - 【立即急诊】呕吐血液或类似暗咖啡色的呕吐物
  - 【立即急诊】持续严重的疼痛影响活动能力
  - 【立即急诊】胸痛、呼吸困难、心悸或出汗
  related_protocols:
  - 腹痛
  - 意识状态改变
  - 胸痛
  - 脱水
  - 糖尿病问题
  - 成人腹泻
  - 成人发热
  - 疑似食物中毒
  - 头痛
  - 头部受伤
  - 过量用药
  - 术后问题
  - 妊娠期恶心呕吐
  - 使用或接触
- id: gastrointestinal_004
  topic_zh: 呕吐，儿童
  topic_en: Vomiting Child
  source_file: STCC/Vomiting_Child.md
  key_questions:
  - 姓名
  - 年龄
  - 起始时间
  - 疑似原因
  - 病史
  - 药物使用情况
  - 伴随症状
  triage_levels:
    A:
      criteria:
      - 意识状态改变：无力，异常易怒，困惑
      - 严重头痛、颈部僵硬或前屈时疼痛
      - 呕吐鲜红色血液或类似咖啡渣的暗色呕吐物
      - 近期头部或腹部受伤
      - 接触有毒物质（如药物、植物、清洁剂、杀虫剂或野生蘑菇）
      - 新生儿<1个月大
      - 不哭闹时腹部坚硬或紧绷
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 脱水的迹象：
      - 尿量减少
      - 眼睛凹陷或前囟凹陷
      - 口腔干燥
      - 哭泣时无泪
      - 异常无力
      - 呼吸急促或快速
      - 持续腹痛，影响活动
      - 孩子看起来非常不适
      - 糖尿病史且无法通过家庭护理措施控制呕吐
      - <3个月大的婴儿已呕吐>2次或有喷射性呕吐
      action: 立即前往急诊室
    C:
      criteria:
      - 持续时间超过12小时的呕吐
      - 体温>101°F (38.3°C) 持续>24小时
      - 在过去6小时内呕吐超过3次
      - 持续性腹泻
      - 喂食后婴儿有剧烈呕吐
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 中度腹泻或便秘
      - 近期出国旅行或露营
      - 家中其他成员患病
      - 过量摄入食物或液体
      - 最近服用抗生素、止痛药或新药物
      - 耳痛、感冒、喉咙痛或发热
      action: 居家观察，按家庭护理指导
  home_care:
  - 每隔5分钟给予1茶匙Lytren、Pedialyte、Infalyte或Kao Lectrolyte，并根据耐受情况逐渐增加。
  - 如果婴儿喝果汁，每隔5分钟给予1茶匙，然后根据耐受情况逐渐过渡到清淡液体。如果同时有腹泻，请不要给果汁。
  - 如果母乳喂养且婴儿呕吐3次以上，每30至60分钟提供4至5分钟的哺乳，并在两次哺乳之间补充1茶匙重水合液，每隔5至15分钟一次。通常不需要停止母乳喂养。
  - 如果是配方奶喂养，请使用少量、频繁的喂食方式。
  - 呕吐后1到2小时内避免进食或饮水。
  - 4小时内每隔5分钟饮用1茶匙液体（稀释果汁、加糖弱茶、清汤、果冻或冰块）。4小时无呕吐后，可逐渐增加提供的液体量。
  - 呕吐后的48小时内不要让儿童参与剧烈活动。
  - 脱水的迹象出现时，应立即寻求医疗帮助。
  - 频繁洗手，尤其是在照顾有呕吐和/或腹泻症状的儿童时，使用肥皂和水清洗双手。
  callback_criteria:
  - 高烧、虚弱或持续超过2小时的腹痛
  - 48小时内无改善或状况恶化
  - 脱水迹象
  related_protocols:
  - 儿童
  - 意识状态改变
  - 便秘
  - 脱水
  - 儿童
  - 儿童
  - 疑似食物中毒
  - 头痛
  - 头部受伤
  - 术后问题
- id: gastrointestinal_005
  topic_zh: 消化不良
  topic_en: Indigestion
  source_file: STCC/Indigestion.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 症状通常发生在进食后不久
  - 过敏史
  - 用药情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 呼吸困难
      - 皮肤湿冷
      - 颈部、下颌、肩膀、背部或手臂疼痛
      - 面部、嘴唇、耳垂或指甲发蓝或灰暗
      - 心脏病史或糖尿病史
      - 劳累时出现疼痛
      - 有即将发生不幸的感觉
      - 胸痛伴有心悸
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 呕吐黑色咖啡渣样物质
      - 剧烈腹痛
      action: 立即前往急诊室
    C:
      criteria:
      - 服用药物后不适持续存在
      - 状况恶化，需要更频繁地使用药物
      - 经常呕吐、体重减轻或食欲下降
      - 吞咽困难或疼痛
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 使用阿司匹林、布洛芬或类固醇后疼痛加剧
      - 弯腰、运动或饭后不久躺下时疼痛加剧
      - 经常嗳气或放屁
      - 口中酸味
      - 腹胀或饱胀感
      - 最近压力增加
      - 进食或饮水后症状很快出现
      - 进食后有轻微恶心或腹泻
      - 之前被诊断为反流性食管炎
      - 最近开始使用新药
      action: 居家观察，按家庭护理指导
  home_care:
  - 尝试非处方药物（如Maalox、Mylanta、Riopan、Tums、Pepcid、Prilosec），并按照标签上的说明使用。液体通常比片剂提供更快的缓解作用。如果正在服用其他处方药，请咨询家庭医生。
  - 不要给儿童服用Pepto-Bismol。
  - 避免在睡前2到3小时内进食。
  - 饭后2到3小时内不要躺下，也不要在饭后不久弯腰或运动。
  - 用木块或砖头将床头抬高4到6英寸。
  - 少量多餐。
  - 避免辛辣食物、酒精、咖啡、吸烟、巧克力、柑橘类水果、西红柿、醋、油腻的食物和碳酸饮料。
  - 如果阿司匹林或布洛芬使问题加剧，尝试使用对乙酰氨基酚。不要给儿童服用阿司匹林。<20岁者应避免类似阿司匹林的产品。如果存在肝病，则不应使用对乙酰氨基酚。如需用药，请咨询医生。
  - 避免在排便、排尿和举重时用力。
  callback_criteria:
  - '>3天后持续不适且未见改善或状况恶化'
  - 抗酸药无效
  - 吞咽困难或疼痛
  related_protocols:
  - 腹部肿胀
  - 胸痛
  - 嗳气/打嗝
  - 气体/排气
  - 烧心
  - 直肠出血
  - 吞咽困难
- id: gastrointestinal_006
  topic_zh: 便秘
  topic_en: Constipation
  source_file: STCC/Constipation.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 最后一次排便
  - 用药情况
  - 病史
  - 疼痛评分
  triage_levels:
    A:
      criteria:
      - 严重腹痛，肿胀，膨胀或呕吐
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 持续性呕吐和渐进性腹部肿胀
      - 剧烈疼痛或绞痛
      - 呕吐出棕色、黄色或苦味的液体
      - 有便血且无痔疮史或便秘伴随出血
      - 婴儿<1个月，母乳喂养，出现脱水迹象
      action: 立即前往急诊室
    C:
      criteria:
      - 5至7天未排便，且家庭护理措施无效的便秘
      - 近期手术、受伤或分娩后，家庭护理措施未能缓解症状
      - 有憩室炎史并伴有发热
      - 婴儿超过6到10天无大便
      - 儿童/婴儿哭闹、腹胀、排出硬便，对家庭护理措施反应不佳
      - 24至48小时内不明原因的发热
      - 小于2个月的婴儿在出生后24小时首次排便且现在便秘
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 干硬的大便
      - 排便时疼痛
      - 大便或排便习惯近期改变
      - 慢性便秘
      - 小而频繁出现的液体或硬便
      - 间歇性便秘
      - 近期活动减少或卧床休息
      - 服用含可待因的镇痛药物或其他加重便秘的药物
      - 厕纸或粪便表面有血
      action: 居家观察，按家庭护理指导
  home_care:
  - 确保饮食量足够（数量），含纤维丰富，水分充足（除非在限制液体摄入的饮食中，否则每天应喝6到8杯[每杯8盎司]水）。将李子或李子汁、新鲜水果、豆类和全谷物加入饮食。
  - 避免导致便秘的食物（奶制品、米饭、香蕉、白面包和加工食品）。
  - 每天早晨喝一杯热饮，如咖啡、茶或加柠檬的热水。
  - 每天固定时间保证隐私并排便。
  - 根据耐受情况增加运动量。
  - 成人可以尝试非处方的容积性泻药（美达美、美拉克松、甘油栓剂、矿物油）或其他措施无效时使用灌肠。按照标签上的指示操作。向药师咨询其他产品建议。
  - 婴儿：
  - 对于>1个月大的婴儿，如果婴儿在喝果汁，可以给李子汁或杏桃汁兑水以帮助缓解便秘。不要给予灌肠或泻药。
  - 对于>2个月大的婴儿，每天两次给予水果汁（按月龄每盎司计算）。
  - 对于>4个月大的婴儿，添加富含纤维的婴儿食品如李子、桃子、梨或甘薯。
  - 儿童：增加果汁摄入量并减少牛奶至1品脱/天。增加高纤维食物，如麸皮麦片、燕麦粥、麸皮松饼（如果孩子>4岁）或爆米花。避免使用泻药和灌肠。
  - 可以使用大便软化剂如Citrucel、Metamucil、Colace或矿物油。（每天1/2至1汤匙通常足够，但请在给药前阅读容器标签上的指示。）
  - 对于因便秘引起的直肠疼痛，坐在温水中20分钟。
  - 如果家庭护理措施无效，请回电或预约家庭医生。
  callback_criteria:
  - 【立即急诊】严重腹痛、肿胀或呕吐
