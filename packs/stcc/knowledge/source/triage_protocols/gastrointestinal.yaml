      - 疼痛放射到背部
      - 间歇性腹部不适或肿胀
      - 过度排气
      - 粪便苍白、量多且气味难闻
      - 最近食用了高纤维或产气食物，如豆类或啤酒
      action: 居家观察，按家庭护理指导
  home_care:
  - 避免食用易产气的食物（芜菁、豆类、玉米、卷心菜、洋葱、油炸食品）。
  - 避免过度摄入甜点、油腻食物和其他已知会导致气体的食品。
  - 避免吃得过快或过多。
  - 避免使用泻药。
  - 每天喝足够的水。
  - 保持规律的排便习惯。
  - 定期锻炼。
  - 尽量减少餐时的压力或兴奋。
  - 小口饮用去气的透明碳酸饮料或薄荷茶以帮助分解气体。
  - 如果对乳糖不耐受且无法避免摄入乳制品，询问药师是否有非处方药建议。
  - 作为替代方案，餐后尝试食用包糖的茴香籽或喝用茴香籽煮制的茶水，以分解和分散肠道中的气体。
  callback_criteria:
  - 采取家庭护理措施后症状持续或恶化
  - 恶心/呕吐
  related_protocols:
  - 腹部肿胀
  - 胸痛
  - 便秘
  - 消化不良
- id: gastrointestinal_014
  topic_zh: 胃灼热
  topic_en: Heartburn
  source_file: STCC/Heartburn.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 过敏史
  - 用药情况
  - 既往病史
  - 伴随症状
  - 疼痛程度
  triage_levels:
    A:
      criteria:
      - 呼吸困难
      - 皮肤湿冷
      - 颈部、下颚、肩部、背部或手臂疼痛
      - 脸部、嘴唇、耳垂或指甲发蓝或发灰
      - 呕吐血液或深咖啡色样物
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 糖尿病或心脏病史
      - 头晕或头重脚轻
      action: 立即前往急诊室
    C:
      criteria:
      - 服用抗酸药后不适未缓解
      - 病情恶化，需要更频繁地使用抗酸药
      - 吞咽困难或疼痛
      - 感觉药物卡在食道里
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 用药后疼痛加剧
      - 弯腰、锻炼或饭后不久躺下时疼痛加剧
      - 恶心或呕吐
      - 频繁嗳气
      - 胃内容物反流入口腔
      - 大量吸烟或饮酒
      - 压力增大
      action: 居家观察，按家庭护理指导
  home_care:
  - 尝试使用非处方抗酸药（Maalox, Mylanta, Riopan, Tums），并按照瓶上的说明。尝试使用非处方的Pepcid AC、Tagamet HB、Zantac或Prilosec。如果正在服用其他处方药，请咨询PCP。液体比片剂提供更快的缓解。不要给儿童服用Pepto-Bismol。请向药剂师询问更多产品建议。
  - 避免在睡前2到3小时内进食或饮水。
  - 饭后不久不要躺下、弯腰或锻炼。
  - 使用木块或砖头将床头抬高4到6英寸，或者侧身睡以加快胃排空并减少反流。
  - 少量多餐。
  - 避免食用辛辣食物、酒精、咖啡、烟草、巧克力、柑橘类水果、西红柿、醋、油腻的食物或其他任何触发胃灼热的食品或饮料。
  - 如果阿司匹林或布洛芬加重问题，尝试使用对乙酰氨基酚。不要给儿童服用阿司匹林。<20岁者避免使用类似阿司匹林的产品。肝病患者避免使用对乙酰氨基酚。肾病或胃部存在问题的患者以及孕妇应避免使用布洛芬。遵循标签上的说明。
  - 避免穿紧身衣物，如束腰、皮带、控制型连裤袜和腰部紧身的裤子或裙子。
  - 晚餐后50分钟，用1茶匙苹果醋加水或果汁稀释；这有助于加快食物消化，减少睡眠时的反流。
  callback_criteria:
  - 服用处方药后出现不适
  - 3天内无改善或情况恶化
  - 抗酸药或其他非处方药（如Pepcid AC或Zantac）无效
  - 频繁使用抗酸药
  - 吞咽困难或疼痛
  - 呼吸困难
  - 皮肤湿冷
  - 颈部、下颚、肩部、背部或手臂发蓝或发灰
  - 呕吐血液或深咖啡色样物
  related_protocols:
  - 儿童
  - 胸痛
  - 气体/嗳气
  - 消化不良
  - 成人
  - 儿童
