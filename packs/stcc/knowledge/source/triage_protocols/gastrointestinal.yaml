      - 癌症史
      action: 居家观察，按家庭护理指导
  home_care:
  - 深呼吸，屏住15到30秒。
  - 对着纸袋呼气5分钟。
  - 小口喝冰水。
  - 吞咽干面包、饼干、一茶匙干糖或碎冰。注意：小孩可能因干糖而窒息。将糖放在布中扎紧，在水中浸泡后让孩子吸吮糖包。也可以让糖在舌头上融化直到完全溶解。
  - 拉舌头。
  - 轻轻按压闭合的眼睑。
  - 用牙齿和右侧鼻孔夹住上唇，轻轻施压。
  - 轻抚舌头背面。
  - 按照容器上的指示服用常规的抗酸药（如Maalox, Mylanta）。
  - 通过分散注意力来转移注意。
  - 持续或加重的情况
