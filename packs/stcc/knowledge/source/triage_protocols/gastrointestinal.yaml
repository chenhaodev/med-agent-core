- id: gastrointestinal_017
  topic_zh: 大便失禁
  topic_en: Incontinence Stool
  source_file: STCC/Incontinence_Stool.md
  key_questions:
  - 姓名
  - 年龄
  - 起病时间
  - 过敏史
  - 用药情况
  - 既往史
  triage_levels:
    A:
      criteria:
      - 发作后、昏厥或失去意识后的尿失禁和大便失禁
      - 突然丧失排便控制力，伴有口齿不清、肌肉无力、视力模糊或双视、意识水平下降
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 近期背部受伤、创伤或跌倒后出现剧烈疼痛和多次失禁
      - 黑便或有血块的大便
      action: 立即前往急诊室
    C:
      criteria:
      - 近期有分娩史，阴道或直肠手术，痔疮，肛瘘或肛裂
      - 多次失禁发作
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 感觉肛门内有肿块
      - 突然发作的腹泻且无法及时上厕所
      - 近期无排便或多次硬便后频繁不自主渗漏大便
      - 曾经如厕训练成功的儿童再次出现大便失禁
      action: 居家观察，按家庭护理指导
  home_care:
  - 避免便秘。增加膳食纤维、体积和水分摄入（新鲜水果、蔬菜、全谷物、谷类食品和糙米）。尝试使用美达菲来增加体积。每天喝6到8杯水。定期锻炼。
  - 对于曾经接受过如厕训练的儿童：
  - 允许孩子决定上厕所的时间。不要强迫孩子坐在马桶上。
  - 当孩子使用卫生间时给予表扬。
  - 与孩子讨论全天保持干净可获得的奖励。
  - 如果孩子弄脏了，让孩子自己清理并更换衣物（如果年龄足够大）。
  - 不要因为意外而责备或惩罚孩子，也不允许其他兄弟姐妹取笑孩子。
  - 对于无法及时上厕所的老年或残疾成人，不要表现出愤怒。讨论识别预警信号的方法，并在出现这些信号时尽快去洗手间。
  - 考虑租赁或购买便携式马桶，以应对突发性腹泻发作时使用。
  - 审查饮食和用药情况，如使用泻药、新药物、李子汁或蓖麻油的情况。
  callback_criteria: []
  related_protocols:
