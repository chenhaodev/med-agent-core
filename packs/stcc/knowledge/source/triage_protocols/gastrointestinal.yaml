- id: gastrointestinal_007
  topic_zh: 成人食欲减退
  topic_en: Appetite Loss Adult
  source_file: STCC/Appetite_Loss_Adult.md
  key_questions:
  - 姓名
  - 年龄
  - 起始时间
  - 用药情况
  - 既往病史
  triage_levels:
    A:
      criteria:
      - 意识障碍
      - 自杀念头
      - 幻觉（听觉、触觉或视觉）
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 体温>101°F (38.4°C)且免疫系统减弱或年龄较大
      - 已知或疑似饮食障碍，以及坐立时头晕和心率持续增加
      action: 立即前往急诊室
    C:
      criteria:
      - 突然体重减轻>5至10磅
      - 心脏病史、肢体肿胀、水肿、癌症、病毒感染、胃肠炎、寄生虫、甲状腺功能亢进或肠道疾病
      - 皮肤或眼白发黄
      - 体温>101°F (38.4°C)且退热措施无效
      - 突然体重增加>5磅
      - 水分摄入不足
      - 数周内不明原因的体重减轻
      - 严重抑郁
      - 突然停止药物（包括处方药或非处方药）、酒精或咖啡因
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 不良饮食习惯
      - 近期手术
      - 压力/焦虑增加
      - 食欲减退新出现
      - 无其他症状
      - 活动减少
      action: 居家观察，按家庭护理指导
  home_care:
  - 吃均衡的餐食。
  - 手术或疾病后缓慢增加食物量。
  - 定期锻炼。
  - 可尝试液体饮食补充剂（如Ensure、Boost）。向您的PCP或药剂师咨询其他非处方液态饮食补充剂。
  - 试图找出食欲减退的原因，并采取适当措施解决该问题（如假牙不合适、口腔溃疡、恶心、抑郁、吞咽困难、近期手术、化疗等）。
  - 提供安慰，告知在麻醉、抗生素和多种药物使用后的手术中出现食欲减退并不罕见。与您的外科医生或PCP讨论改善食欲及减缓体重下降的方法。
  - 服用常规的不适和发热药物。如存在肝病，则避免使用对乙酰氨基酚。如存在肾病、胃部问题或怀孕情况下，应避免使用布洛芬。按照标签上的指示使用。
  callback_criteria:
