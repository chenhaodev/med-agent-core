  - 进食障碍治疗情况
  triage_levels:
    A:
      criteria: []
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 意识状态改变（AMS）
      - 呕吐、嗜睡、烦躁和头痛或颈部僵硬疼痛
      action: 立即前往急诊室
    C:
      criteria:
      - 儿童拒绝进食或饮水并看起来病态
      - 已知或疑似进食障碍，且站立或坐下时头晕和心率持续增加
      - 脱水迹象：
      - 尿量减少
      - <1岁儿童超过8小时无尿
      - '>1岁儿童超过12小时无尿'
      - 哭泣但没有眼泪
      - 囟门凹陷
      - 极度口渴，口腔干燥
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 异常频繁的排尿或夜遗症
      - 看到食物时恶心、呕吐、皮肤发黄、发热和疲劳
      - 皮肤持续苍白
      - 尿液深色且大便颜色浅
      - 食欲持久下降，淋巴结肿大，疲劳
      - 体重增长不良
      - 突然体重减轻
      - 严重的节食或过度运动以及青少年的扭曲身体形象
      - 皮疹或发热
      - 不良饮食习惯
      - 压力/焦虑增加
      - 皮肤干燥，头发脆弱
      - 近期出现食欲减退
      action: 居家观察，按家庭护理指导
  home_care:
  - 鼓励均衡饮食。
  - 当喉咙痛导致吞咽困难时，不要强迫孩子进食。鼓励食用冰淇淋、冰棒和冷饮。
  - 孩子生病时，不要过分强调食物的重要性。
  - 理解2岁左右的孩子食欲下降是正常的。
  - 手术后或病后逐渐增加食物量。
  - 发热时可给予对乙酰氨基酚。不要给儿童使用阿司匹林。<20岁的孩子避免使用类似阿司匹林的产品。肝病患者应避免使用对乙酰氨基酚。存在肾病、胃问题的患者或孕妇应避免使用布洛芬。请按照标签上的说明服用。
