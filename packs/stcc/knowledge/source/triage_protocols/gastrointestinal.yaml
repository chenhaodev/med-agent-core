      - 无法从直肠移除异物
      - 儿童在直肠区域出现红色脱皮疹子
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 剧烈疼痛
      - 严重出血
      action: 立即前往急诊室
    C:
      criteria:
      - 经家庭护理措施后持续的疼痛或瘙痒
      - 暴露于性传播疾病
      - 近期手术
      - 无痛性皮疹或病变>24°
      - 最近进行过结肠镜检查、乙状结肠镜检查或侵入性操作
