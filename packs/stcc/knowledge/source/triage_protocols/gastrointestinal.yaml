- id: gastrointestinal_018
  topic_zh: 黄疸
  topic_en: Jaundice
  source_file: STCC/Jaundice.md
  key_questions:
  - 姓名
  - 年龄
  - 起始时间
  - 皮肤或眼睛是否有黄色
  - 用药情况
  - 病史
  - 相关症状
  triage_levels:
    A:
      criteria:
      - 新生儿出生后24小时内出现皮肤发黄
      - 手臂或腿部发黄
      - 肛温>100.4°F（38°C）或<96.8°F（36°C）
      - 新生儿腰部以下部位发黄
      - 连续两次喂养无法唤醒婴儿（4至6小时）
      - 新生儿超过8小时无尿布湿润
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 尿色深
      - 皮肤发黄
      - 大便呈白色、黄色或土灰色
      - 恶心、呕吐或食欲不振
      - 7天以上的新生儿皮肤发黄
      - 2到4天大的新生儿超过24小时无大便
      - 每天尿布少于6次，母乳喂养时少于3次
      - 14天后新生儿皮肤仍持续发黄
      action: 立即前往急诊室
  home_care:
  - 如果新生儿为母乳喂养，每1.5到2.5小时喂一次（每天8次以上）。
  - 如果新生儿使用奶瓶喂养，则在白天每隔2至3小时喂一次。
  - 让新生儿睡觉时靠近窗户，日间皮肤暴露以吸收阳光。
  - 若需补充营养，请使用配方奶或母乳。不要用水。
  - 请记住，许多新生儿会出现黄疸，并通常在3到5天内达到高峰，在1到2周内消失。新生儿通过排便排出胆红素。（喂养次数越多，排便次数也越多。）
  - 唤醒困倦的新生儿的小贴士：
  - 解开包裹并脱下新生儿的衣服。
  - 更换尿布。
  - 按摩新生儿的腿、背和手臂。
  - 用手指沿脊椎轻柔地给新生儿背部按摩。
  - 通过将新生儿举离自己，并轻轻将其向自己的脸部举起，进行“仰卧起坐”。
  - 如果新生儿6小时内未进食，请喂以泵出的母乳或配方奶。
  callback_criteria: []
  related_protocols: []
- id: gastrointestinal_019
  topic_zh: 造口问题
  topic_en: Ostomy Problems
  source_file: STCC/Ostomy_Problems.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 造口类型或造口袋原因
  - 药物
  - 病史
  triage_levels:
    A:
      criteria:
      - 造口处严重出血
      - 严重的腹痛或肿胀
      - 持续呕吐
      - 发热且腹部触痛或僵硬
      - 便秘，腹痛，肿胀和呕吐
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 尿路造口且体温 >100.4°F (38°C)，且尿液呈粉红色、红色或异常浑浊
      - 恶心，食欲不振，腹痛
      - 引流液渗入手术伤口
      - 服用抗凝药物且新出现的造口出血或尿液呈粉红或红色
      - 无造口排泄物
      - 大便带血
      action: 立即前往急诊室
    C:
      criteria:
      - 超过4天未有排便且便秘对家庭护理措施无反应
      - 无法管理造口或造口袋伤口
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 造口处少量出血
      - 新出现的瘙痒和灼烧感在造口或造口袋部位
      - 造口排泄物减少
      - 轻度便秘
      - 新服用药物且正常肠道习惯改变
      action: 居家观察，按家庭护理指导
  home_care:
  - 检查器具，确保各部分紧密连接。
  - 如果造口有渗漏，移除器具，用水清洁皮肤，彻底干燥，并按护士或初级保健医生的指导准备皮肤；应用新的器具。保持5分钟以确保袋子牢固贴合于皮肤上。
  - 按指示服用处方药物。
  - 当回肠造口袋充盈1/3-1/2时排空。
  - 肥皂可能干扰皮肤屏障粘合剂的作用；在使用肥皂清洁造口周围区域前，请与ET护士或提供者讨论。
  - 定期更换皮肤屏障—通常每3至4天一次，或按提供者的指示进行。
  - 在应用新的皮肤屏障和器具之前，确保造口周围的皮肤干净干燥。
  - 记住少量出血是正常的，组织容易出血，类似于刷牙后牙龈出血的情况。
  - 确保饮食量充足、富含体积（高纤维）及液体（每天6到8杯水，除非在限流饮食中）。
  - 每天早晨喝一杯热饮料，如咖啡、茶、柠檬热水或李子汁。
  - 按照指示使用大便软化剂、泻药和灌肠。
  - 当服用含可待因或其他增加便秘的药物时，请遵循初级保健医生开具的便秘预防计划。
  callback_criteria:
  - 【立即急诊】严重出血
  - 【立即急诊】严重的腹痛或肿胀
  - 【立即急诊】持续呕吐
  - 【立即急诊】发热且腹部触痛和僵硬
  related_protocols:
