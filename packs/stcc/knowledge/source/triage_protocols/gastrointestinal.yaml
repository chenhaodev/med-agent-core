- id: gastrointestinal_010
  topic_zh: 胃管问题
  topic_en: Feeding Tube Problems
  source_file: STCC/Feeding_Tube_Problems.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 管子类型
  - 持续时间
  - 管子是否在位
  - 用药情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 严重出血
      - 剧烈疼痛
      - 突然呼吸困难或气短
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 胃管被拔出或移位并伴有疼痛、出血或肿胀
      action: 立即前往急诊室
    C:
      criteria:
      - 加药或喂养液后管子经常堵塞
      - 尝试家庭护理措施后仍无法疏通管子
      - 胃管脱落
      - 照护者担心管子移位
      - 插入部位看起来感染了（发红、肿胀、疼痛、红色条纹或分泌物）
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 无法将溶液通过胃管注入
      action: 居家观察，按家庭护理指导
  home_care:
  - 疏通胃管（对于已接受过相关指导的照护者；如果未接受过指导，建议联系家庭健康护士、主诊医生、诊所或急诊室）：
  - 将床头抬高 45 度。
  - 将大注射器的尖端插入管子，并向后拉动以尽可能多地清除管内物质。
  - 用 30 毫升（1 盎司）水充满注射器。
  - 连接注射器到管子并冲洗。
  - 尽可能多地清除管内物质。
  - 注入 5 毫升蔓越莓汁、可乐或茶，并夹住管子。
  - 重复此过程直到管子疏通。
  - 每次喂食、用药或补充后，用 50 毫升水冲洗管子。
  - 检查胃管位置（对于已接受过护士或主诊医生关于确认管子位置指导的照护者）：
  - 关闭泵。
  - 使用大注射器，将尖端插入胃管并轻轻向后拉动。
  - 如果担心管子移位，在确认管子位置前不要使用该管子。
  callback_criteria:
  - 无法疏通管子
  - 感染迹象（发热、分泌物、热度、发红、红色条纹或恶臭分泌物）
  - 胃管移位或脱落
  - 【立即急诊】严重出血
  - 【立即急诊】剧烈疼痛
  - 【立即急诊】突然呼吸困难或气短
  related_protocols:
  - 腹部肿胀
  - 伤口愈合和感染
