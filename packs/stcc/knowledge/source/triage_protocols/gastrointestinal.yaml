- id: gastrointestinal_020
  topic_zh: 蛲虫
  topic_en: Pinworms
  source_file: STCC/Pinworms.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 已知或疑似蛲虫感染
  - 用药情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 直肠区域感染迹象（疼痛，肿胀，发红，分泌物，发热）
      - 夜间及凌晨时分严重的直肠瘙痒加剧
      - 直肠或阴道区域出现1/4至1/2英寸长的白色线状虫体
      - 粪便中可见虫体
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 直肠区域轻微发红、瘙痒或触痛
      - 儿童睡眠困难，烦躁不安或阴道刺激
      - 接触过蛲虫感染儿童的床上用品或床单
      - 治疗1周后直肠症状持续不缓解
      - 家庭成员被诊断为蛲虫感染并担心传播问题
      action: 立即前往急诊室
  home_care:
  - 为了检测儿童是否患有蛲虫，在睡前几小时在暗室内用灯光照射儿童的肛门。如果存在蛲虫，它们会重新爬回肛门。
  - 修剪指甲，并鼓励良好的洗手习惯。
  - 避免咬指甲或吮吸拇指。
  - 用热水和肥皂水清洗衣物及内衣直至蛲虫消失。
  - 治疗后2周内每天真空清洁或拖扫卧室。
  - 每天早上洗澡并清洁受影响区域。淋浴为佳。
  - 穿短裤或内裤在睡衣下面。
  - 为了减轻瘙痒：
  - 将氧化锌或1%氢化可的松软膏涂抹于受影响区域。
  - 用温水加泻盐或食盐泡澡。
  - 可能需要处方药来消除蛲虫。按指示完整服用药物。
  - 尝试非处方蛲虫药物（如Reese’s），并按照标签说明使用。
  callback_criteria: []
  related_protocols:
  - 床虱暴露或担忧
  - 瘙痒
  - 直肠问题
- id: gastrointestinal_021
  topic_zh: 直肠出血
  topic_en: Rectal Bleeding
  source_file: STCC/Rectal_Bleeding.md
  key_questions:
  - 姓名
  - 年龄
  - 起始时间
  - 药物使用情况
  - 病史
  triage_levels:
    A:
      criteria: []
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 头晕或昏厥
      - 呕血或咖啡色呕吐物
      - 间歇性腹痛
      - 频繁出现黑色柏油样大便
      - 大量鲜红色血液与大便混合，或排出的血块
      action: 立即前往急诊室
    C:
      criteria:
      - 使用抗凝药物、类固醇、非甾体抗炎药，或大量阿司匹林
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 近期有癌症病史
      - 体温 >100°F (37.7°C)
      - 大便带血丝
      - 擦拭时厕纸上有血迹
      - 便秘或痔疮
      - 便秘改善后出血持续>2到3天
      - 正在服用铁剂或碱式水杨酸铋（Pepto-Bismol）
      - 近期食用过甜菜或菠菜
      action: 居家观察，按家庭护理指导
  home_care:
  - 每天在温盐水中浸泡20分钟以清洁区域并促进愈合。（向水中加入2汤匙盐或小苏打。）
  - 保持直肠区清洁。可以使用药物垫（如Tucks）清洁和舒缓该区域；遵循标签上的指示。请药剂师提供其他产品建议。
  - 如果直肠区发炎，可涂抹非处方的氢化可的松软膏（Anusol-HC, Cortaid）或氧化锌糊剂或粉末。
  - 如果痔疮持续存在，请尝试使用非处方药物（如Anusol, Nupercainal, Preparation H），以帮助缓解和缩小痔疮。遵循标签上的指示。
  - 增加水分摄入，食用富含纤维的食物：水果、蔬菜、麦麸、谷物和豆类。避免可能导致便秘的食物，如奶酪。如果因不适而服用阿片类止痛药，这一点尤为重要。
  - 如果正在服用铁剂或碱式水杨酸铋（Pepto-Bismol）或食用了菠菜或甜菜，请与家庭医生联系进行粪便隐血试验。
  - 每天锻炼30分钟，即使只能分10-15分钟的间隔进行。
  callback_criteria:
  - 三天内无改善或出血加重
  - 便秘或痔疮在家中治疗一周后仍持续存在
  - 大便中混有血液或出现黑色大便
  - 【立即急诊】呕血或咖啡色呕吐物
  - 【立即急诊】头晕或昏厥
  - 【立即急诊】间歇性腹痛
  - 【立即急诊】大量鲜红色血液与大便混合，或排出的血块
  - 【立即急诊】频繁出现黑色柏油样大便
  related_protocols: []
- id: gastrointestinal_022
