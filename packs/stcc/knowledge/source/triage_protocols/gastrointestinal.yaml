- id: gastrointestinal_024
  topic_zh: 吞咽困难
  topic_en: Swallowing Difficulty
  source_file: STCC/Swallowing_Difficulty.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 过敏史
  - 用药情况
  - 病史
  - 疼痛评分
  triage_levels:
    A:
      criteria:
      - 颈部、胸部和四肢无力
      - 视力模糊或双视，流涎，眼睑下垂
      - 出现疾病症状的小孩过度流涎
      - 面部、舌头或喉咙突然肿胀，或有瘙痒、荨麻疹、喘息
      - 呼吸困难
      - 颌部、咽喉、颈部、肩部、胸部或手臂疼痛
      - 无法吞咽自己的唾液
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 感觉有骨头或食物卡在喉咙或食道中
      action: 立即前往急诊室
    C:
      criteria:
      - 不明原因的体重下降
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 因咽喉疼痛而吞咽困难
      - 前倾或躺下时胸痛间歇出现
      - 吞咽后感觉喉咙紧绷
      - 近期压力增加
      action: 居家观察，按家庭护理指导
  home_care:
  - 根据耐受情况服用常规的止痛药（阿司匹林、对乙酰氨基酚、布洛芬）以缓解发热和不适。不要给儿童服用阿司匹林。年龄<20岁者避免使用类似阿司匹林的产品。肝病患者避免使用对乙酰氨基酚。肾病或胃部问题存在时，以及怀孕情况下避免使用布洛芬。请遵循标签上的指示。
  - 用盐水漱口以缓解咽喉不适。含硬糖或喉片。
  - 增加液体摄入量。小口喝柠檬蜂蜜茶。
  - 根据耐受情况吞咽面包或软食。
  - 尝试非处方抗酸药，如盖胃平、马洛克斯、美林达、里奥潘和泰诺，并遵循标签上的指示。
  - 饭后不要立即躺下、弯腰或锻炼。
  - 少量多餐。
  - 避免辛辣食物、酒精、咖啡、吸烟、巧克力、醋、油腻食品和碳酸饮料。
  callback_criteria:
  - 3天内无改善或情况恶化
  - 打嗝或呕吐血或类似深色咖啡渣的呕吐物
  - 过度流涎
  - 家庭护理措施无效的持续发热
  - 【立即急诊】颈部、胸部和四肢无力
  - 【立即急诊】视力模糊或双视，流涎，眼睑下垂
  - 【立即急诊】出现疾病症状的小孩过度流涎
  - 【立即急诊】面部、舌头或喉咙突然肿胀，或有瘙痒、荨麻疹、喘息
  - 【立即急诊】呼吸困难
  - 【立即急诊】颌部、咽喉、颈部、肩部、胸部或手臂疼痛
  - 【立即急诊】无法吞咽自己的唾液
  related_protocols: []
