      - 首次出现肛门出血、肿胀、疼痛或瘙痒
      - 肛门瘙痒
      - 在大便中或肛门周围可见小虫子
      - 无痛性皮疹或生长<24°
      action: 居家观察，按家庭护理指导
  home_care:
  - 每日泡温水浴20到30分钟。
  - 使用非处方药以缓解瘙痒和不适。
  - 避免导致便秘的食物（奶酪和白面粉制品）。饮食中应包括新鲜水果、蔬菜和全谷物。每天喝大量的水（除非PCP已下令限制液体摄入）。
  - 尝试使用非处方的痔疮药物。
  callback_criteria:
