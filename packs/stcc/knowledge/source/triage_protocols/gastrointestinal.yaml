- id: gastrointestinal_015
  topic_zh: 痔疮
  topic_en: Hemorrhoids
  source_file: STCC/Hemorrhoids.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 痔疮问题
  - 用药情况
  - 病史
  - 既往治疗
  - 疼痛评分
  triage_levels:
    A:
      criteria:
      - 严重的持续性直肠出血
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 严重的直肠疼痛，影响活动
      - 感染迹象：红肿、疼痛、流脓或发烧
      - 糖尿病
      action: 立即前往急诊室
    C:
      criteria:
      - 无大便时的出血
      - 大便表面有血迹
      - 怀孕史，长时间久坐，便秘史
      - 排便时用力增加
      - 排便后疼痛、瘙痒或分泌物
      - 直肠内外出现小肿块持续1到3天
      action: 当天内联系医生/诊所
  home_care:
  - 每天多次坐在温水浴盆中或坐浴10分钟以缓解不适和肿胀，特别是在疼痛的排便后。
  - 每次排便后用柔软的纸巾或湿巾清洁直肠区域。
  - 为缓解瘙痒，在该区域敷冷敷布10分钟，每日4次。
  - 在清洁干燥的区域涂抹氧化锌或凡士林以减少刺激并帮助粪便顺利排出。遵循标签上的指示。
  - 如果上述措施无效，可以尝试非处方药物（痔疮栓剂、0.5%浓度的氢化可的松、Tucks）。遵循标签上的指示。含有金缕梅的产品可能有助于减轻不适感。含氢化可的松的产品有助于减少瘙痒。
  - 避免长时间坐着、站立、提重或用力。
  - 穿棉质衣物和宽松内衣。
  - 排便时避免用力。耐心一些，但不要坐超过2分钟。站起来做点别的事情，等感觉轻松些再回来继续。
  - 为帮助预防便秘，请多喝水并食用富含纤维的食物（水果、蔬菜和全谷物麦片）。
  callback_criteria:
  - 直肠开口周围出现硬块
  - 发生严重的直肠出血或黑便（超过一次）
  - 严重疼痛对家庭护理措施无反应
  - 疼痛或出血持续>1周
  - 感染迹象：红肿加剧、疼痛、肿胀、流脓或发烧
  related_protocols:
  - 便秘
  - 成人腹泻
  - 儿童腹泻
  - 直肠出血
  - 直肠问题
