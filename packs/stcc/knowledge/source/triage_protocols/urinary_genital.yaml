protocols:
- id: urinary_genital_001
  topic_zh: 尿痛
  topic_en: Urination Painful
  source_file: STCC/Urination_Painful.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 过敏史（如怀孕超过20周
  - 请参阅孕期尿路问题(491)）
  - 用药情况
  - 病史
  - 疼痛程度
  triage_levels:
    A:
      criteria:
      - 无法排尿
      - 尿中大量血迹
      - 腰背或腹部疼痛且超过8小时无法排尿
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 最近进行过泌尿系统手术，出现意外的疼痛或发热
      - 生殖器或腹部近期受伤
      - 使用抗凝药物且尿液呈粉红色或红色
      - 排尿时极度不适
      - 腰背痛
      - 体温>102°F (39°C)
      - 阴囊严重疼痛或肿胀
      - 有红斑狼疮、肾小球肾炎或单肾病史
      - 会阴部或直肠疼痛
      - 腰背痛且体温>100.5°F (38.1°C)
      - 超过4小时无法排尿
      action: 立即前往急诊室
    C:
      criteria:
      - 阴茎分泌物
      - 云状或恶臭的尿液（<2岁）
      - 儿童呕吐或液体摄入不足
      - 急迫感或频率超过3天
      - 膀胱部位疼痛
      - 云状或恶臭的尿液
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 排尿结束时疼痛加剧
      - 反复出现泌尿系统感染
      - 性接触后尿痛
      - 频繁泡浴或生殖器区域有肥皂残留（尤其是在年幼的女孩中）
      - 急迫感或频率小于3天
      action: 居家观察，按家庭护理指导
  home_care:
  - 多喝水，尤其是蔓越莓汁。
  - 避免摄入咖啡因和酒精。
  - 性交前后排尿。
  - 从前向后擦拭会阴部区域。
  - 穿棉质内衣。
  - 避免长时间穿着紧身裤。
  - 年幼女孩应避免频繁泡浴，并仅用水清洗会阴部。
  - 对于刺激或疼痛的会阴，可在洗澡水中加入半杯白醋并浸泡20分钟。2小时后再重复一次，12小时后再次进行。
  - 按常规服用止痛药（阿司匹林、对乙酰氨基酚、布洛芬）以缓解不适。不要给儿童使用阿司匹林。<20岁者避免使用类似阿司匹林的产品。肝病患者避免使用对乙酰氨基酚。肾病或胃部问题存在时，或孕期情况下避免使用布洛芬。请按照标签上的说明服用。
  - 如果反复出现泌尿系统感染和不适，请与药剂师讨论可用的非处方产品（如苯扎贝特盐酸盐[Pyridium]）。
  callback_criteria: []
  related_protocols: []
- id: urinary_genital_002
  topic_zh: 阴道出血
  topic_en: Vaginal Bleeding
  source_file: STCC/Vaginal_Bleeding.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间（如果怀孕
  - 请参见怀孕阴道出血(493)）
  - 浸透的卫生巾或棉条数量及大小
  - 用药情况
  - 既往史
  triage_levels:
    A:
      criteria:
      - 近期遭受强奸或创伤
      - 怀孕超过20周且突然出血
      - 1小时内浸透一个全尺寸卫生巾并伴有虚弱感
      - 意识水平下降
      - 皮肤苍白湿润
      - 突然出现鲜红色血液
      - 2小时以上每小时浸透两个以上卫生巾或棉条，或者6小时以上每小时浸透一个以上卫生巾或棉条
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 盆腔疼痛伴出血（不同于常规月经不适）
      - 异常大量出血
      - 绝经后突然出现出血或点滴出血（未服用安宫黄体酮[Provera]）
      - 坐起时感到头晕或轻度头昏
      - 近期流产且出血增加、疼痛加剧或发热
      action: 立即前往急诊室
    C:
      criteria:
      - 怀孕并伴有出血
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 少量出血：
      - 性交后
      - 服用避孕药前三个月内
      - 周期中期漏服避孕药
      - 绝经后使用安宫黄体酮
      - 出血持续>10天
      action: 居家观察，按家庭护理指导
  home_care:
  - 请记住，在排卵期、服用避孕药前三个月内、服用安宫黄体酮期间，或是情绪危机时出现突破性出血并不罕见。
  - 频繁更换棉条。
  - 如果使用棉条时出现发热、寒战或肌肉疼痛，请停止使用，并在症状持续或加重时通知家庭医生。
  - 如怀疑流产，请勿冲洗马桶；保留组织和血块供医生检查。
  callback_criteria:
  - 【立即急诊】剧烈疼痛影响活动能力
  - 【立即急诊】1小时内浸透一个全尺寸卫生巾并伴有虚弱感
  - 【立即急诊】意识水平下降
  - 【立即急诊】皮肤苍白湿润
  - 【立即急诊】2小时以上每小时浸透两个以上卫生巾或棉条，或者6小时以上每小时浸透一个以上卫生巾或棉条
  related_protocols: []
- id: urinary_genital_003
  topic_zh: 遗尿
  topic_en: Bed-Wetting
  source_file: STCC/Bed-Wetting.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 频率
  - 用药情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 体温 >101°F (38.3°C)
      - 排尿时疼痛或灼热感
      - 尿急或尿频
      - 腹痛或背痛
      - 尿液中有血或脓
      - 恶心或呕吐
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 遗尿变得更加频繁
      - 儿童之前已经连续数月或数年没有尿床
      - 3岁以上儿童有白天膀胱控制问题
      - 3岁以上儿童在遗尿时弄脏内裤
      - 家族中有遗尿史
      action: 立即前往急诊室
  home_care:
  - 鼓励白天多喝水，但在睡前2小时内限制饮水。
  - 不要惩罚孩子或强迫孩子夜间使用尿布。使用防水内裤和厚垫子或塑料覆盖物来保护床垫。
  - 口头表扬孩子或使用“干爽夜晚”日历或图表奖励孩子。
  callback_criteria:
  - 遗尿变得更加频繁或严重
  - 6岁以上的儿童在遵循家庭护理指导1个月后仍无改善
  - 体温 >101°F (38.3°C)
  - 尿急、尿频，或排尿时疼痛/灼热感
  - 腹痛或背痛
  - 尿液中有血或脓
  - 恶心或呕吐
  related_protocols: []
- id: urinary_genital_004
  topic_zh: 乳房问题
  topic_en: Breast Problems
  source_file: STCC/Breast_Problems.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 用药情况
  - 病史（如果正在哺乳
  - 请参阅“哺乳期问题”[93]）。
  triage_levels:
    A:
      criteria:
      - 产后期间出现寒战、发热和头痛
      - 近期乳房受到创伤或穿刺，并伴有撕裂伤或感染迹象
      - 产后期间肌肉疼痛、发热以及乳房上的红肿痛区
      - 乳头有恶臭分泌物
      - 剧烈疼痛
      - 假体乳房的穿孔和渗漏
      - 近期乳腺手术后出现寒战、发热、疼痛加剧、切口处发红、流脓或肿胀
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 有乳房红肿热痛的历史
      - 皮肤溃疡
      - 血性分泌物
      - 非妊娠女性的乳头分泌物
      - 乳房突然出现烧灼、刺痛或剧痛
      - 新纹身并伤口处疼痛，寒战，感觉不适或头痛
      action: 立即前往急诊室
    C:
      criteria:
      - 近期乳房受到创伤，并伴有疼痛、肿胀或瘀伤
      - 乳房有肿块但无其他症状
      - 肿块与月经前期无关
      - 男性乳房肿块
      - 女性最近一次乳腺检查超过1年前
      - 肿块在月经前一周出现并在经期后消失
      - 乳头凹陷或位置改变
      - 使用抗生素后乳头疼痛或类似凝乳状的分泌物
      action: 当天内联系医生/诊所
  home_care:
  - 注意感染迹象：发热；乳头或裂口处有分泌物；红、热、痛区域或红色条纹。在受影响的区域使用湿热敷10至15分钟，每天4次，直到症状消失。
  - 如果是创伤相关，请在最初的24到48小时内每2到4小时使用冰袋，之后则改为每次10至15分钟，每天4次的热敷。不要直接将冰块或热水袋放在皮肤上。应在冰袋或热源与皮肤之间放置一层布。
  - 保持乳头清洁干燥。
  - 避免穿戴刺激乳头的衣物。
  - 对于月经前期肿胀和触痛，减少摄入咸食、咖啡因、巧克力和含咖啡因饮料。
  - 遵循家庭医生关于定期自我乳房检查和乳腺X线摄影的建议。
  callback_criteria:
  - 创伤后48小时内肿块未消退
  - 状况持续或恶化
  - 感染迹象
  - 血性、绿色、棕色或黄色分泌物
  - 剧烈疼痛
  related_protocols: []
- id: urinary_genital_005
  topic_zh: 紧急避孕 (EC)
  topic_en: Contraception Emergency EC
  source_file: STCC/Contraception_Emergency_EC.md
  key_questions:
  - 姓名
  - 年龄
  - 发生时间（自上次无保护性交以来的小时数）
  - 原因
  - 正在使用的药物
  - 避孕史
  - 其他症状
  triage_levels:
    A:
      criteria:
      - 最近服用了紧急避孕药并出现过敏反应迹象（呼吸困难或吞咽困难，喉咙或舌头突然肿胀，无法说话，或胸痛）
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 阴道或肛门撕裂或出血
      - 请求进行性侵犯检查和证据收集
      - 受害者是未成年人
      action: 立即前往急诊室
    C:
      criteria:
      - 发生了性侵犯或被迫发生性行为，且请求不收集证据的医疗检查
      - 无保护性交发生在120小时内（5天），请求预防性传播疾病和怀孕
      - 请求使用铜宫内节育器作为紧急避孕措施；无保护性交发生在过去5天内
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 对紧急避孕药有疑问或担忧
      - 无保护性行为超过120小时，且对怀孕有顾虑
      - 已服用紧急避孕药，并存在副作用的担忧；或出现恶心/呕吐、腹痛、头晕、疲劳、头痛、月经变化、乳房触痛
      action: 居家观察，按家庭护理指导
  home_care:
  - 提供安慰和一般信息：
  - 紧急避孕药仅用于应急，不应作为长期避孕手段。
  - 紧急避孕药不能预防性传播疾病。
  - 紧急避孕药在第一次72小时内最有效，但可在无保护性行为后120小时内使用。（紧急避孕产品“Next Choice”需在72小时内服用[电话866-9WATSON]。“Plan B”需在120小时内服用。[1-888-not-2-late或1-668-2-5283]。）
  - 如果年龄≥16岁，可以在某些药店无需处方购买紧急避孕药（各州对年龄限制可能有所不同）。如果年龄≤16岁，则需要处方。请咨询您的药店了解任何年龄要求。
  - 关于紧急避孕的更多信息可访问 http://ec.princeton.edu 或致电 1-888-not-2-late (1-668-2-5283)。
  - 如果有怀孕的顾虑，建议进行尿液妊娠测试。大多数药房和许多有药店产品的市场都可以购买到尿液妊娠测试。
  - 为了预防恶心和呕吐，可以在第一次服用紧急避孕药前1小时服用Dramamine II或Benadryl。
  - 提供安慰；通常恶心很快就会过去。
  - 如果在服用紧急避孕药后1小时内出现呕吐，应重复剂量，并与抗恶心药物一起服用。
  - 如果在服用紧急避孕药24小时后仍有持续的副作用如恶心/呕吐、腹痛、头晕、疲劳或乳房触痛，请联系PCP。
  - 如果在无保护性行为后120小时内服用了紧急避孕药，并且21天内没有月经，应进行尿液妊娠测试。如果是阳性结果，请与PCP跟进。如果是阴性结果，再等待7天。如果没有月经发生，再进行一次尿液妊娠测试，并将结果告知PCP。
  callback_criteria:
  - 持续超过24小时的恶心/呕吐、腹痛、头晕、疲劳或乳房触痛
  - 伴随或不伴随发热的阴道出血
  - 突然大量出汗
  - 意识水平下降
  related_protocols:
  - 血液/体液暴露
  - 家庭暴力
  - 直肠
  - 阴道
  - 性侵犯
  - 阴道出血
  - 阴道分泌物/疼痛/瘙痒
- id: urinary_genital_006
  topic_zh: 阴道异物
  topic_en: Foreign Body Vagina
  source_file: STCC/Foreign_Body_Vagina.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 异物
  - 过敏史
  - 用药情况
  - 既往病史
  - 疼痛评分
  triage_levels:
    A:
      criteria:
      - 阴道内嵌有锐利物体
      - 大量出血
      - 剧烈疼痛
      - 性行为侵犯
      - 突然发作：皮疹、发热、手或脚脱皮、全身不适感、呕吐或腹泻
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 多次尝试后仍无法取出异物
      - 水肿和触痛
      - 异味分泌物
      - 阴道内放置的卫生棉条超过24小时且无法取出
      - 无法取出避孕或娱乐设备
      action: 立即前往急诊室
  home_care:
  - 不要尝试移除阴道内的锐利物体或已经断裂的物体。
  - 按照常规服用止痛药（阿司匹林、对乙酰氨基酚、布洛芬）。不要给儿童服用阿司匹林。10岁以下避免使用类似阿司匹林的产品。肝病患者避免使用对乙酰氨基酚。肾病或胃部问题存在，或怀孕时避免使用布洛芬。请按照标签指示服用。
  - 注意感染的迹象：疼痛加剧、分泌物增多、发热或肿胀。
  callback_criteria:
  - 多次尝试后仍无法取出异物
  - 水肿和触痛持续或加重
  - 异味排泄物或发热
  - 皮疹、发热、手或脚脱皮、全身不适感、呕吐或腹泻
  - 【立即急诊】大量出血
  - 【立即急诊】剧烈疼痛
  related_protocols:
  - 家庭暴力
  - 老年人虐待
  - 穿刺问题
  - 性侵犯
  - 阴道出血
  - 阴道分泌物/疼痛/瘙痒
- id: urinary_genital_007
  topic_zh: 生殖器病变
  topic_en: Genital Lesions
  source_file: STCC/Genital_Lesions.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 过敏史
  - 用药情况
  - 病史
  - 疼痛评分
  triage_levels:
    A:
      criteria:
      - 剧烈疼痛
      - 感染迹象：疼痛加剧、红肿、流脓、发热、温暖感
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 开放性疮口
      - 新出现的散在簇状水泡
      - 发烧和全身不适
      - 腹股沟淋巴结肿大
      - 阴道或阴茎分泌物或出血
      - 剧烈瘙痒或烧灼感
      - 身体其他部位有疮口
      - 盆腔疼痛
      - 阴道开口处的痛性肿块
      - 治疗酵母菌感染超过3天后无改善
      action: 立即前往急诊室
    C:
      criteria:
      - 确诊患有生殖器疱疹、尖锐湿疣或有STD暴露史并要求治疗
      - 排尿或排便时疼痛
      - 生殖器或肛门区域出现持续超过24小时的无痛性皮疹或硬结
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 发痒的红色皮疹
      - 近期剧烈活动后出汗的历史
      - 大腿内侧、腹股沟或阴囊出现红斑、鳞屑和瘙痒
      - 凸起的红色、触痛或白色/硬结
      - 持续时间小于24小时的无痛性皮疹或肿物
      action: 居家观察，按家庭护理指导
  home_care:
  - 用温水泡澡。
  - 避免使用泡沫浴、刺激性强的或有香味的肥皂、带香味的卫生纸或个人清洁用品。
  - 在症状消退前避免性活动。
  - 保持患处干净干燥。
  - 穿棉质内衣和宽松衣物。避免紧身服装。
  - 尝试使用非处方药膏（如Lotrimin）治疗瘙痒皮疹，遵循标签上的指示。
  - 如果怀疑有虱子，请根据阴毛上出现的小昆虫或虫卵的情况参考虱子协议。
  - 如果来电者怀疑自己患有性传播疾病，建议联系当地公共卫生部门或诊所。
