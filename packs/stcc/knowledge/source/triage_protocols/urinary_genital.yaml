- id: urinary_genital_009
  topic_zh: 尿失禁
  topic_en: Incontinence Urine
  source_file: STCC/Incontinence_Urine.md
  key_questions:
  - 姓名
  - 年龄
  - 起病时间
  - 用药情况
  - 既往史
  triage_levels:
    A:
      criteria:
      - 近期有背部受伤或腿部无力的历史
      - 突然无法控制排尿
      - 癫痫发作后的昏厥或失去意识
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 泌尿系统感染的迹象：疼痛性排尿、频尿或急迫感
      action: 立即前往急诊室
    C:
      criteria:
      - 咳嗽、打喷嚏、举重、用力、笑或跑步时尿液泄漏
      - 生殖器有沉重感
      - 突然产生排尿的冲动且在到达厕所前无法控制尿液
      - 开始排尿困难
      - 无法再忍受这个问题
      action: 当天内联系医生/诊所
  home_care:
  - 练习加强和支持膀胱及生殖器官的肌肉。
  - 尝试在排尿中途收紧肌肉以停止尿流。持续计数到六，然后释放尿液再计数到六。停止并保持尿流计数到六，释放剩余尿液。
  - 每天多次坐着、站着或走路时练习控制尿液和肛门周围肌肉的收缩和放松。
  - 多喝水，包括蔓越莓汁，以帮助预防泌尿系统感染。
  - 使用护垫或吸水内裤。
  - 观察失禁的发生频率。避免可能引起或加重失禁的药物、食物或饮料（如咖啡因或酒精）。
  callback_criteria: []
  related_protocols:
  - 床上遗尿
  - 妊娠相关问题
  - 癫痫发作
  - 热性惊厥
  - 疑似中风
  - 导尿管/肾造瘘管问题
  - 排尿困难
  - 多尿
  - 疼痛性排尿
- id: urinary_genital_010
  topic_zh: 月经问题
  topic_en: Menstrual Problems
  source_file: STCC/Menstrual_Problems.md
  key_questions:
  - 姓名
  - 年龄
  - 起病时间
  - 过敏史
  - 普罗维拉注射史
  - 用药情况
  - 既往史
  triage_levels:
    A:
      criteria:
      - 持续严重出血，每小时需使用超过一片全尺寸卫生巾或棉条达8小时之久
      - 排出大的血块或组织，并且不同于往常的月经周期
      - 剧烈疼痛及可能怀孕
      - 有性行为史，末次月经6至8周前，伴有腹痛、肩痛或阴道出血
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 异常严重的疼痛且无怀孕可能性
      - 不明原因发热（体温>100°F 或 37.8°C）并伴有腹痛
      - 坐起或站立时出现晕厥或头晕
      - 使用棉条后突然高热、类似晒伤的皮疹、全身不适、头晕、呕吐、水样腹泻、心跳加快或头痛
      action: 立即前往急诊室
    C:
      criteria:
      - 痉挛影响了学校学习、工作或日常活动
      - 持续性阴道分泌物
      - 持续性阴道出血超过10天或自上次月经后不到21天
      - 可能怀孕并伴有出血但无疼痛
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 出血停止后仍持续疼痛
      - 月经推迟且有压力增加、剧烈活动、显著体重减轻、近期患病、停用避孕药或年龄大于40岁的历史
      - 周期中期轻微出血或腹部不适
      - 经前易怒、腹胀、头痛或乳房触痛
      - 绝经后出现阴道出血
      - 服用避孕药期间出现突破性出血
      - 月经不规律
      - 性交后出血
      action: 居家观察，按家庭护理指导
  home_care:
  - 使用常规止痛药物（阿司匹林、对乙酰氨基酚、布洛芬、萘普生）。怀孕时避免使用阿司匹林和布洛芬。不要给儿童服用阿司匹林。20岁以下者避免使用类似阿司匹林的产品。肝病患者避免使用对乙酰氨基酚。肾病或胃部问题的患者避免使用布洛芬。按照标签上的说明用药。
  - 将热水袋或暖水瓶放在腹部持续20至30分钟，以缓解腹痛，或者洗个温水澡。不要在热水袋上睡着。
  - 频繁更换棉条，至少每4小时一次。夜间使用卫生巾。如果生殖器附近有皮肤感染，请避免使用棉条。
  - 如果月经超过两周未来，早晨第一次尿液样本用家用怀孕测试棒检测。
  - 对于经前症状，减少盐、咖啡因和糖的摄入，并在月经前来临之前减少酒精和香烟的使用。
  - 增加运动量以帮助减轻痉挛和经前症状。
  callback_criteria:
  - 3天内无改善或病情恶化
  - 月经痛影响了学校学习、工作或日常活动
  - 坐起或站立时出现晕厥或头晕
  - 不明原因发热并伴有腹痛
  - 【立即急诊】持续严重出血，每小时需使用超过一片全尺寸卫生巾或棉条达8小时之久
  - 【立即急诊】排出血块或组织
  related_protocols:
  - 性传播疾病
  - 阴道出血
  - 阴道分泌物/疼痛/瘙痒
- id: urinary_genital_011
  topic_zh: 阴囊问题
  topic_en: Scrotal Problems
  source_file: STCC/Scrotal_Problems.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 过敏史
  - 用药情况
  - 病史
  - 疼痛程度
  triage_levels:
    A:
      criteria:
      - 48小时内生殖器受伤
      - 无已知伤害，突然发作的疼痛、肿胀、发热、恶心、呕吐
      - 阴囊变黑、蓝色或鲜红色
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 48小时前生殖器受伤伴有疼痛和肿胀
      - 逐渐出现的疼痛、发热或肿胀
      - 一侧睾丸增大
      - 无法减少阴囊肿胀，婴儿伴有发热、呕吐和烦躁的情况
      action: 立即前往急诊室
    C:
      criteria:
      - 无痛性肿块或肿胀
      - 阴囊上的溃疡或疼痛的红色皮疹
      - 感染迹象：疼痛、肿胀、红斑、发热、红线或分泌物
      - 阴囊瘙痒、红斑、肿胀或不适
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 无痛性皮疹<24小时
      action: 居家观察，按家庭护理指导
  home_care:
  - 在等待就诊期间，用卷起的毛巾支撑阴囊，对患处敷冰袋，并穿戴支持器。不要将冰直接敷在皮肤上；在冰和皮肤之间使用湿布或其他织物屏障。
  - 对于不适感可服用常规止痛药（阿司匹林、对乙酰氨基酚、布洛芬）。不要给儿童服用阿司匹林。如果年龄<20岁，避免使用类似阿司匹林的产品。如果有肝病，避免使用对乙酰氨基酚。如果有肾病或胃部问题，或者怀孕的情况下，避免使用布洛芬。请按照标签上的说明使用。
  callback_criteria:
  - 任何肿块
  - 48小时后无改善或病情恶化
  - 感染迹象：疼痛、肿胀、红斑、发热、红线或分泌物
  - 持续>2周的疼痛
  - 排尿时疼痛
  - 【立即急诊】睾丸变黑、蓝色或鲜红色
  related_protocols:
  - 生殖器病变
  - 男性生殖器问题
  - 穿刺问题
  - 性传播疾病
  - 排尿痛
- id: urinary_genital_012
  topic_zh: 性传播疾病 (STD)
  topic_en: Sexually Transmitted Disease STD
  source_file: STCC/Sexually_Transmitted_Disease_STD.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 疑似性病
  - 已知或可疑的性病暴露史
  - 用药史
  triage_levels:
    A:
      criteria:
      - 遭受性侵犯
      - 与已知HIV携带者的无保护性行为
      - 与疑似HIV携带者的无保护肛交、口交或阴道性交
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 已知或怀疑有性病暴露史
      - 阴道或阴茎分泌物
      - 阴道、阴茎或会阴部病变
      - 盆腔疼痛（伴或不伴有发热）
      action: 立即前往急诊室
    C:
      criteria:
      - 可能的阴道念珠菌感染
      - 已知生殖器疱疹
      action: 当天内联系医生/诊所
  home_care:
  - 温水浴可缓解疱疹的不适，但不能治愈。在有开放性溃疡时避免性行为。始终使用乳胶避孕套。
  - 如果与多个伴侣发生无保护措施的性行为或与已知或疑似HIV感染者发生性行为，请立即进行HIV感染实验室测试，并在初次暴露后的3个月和6个月再次检测。为防止自己和其他人被感染，应使用避孕套或避免性行为。联系家庭医生或卫生部门诊所以获取检测服务。接触后可能有即时的医疗治疗。
  - 双方都应接受性病检测并接受治疗，且应避免无保护措施的性接触。
  - 在进行亲密性行为前，与新伴侣讨论性病和HIV暴露史。
  - 使用乳胶避孕套（除非对乳胶过敏）。
  callback_criteria:
  - 有感染HIV的风险且持续疾病、疲劳、体重下降、腹泻、淋巴结肿大、溃疡、干咳或夜间盗汗
  - 怀疑暴露于性病
  - 异常的阴道或阴茎分泌物、生殖器病变或生殖器疼痛
  - 已知生殖器疱疹且无法忍受持续不适
  - 盆腔疼痛（伴或不伴有发热）
  - 【立即急诊】高烧并已知带状疱疹发作
  - 【立即急诊】新发混乱或谵妄
  - 【立即急诊】眼睛周围或内部的疼痛、红肿或皮疹
  related_protocols: []
- id: urinary_genital_013
  topic_zh: 尿管/肾造口管问题
  topic_en: Urinary CatheterNephrostomy Tube Problems
  source_file: STCC/Urinary_CatheterNephrostomy_Tube_Problems.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 尿路装置类型
  - 在位时间长度
  - 外科医生或泌尿科医生的姓名
  - 药物使用史
  - 病史
  triage_levels:
    A:
      criteria:
      - 剧烈疼痛
      - 严重出血
      - 尿管在位超过8小时无尿液流出
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 尿管4小时内无排液且家庭护理措施无效
      - 正在服用抗凝药物，且尿液呈粉红色或红色
      - 最近进行过泌尿系统手术，出现异常疼痛
      - 体温>100.4°F (38°C)
      - 外科放置的导管或管道脱落
      - 尿液中大量血液
      - 持续性背部、下腹部或侧腰部疼痛
      action: 立即前往急诊室
    C:
      criteria:
      - 装置插入点周围皮肤或会阴区红肿疼痛
      - 浑浊或恶臭的尿液
      - 导管在位但无尿液流出
      - 尿液从器械周围渗漏
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 导管或管道渗漏
      - 轻微不适
      action: 居家观察，按家庭护理指导
  home_care:
  - 检查导管是否有扭结。
  - 确保集尿袋位置低于骨盆。
  - 确保患者未压在导管上，且导管已正确放置。
  - 检查并固定所有连接处。
  - 确保肾造口（如果存在）的旋塞处于正确位置。
  - 改变患者的体位。
  - 用肥皂和水清洁导管，然后推进1/2英寸或旋转90°。
  - 如个体已经接受了灌洗程序的指导，则可以进行导管灌洗。
  - 除非限制液体摄入量，否则每天至少喝8到10杯水。
  - 如果家庭护理措施后无改善，请回电。
  - 保持生殖器区域和导管清洁。女性患者应从插入部位前方开始清洗，并用肥皂清洗，再用温水冲洗。
  callback_criteria: []
  related_protocols:
  - 脱水
  - 排尿困难
  - 过多
  - 疼痛
  - 尿液颜色异常
  - 伤口愈合和感染
- id: urinary_genital_014
  topic_zh: 排尿困难
  topic_en: Urination Difficult
  source_file: STCC/Urination_Difficult.md
  key_questions:
  - 姓名
  - 年龄
  - 起病时间
  - 原因
  - 用药史
  - 既往史
  - 疼痛评分
  triage_levels:
    A:
      criteria:
      - 严重的腹痛且超过8小时无法排尿
      - 已放置导管但超过8小时无尿流
      - 严重的腹痛且体温>102°F (39°C)
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 膀胱充盈且超过4小时无法排尿
      - 持续的腰部或下腹部疼痛
      - 有肾病或前列腺炎史
      - 近期进行过泌尿系统或腹部手术
      - 尿液中有大量血液
      - 近期受到创伤
      - 已放置导管但超过4小时无尿流
      - 近期背部受伤
      action: 立即前往急诊室
    C:
      criteria:
      - 恶心、呕吐、腹泻
      - 生殖器疱疹
      - 会阴区疼痛、红肿、刺激
      - 性活动后排尿困难
      - 液体摄入减少，出汗过多，尿液颜色深黄或橙色
      - 轻微不适
      - 新发失禁
      - 体温>102°F (39°C)
      - 排尿启动困难
      action: 当天内联系医生/诊所
  home_care:
  - 每天至少喝六到八盎司的水（除非医生要求限制液体摄入）。
  - 避免摄入咖啡因和酒精。
  - 对于尿潴留问题，尝试在温水中排尿。
  - 对于生殖器疱疹，在会阴区应用冷敷。
  - 对于排尿启动困难，打开水龙头（流水声可以帮助刺激排尿），并在坐在马桶上时将温水倒在会阴部。
  callback_criteria:
  - 严重的腰部或腹部疼痛
  - 持续超过12小时无法排空膀胱
  - 脱水迹象：眼窝凹陷，皮肤弹性下降，极度口渴，口腔或黏膜干燥，婴儿哭泣无泪
  - 严重恶心、呕吐或腹泻
  - 尿液中有血液
  - 【立即急诊】严重的腹痛且超过8小时无法排尿，或体温>102°F (39°C)
  - 【立即急诊】已放置导管但超过8小时无尿流
  related_protocols:
  - 腹痛成人
  - 腹痛儿童
  - 生殖器病变
  - 导尿管/肾造瘘管问题
  - 排尿疼痛
  - 尿液颜色异常
- id: urinary_genital_015
  topic_zh: 尿频
  topic_en: Urination Excessive
  source_file: STCC/Urination_Excessive.md
  key_questions:
  - 姓名
  - 年龄
  - 起病时间
  - 原因
  - 用药情况
  - 既往史
  triage_levels:
    A:
      criteria:
      - 糖尿病
      - 儿童、老年人或免疫抑制成人脱水迹象：
      - 眼睛凹陷
      - 皮肤松弛干燥，捏起后不能迅速恢复原状
      - 极度口渴、口腔干燥或黏膜干燥
      - 哭泣无泪
      - 极度口渴
      - 乳腺癌、肺癌或多发性骨髓瘤病史
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 肾脏疾病史
      - 腰痛或背痛
      - 甲状旁腺肿瘤或疾病史
      - 肌肉抽筋或无力
      - 正常健康成人脱水迹象
      action: 立即前往急诊室
    C:
      criteria:
      - 利尿剂治疗近期有变化
      - 增加液体摄入，特别是茶、咖啡、酒精
      - 压力增大
      - 服用利尿药物（处方药、非处方药或草药）
      action: 当天内联系医生/诊所
  home_care:
  - 观察是否有脱水迹象。
  - 饮用不含咖啡因的运动饮料或碳酸饮料。
  - 如果无其他身体症状，注意病情是否恶化或出现新症状。
  - 如为糖尿病患者，请密切监测血糖水平。
  callback_criteria:
  - 3天内无改善或情况恶化
  - 持续发热且对退热措施无反应
  - 呕吐、腹泻、疲劳、嗜睡或颈部僵硬
  - 发热或肿胀
  related_protocols:
  - 成人
  - 儿童
  - 背痛
  - 脱水
  - 糖尿病相关问题
  - 尿失禁
- id: urinary_genital_016
  topic_zh: 尿液，颜色异常
  topic_en: Urine Abnormal Color
  source_file: STCC/Urine_Abnormal_Color.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 用药情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 粉色、红色或烟棕色尿液，且近期有背部或腹部创伤或剧烈疼痛
      - 发热和腰部或背部疼痛
      - 存在泌尿支架且伴有剧烈疼痛或大量鲜红血液
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 近期出现深棕色尿液、大便颜色浅白，以及皮肤和眼睛发黄
      - 尿中带血，无论有无疼痛
      action: 立即前往急诊室
    C:
      criteria:
      - 深黄色或橙色尿液，并且存在以下一种或多种症状：
      - 暴露于炎热气候
      - 减少液体摄入量
      - 尿量减少
      - 使用可导致尿液颜色变化的药物：苯唑西平盐酸盐（Pyridium）、苯妥英钠（Dilantin）、酚酞、甲硝唑（Flagyl）或呋喃妥因（Furadantin）
      - 近期摄入过红菜头、甜菜、黑莓或其他红色食物
      - 新的处方药
      action: 当天内联系医生/诊所
  home_care:
  - 增加液体摄入量。
  - 避免可能引起尿色变化的食物（红菜头、甜菜、黑莓或其他红色食物），并观察尿色是否有变化。尿色应在24小时内恢复到正常颜色。
  - 如果目前正在服用苯唑西平盐酸盐（Pyridium）治疗泌尿道感染，预计尿液会呈现红色或橙色。
  - 蓝色或绿色尿液通常与食物或药物摄入有关。
  callback_criteria:
  - 【立即急诊】创伤性撞击背部、侧部或腹部，或跌倒或事故后的肉眼可见的血尿并伴有腹痛加剧
  related_protocols: []
- id: urinary_genital_017
  topic_zh: 阴道分泌物/疼痛/瘙痒
  topic_en: Vaginal DischargePainItching
  source_file: STCC/Vaginal_DischargePainItching.md
  key_questions:
  - 姓名
  - 年龄
  - 起始时间
  - 过敏史
  - 用药情况
  - 病史
  - 疼痛程度
  triage_levels:
    A:
      criteria:
      - 严重的盆腔疼痛影响活动
      - 体温 >102.0°F (38.9°C)，疼痛加重、寒战、颤抖或呕吐
      - 有难闻的阴道分泌物，伴有疼痛或瘙痒，并且有近期创伤、强奸、手术、怀孕或流产的历史
      - 末次月经超过6周前，腹痛，怀疑怀孕
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 瘙痒影响活动
      - 体温 >100.0°F (37.8°C)
      - 有恶臭且分泌物量大
      - 绿色、棕色或类似白豆渣的白色分泌物
      - 接触过性病或其他性传播疾病并要求检查
      - 外阴或阴道疼痛溃疡或刺激感
      - 一侧卵巢切除史，生育年龄
      - 无法取出的卫生棉条在体内
      action: 立即前往急诊室
    C:
      criteria:
      - 频繁使用有香味的女性卫生产品
      - 性交时或之后疼痛
      - 末次Papanicolaou涂片检查超过1年前
      - 少量透明、白色或黄色分泌物
      - 近期长时间的性活动
      - 担心可能患有性传播疾病但无已知接触史
      - 外阴或阴道出现无痛溃疡
      - 使用抗生素期间症状开始
      - 接触化学物质或泡泡浴
      action: 当天内联系医生/诊所
  home_care:
  - 注意分泌物与平时的不同，并了解可能需要进一步的检查。
  - 浸泡在温水中（避免使用有香味的泡泡浴）。
  - 穿宽松的内衣和衣物。
  - 穿着带有棉质衬里的内裤。
  - 避免使用有香味的女性卫生产品、卫生棉条、卫生巾和厕纸。
  - 将克霉唑（Gyne-Lotrimin）膏涂抹于患处。请药剂师推荐其他非处方产品。
  - 将冷敷布贴于患处。
  - 在服用抗生素期间，每天吃酸奶以帮助预防感染。
  - 经常清洁该区域。
  - 通知伴侣感染情况及治疗需求。
  - 性生活时使用避孕套以防止交叉感染。
  - 腹部不适时可使用热水袋。
  - 症状存在或未由家庭医生检查前避免性生活。
  callback_criteria:
  - 体温 >102.0°F (38.9°C)，颤抖，寒战，呕吐，或疼痛加剧
  - 症状持续 >3 天
  - 有恶臭且分泌物量大
  related_protocols:
  - 生殖器病变
  - 月经问题
  - 性传播疾病
  - 阴道出血
