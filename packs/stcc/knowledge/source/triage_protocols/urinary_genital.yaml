- id: urinary_genital_008
  topic_zh: 男性生殖器问题
  topic_en: Genital Problems Male
  source_file: STCC/Genital_Problems_Male.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 用药情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 使用冰袋冷敷30分钟后仍然持续勃起疼痛
      - 剧烈疼痛或肿胀
      - 阴茎受到创伤伴有变形或出血
      - 阴茎内有异物
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 无法将包皮拉回到阴茎头部
      - 无法排尿
      - 排尿时疼痛
      - 腰部疼痛
      - 排尿后腹股沟疼痛且体温>100°F（37.8°C）
      - 阴囊或睾丸肿胀或疼痛
      action: 立即前往急诊室
    C:
      criteria:
      - 持续的阴茎肿胀、硬块或溃疡
      - 已知或怀疑接触过性传播疾病
      - 疼痛性皮疹或溃疡
      - 超过24小时的阴茎分泌物
      - 阴茎头部红肿
      - 尿中带血
      - 精液中带血
      - 阴茎上有水疱状皮疹
      - 包皮肿胀
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 性交时或性交后疼痛
      - 勃起困难或维持勃起困难，且有糖尿病病史或正在服用抗抑郁药、抗焦虑药物、降压药或利尿剂
      - 丧失性欲
      - 阴茎被拉链夹住
      - 婴儿阴茎肿胀和割伤
      - 超过24小时的无痛皮疹或生长物
      action: 居家观察，按家庭护理指导
  home_care:
  - 如果性交时疼痛，可以考虑使用非处方润滑剂（如K-Y润滑剂）。不要使用凡士林。
  - 如果性交后阴茎头部疼痛，探索可能的原因，比如对避孕霜或避孕套的过敏，并改用替代方法。
  - 如果因摩擦尿布导致阴茎头红肿，在给婴儿换尿布时将阴茎向下压。
  - 如果客户有性功能障碍问题且正在服用处方药、患有糖尿病或情绪问题，应与家庭医生讨论。
  - 释放被拉链夹住的阴茎：
  - 剪掉拉链底部并拉开两边
  - 在阴茎和拉链轨道上涂抹凡士林，并朝最初引起问题的方向拉动拉链
  - 如果无法释放阴茎，请立即寻求医疗帮助
  - 查看是否有头发缠绕在婴儿阴茎上，将其剪断以减轻压力。肿胀应会消退。如果无法移除头发或肿胀持续存在，应立即寻求医疗帮助。
  - 如果有性传播疾病的嫌疑，伴侣也应接受治疗。双方完成服用处方药前应使用避孕套。
  callback_criteria:
  - 【立即急诊】持续勃起疼痛
  - 【立即急诊】剧烈疼痛或肿胀
  - 【立即急诊】无法排尿
