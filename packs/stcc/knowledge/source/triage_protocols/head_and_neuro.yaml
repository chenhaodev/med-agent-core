- id: head_and_neuro_014
  topic_zh: 瑞氏综合征，疑似
  topic_en: Reye Syndrome Suspected
  source_file: STCC/Reye_Syndrome_Suspected.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 用药情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 最近有病毒性疾病史，如水痘、流感或其他呼吸道疾病
      - 在疾病期间服用阿司匹林，并且在病毒感染后不久出现以下任何症状：
      - 头痛、协调障碍、言语不清、意识混乱、倦怠、性格变化
      - 肢体无力
      - 听力下降或复视
      action: 立即呼叫救护车（120）
    B:
      criteria: []
      action: 立即前往急诊室
  home_care:
  - 通常不建议给儿童或青少年使用阿司匹林，因为症状往往在病毒感染后的几天才出现。对于发热和不适可服用对乙酰氨基酚。
  - 如果孩子在病毒性疾病期间或之前立即服用了阿司匹林，请密切观察是否有瑞氏综合征的症状，并报告给您的PCP。这些症状通常出现在病毒性疾病的急性期之后，可能迅速进展。包括以下症状：
  - 头痛、协调障碍、言语不清、意识混乱、倦怠和性格变化
  - 肢体无力
  - 听力下降或复视
  - 疑似瑞氏综合征的症状
  callback_criteria:
  - 【立即急诊】意识混乱、倦怠和其他精神状态改变
  - 【立即急诊】头痛、协调障碍、言语不清
  - 【立即急诊】肢体无力
  - 【立即急诊】听力下降或复视
  related_protocols:
  - 水痘
  - 意识混乱
  - 充血
  - 咳嗽
  - 儿童发热
- id: head_and_neuro_015
  topic_zh: 糖尿病问题
  topic_en: Diabetes Problems
  source_file: STCC/Diabetes_Problems.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 糖尿病类型
  - 历史
  - 用药情况
  - 最近一次血糖读数
  - 已尝试的家庭护理措施
  triage_levels:
    A:
      criteria:
      - 血糖症状逐渐加重且
      - 意识水平下降或混乱，极度口渴，口腔干燥，频繁排尿，皮肤干燥发红
      - 呼吸深而急促
      - 呼出的气体有果味
      - 乏力、疲劳或困倦
      - 尿中高血糖和酮体
      - 注射胰岛素或服用口服降糖药后：
      - 乏力，皮肤苍白湿润，呼吸浅快，视力模糊或重影，大量出汗，头晕，头痛，混乱或易怒，在摄入含快速作用糖的食物15分钟后没有改善
      - 严重脱水
      - 胰岛素过量
      - 持续腹泻和急促的呼吸困难
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 血糖水平高，尿中有些酮体，但人意识清醒
      - 家庭护理措施无效的开放性或感染伤口
      - 持续呕吐超过12小时且无法保持药物摄入
      - 儿童血糖>300或成人血糖>400
      - 血糖<80且常规方法提高血糖水平无反应
      - 体温>100.4°F（38.0°C）
      action: 立即前往急诊室
    C:
      criteria:
      - 疲劳逐渐加重
      - 伴有发热和有痰咳嗽的上呼吸道感染
      - 排尿疼痛、背痛，或尿液浑浊或带血
      - 胰岛素或口服药物依从性差且感觉不适
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 正在使用胰岛素或口服降糖药，血糖为200至300
      - 呕吐或腹泻，无发热，糖尿病受控制
      - 请求饮食指导和血糖控制
      - 开始出现胰岛素反应的症状，并对摄入的糖有反应（血糖水平改善）
      - 要求补充血糖药物
      - 伤口愈合缓慢
      action: 居家观察，按家庭护理指导
  home_care:
  - 当首次出现胰岛素反应的迹象时，立即饮用橙汁或可乐，或者吸食硬糖或方糖，但前提是患者必须意识清醒。
  - 患病期间应继续使用胰岛素，除非不能进食。在生病期间定期检查血液或尿液中的葡萄糖和乙酰酮。
  - 定期锻炼。
  - 特别注意双脚的护理。避免割伤、溃疡、水泡、不合脚的鞋子或赤足行走。及时处理脚部受伤。
  - 按照医生指示服用药物。
  - 多喝水或非咖啡因、无糖饮料以预防脱水。如果低血糖问题频繁发生，随时携带快速作用糖食物。例如：食糖、果汁或普通汽水、无脂牛奶、蜂蜜或玉米糖浆、果酱、葡萄干、软糖、薄荷糖、硬糖、葡萄糖片和葡萄糖凝胶。预期在15到20分钟后血糖会上升。
  callback_criteria: []
  related_protocols: []
