- id: head_and_neuro_013
  topic_zh: 虚弱
  topic_en: Weakness
  source_file: STCC/Weakness.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 病因
  - 部位（如怀疑创伤导致的背部/颈部损伤
  - 请参见背部/颈部损伤）
  - 用药情况
  - 病史
  - 疼痛评分
  triage_levels:
    A:
      criteria: []
      action: 立即呼叫救护车（120）
    B:
      criteria: []
      action: 立即前往急诊室
    D:
      criteria:
      - 无法站立、行走或承重
      - 身体一侧突然无力
      - 面部、手臂或腿部无力
      - 视觉障碍
      - 言语和语言问题
      - 心律不齐
      - 严重头痛
      - 手或脚变冷或发蓝
      - 受影响肢体出现疼痛、肿胀、温暖或红斑
      - 剧烈疼痛影响正常活动
      - 节食或使用利尿剂的历史
      - 血栓或心脏问题历史
      - 四肢逐渐出现麻木、刺痛或烧灼感
      - 疼痛放射至手臂或腿部
      - 发热；咳嗽；绿色、黄色或棕色痰液；身体酸痛超过24小时且未见好转
      - 服用降胆固醇药物的历史
      - 近期频繁跌倒的历史
      - 活动能力逐渐下降
      - 偶尔出现无力
      - 神经系统问题历史，对药物无反应
      - 增加的运动量、活动水平或压力
      - 肌肉疼痛历史
      - 进食障碍历史
      action: 居家观察，按家庭护理指导
  home_care:
  - 休息并定时吃饭。
  - 将湿热敷料应用于疼痛肿胀区域（如果是已知损伤，在最初24小时内使用冰块）。
  - 不要直接将冰放在皮肤上；在冰和皮肤之间放置一层布料。
  - 服用您常用的止痛药（阿司匹林、对乙酰氨基酚、布洛芬）。不要给儿童服用阿司匹林。年龄<20岁者避免使用类似阿司匹林的产品。存在肝病的情况下避免使用对乙酰氨基酚。存在肾病或胃部问题，或怀孕情况下避免使用布洛芬。遵循标签上的说明。
  - 无改善或状况恶化
  callback_criteria: []
