protocols:
- id: head_and_neuro_001
  topic_zh: 头部损伤
  topic_en: Head Injury
  source_file: STCC/Head_Injury.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 过敏史
  - 受伤机制
  - 药物使用情况
  - 相关症状
  - 病史
  triage_levels:
    A:
      criteria:
      - 手臂或腿部移动困难、无力、不协调或言语不清
      - 严重颈痛
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 呼吸异常或呼吸困难
      - 意识改变、难以唤醒、混乱、激动
      - 无法控制的出血
      - 抽搐活动
      - 前语言期儿童不认识父母或看护人
      - 持续视觉障碍
      - 持续呕吐
      - 持续头痛
      - 手臂或腿部麻木或刺痛
      action: 立即前往急诊室
    C:
      criteria:
      - 鼻孔或耳朵持续流出血液或液体
      - 张口、裂开、参差不齐或深伤口
      - 耳后或眼下的瘀斑
      - 持续出血>10分钟
      - 丧失意识的历史
      - 受伤后行为改变
      - 2岁以下儿童跌落高度超过2英尺
      - 正在或最近使用抗凝药物
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 1岁以下婴儿头部有软绵绵的肿胀区域持续>12小时
      - 额头或头皮上有肿块（鹅蛋状）
      - 间歇性头痛对止痛药无反应
      action: 居家观察，按家庭护理指导
  home_care:
  - 每2小时使用冰袋或冷敷20分钟以减轻肿胀和不适。在皮肤与冰之间放置布障。
  - 允许儿童受伤后睡眠。24小时内每2小时唤醒一次，评估其警觉性和反应性。
  - 受伤后的头24小时内避免剧烈活动。在安静的环境中休息，头部略微抬高。
  - 使用对乙酰氨基酚缓解不适。不要给儿童服用阿司匹林。如果年龄<20岁，避免类似阿司匹林的产品。如果有肝病，请避免使用对乙酰氨基酚。如果有肾病、胃部问题或怀孕的情况下，避免使用布洛芬。请遵循标签上的说明。
  - 避免使用阿司匹林和布洛芬。
  - 受伤后的头24小时内避免饮酒、安眠药或镇静剂。
  - 避免大量饮食。
  callback_criteria:
  - 状况未改善或恶化
  - 持续头痛
  - 冰敷后超过24小时的持续肿胀
  - 鼻孔或耳朵流出血液或清澈液体
  - 【立即急诊】混乱、方向感丧失、激动或视力改变
  - 【立即急诊】意识改变或难以唤醒
  - 【立即急诊】手臂或腿部麻木、刺痛或无力
  - 【立即急诊】持续呕吐、严重头痛、言语问题、抽搐或嗜睡
  - 【立即急诊】儿童不认识父母或看护人
  - 【立即急诊】持续的麻木和刺痛
  related_protocols:
  - 意识改变
  - 背部/颈部损伤
  - 混乱
  - 跌倒
  - 头痛
  - 成人呕吐
  - 儿童呕吐
- id: head_and_neuro_002
  topic_zh: 头痛
  topic_en: Headache
  source_file: STCC/Headache.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 过敏史
  - 偏头痛或已知动脉瘤病史
  - 用药情况
  - 疼痛程度
  - 病史（如果近期有头部创伤或受伤
  - 请参见头部损伤协议）
  triage_levels:
    A:
      criteria:
      - 突然剧烈疼痛或“一生中最严重的头痛”
      - 突然出现的身体一侧无力、步态不稳、麻木和/或刺痛
      - 混乱、唤醒困难、行为异常
      - 突然说话困难或言语不清
      - 颈部僵硬伴发热（低头时疼痛）
      - 视力模糊或复视
      - 皮肤上有紫色或血色的平斑点或小红点
      - 糖尿病儿童血糖偏高
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 持续呕吐
      - 高血压病史和头晕
      - 体温>103°F (39.4°C)且对退烧措施无反应
      - 眼睛疼痛伴有红肿和视力下降
      - 近期被蜱虫叮咬，头痛、皮疹及流感样症状
      - 新发剧烈持久性疼痛
      - 行走能力改变
      action: 立即前往急诊室
    C:
      criteria:
      - 对常规偏头痛治疗无反应的持续偏头痛
      - 偏头痛强度或性质与以往不同
      - 头痛持续>12小时且无其他症状
      - 疼痛影响活动
      - 颞部疼痛且年龄>50岁
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 发热和喉咙痛
      - 肌肉和关节酸痛
      - 近期有压力性事件
      - 过敏史
      - 钝痛持续，颈部肌肉触痛紧绷
      - 最近停止饮用咖啡、吃巧克力或吸烟
      - 严重节食及体重减轻
      - 牙科问题
      action: 居家观察，按家庭护理指导
  home_care:
  - 每2小时在额头敷冷敷包或冰袋。
  - 在安静、昏暗的房间休息。
  - 服用常规止痛药（阿司匹林、对乙酰氨基酚、布洛芬）。不要给儿童使用阿司匹林。年龄<20岁者避免使用类似阿司匹林的产品。肝病患者避免使用对乙酰氨基酚。肾病或胃部问题存在时，或在怀孕情况下避免使用布洛芬。遵循标签上的指示。
  - 用常规的退烧措施降低体温。
  - 对于已知偏头痛：
  - 按PCP指导服用药物
  - 头部抬高休息
  - 颈部后方敷热
  - 额头敷冷敷包
  - 考虑避免巧克力、乳制品、切达干酪和蓝纹奶酪、腌制猪肉、咖啡因、谷氨酸钠（味精）等食物。
  callback_criteria: []
  related_protocols: []
- id: head_and_neuro_003
  topic_zh: 疑似中风
  topic_en: Stroke Suspected
  source_file: STCC/Stroke_Suspected.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 既往中风史
  - 充血性心力衰竭
  - 房颤
  - 冠状动脉疾病
  - 糖尿病
  - 肺栓塞
  - 深静脉血栓形成
  - 相关症状
  - 用药情况
  - 疼痛评分
  - 心脏植入装置
  triage_levels:
    A:
      criteria:
      - 突然一侧面部下垂，微笑偏斜，伸出舌头时偏向一边
      - 突然手臂或腿无力或麻木；如果要求其举起双臂，一只会掉下来
      - 言语不清或难以理解
      - 突然变得混乱或迷失方向
      - 突然头痛剧烈
      - 突然从一只眼或双眼看东西困难或出现不自主的眼球运动
      - 突然吞咽困难
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 突然感到头晕或轻飘飘的
      - 突然平衡或协调能力受损，或行走困难
      - 突然失去记忆
      - 突然肌肉僵硬或身体某部分感觉丧失
      - 突然眼球不自主运动或从一只眼或双眼看东西困难
      - 突然行为改变
      - 心跳加速或心律不齐伴有头晕或轻飘飘的感
      - 过去24小时内滥用娱乐性毒品或处方药
      action: 立即前往急诊室
    C:
      criteria:
      - 无明显改善或状况恶化
      - 没有改善或病情加重
      - 突然一侧面部下垂，微笑偏斜，伸出舌头时偏向一边
      - 突然手臂或腿无力或麻木；如果要求其举起双臂，一只会掉下来
      - 言语不清或难以理解
      - 突然变得混乱或迷失方向
      - 突然感到头晕或轻飘飘的
      - 突然平衡或协调能力受损，或行走困难
      - 突然头痛剧烈
      - 突然吞咽困难
      - 突然失去记忆
      - 突然肌肉僵硬或身体某部分感觉丧失
      - 突然眼球不自主运动或从一只眼或双眼看东西困难
      - 突然行为改变
      - 心跳加速或心律不齐伴有头晕或轻飘飘的感觉
      - 过去24小时内滥用娱乐性毒品或处方药
      action: 当天内联系医生/诊所
  home_care: []
  callback_criteria: []
  related_protocols:
  - 酒精问题
  - 过敏反应
  - 精神状态改变
  - 糖尿病问题
  - 头晕
  - 头痛
  - 心率问题
  - 高血压
  - 神经系统症状
  - 癫痫发作
  - 言语困难
  - 无力
- id: head_and_neuro_004
  topic_zh: 意识状态改变 (AMS)
  topic_en: Altered Mental Status AMS
  source_file: STCC/Altered_Mental_Status_AMS.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 已知原因
  - 用药情况
  - 既往病史
  triage_levels:
    A:
      criteria:
      - 无意识，停止呼吸
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 当天多次失去意识
      - 拨打时无法唤醒
      - 药物/酒精过量
      - 呼吸困难
      - AMS伴有以下任一症状：
      - 剧烈头痛
      - 胸痛/不适
      - 心跳加快
      - 糖尿病且对家庭护理措施无反应
      - 怀孕，阴道出血或腹痛
      - 严重腹痛
      - 坐立不安时疼痛加剧
      - 发热儿童出现身体僵硬或松弛
      - 持续的AMS
      - 嗜睡且难以唤醒
      action: 立即前往急诊室
    C:
      criteria:
      - 头痛、发热或颈部僵硬疼痛
      - 近期头部受伤或创伤
      - 新出现癫痫发作或长时间的发作后状态
      - 持续高热
      - 新出现听觉（如听到声音、嗡嗡声、咔嚓声）、感觉（如虫爬）或视觉幻觉或妄想
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 短暂的失去意识发作
      action: 居家观察，按家庭护理指导
  home_care:
  - 保持患者安全平躺直至完全清醒和有反应。
  - 若呕吐，将患者侧卧。
  - 不要让患者无人看管。
  - 如果糖尿病患者突然出现意识水平变化，立即给予糖分来源，但前提是患者足够清醒能够进食或饮水。快速作用的糖分来源包括橙汁或其他果汁、调味饮料（如酷爱）、常规可乐、糖果（如救生圈或软糖）或一茶匙糖或果酱。
  - 如果事件与酒精或药物有关，请参阅酒精问题协议（22）和物质滥用、使用或暴露协议（581）。寻求未来帮助，联系当地资源：咨询、解毒计划、住院/门诊治疗计划、AA或Al-Anon。
  callback_criteria: []
  related_protocols:
  - 酒精问题
  - 呼吸困难
  - 胸痛
  - 意识模糊
  - 脱水
  - 糖尿病问题
  - 头晕
  - 昏厥
  - 成人发热
  - 儿童发热
  - 头痛
  - 心率问题
  - 癫痫发作
  - 热性惊厥
  - 疑似中风
  - 使用或暴露
  - 排尿困难
- id: head_and_neuro_005
  topic_zh: 混乱
  topic_en: Confusion
  source_file: STCC/Confusion.md
  key_questions:
  - 姓名
  - 年龄
  - 起始时间
  - 原因
  - 用药
  - 病史
  - 疼痛评分
  triage_levels:
    A:
      criteria:
      - 近期有头部受伤史
      - 接触化学品或药物摄入
      - 糖尿病
      - 中风、高血压或心脏病史
      - 对姓名、日期、地点或情境定向障碍
      - 呼吸带有果味
      - 皮肤潮红或干燥
      - 严重呕吐
      - 体温 >102°F (38.9°C)
      - 颈部僵硬，剧烈头痛，强直
      - 身体一侧突然无力
      - 微笑时面部一侧下垂
      - 说话困难
      - 视力突然改变
      - 苍白、出汗、头晕或虚弱
      - 病儿行为突然变化；好斗，不合作，言语无意义
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 新发的幻觉或偏执症
      - 有药物或酒精滥用史
      - 儿童、老年人或免疫功能低下者体温 >101°F (38.3°C)
      - 癫痫发作病史
      action: 立即前往急诊室
    C:
      criteria:
      - 正在服用已知可引起混乱的药物
      - 最近开始使用新药
      - 体温 >101°F (38.3°C)
      - 有痴呆或慢性脑综合征病史且精神状态改变
      - 最近突然停止使用（非处方药或处方药）、酒精或咖啡因
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 有痴呆或慢性脑综合征病史且无状态变化
      action: 居家观察，按家庭护理指导
  home_care:
  - 如果正在服用可能导致谵妄的药物（如抗组胺药、颠茄碱、生物碱），请停止使用，并在1小时内如果没有改善，请回拨或联系家庭医生。
  - 让患者在一个光线充足、熟悉的环境中舒适地休息，旁边有人陪伴。
  - 给予常规退烧药（如对乙酰氨基酚）。用温水浴降低体温。不要给儿童服用阿司匹林。20岁以下者避免使用类似阿司匹林的产品。肝病存在时避免使用对乙酰氨基酚。肾病、胃部问题或怀孕的情况下避免使用布洛芬。请按照标签上的说明使用。
  callback_criteria:
  - 持续超过1小时的混乱状态
  - 退烧后仍持续混乱
  - 谵妄缓解后仍有其他症状存在
  - 【立即急诊】剧烈头痛或颈部僵硬或强直
  - 【立即急诊】身体一侧突然无力
  - 【立即急诊】说话困难
  - 【立即急诊】面色苍白、出汗、头晕或虚弱
  - 【立即急诊】出现幻觉、偏执或自杀威胁或企图
  - 【立即急诊】病儿行为突然变化
  - 【立即急诊】严重呕吐
  - 【立即急诊】呼吸带有果味
  - 【立即急诊】皮肤潮红或干燥
  related_protocols:
  - 酒精问题
  - 意识状态改变
  - 成人发热
  - 儿童发热
  - 头痛
  - 癫痫发作
  - 热性惊厥
  - 使用或暴露
- id: head_and_neuro_006
  topic_zh: 发作
  topic_en: Seizure
  source_file: STCC/Seizure.md
  key_questions:
  - 姓名
  - 年龄
  - 发作时间
  - 既往发作史
  - 过敏史
  - 用药史
  - 病史
  triage_levels:
    A:
      criteria:
      - 多次发作
      - 呼吸困难
      - 发作持续>5分钟
      - 严重头痛
      - 持续异常嗜睡
      - 近期头部受伤史
      - 近期药物摄入史
      - 首次发作
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 发作期间受伤
      - 有习惯性大量饮酒或用药史，且最近戒酒或停药
      - 在服用抗癫痫药物的情况下仍频繁发作
      action: 立即前往急诊室
    C:
      criteria:
      - 停止服用抗癫痫药物
      - 有糖尿病、脑血管意外、癌症、心血管疾病或神经肌肉疾病的病史
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 有发作史，且从发作中苏醒后神志清醒
      action: 居家观察，按家庭护理指导
  home_care:
  - 将患者侧卧或俯卧，头偏向一侧以防分泌物或呕吐物导致窒息。
  - 如呼吸有杂音，向前拉下巴和下颌。不要将手指、药物或其他物体放入抽搐者的口中。
  - 松开领带或其他紧身衣物。
  - 将发作中的人员移至远离可能造成伤害的物品的安全区域。
  - 保护头部不撞击硬物。
  - 不要试图抓住或限制患者的活动，让其自然完成发作过程。
  - 预期患者在发作后大约30分钟内会入睡，并逐渐醒来。
  - 在发作后不允许患者驾车。
  - 完全清醒前不要给予任何口服物质。
  - 脱去衣物并用凉水擦拭。
  - 将冷敷贴于额头、面部和颈部。
  - 发热时可服用对乙酰氨基酚。如果人还昏昏欲睡，可以使用对乙酰氨基酚栓剂。儿童不可给予阿司匹林。<20岁者避免使用类似阿司匹林的产品。肝病患者避免使用对乙酰氨基酚。肾病或胃部问题存在时以及怀孕情况下避免使用布洛芬。请按照说明书上的指示服用。
  callback_criteria:
  - 反复发作活动
  - 无改善或病情恶化
  - 发热对退热措施无效
  - 【立即急诊】呼吸困难
  - 【立即急诊】严重头痛、颈部僵硬或疼痛
  - 【立即急诊】持续性混乱
  related_protocols:
  - 酒精问题
  - 意识状态改变
  - 混淆
  - 成人发热
  - 儿童发热
  - 头部受伤
  - 热性发作
- id: head_and_neuro_007
  topic_zh: 发热性惊厥
  topic_en: Seizure Febrile
  source_file: STCC/Seizure_Febrile.md
  key_questions:
  - 姓名
  - 年龄
  - 发作时间
  - 既往惊厥史
  - 体温（如果已知）
  - 孩子是否感觉发热
  - 过敏史
  - 用药情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 多次惊厥
      - 呼吸困难或停止呼吸 >60 秒
      - 惊厥持续 >5 分钟
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 首次发作的惊厥
      - 儿童年龄小于 6 个月或大于 5 岁
      - 严重头痛，颈部僵硬或疼痛
      action: 立即前往急诊室
    C:
      criteria:
      - 持续高热 >102°F (38.9°C) 对退烧措施无反应
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 惊厥后清醒且有方向感
      - 孩子希望在惊厥后睡觉，但可以被唤醒而不会烦躁
      action: 居家观察，按家庭护理指导
  home_care:
  - 将患者侧卧或俯卧，头部转向一侧以防止因分泌物或呕吐引起的窒息。
  - 如果有呼吸嘈杂声，前拉下颚和下巴。不要将手指、药物或其他任何物体放入正在抽搐的人的口中。
  - 松开衣物。
  - 将抽搐者移动到远离可能造成伤害物体的安全区域。
  - 保护头部不撞击硬物。
  - 不要试图抱住患者并限制其运动。让惊厥自然结束。
  - 预期会有嗜睡。允许在凉爽的房间内休息，轻装患者内衣。
  - 直到完全清醒前不要给予任何口服物品。
  - 脱去衣物，用冷水擦洗。如果出现颤抖，则停止洗澡。
  - 将冷敷贴放在额头、脸部、颈部和腋下。
  - 对于发热情况，给予对乙酰氨基酚，并遵循标签上的指示。如果嗜睡持续，请使用对乙酰氨基酚栓剂。每 4 小时一次，即使在夜间也要如此，直到体温降至 <100°F (37.8°C)。不要给儿童使用阿司匹林。对于年龄 <20 岁的人避免使用类似阿司匹林的产品。如果有肝脏疾病，请避免使用对乙酰氨基酚。如果有肾脏疾病或胃部问题存在，或者在怀孕的情况下，避免使用布洛芬。遵循标签上的指示。
  - 不要用酒精擦浴。
  callback_criteria:
  - 反复发作的惊厥活动
  - 没有好转或病情恶化
  - 发热对退烧措施无反应
  - 【立即急诊】呼吸困难或停止呼吸 >60 秒
  - 【立即急诊】惊厥持续 >5 分钟
  - 【立即急诊】面部、嘴唇或指甲变蓝
  - 【立即急诊】在发作期间受伤
  - 【立即急诊】持续性困惑
  - 【立即急诊】严重头痛，颈部僵硬或疼痛
  related_protocols: []
- id: head_and_neuro_008
  topic_zh: 眩晕
  topic_en: Dizziness
  source_file: STCC/Dizziness.md
  key_questions:
  - 姓名
  - 年龄
  - 起始时间
  - 病史
  - 药物使用情况
  triage_levels:
    A:
      criteria: []
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 突然出现面部、手臂或腿部一侧的无力或麻木感
      - 说话或行走困难，意识混乱，面肌下垂
      - 昏厥发作或失去知觉
      - 心率<50次/分钟或>130次/分钟或心律不齐
      - 持续严重头痛或视力改变
      - 发热、皮肤苍白和无力
      action: 立即前往急诊室
    C:
      criteria:
      - 48小时内有最近的创伤或头部撞击史
      - 近期严重呕吐、腹泻或出血及眩晕，站立或坐立时脉搏增加
      - 糖尿病病史
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 耳痛、耳鸣或听力下降
      - 发热对退热措施无反应
      - 持续头昏眼花>3天
      - 最近突然停止使用药物（非处方药或处方药）、酒精或咖啡因
      - 眩晕影响日常活动
      - 有节食史，进食后眩晕未改善
      - 服用新药后出现眩晕
      - 压力增加
      - 饮酒期间或之后发生眩晕
      - 头部移动时发生眩晕
      action: 居家观察，按家庭护理指导
  home_care:
  - 在感到眩晕时，伸出一只手触碰某物，然后躺平或将头低下放在膝盖上，深呼吸几分钟。
  - 如果眩晕伴有焦虑、快速呼吸和面部或手指麻木，对着纸袋呼吸5至10分钟，确保嘴巴和鼻子被纸袋覆盖。
  - 慢慢坐起或站起。避免突然改变体位。
  - 如果是前庭炎诊断，考虑让他人提供交通工具。治疗开始后，眩晕可能需要长达4周的时间才能完全缓解。
  - 对于持续的眩晕，避免嘈杂环境。
  - 限制含咖啡因饮料和酒精的摄入。
  - 如果脱水，喝大量的水或运动饮料。
  - 使用夜灯。
  - 如果眩晕与运动有关，可考虑非处方抗晕动药物（如苯海拉明、波尼尔），并遵循标签上的指示。
  - 如果眩晕由梅尼埃病引起，强调限制盐分摄入的重要性。
  - 当感到“眩晕发作”即将来临，停止移动几分钟。伸出一只手轻轻触碰坚固物体，然后坐下保持不动。
  callback_criteria:
  - 症状持续>1周或恶化
  - 持续呕吐和眩晕
  - 【立即急诊】意识水平下降
  - 【立即急诊】无力或说话困难
  - 【立即急诊】心率<50次/分钟或>130次/分钟或心律不齐
  related_protocols:
  - 呼吸问题
  - 胸痛
  - 意识混乱
  - 脱水
  - 耳痛和分泌物
  - 昏厥
  - 跌倒
  - 头痛
  - 心率问题
  - 热暴露问题
  - 高血压
  - 过度换气
  - 神经系统症状
  - 直肠出血
  - 疑似中风
  - 使用和暴露
  - 虚弱
- id: head_and_neuro_009
  topic_zh: 昏厥
  topic_en: Fainting
  source_file: STCC/Fainting.md
  key_questions:
  - 姓名
  - 年龄
  - 发作时间
  - 原因
  - 其他伤害
  - 药物
  - 病史
  triage_levels:
    A:
      criteria: []
      action: 立即呼叫救护车（120）
    B:
      criteria: []
      action: 立即前往急诊室
    C:
      criteria:
      - 失去意识超过1到2分钟
      - 四肢无力、混乱、说话困难、麻木刺痛感或视力模糊
      - 近期头部受伤史
      - 心脏病或糖尿病病史
      - 心律不齐或快速心跳
      - 严重头痛
      - 严重背痛或腹痛
      - 最近出现带血或黑色柏油样大便
      - 呼吸短促
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 脱水迹象：
      - 排尿减少
      - 尿液颜色深黄
      - 眼球凹陷
      - 皮肤弹性差
      - 极度口渴
      - 口腔或黏膜干燥
      - 持续的头昏眼花或眩晕感
      - 病人年龄超过50岁，且在转头或抬头后出现昏厥
      - 怀孕或末次月经（LMP）超过6周前
      - 长时间暴露于阳光下或炎热环境中
      - 长时间未进食
      - 突然从躺着、坐着或弯腰的姿势站起来时感到头晕
      - 最近经历了一件情感事件
      - 剧烈运动后感到头晕
      - 长时间站立不动后出现晕厥
      - 新开始使用降压药物
      - 快速呼吸并伴有手部、脚趾或脸部麻木感后出现昏厥
      action: 居家观察，按家庭护理指导
  home_care:
  - 对于头昏眼花，可将双腿抬高过头部，或坐下并将头部置于两膝之间直至不适感消失。
  - 若长时间暴露于热环境中，应小口饮用凉饮料，并使用冷敷物以帮助降温。
  - 避免突然改变姿势：从躺着、坐着或弯腰的姿势缓慢起身。
  - 如果病人患有糖尿病，请检查血糖并采取适当措施。对于低血糖，可喝一杯橙汁、可乐或牛奶。
  - 频繁食用少量蛋白质零食。如果超重，则应遵循均衡、合理的减重饮食计划。
  - 避免长时间站立不动。可能的话，变换双脚的重量分布，走动一下。
  callback_criteria:
  - 经常出现头晕眼花的情况
  - 新开始使用降压药物且昏厥持续不减
  - 症状持续或加重
  - 首次出现带血或黑色柏油样大便
  - 可能怀孕
  - 【立即急诊】胸痛、下颌疼痛、颈部疼痛、肩部疼痛或手臂疼痛
  - 【立即急诊】严重头痛
  - 【立即急诊】严重背痛或腹痛
  - 【立即急诊】昏厥复发
  - 【立即急诊】呼吸短促
  related_protocols:
  - 酒精问题
  - 意识混乱
  - 糖尿病问题
  - 头晕
  - 心率问题
  - 热暴露问题
  - 怀孕问题
  - 疑似中风
  - 虚弱
- id: head_and_neuro_010
  topic_zh: 麻木和刺痛
  topic_en: Numbness and Tingling
  source_file: STCC/Numbness_and_Tingling.md
  key_questions:
  - 姓名
  - 年龄
  - 起始时间
  - 原因
  - 位置
  - 相关症状
  - 药物使用情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 精神状态改变
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 剧烈头痛
      action: 立即前往急诊室
    C:
      criteria:
      - 身体一侧受影响
      - 突然的手臂和/或腿部无力
      - 言语困难，口齿不清
      - 视力模糊
      - 大小便失禁
      - 手指或脚趾比另一侧冷或蓝
      - 症状出现前有头痛
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 近期有过重体力劳动或剧烈运动的病史
      - 区域疼痛、肿胀和/或温暖
      - 严重疼痛
      - 夜间手或臂部出现麻木、刺痛和/或锐痛
      - 近期有疾病或手术的病史
      - 逐渐起始的症状
      - 无已知损伤的情况下颈部僵硬或疼痛
      - 确诊为腕管综合征且症状加重
      - 长时间保持一个姿势后出现症状
      - 快速呼吸、头晕，手部、脸部或唇部受影响
      action: 居家观察，按家庭护理指导
  home_care:
  - 避免长时间保持同一姿势。
  - 定期在受影响区域收紧和放松肌肉以促进血液循环。
  - 保护感觉麻木的部位以防受伤。
  - 为了减缓快速呼吸并控制麻木和刺痛，请参阅下一页。
  - 避免重复动作；休息并做伸展运动。
  - 将热敷或冷敷应用于颈部僵硬处。
  - 坐下并将注意力集中在放慢呼吸上，每5秒一次深呼吸。
  - 用纸袋覆盖口鼻，进行10次呼气和吸气。
  - 如果情况没有改善，请继续使用袋子呼吸5到15分钟。
  - 不用袋子休息几分钟。
  - 重复使用和不使用袋子的呼吸动作直到状况有所改善。
  callback_criteria:
  - 20到30分钟内无改善或情况恶化
  - 症状影响日常生活
  related_protocols: []
- id: head_and_neuro_011
  topic_zh: 神经系统症状
  topic_en: Neurologic Symptoms
  source_file: STCC/Neurologic_Symptoms.md
  key_questions:
  - 姓名
  - 年龄
  - 起病时间
  - 用药情况
  - 既往史
  triage_levels:
    A:
      criteria:
      - 面部、手臂或腿部一侧麻木或无力
      - 不明原因的眩晕或跌倒
      - 呼吸困难
      - 意识状态改变
      - 无法站立、行走或承重
      - 言语障碍
      - 一侧面部下垂
      - 吞咽困难
      - 无法移动肢体
      - 视力变化
      - 突然剧烈头痛
      - 近期头部受伤史和血压升高
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 完全在数小时内缓解的短暂局灶性神经功能缺损
      - 新发且突然出现的膀胱或肠道失禁
      - 新发背痛和会阴区或肛门区麻木
      - 无法排尿且膀胱充盈
      - 头痛比之前的头痛更严重
      - 低血糖伴随无力、困惑、眩晕、头痛、颤抖或视力问题，并对常规家庭疗法无反应
      action: 立即前往急诊室
    C:
      criteria:
      - 颤抖和有大量饮酒史
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 注意力不集中
      - 手或脚的短暂刺痛感
      - 新发的颤抖，且无糖尿病、酒精滥用、帕金森病或癫痫发作史
      action: 居家观察，按家庭护理指导
  home_care:
  - 提供保证，即长时间坐姿或对区域施加压力后出现的脚或手部刺痛感在活动和拉伸后会消失。
  - 避免膝盖或踝关节交叉双腿。
  - 避免吸烟。
  - 按处方服药。
  - 在经历短暂症状时避免驾驶或操作机械。
  - 采取防跌措施。移除安全隐患。将铃铛或其他通讯设备放在伸手可及的地方，以便在尝试起床前呼救。
  callback_criteria:
  - 面部、手臂或腿部无力或麻木
  - 理解困难
  - 持续的视力变化
  - 持续眩晕
  - 没有改善或状况恶化
  related_protocols: []
- id: head_and_neuro_012
  topic_zh: 语言障碍
  topic_en: Speaking Difficulty
  source_file: STCC/Speaking_Difficulty.md
  key_questions:
