protocols:
- id: respiratory_001
  topic_zh: 呼吸问题
  topic_en: Breathing Problems
  source_file: STCC/Breathing_Problems.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 用药情况
  - 既往史
  triage_levels:
    A:
      criteria:
      - 嘴唇或舌头发绀
      - 皮肤湿冷
      - 窒息感
      - 泡沫状粉红色或大量白色痰液
      - 意识改变
      - 突然发作的严重呼吸短促
      - 有肺栓塞、血栓或肺塌陷史
      - 使用吸入器未能缓解的哮喘病史和严重喘息
      - 无法说话
      - 流口水且无法吞咽
      - 吸入烟雾、火焰或气体后的呼吸困难
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 因剧烈疼痛而难以深呼吸
      - 过去2小时内开始的严重气促、喘息或有声呼吸
      - 近期创伤、手术或分娩史
      - 吸入异物
      - 接触过之前引起显著反应的物质（如蜇伤、药物、植物、化学物质、食物或动物）
      - 断续说话
      - 无法平躺或需坐起来呼吸
      - 免疫抑制，年龄>60岁，有镰状细胞贫血或糖尿病病史，或长期卧床且体温>101°F (38.3°C)
      - 峰流速<基线的50%
      - 成人体温>103°F (39.4°C)
      - 呼吸短促逐渐加重
      - 治疗后持续喘息
      - 严重喘息或咳嗽，常用的雾化器或吸入器不可用
      action: 立即前往急诊室
    C:
      criteria:
      - 断续说话
      - 紧绷的咳嗽
      - 休息时有轻微可听的喘息声
      - 呼吸时疼痛加剧
      - 上呼吸道感染且之前因相同症状住院
      - 因咳嗽或呼吸困难无法连续睡眠1-2小时以上
      - 有糖尿病或心脏病史
      - 峰流速为基线的50%至80%
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 体温>101°F (38.3°C)
      - 峰流速为基线的50%至80%
      - 胸部不适持续不缓解或加重
      - 呼吸困难且无法缓解
      - 突然发作的严重症状，如胸痛、意识丧失等
      action: 居家观察，按家庭护理指导
  home_care: []
  callback_criteria: []
  related_protocols:
  - 过敏反应
  - 哮喘
  - 胸痛
  - 窒息
  - 普通感冒症状
  - 充血
  - 咳嗽
  - 吸入异物
  - 过度换气
  - 喘息
- id: respiratory_002
  topic_zh: 哮喘
  topic_en: Asthma
  source_file: STCC/Asthma.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 既往哮喘史
  - 严重程度
  - 峰流速测量值
  - 之前的治疗
  - 药物使用情况
  - 既往病史
  - 疑似或已知的触发因素
  triage_levels:
    A:
      criteria:
      - 治疗后持续喘息
      - 呼吸困难或气短
      - 无法躺下呼吸；必须坐起来才能呼吸
      - 胸部疼痛或紧绷感
      - 嘴唇、舌头或脸部发绀或发蓝
      - 药物、食物、蜜蜂叮咬或接触已知过敏原或哮喘触发因素后突然出现喘息
      - 虚弱、无力和躁动不安
      - 只能说短词
      - 峰流速值<50%的基线水平
      - 严重的喘息或咳嗽，且没有可用雾化器或吸入器
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 呕吐并无法保留药物
      - 上呼吸道感染症状和既往史：
      - 激素治疗
      - 因相同症状住院的历史
      - 气管插管历史
      - 只能说部分句子
      - 峰流速值50%至80%的基线水平，且使用雾化器或吸入器后无改善
      - 每4小时一次以上使用雾化器或吸入器
      action: 立即前往急诊室
    C:
      criteria:
      - 体温>100.5°F（38.1°C）
      - 药物无法缓解的咳嗽
      - 当前药物只能提供最小或暂时的哮喘症状缓解
      - 黄色或绿色痰液
      - 峰流速值>50%至80%的基线水平
      action: 当天内联系医生/诊所
  home_care:
  - 增加液体摄入量；饮用清水和透明液体。
  - 早期治疗症状以减少哮喘发作的严重性。按照初级保健医生（PCP）的处方使用预防药物。
  - 使用加湿器、蒸汽浴室或冷湿空气帮助缓解症状。
  - 遵循初级保健医生（PCP）制定的治疗计划或管理计划，正确使用峰流速计、药物和吸入器以最佳控制哮喘。
  - 避免阿司匹林产品和去充血剂。
  - 每晚淋浴减少花粉暴露。
  - 限制宠物接触，尤其是在睡眠区域。
  - 避免烟雾和尘土环境。鼓励家中吸烟者在户外吸烟。
  - 避免已知的触发因素，例如动物皮屑、身体和头发护理产品、香水、强烈气味、烟草烟雾、空气污染、花粉和清洁溶剂。
  - 如果哮喘症状是由剧烈运动引起的，在活动前90分钟服用药物（使用吸入器则提前30分钟）。
  callback_criteria:
  - 【立即急诊】呼吸困难加剧
  - 【立即急诊】脸部、舌头或嘴唇发绀或发蓝
  - 【立即急诊】胸部疼痛或紧绷感
  - 【立即急诊】虚弱、无力和躁动不安
  - 【立即急诊】峰流速值<50%的正常基线水平
  related_protocols:
  - 呼吸困难
  - 窒息
  - 充血
  - 成人发热
  - 儿童发热
  - 花粉症问题
  - 喘息
- id: respiratory_003
  topic_zh: 咳嗽
  topic_en: Cough
  source_file: STCC/Cough.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 既往治疗
  - 相关症状
  - 用药情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 是 转至 窒息处理方案（130）
      - 否 下行至 B
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 突然出现的呼吸急促、快速呼吸或喘息
      - 是 转至 呼吸困难处理方案（101）
      - 否 下行至 C
      action: 立即前往急诊室
    C:
      criteria:
      - 是 转至 胸痛处理方案（118）
      - 否 下行至 D
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 嘴唇或舌头发绀
      - 窒息感
      - 咳出泡沫状粉红色痰液
      - 呼吸困难且无法说话
      - 吸入烟雾、火焰或气体后的呼吸困难
      - 接触某种之前引起过显著反应的物质（如刺伤、药物、植物、化学品、食物或动物）后突然发作
      - 是 “呼叫救护车” 或 “立即寻求急救”
      - 否 下行至 E
      - 咳嗽与感冒症状无关，且患者有以下病史：
      - 胸部创伤 >48 小时
      - 血栓或近期长时间久坐
      - 近期手术
      - 近期分娩
      - 近期心脏病发作
      - 哮喘对家庭护理措施或药物无反应
      - 6 个月以下婴儿呼吸急促和持续咳嗽
      - 婴儿显得非常不适
      - 儿童的呼吸模式改变：费力、声音大、喘息或胸壁凹陷 >30 分钟
      - 是 “2 小时内寻求医疗护理”
      - 否 下行至 F
      - 持续发热 >72 小时且对退热措施无反应
      - 绿色或棕色痰液 >72 小时
      - 儿童有“犬吠样”咳嗽，暴露于冷空气、加湿器或蒸汽中无法缓解
      - 是 “24 小时内寻求医疗护理”
      - 否 下行至 G
      - 运动引起的咳嗽
      - 持续数周或数月的持续或加重的咳嗽
      - 咳嗽伴有间歇性轻微胸痛（深咳时）
      - 温度 >101°F (38.3°C) 持续 >24 小时的儿童
      - 体重减轻伴随咳嗽
      - 是 “如果未见好转，请回电或预约家庭医生”
      - 否 遵循居家护理指导
      action: 居家观察，按家庭护理指导
  home_care:
  - 每天喝 6 到 8 杯水。
  - 温热的雾气可能有助于改善状况。通过覆盖在口鼻上的湿布呼吸，或使用加湿器。
  - 如果没有蒸汽设备，可以用热水洗澡时吸入蒸气。
  - 避免吸烟和二手烟。
  - 使用蜂蜜和柠檬水可以缓解咳嗽（1 岁以上的儿童）。
  - 保持室内空气湿润。
  - 对于6个月以下的婴儿，确保其充足饮水，并咨询医生是否需要其他治疗。
  - 如果有鼻塞，使用生理盐水滴鼻液可以帮助清理鼻子。
  callback_criteria:
  - 情况未见好转或恶化
  - 发热持续 >72 小时
  - 出现绿色、棕色或灰色痰液且持续 >72 小时
  - 咯血（不仅仅是条纹或斑点）
  - 【立即急诊】嘴唇或舌头发绀
  - 【立即急诊】窒息感
  - 【立即急诊】咳出泡沫状粉红色痰液
  - 【立即急诊】呼吸困难且无法说话
  related_protocols:
  - 哮喘
  - 呼吸困难
  - 胸痛
  - 窒息
  - 普通感冒症状
  - 鼻塞
  - 充血性心力衰竭
  - 吸入异物
  - 流感
  - 百日咳
  - 喉咙痛
  - 喘息
- id: respiratory_004
  topic_zh: 喘息
  topic_en: Wheezing
  source_file: STCC/Wheezing.md
  key_questions:
  - 姓名
  - 年龄
  - 发作时间
  - 用药情况
  - 插管史
  - 住院史
  - 病史
  triage_levels:
    A:
      criteria:
      - 严重的呼吸困难
      - 无法说话
      - 胸骨凹陷
      - 吸入异物
      - 嘴唇或面部发绀
      - 严重胸痛
      - 用药后或接触已知过敏原后的突发性喘息
      - 峰流速值<50%基线值（如果是哮喘患者）
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 对药物治疗无反应
      - 对家庭护理措施无反应
      - 需要坐起来才能呼吸
      - 类似以前需要住院或注射的喘息发作
      - 有心力衰竭、心脏病、慢性阻塞性肺疾病、肺栓塞或腿部血栓病史
      - 断断续续地说句子
      - 峰流速值50%至80%基线值（如果是哮喘患者）
      action: 立即前往急诊室
    C:
      criteria:
      - 峰流速值>80%基线值（如果是哮喘患者）
      - 咳出绿色、黄色或铁锈色的痰
      - 婴儿、老人或免疫抑制者
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 首次喘息发作，短时间内可缓解
      - 能完整地说句子
      action: 居家观察，按家庭护理指导
  home_care:
  - 按家庭医生的指导服用药物。
  - 使用冷雾加湿器。
  - 确定原因并避免接触刺激物。
  callback_criteria:
  - 【立即急诊】嘴唇或面部变蓝
  - 【立即急诊】呼吸困难
  - 【立即急诊】意识水平下降
  - 【立即急诊】无法说话或只能说出简短的单词
  - 【立即急诊】严重胸痛
  - 【立即急诊】峰流速值<50%基线值（如果是哮喘患者）
  related_protocols:
  - 过敏反应
  - 哮喘
  - 呼吸困难
  - 慢性阻塞性肺疾病
  - 充血
  - 心力衰竭
  - 咳嗽
  - 喉炎
  - 花粉症问题
- id: respiratory_005
  topic_zh: 慢性阻塞性肺疾病 (COPD)
  topic_en: Chronic Obstructive Pulmonary Disease COPD
  source_file: STCC/Chronic_Obstructive_Pulmonary_Disease_COPD.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 既往 COPD 病史
  - 严重程度
  - 峰流速测量（如使用）
  - 既往治疗
  - 药物
  - 既往病史
  - 疑似或已知的触发因素
  triage_levels:
    A:
      criteria:
      - 治疗后持续喘息
      - 呼吸困难或气短
      - 胸痛或胸部紧绷感
      - 不能平躺；必须坐起来才能呼吸
      - 嘴唇、舌头或脸部发绀或蓝色
      - 用药后、接触已知过敏原或其他触发因素后突然出现喘息
      - 虚弱、乏力、烦躁不安或极度疲倦
      - 说话时只能用2-3个词的短句
      - 峰流速 < 正常基线的50%
      - 重度喘息或咳嗽，且无雾化器或吸入器可用
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 呕吐且无法保留药物
      - 上呼吸道感染症状，并有以下病史：
      - 使用皮质类固醇治疗
      - 因相同症状住院的历史
      - 插管历史
      - 峰流速为正常基线的50%到80%，并使用雾化器或吸入器后无改善
      - 每4小时或更短时间使用一次雾化器或吸入器
      action: 立即前往急诊室
    C:
      criteria:
      - 发热 >100.5°F (38.1°C)
      - 药物无法缓解的咳嗽
      - 当前药物对 COPD 症状仅有轻微或暂时性缓解
      - 长期咳嗽，痰液呈透明、白色、黄色或绿色
      - 脚踝或腿部肿胀
      - 早晨头痛（由睡眠期间呼吸减少导致氧气不足和二氧化碳增加引起）
      - 峰流速 >50% 到 80% 的正常基线
      action: 当天内联系医生/诊所
  home_care:
  - 停止吸烟，避免接触任何可能的刺激物。
  - 定期使用医生开具的所有药物和治疗方案。
  - 监测症状变化，并根据需要调整药物剂量。
  - 保持适当的活动量，以增强呼吸肌肉的力量和耐力。
  - 遵循健康饮食习惯，维持适当体重。
  - 定期进行医疗检查，与医生讨论病情进展。
  - 参加 COPD 支持小组，与其他患者交流管理疾病的经验。
  callback_criteria:
  - 【立即急诊】呼吸困难加剧
  - 【立即急诊】面部、舌头或嘴唇发绀或蓝色
  - 【立即急诊】胸痛或胸部紧绷感
  - 【立即急诊】虚弱、乏力、烦躁不安
  - 【立即急诊】峰流速 < 正常基线的50%
  related_protocols: []
- id: respiratory_006
  topic_zh: 气道阻塞
  topic_en: Choking
  source_file: STCC/Choking.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 疼痛评分
  - 病史
  triage_levels:
    A:
      criteria:
      - 患者有意识但无法说话、咳嗽或呼吸
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 患者无意识且不呼吸
      action: 立即前往急诊室
    C:
      criteria:
      - 呼吸困难
      - 口唇或面部发绀
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 异物吸入肺部
      - 排出异物后咳血或严重疼痛
      - 无法从喉咙中移除异物且无其他症状
      - 可以说话和咳嗽
      - 没有呼吸困难
      - 经常性唾液、食物或液体引起窒息
      action: 居家观察，按家庭护理指导
  home_care:
  - 对于经常性气道阻塞，慢慢吃东西，每次取较小的口。
  - 如果感觉有鱼刺卡在喉咙里，试着用面包和牛奶将其冲下。
  callback_criteria:
  - 喉咙中有鱼刺且持续2小时以上的刺激感
  - 感染迹象：持续咽喉痛、发热、流脓
  - 吞咽困难
  - 症状未见好转或病情加重
  - 【立即急诊】呼吸困难
  - 【立即急诊】无法吞咽唾液或液体
  - 【立即急诊】排出喉咙中的异物后咳血或严重疼痛
  related_protocols:
  - 呼吸困难
  - 咳嗽
  - 异物吞咽
  - 咽喉痛
  - 吞咽困难
  - 无力
- id: respiratory_007
  topic_zh: 过度换气
  topic_en: Hyperventilation
  source_file: STCC/Hyperventilation.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 用药情况
  - 病史
  - 伴随症状
  triage_levels:
    A:
      criteria:
      - 是 → 参见胸痛协议（123）
      - 否 ↓ 转至 B
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 嘴唇或指甲发绀
      - 无法说话
      - 必须坐起来才能呼吸
      - 是 → 参见呼吸问题协议 (106)
      - 否 ↓ 转至 C
      action: 立即前往急诊室
    C:
      criteria:
      - 严重疼痛
      - 发热且对退烧措施无反应
      - 异常困倦
      - 是 → “在2到4小时内寻求医疗护理”
      - 否 ↓ 转至 D
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 面部、口唇、手指或脚趾周围的麻木和刺痛感
      - 感觉要昏倒
      - 手脚抽搐
      - 焦虑或情绪激动
      - 有类似症状的病史或先例
      - 是 → “如果无改善，请回电或联系家庭医生预约”
      - 否 遵循家庭护理指导
      action: 居家观察，按家庭护理指导
  home_care:
  - 坐下并专注于放慢呼吸，每5秒一次呼吸。
  - 用纸袋盖住口鼻，深呼吸10次。
  - 如果没有改善，继续使用袋子呼吸5到15分钟。
  - 不用袋子休息几分钟。
  - 反复进行带袋子和不带袋子的呼吸，直到状况改善。
  callback_criteria:
  - 无改善或状况恶化
  - 发作期间突然发热
  - 频繁发作
  - 【立即急诊】嘴唇或指甲发绀
  related_protocols: []
- id: respiratory_008
  topic_zh: 吸入异物
  topic_en: Foreign Body Inhaled
  source_file: STCC/Foreign_Body_Inhaled.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 吸入物体
  - 病史
  - 用药情况
  triage_levels:
    A:
      criteria:
      - 窒息且无法说话、咳嗽或呼吸
      - 失去意识的人没有呼吸
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 呼吸困难
      - 嘴唇或脸部变蓝
      - 无法哭泣或说话
      - 自杀企图
      action: 立即前往急诊室
    C:
      criteria:
      - 异物吸入肺部
      - 咳血或在异物从喉咙移除后感到剧烈疼痛
      - 无法从喉咙中取出异物，但没有其他症状
      - 窒息感
      - 流口水
      - 短语说话
      - 无法吞咽唾液或液体
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 断句说话
      - 吸入异物、气溶胶或烟雾后间歇性咳嗽或喘息
      - 能说话和咳嗽
      - 无呼吸困难
      - 频繁因唾液、食物或液体而窒息
      - 完整句子说话
      action: 居家观察，按家庭护理指导
  home_care:
  - 对于经常性窒息，慢慢吃东西，每次吃得少一些。
  - 如果有鱼刺卡在喉咙的感觉，试着用面包和牛奶将鱼刺冲下去。
  callback_criteria:
  - 喉咙里有鱼刺或鸡骨，并且持续感到喉咙痛超过2小时
  - 感染迹象：持续的喉咙痛、发热或流脓
  - 吞咽困难
  - 没有改善或情况恶化
  - 【立即急诊】呼吸困难、气短或喘息
  - 【立即急诊】无法吞咽唾液或液体
  - 【立即急诊】窒息感
