- id: respiratory_009
  topic_zh: 成人睡眠呼吸暂停
  topic_en: Sleep Apnea Adult
  source_file: STCC/Sleep_Apnea_Adult.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 用药情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 停止呼吸
      - 皮肤变蓝
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 连续几分钟的呼吸暂停
      - 皮肤曾变为灰或蓝色但现在恢复正常颜色
      - 发作后出现异常呼吸
      - 需要进行人工呼吸
      action: 立即前往急诊室
    C:
      criteria:
      - <2分钟的短暂呼吸暂停
      - 皮肤颜色无变化
      - 发作后呼吸正常
      - 不需要进行人工呼吸
      - 睡眠周期中出现窒息、突然醒来、困倦和再次入睡的现象
      - 持续的日间困倦及白天突然睡着的情况
      - 因缺乏睡眠导致的功能下降或抑郁
      action: 当天内联系医生/诊所
  home_care:
  - 尽量保持冷静。
  - 尽可能消除所有可能的致病因素：压力、焦虑、抑郁、肥胖、吸烟及药物或酒精滥用。
  - 接受心肺复苏培训。迅速识别长时间的呼吸暂停并及时进行心肺复苏有助于防止因大脑缺氧导致死亡或严重问题。
  - 如果仅在仰卧时出现呼吸暂停，尝试侧卧或俯卧睡觉。使用枕头支撑。考虑将物体固定在睡衣背部以鼓励其他睡眠姿势。
  - 持续的呼吸暂停发作
  - 长时间停止呼吸
  - 皮肤变蓝
  - 正在进行心肺复苏
  callback_criteria: []
  related_protocols:
  - 呼吸问题
