- id: injury_trauma_008
  topic_zh: 严重出血
  topic_en: Bleeding Severe
  source_file: STCC/Bleeding_Severe.md
  key_questions:
  - 姓名
  - 年龄
  - 起病时间
  - 原因
  - 位置
  - 药物
  - 疼痛评分
  - 历史
  triage_levels:
    A:
      criteria:
      - 枪伤、刀伤或其他穿透性伤口且难以控制出血
      - 休克迹象包括：
      - 头晕，意识模糊
      - 无反应
      - 皮肤苍白、冰冷或潮湿
      - 脉搏快速
      - 血液从伤口喷出且无法通过直接压迫止血
      - 衣物和绷带被血液浸透
      - 地面有血液积聚
      - 腹部、胸部或颈部穿透性伤口
      - 受伤部位暴露骨头或变形
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 直接压迫超过10分钟后仍持续出血
      - 裂开的流血伤口
      - 有出血障碍病史且难以控制出血
      - 正在服用抗凝药物
      - 无法移动受伤部位以上的肢体或手指
      action: 立即前往急诊室
  home_care:
  - 让患者躺下，并抬高受伤部分。
  - 直接对伤口施压至少10分钟。
  - 如果伤口喷血，用手掌和无菌或干净的绷带直接覆盖伤口施压。
  - 如果伤口深且大，用绷带或布料填充。避免使用纸巾或卫生纸。
  - 如果持续喷血，在心脏与受伤部位之间的动脉上施压。
  - 保持压力直到出血停止或救援到达。
  - 如果绷带被血液浸透，不要移除；在原有绷带上再加一层新的绷带。
  - 如果直接压迫无法控制出血且有止血带可用，按照止血带包装中的说明，在距离出血部位2到3英寸处使用止血带。不要将止血带放在关节上。
  - 记录下止血带的使用时间，以便急救人员了解止血带的应用时间。止血带可以放置2小时而不会造成组织损伤风险。
  - 在拔牙或牙齿创伤后持续出血的情况下，用湿润的黑茶袋咬住20分钟以控制出血。
  callback_criteria:
  - 出血或肿胀在出血得到控制后的24小时后发生
  - 感染迹象：疼痛加剧、分泌物、发热、肿胀、脓液、条纹或红斑
  - 【立即急诊】休克迹象：
  - 【立即急诊】皮肤苍白、冰冷或潮湿
  - 【立即急诊】极度口渴
  - 【立即急诊】脉搏快速
  related_protocols:
