- id: injury_trauma_019
  topic_zh: 伤口愈合与感染
  topic_en: Wound Healing and Infection
  source_file: STCC/Wound_Healing_and_Infection.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 近期手术史
  - 缝线或伤口处理
  - 药物使用情况
  - 病史
  - 疼痛评分
  - 是否正在使用负压伤口治疗（VAC）装置
  triage_levels:
    A:
      criteria:
      - 裂开、分离、锯齿状或深伤口
      - 手术切口裂开或张开，并且有大量液体、分泌物或物质从伤口突出
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 手术切口裂开或张开
      - 愈合中的伤口伴有头痛、肌肉疼痛、全身不适或发热
      - 感染迹象：疼痛、肿胀、分泌物、温热或从伤口延伸的红线
      - 颈部、腋窝或腹股沟淋巴结肿大
      - 由咬伤引起的伤口
      - 体温 > 37.8°C (100°F)
      - 污伤口且无破伤风疫苗接种史，疫苗接种状态未知，或最后一次破伤风疫苗接种 >5 年前
      - 糖尿病、HIV、慢性病史，使用类固醇或抗凝药物，化疗，以及伤口愈合不良
      action: 立即前往急诊室
    C:
      criteria:
      - 寒战、全身不适或头痛
      - 家庭护理措施后无改善
      - <24 小时的伤口且无破伤风疫苗接种史，疫苗接种状态未知，或最后一次破伤风疫苗接种 >5 年前
      - 伤口周围有水泡
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 伤口边缘发痒
      - 破伤风疫苗接种 >5 年前
      - 正在使用 VAC 且有关于
      - 管子或敷料边缘渗漏的问题
      - 容器已满
      - 设备关闭时间超过 8 小时
      action: 居家观察，按家庭护理指导
  home_care:
  - 保持伤口清洁干燥。
  - 如有分泌物，应用敷料覆盖。
  - 每天 4 次，每次 20 分钟应用温热湿敷包。
  - 每日检查伤口愈合情况。
  - 无破伤风疫苗接种史，疫苗接种状态未知，或最后一次破伤风疫苗接种 >5 年前。受伤后 72 小时内联系家庭医生或诊所进行破伤风疫苗接种。
  - 如伤口出血，躺下并按压伤口 10 分钟；如果情况没有改善，请联系家庭医生。
  - 监测体温。
  - 对于 VAC 相关问题：
  - 如负压装置关闭时间超过 8 小时，更换湿到干的敷料，并通知居家健康（HH）护士。
  - 如 VAC 在管子或敷料边缘渗漏，加强 VAC 敷料并通知 HH 护士。
  - 如果容器已满，按照 HH 护士指示将其替换并丢弃。
  - 切开或未切开的脓肿对抗生素高度耐药，并容易感染 MRSA。采取以下措施防止分享或恶化：
  - 每天洗手 >3 次或在手脏时使用微生物清洁剂
  - 活动后立即用温水清洗身体
  - 伤口周围出现水泡时，请联系家庭医生。
  - 如果情况恶化或在接受家庭护理和治疗后没有改善，请联系家庭医生。
  callback_criteria:
  - 【立即急诊】手术切口裂开且无法联系到外科医生
  related_protocols: []
