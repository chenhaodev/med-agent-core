- id: injury_trauma_018
  topic_zh: 伤口护理：缝合或钉合
  topic_en: 'Wound Care: Sutures or Staples'
  source_file: STCC/Wound_Care:_Sutures_or_Staples.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 缝合或钉合日期
  - 药物
  - 疼痛评分
  - 病史
  triage_levels:
    A:
      criteria:
      - 意识改变
      - 呼吸困难
      - 手术切口裂开或张口，大量液体、引流物或组织暴露
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 伤口周围迅速扩散的温热、肿胀或红斑
      - 最近进行了缝合/钉合；头痛、肌肉疼痛、全身不适或发热
      - 体温 >101.3°F (38.5°C)
      - 切口裂开或张口
      - 直接按压超过 10 分钟后仍有持续出血
      - 切口远端的麻木或肿胀
      - 无法移动切口远端的关节
      - 引流管从伤口滑出
      - 缝线或钉子松动，且放置时间 <48 小时
      - 缝线或钉子脱落，胶水分离，面部伤口裂开
      action: 立即前往急诊室
    C:
      criteria:
      - 持续的切口疼痛或不适
      - 逐渐出现的温热、恶臭、肿胀或红斑
      - 黄色或绿色分泌物且无发热
      - 糖尿病、HIV、慢性病史，使用类固醇或抗凝血药物、化疗及愈合不良的伤口
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 已移除缝线/钉子且触痛
      - 关于缝线/钉子/胶水的问题
      - 错过拆线日期
      - 缝线或钉子松动，且放置时间 >48 小时
      - 伤口边缘瘙痒
      - 伤口周围起泡
      action: 居家观察，按家庭护理指导
  home_care:
  - 至少 24 小时内保持缝合/钉合/粘合区域清洁干燥。
  - 用温水轻轻清洗伤口，每日一次，并在脏污时清洁。
  - 注意感染迹象：温热、疼痛、分泌物、红斑或红色条纹。每天检查伤口。
  - 接触伤口或更换敷料前，使用肥皂和水或基于酒精的手部消毒剂洗手。
  - 根据外科医生的处方，每天三次将抗生素软膏涂抹于伤口上。
  - 除非由外科医生或家庭医生指示，否则不要在腹部伤口上使用乳液、药水或石油基软膏。
  - 敷料湿透或脏污时更换。
  - 如果缝线或钉子脱落或胶水分开 >48 小时后，请用胶带或蝴蝶绷带保持伤口闭合，直到准备好移除剩余的缝线/钉子。
  - 按时进行拆线预约。
  - 服用常规疼痛药物以缓解不适。不要给儿童使用阿司匹林。如果年龄 <20 岁，则避免使用类似阿司匹林的产品。如果有肝病，请避免使用对乙酰氨基酚。如果有肾病或胃部问题，或者怀孕的情况下，应避免使用布洛芬。请遵循标签上的指示。
  - 在缝合/钉子移除后的头两天内，避免碰撞或拉伸伤口。
  - 使用防晒霜并避免直接日晒于愈合中的伤口上。
  callback_criteria:
  - 感染迹象；疼痛、温热、恶臭、肿胀、红斑、分泌物或从伤口延伸出的红色条纹
  - 持续出血
  - 疼痛加剧
  - 伤口裂开
  - 病情恶化或无改善
  - 【立即急诊】直接按压 >10 分钟后仍有持续出血
  - 【立即急诊】呼吸困难
  - 【立即急诊】大伤口裂开且身体组织暴露
  - 【立即急诊】手术切口打开且无法联系到外科医生
