      - 1岁以上儿童跌落后超过12小时头部有软绵绵的肿块
      - 1岁以下儿童头部有肿块
      action: 立即前往急诊室
    C:
      criteria:
      - 近期频繁跌倒的历史
      - 最近突然停药（非处方药、处方药或街头药物）、酒精或咖啡因
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 肿胀或瘀伤
      - 跌后24至48小时内僵硬或酸痛
      action: 居家观察，按家庭护理指导
  home_care:
  - 在受伤部位冰敷20分钟，每天4次，持续24至48小时。不要将冰直接放在皮肤上，使用湿布或其他织物作为隔离。
  - 预期会出现1周或更长时间的青紫斑痕。
  - 评估家中是否存在安全隐患并纠正问题。
  - 联系当地社区中心或老年人中心获取关于锻炼、跌倒预防计划和提高家庭安全性的建议。
  - 访问跌倒预防网站：www.cdc.gov/injury 或 www.stopfalls.org
  - 定期进行锻炼以增强体力和平衡能力。
  - 每年进行一次眼科检查，并在需要时更换眼镜。
  - 请医生或药剂师审查药物，因为某些药物可能会改变视力、导致头晕或混乱。
  - 穿合脚的鞋子。
  - 固定或移除松动的地毯。
  - 清除杂物或可能导致绊倒的障碍物。
  - 在淋浴和浴缸地板上添加防滑安全贴纸。
  - 所有楼梯都安装扶手并确保照明充足。
  - 在浴室中加装扶手。
  - 在更衣区放置一个凳子或坐的地方——许多跌倒发生在尝试穿衣服时。
  callback_criteria:
  - 症状持续或加重
  - 频繁发生跌倒
  - 行动能力逐渐困难
  - 出现剧烈疼痛
  - 【立即急诊】精神状态改变或混乱
  - 【立即急诊】协调能力缺乏
  - 【立即急诊】持续呕吐
  - 【立即急诊】言语不清
  - 【立即急诊】四肢无力、刺痛或麻木
  - 【立即急诊】身体一侧无力
  - 【立即急诊】剧烈头痛
  - 【立即急诊】视力模糊或复视
  - 【立即急诊】颈部疼痛
  - 【立即急诊】小孩不认识父母或看护者
  related_protocols:
