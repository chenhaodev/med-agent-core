- id: injury_trauma_014
  topic_zh: 破伤风免疫
  topic_en: Immunization Tetanus
  source_file: STCC/Immunization_Tetanus.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 受伤原因
  - 破伤风免疫状态
  - 过敏史
  - 用药情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 呼吸、说话或吞咽困难
      - 喉咙或舌头突然肿胀
      - 混乱、激动或意识水平下降（LOC）
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 皮疹或潮红
      - 全身性荨麻疹
      action: 立即前往急诊室
    C:
      criteria:
      - 无破伤风免疫史
      - 最后一次免疫超过10年
      - 穿刺或污染伤口，且自上次破伤风免疫超过5年
      - 出生后接种的破伤风疫苗少于四次
      - 注射部位发热、疼痛、红肿在注射后48小时以上出现
      action: 当天内联系医生/诊所
    D:
      criteria:
      - DT注射部位在注射后48小时内出现发热、疼痛、红肿
      action: 居家观察，按家庭护理指导
  home_care:
  - 每2小时对注射部位应用冰袋20分钟，持续24小时以帮助减少肿胀和不适。在皮肤与冰之间放置一层布料。
  - 如果需要缓解发热或不适，请服用常规的止痛药（阿司匹林、扑热息痛、布洛芬）。不要给儿童使用阿司匹林。年龄<20岁者避免使用类似阿司匹林的产品。肝病患者避免使用扑热息痛。肾病、胃部问题或怀孕情况下避免使用布洛芬。遵循标签上的指示。
  - 记录加强剂的日期。一次加强剂可提供10年的保护。如果伤口或穿刺是脏的，建议在5年内再次接种疫苗。
  - 应在受伤后72小时内给予破伤风免疫。
  - 监测注射部位是否有感染迹象。
  - 提供安慰；注射后的48小时内疼痛和肿胀是正常反应。
  callback_criteria:
  - 儿童在注射后哭闹超过3小时
  - 注射48小时后出现红肿、疼痛或发热
  - 【立即急诊】呼吸、说话或吞咽困难
  - 【立即急诊】喉咙或舌头突然肿胀
  - 【立即急诊】胸痛或晕厥
  - 【立即急诊】混乱、激动或意识水平下降（LOC）
  related_protocols:
  - 过敏反应
  - 成人的发热
  - 儿童的发热
  - 免疫反应
  - 切割伤
  - 刺伤
- id: injury_trauma_015
  topic_zh: 静脉治疗问题
  topic_en: Intravenous Therapy Problems
  source_file: STCC/Intravenous_Therapy_Problems.md
  key_questions:
  - 姓名
  - 年龄
  - 起始时间
  - 原因
  - 静脉（IV）的位置和类型
  - 置入时间长度
  - 用药情况
  - 历史记录
  triage_levels:
    A:
      criteria:
      - 静脉输液部位疼痛且正在输入抗癌药物
      - 导管尖端可能断裂或折断
      - 中心静脉导管明显脱出
      - 中心静脉导管和突然出现呼吸困难或胸痛
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 在家庭护理建议后仍无法冲洗中心静脉导管
      - 家庭护理措施无效的持续发热
      - 静脉插入部位发红、肿胀、疼痛、红线和温暖
      - 中心静脉插入部位肿胀
      action: 立即前往急诊室
    C:
      criteria:
      - 静脉无法冲洗，且没有管路或夹子问题
      - 输液部位冷或肿痛
      - 输液流速慢或不流动
      - 捏住管路时无血液回流
      - 管路中有血液积聚
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 输液部位疼痛但没有肿胀或感染、渗漏的迹象
      - 输液泄漏
      action: 居家观察，按家庭护理指导
  home_care:
  - 不要在输液部位上方戴手表或其他紧身首饰。
  - 不要穿在输液部位上方过紧的衣物。
  - 中心静脉导管问题：
  - 检查管路是否有扭结和夹子。
  - 改变身体或手臂的位置。
  - 如果不在泵上，提高药袋位置。
  - 检查泵是否正常工作。
  - 如已接受冲洗指导，缓慢冲洗线路。如果线路容易冲洗，用10毫升生理盐水更有力地冲洗，然后重新开始输注。
  - 如果线路在外部断裂，夹紧管路，并用橡皮筋固定以防止回流和凝结，联系PCP进行修复。
  - 静脉问题：
  - 如果输液流速慢或不流动且部位感觉冷，夹紧管路。
  - 如果部位没有肿胀或疼痛，检查管路、泵和夹子是否有问题。改变肢体或身体的位置。如果不在泵上，提高药袋位置。
  - 检查泵是否正常工作。泵是否已连接到电源（插电）？
  - 如已接受冲洗指导，用3毫升生理盐水冲洗线路。
  - 如果没有感染或渗漏的迹象，减慢输液速度，并在插入部位敷冷敷包。每10分钟检查一次部位是否有肿胀、发红或疼痛。
  - 如果输液泄漏，干燥该区域并重新检查是否存在泄漏。紧固所有连接，更换帽子，如已接受更换管路指导，请更换和预充管路，然后重新开始输注。
  - 如果输液脱出或拔出，在出血部位施加压力，并联系PCP重启输液。
  - 如果家庭护理措施后仍持续泄漏，联系PCP重启输液。
  callback_criteria:
  - 【立即急诊】输液部位疼痛，且正在输入抗癌药物
  - 【立即急诊】导管尖端可能断裂或折断
  - 【立即急诊】中心静脉导管明显脱出
  - 【立即急诊】中心静脉导管和突然出现胸痛或呼吸困难
  related_protocols:
  - 伤口愈合与感染
- id: injury_trauma_016
  topic_zh: 术后问题
  topic_en: Postoperative Problems
  source_file: STCC/Postoperative_Problems.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 手术类型及日期
  - 能否联系到外科医生
  - 石膏/夹板/敷料的位置
  - 药物使用情况
  - 病史
  - 疼痛评分
  triage_levels:
    A:
      criteria:
      - 突然出现剧烈疼痛
      - 手术伤口裂开或张口，并有大量液体流出或物体从伤口突出
      - 如果是石膏、夹板或骨科手术：
      - 手指或脚趾冷、蓝或麻木
      - 严重疼痛、肿胀或紧绷，对抬高或家庭护理措施无反应
      - 咳血或粉红色泡沫痰
      - 腿部肿胀和受影响的腿脚脉搏消失、麻木或刺痛
      - 呼吸短促
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 手术伤口裂开或张口
      - 感染迹象（疼痛、肿胀、流液、发热或红条从伤口延伸）
      - 大腿、小腿、踝部或脚趾的肿胀和疼痛
      - 敷料、夹板或石膏感觉太紧
      - 切口大量出血，对家庭护理措施无反应
      - 脚踝、小腿、胫骨或大腿区域触感温暖或发红
      - 一条腿或脚踝突然肿胀
      - 体温 >100.4°F (38°C)
      action: 立即前往急诊室
    C:
      criteria:
      - 糖尿病、HIV感染、慢性病史，使用类固醇、抗凝血药或化疗药物且伤口愈合不良
      - 疼痛逐渐加剧
      - 服用处方止痛药后疼痛未缓解
      - 石膏、夹板或器具开裂或不稳定
      - 切口处持续渗出或出血
      - 持续恶心和呕吐
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 伤口边缘瘙痒
      - 在石膏或夹板内有持续的肿胀或紧绷，但经家庭护理措施后有所改善
      - 敷料上有少量血性渗出物
      - 有关活动或饮食的问题
      - 负压伤口治疗（VAC）装置就位且
      - 容器已满
      - 关闭8小时以上
      action: 居家观察，按家庭护理指导
  home_care:
  - 定时服用止痛药。
  - 按照家庭医生的指示执行家庭护理计划，包括抗生素、伤口检查、运动、饮食、肠道护理和抬高肢体。
  - 根据家庭医生的指示保持伤口清洁干燥。
  - 记住，伤口边缘瘙痒是愈合的迹象。
  - 如果负压伤口治疗（VAC）装置使用中出现任何问题，请立即联系医疗提供者。
  callback_criteria:
  - 【立即急诊】突然出现剧烈疼痛
  - 【立即急诊】手术伤口裂开或张口，并有大量液体流出或物体从伤口突出
  - 【立即急诊】如果是石膏、夹板或骨科手术：
  - 【立即急诊】手指或脚趾冷、蓝或麻木
  - 【立即急诊】严重疼痛、肿胀或紧绷，对抬高或家庭护理措施无反应
  - 【立即急诊】咳血或粉红色泡沫痰
  - 【立即急诊】腿部肿胀和受影响的腿脚脉搏消失、麻木或刺痛
  - 【立即急诊】呼吸短促
  related_protocols:
  - 严重
  - 呼吸问题
  - 石膏/夹板问题
  - 胸痛
  - 便秘
  - 成人
  - 儿童
  - 腿痛/肿胀
  - 成人
  - 儿童
  - 肿胀
  - 无力
  - 缝线或钉子
  - 伤口愈合和感染
- id: injury_trauma_017
  topic_zh: 刺伤
  topic_en: Puncture Wound
  source_file: STCC/Puncture_Wound.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 位置
  - 药物使用情况
  - 破伤风免疫状态
  - 疼痛评分
  - 病史
  triage_levels:
    A:
      criteria:
      - 无法通过压迫止血或喷射性出血
      - 意识水平下降
      - 受伤部位远端无脉搏
      - 呼吸困难
      - 皮肤苍白、出汗或心跳加速
      - 伤口远端皮肤冷、蓝且麻木
      - 高压注射伤
      - 被污染的针刺伤
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 麻木或刺痛感
      - 移动受影响部位困难
      - 关节内的刺伤
      - 伤口内有可见异物且无法移除
      - 通过鞋底的刺伤
      - 发烧、流脓或红色条纹
      - 剧烈疼痛
      - 伤口周围肿胀或瘀伤加剧，受伤者正在服用抗凝血药物
      - 持续存在异物感
      - 脚部伤口且糖尿病史
      action: 立即前往急诊室
    C:
      criteria:
      - 无法移除大碎片
      - 有糖尿病史
      - 无破伤风免疫接种，免疫状态未知，或最后一次破伤风免疫接种超过5年前
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 持续疼痛或肿胀>5天
      - 轻微刺伤
      - 无法移除小碎片
      - 逐渐肿胀
      - 逐渐瘀血
      - 疼痛或肿胀在3天内无改善，且家庭护理措施无效
      - 如果出血量大或喷射状，用干净的绷带或布直接覆盖伤口并呼叫救护车。不要检查出血是否停止。不要尝试从伤口中移除嵌入物。寻求医疗护理。
      action: 居家观察，按家庭护理指导
  home_care:
  - 使用肥皂和水彻底清洁。
  - 每天数次用温水或加入温水中的泻盐浸泡受影响区域10至15分钟。这有助于预防感染并促进愈合。
  - 受伤后几天内给伤口包扎，以保持伤口清洁。
  - 观察感染的迹象：红肿加剧、疼痛加剧、流脓、条纹出现或发烧。
  - 如果脏或污染伤口在5年内未进行破伤风免疫接种，请在24小时内联系主治医生或诊所进行破伤风免疫接种。
  - 如果干净伤口在10年内未进行破伤风免疫接种，请在72小时内联系主治医生或诊所进行破伤风免疫接种。
  - 每天涂抹抗生素软膏2至3次。使用前先浸泡受影响区域。
  - 不要将碎片所在区域泡在水或溶液中，这会导致木材膨胀，妨碍移除。
  callback_criteria:
  - 感染迹象：红肿加剧、疼痛加剧、流脓、条纹出现或发烧
  - 麻木感、刺痛感或疼痛加剧
  - 伤口在2周内未愈合
  - 持续存在异物感
  - 【立即急诊】呼吸困难
  - 【立即急诊】皮肤苍白、出汗或心跳加速
  - 【立即急诊】伤口远端无脉搏
  - 【立即急诊】伤口远端皮肤发绀
  related_protocols:
  - 狂犬咬伤/人咬伤
  - 挫伤
  - 皮肤异物
