  - 既往史
  triage_levels:
    A:
      criteria: []
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 无意识或意识改变
      - 没有脉搏或呼吸
      - 心跳快速或不规则
      - 呼吸困难
      - 颈部以上的烧伤
      - 高电压电击
      - 明显的入口和出口伤口
      action: 立即前往急诊室
    C:
      criteria:
      - 麻木、刺痛、瘫痪
      - 视力、听力或语言问题
      - 头部、面部、颈部、手部、足部或生殖器区域的烧伤
      - 苍白、出汗、头晕或虚弱
      - 从电源处被抛出并出现呼吸困难、胸痛或腹痛
      - 手或脚疼痛或畸形
      action: 当天内联系医生/诊所
    D:
