- id: injury_trauma_009
  topic_zh: 骨骼、关节和软组织损伤
  topic_en: Bone Joint and Tissue Injury
  source_file: STCC/Bone_Joint_and_Tissue_Injury.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 部位
  - 用药情况
  - 疼痛程度评分
  - 病史
  triage_levels:
    A:
      criteria:
      - 意识改变
      - 呼吸困难
      - 剧烈疼痛且无法使用受伤肢体
      - 骨头穿透皮肤
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 手指或脚趾与另一侧相比变冷或发绀
      - 手臂、腿部、手指或脚趾麻木、刺痛或无力
      - 剧烈疼痛
      - 6个月以下婴儿受伤
      - 面部损伤伴有视力问题
      action: 立即前往急诊室
    C:
      criteria:
      - 无法移动受伤部位上方或下方的关节
      - 无法使用该部分或承重
      - 对伤害的原因有可疑解释，尤其是在儿童和老年人中
      - 下颌损伤导致开口困难、活动时疼痛加剧或牙齿不对齐
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 关节疼痛或肿胀，且活动受限
      - 48小时后肿胀或瘀伤加剧
      - 损伤发生后30分钟内出现疼痛、肿胀或变色
      action: 居家观察，按家庭护理指导
  home_care:
  - 在受伤区域敷冰袋以减少肿胀和疼痛，持续24至48小时。之后，交替使用冷热敷。不要直接将冰敷于皮肤上；应在冰与皮肤之间放置一块湿布或其他织物。
  - 抬高受影响部位使其高于心脏水平，有助于减轻肿胀。
  - 用夹板（枕头、杂志、纸板）支撑受伤部位的上下方。
  - 休息。
  - 48小时后使用热敷（湿润的热垫或加热包）。不要在睡觉时使用加热垫。不要直接将加热垫放在皮肤上而不加任何织物隔开。
  - 服用常规止痛药（阿司匹林、对乙酰氨基酚或布洛芬）以缓解不适。不要给儿童服用阿司匹林。<20岁者避免使用类似阿司匹林的产品。肝病患者避免使用对乙酰氨基酚。肾病或胃部问题存在时，或者孕妇情况下，避免使用布洛芬。遵循药物标签上的指示。
  callback_criteria:
  - 疼痛加剧
  - 48小时后疼痛、肿胀或行走能力无改善
  - 【立即急诊】受影响部位变冷或发绀
  - 【立即急诊】受影响部位脉搏消失
