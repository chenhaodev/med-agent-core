- id: skin_rash_wound_004
  topic_zh: 瘀伤
  topic_en: Bruising
  source_file: STCC/Bruising.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 瘀伤原因
  - 瘀伤大小及颜色
  - 用药情况（是否有使用华法林或阿司匹林的历史）
  - 病史
  - 疼痛程度
  triage_levels:
    A:
      criteria:
      - 背部下侧、骨盆、胸部或腹部严重疼痛和瘀伤
      - 眼部受到撞击导致的瘀伤，并且有
      - 虹膜出血严重
      - 视力减退或复视
      - 眼球在各个方向移动困难
      - 眼睛剧烈疼痛
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 肢体严重疼痛和瘀伤
      - 受伤部位严重肿胀
      - 原因不明的多处瘀伤
      - 疑似儿童虐待
      - 出血病史或使用抗凝药物的历史
      action: 立即前往急诊室
    C:
      criteria:
      - 活动受限
      - 感染迹象：疼痛加剧、肿胀、发红、渗出物、发热、热感，或者从该区域延伸的红色条纹
      - 频繁跌倒
      - 最近突然停止使用药物（非处方药、处方药、娱乐性），酒精或咖啡因
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 轻微肿胀
      - 轻微不适
      action: 居家观察，按家庭护理指导
  home_care:
  - 休息受影响区域。
  - 不要按摩或揉搓该区域；这可能会增加瘀伤。
  - 在受伤的24至48小时内，使用冰袋冷敷以减轻肿胀和疼痛。不要直接将冰放在皮肤上；应在冰与皮肤之间放置湿布或其他织物屏障。
  - 抬高受影响部位，以帮助减少肿胀和出血。
  - 从受伤后48小时开始，每天4次，每次20分钟，使用温热湿敷包。
  - 如怀疑虐待，提供援助资源。重要问题包括：
  - 此人现在是否处于安全环境中？
  - 此人是否独自一人？
  - 是否有其他家庭成员处于危险中？
  - 此人过去是否受到过虐待？
  - 施虐者现在在哪里？
  - 是否有家人或朋友可以帮忙？
  - 是否已报警、联系成人保护服务或其他帮助人员？
  - 是否需要家庭成人庇护所或家庭危机热线的电话号码？
  callback_criteria:
  - 严重疼痛
  - 活动受限
  - 频繁瘀伤
  - 48小时后无改善或病情恶化
  related_protocols:
  - 关节和组织损伤
  - 儿童虐待
  - 家庭暴力
  - 老年人虐待
  - 肢体损伤
  - 眼部损伤
  - 跌倒
  - 髋部疼痛/损伤
  - 阴囊问题
  - 肿胀
- id: skin_rash_wound_005
  topic_zh: 面部皮肤问题
  topic_en: Facial Skin Problems
  source_file: STCC/Facial_Skin_Problems.md
  key_questions:
  - 姓名
  - 年龄
  - 起始时间
  - 用药情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 面部突然下垂
      - 严重的面部肿胀
      - 迅速扩散的红或紫色皮疹，并在粘膜（唇、口、眼、生殖器）上形成水泡
      - 大面积皮肤剥落或脱落
      - 无法解释的广泛性疼痛
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 感染迹象：肿胀、红斑、疼痛、发热（体温 >100°F (37.8°C)）、分泌物或红线
      - 大的开放性的排出液体的病变
      action: 立即前往急诊室
    C:
      criteria:
      - 鼻孔周围或唇部有结痂、疼痛的病变
      - 面部一侧出现由1-2天前的疼痛和灼烧感先于皮疹的水泡
      - 持续存在的扁平或稍隆起的边界不规则的病变
      - 痣的颜色、大小或形状最近迅速变化
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 瘙痒性皮疹影响睡眠
      - 对抗生素和家庭护理措施无反应的持续性痤疮
      - 面部潮红
      - 唇部周围有水泡或红色、粗糙或疼痛区域
      - 皮肤下肿大且触痛的硬块
      - 突然出现痣或无痛性肿块
      - 持续超过3周的溃疡
      action: 居家观察，按家庭护理指导
  home_care:
  - 使用温和的肥皂（非处方产品，例如 Aveeno, Basis, Cetaphil, Dove, Neutrogena）清洗，并充分冲洗。
  - 对于感染迹象，每天4到6次，每次20分钟，将热湿敷布应用于患处。
  - 不要挤压或刺破病变部位。
  - 保持头皮头发远离面部。
  - 使用唇部保护剂（Blistex）或止痛药（Campho-Phenique）涂抹于口周溃疡以减轻不适。用凡士林基产品保持溃疡湿润。遵循标签上的指示。向您的药剂师咨询其他非处方产品的建议。
  callback_criteria:
  - 口腔周围持续超过14天的溃疡
  - 没有改善或情况恶化
  - 感染迹象
  - 严重的疼痛或瘙痒影响活动
  - 面部突然下垂或麻木
  - 严重的面部肿胀
  - 迅速扩散的红或紫色皮疹，并在粘膜（唇、口、眼、生殖器）上形成水泡
  - 大面积皮肤剥落或脱落
  - 无法解释的广泛性疼痛
  related_protocols:
  - 面部问题
  - 口腔问题
  - 成人皮疹
  - 儿童皮疹
  - 疑似或暴露
  - 疙瘩和疮
- id: skin_rash_wound_006
  topic_zh: 异物，皮肤
  topic_en: Foreign Body Skin
  source_file: STCC/Foreign_Body_Skin.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 异物
  - 过敏史
  - 药物使用情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 无法移除嵌入的鱼钩
      - 异物嵌入关节空间
      - 深部异物
      - 无法移除外来物质
      - 外来物质粘附于皮肤上
      - 无法移除嵌入耳垂或其他部位的身体穿孔或异物
      - 感染迹象：红肿加剧、疼痛、发热、分泌物或红线
      - 眼睛里有强力胶水
      - 剧烈疼痛
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 无法移除大的刺
      - 嵌入玻璃、塑料或金属物体
      - 破伤风疫苗接种时间超过5年
      - 蜱虫头部嵌入皮肤且无法移除
      action: 立即前往急诊室
    C:
      criteria:
      - 无法移除小刺
      - 持续感觉皮下有异物
      action: 当天内联系医生/诊所
  home_care:
  - 鱼钩移除技巧：
  - 将倒钩推过皮肤，用钢丝钳剪掉倒钩，然后将其从进入的方向拉出。
  - 将倒钩向内和向下稍许推动以脱离皮肤，并将其从皮肤中拔出。
  - 通过鱼钩的弯曲部分套上钓鱼线。将倒钩向内压下并稍微保持不动以使倒钩脱离皮肤，快速拉动钓鱼线取出鱼钩。
  - 用镊子或已用火柴火焰或酒精消毒的针移除刺或其他物体。
  - 不要用水或溶液浸泡有刺的区域，这会导致木材膨胀，从而妨碍移除。
  - 如果有感染迹象或为了帮助移除异物，每天应用热敷包或浸泡4到6次。
  - 在难以移除的刺上涂抹抗生素（新霉素）软膏并覆盖绷带。它们通常会在几天内松动。
  - 移除后，用肥皂和水彻底清洗该区域。
  - 移除柏油或强力胶水的方法：
  - 将凡士林、新霉素、蛋黄酱、矿物油或指甲油去除剂涂抹在受影响的区域（眼睛附近除外）。
  - 不要强行打开皮肤或眼睑。
  - 强力胶水最终会剥落。
  - 如果眼睛被粘住，应用新霉素和热敷包。
  - 柏油可能会留下污渍。
  - 通过用冷水或湿毛巾冷却该区域来降低柏油的热量。
  callback_criteria:
  - 48小时后仍无法移除异物
  - 感染迹象：红肿加剧、疼痛、发热、分泌物或红线
  - 剧烈疼痛
  related_protocols:
  - 蜱虫
  - 身体穿孔问题
  - 四肢损伤
  - 割伤
  - 刺伤
  - 纹身问题
- id: skin_rash_wound_007
  topic_zh: 脱发
  topic_en: Hair Loss
  source_file: STCC/Hair_Loss.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 位置
  - 过敏史
  - 用药情况
  - 既往病史
  triage_levels:
    A:
      criteria:
      - 新发脱发伴发热 >101°F (38.3°C)，且退热措施无效
      - 脱发区域感染迹象
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 持续严重疲劳
      - 服用新药后突然脱发
      - 有甲状腺功能减退病史
      - 头皮上出现直径 ½ 至 1 英寸、中间清晰且发痒的圆形红色斑块
      action: 立即前往急诊室
    C:
      criteria:
      - 压力水平升高
      - 持续脱发 >2 周
      - 有鳞屑、瘙痒、红秃斑点
      - 近期怀孕
      - 家族脱发史
      - 不良饮食习惯
      - 化疗、大型手术或感染史
      - 近期严重节食和体重下降史
      - 维生素A、阿司匹林或肝素使用增加
      - 长期使用头发护理产品或器具
      - 持续的头皮屑或头虱
      - 有紧绷发型、卷发棒或热滚筒使用，或染发、漂白或烫发化学物质应用的历史
      - 数月/年逐渐脱发
      - 正在服用避孕药
      action: 当天内联系医生/诊所
  home_care:
  - 请放心，突发性脱发后头发通常会再生。
  - 避免使用橡皮筋、发夹、编辫子或其他对头发施加张力的发型。
  - 避免拉扯头发。梳洗湿发时使用护发素或防缠结剂减少打结。
  - 如果头发因化学物质或美发技术严重受损，考虑改变发型。
  - 均衡饮食，并按指示服用营养补充品。非处方生物素是一种有助于改善指甲和头发生长的补充剂。
  - 观察是否有持续脱发的模式。
  - 与您的理发师讨论推荐的促进头发生长的产品。
  - 如果在服药或压力事件后出现突发性脱发（通常是在事件发生后1至2个月），尽量减少对头发的操作。安慰患者，通常在事件发生后的3到6个月内头发会重新生长。
  callback_criteria: []
  related_protocols:
