- id: skin_rash_wound_009
  topic_zh: 虱子
  topic_en: Lice
  source_file: STCC/Lice.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 过敏情况
  - 用药情况
  triage_levels:
    A:
      criteria:
      - 持续性皮疹和瘙痒影响睡眠
      - 治疗1周后皮疹仍然存在
      - 溃疡扩散或出现感染迹象
      - 治疗后新卵出现
      - 皮疹消失后再复发
      - 对非处方药或处方治疗药物的局部皮肤反应
      - 发热、倦怠或淋巴结肿大
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 正在接受虱子治疗并有关于用药或防止传播给他人的问题
      - 已知接触过有虱子的人或怀疑感染
      action: 立即前往急诊室
  home_care:
  - 在头发湿润时寻找虱子，每次梳理一小部分，并使用细齿梳、虱子梳或用于猫狗的跳蚤梳。每2到3天重复一次，持续2周。
  - 检查其他家庭成员是否有皮疹或瘙痒。如果存在，请用抗虱洗发水治疗。
  - 如果发现虱子，请将抗虱产品（处方药或非处方药——如Rid、Nix或Pronto洗发水）涂抹在干发上10分钟，并按照标签上的说明操作。不要对蒿草过敏的儿童使用Rid。不要让有哮喘的儿童使用Nix。请务必阅读标签上的警告和禁忌症。7到10天后再次治疗。如有需要，可向药剂师咨询更多产品建议。
  - 在水槽中用冷水冲洗（Nix杀死卵）。
  - 使用细齿梳从发根去除虱卵。将透明胶带贴在头发上也有效于移除虱卵。
  - 要清除睫毛上的虱卵，请每天两次在睫毛上涂抹凡士林，持续8天。
  - 将刷子和梳子浸泡在抗虱洗发水中1小时。
  - 用热水清洗衣物和床单。衣物内翻外洗以破坏藏在缝里的虱子或卵。如有可能，在高温下烘干，并熨烫缝线。将无法清洗的衣物和其他物品放入塑料袋中3天。
  - 清洁家具、地毯和床垫。吸尘并立即丢弃吸尘器袋子。
  - 避免共用个人用品，如梳子、刷子、帽子或毛巾。
  - 虱子高度传染性。避免头对头接触。
  - 每天吹干头发以帮助去除和预防虱子感染。
  - 如果虱子对抗虱药物有抗药性，请在头发上大量涂抹真正的蛋黄酱或橄榄油，并用塑料纸或浴帽覆盖至少3小时。蛋黄酱或橄榄油将有助于窒息虱子。
  - 孩子在接受一次抗虱洗发水治疗后可以返回学校。
  callback_criteria:
  - 【立即急诊】对药物有严重的过敏反应
  related_protocols:
  - 床虫暴露或疑虑
  - 瘙痒
  - 成人皮疹
  - 儿童皮疹
  - 突起和溃疡
- id: skin_rash_wound_010
  topic_zh: 穿孔/囊袋问题
  topic_en: PiercingPocketing Problems
  source_file: STCC/PiercingPocketing_Problems.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 过敏史
  - 类型
  - 位置和穿孔或囊袋的年龄
  - 药物使用情况
  - 疼痛程度
  - 病史
  triage_levels:
    A:
      criteria:
      - 迅速增加的疼痛、肿胀或红斑
      - 从伤口延伸出的红线
      - 白色、黄色或绿色恶臭的伤口分泌物
      - 淋巴结肿大（>1英寸直径）和覆盖部位红斑
      - 耳垂、眼睑、眉毛、舌头、乳头或生殖器撕裂伤无法闭合
      - 无法移除嵌入的穿孔或其他异物
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 疼痛或肿胀加剧
      - 红斑增加或从炎症区域延伸出红线
      - 淋巴结肿大（>1英寸直径）
      - 浓稠的白色、黄色或绿色恶臭分泌物
      - 体温 >100.4°F (38°C)
      - 寒战、身体不适感或头痛
      - 家庭护理措施后无改善
      - 局部温热
      - 穿孔周围出现硬化且疼痛的黑色区域
      - 轻微撕裂伤，最后一次破伤风疫苗接种超过10年
      - 家庭护理三天后无改善
      action: 立即前往急诊室
    C:
      criteria:
      - 穿孔周围的水泡、红斑和/或瘙痒
      - 出血、瘀血、变色或肿胀
      - 珠宝开口处的白色-黄色结痂
      - 开口处的白色浓稠分泌物
      - 舌头变黄白
      action: 当天内联系医生/诊所
  home_care:
  - 将浸泡在盐水溶液（1/4茶匙盐溶于1杯水中）的棉球或纱布敷在穿孔处，每天多次，每次至少1分钟。用清水冲洗后，用纸制品拍干。
  - 清洁穿孔前和活动前应用盐水浸泡，以防止结痂被拉入穿孔，并去除污物。
  - 记住愈合时间可能不同，刺痛、烧灼或疼痛感可能会持续几天。瘙痒通常是愈合的迹象。
  - 愈合期间避免使用阿司匹林。非处方药（布洛芬或对乙酰氨基酚）可以帮助缓解不适和减少肿胀。不要给儿童服用阿司匹林。如果年龄<20岁，应避免类似阿司匹林的产品。如果有肝病，请勿使用对乙酰氨基酚。如果有肾病、胃部问题或怀孕的情况，请勿使用布洛芬。请按照标签上的说明使用。
  - 对于颈部以上的穿孔，抬高床头。
  - 不要在穿孔处使用酒精、聚维酮碘（贝塔定）、过氧化氢或其他刺激性清洁剂。它们会导致过度干燥。
  - 不要在穿孔处涂抹软膏。
  callback_criteria: []
  related_protocols:
  - 耳部损伤
  - 皮肤
  - 生殖器病变
  - 男性生殖问题
  - 撕裂伤
  - 口腔问题
  - 隆起和溃疡
  - 伤口愈合与感染
