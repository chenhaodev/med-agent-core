- id: skin_rash_wound_012
  topic_zh: 带状疱疹：疑似或暴露
  topic_en: 'Shingles: Suspected or Exposure'
  source_file: STCC/Shingles:_Suspected_or_Exposure.md
  key_questions:
  - 名字
  - 年龄
  - 发病时间
  - 是否接触过水痘或带状疱疹
  - 接触日期
  - 是否有水痘感染史或接种史
  - 带状疱疹免疫状态
  - 怀孕状况
  - 皮损描述及位置
  - 药物使用情况
  triage_levels:
    A:
      criteria:
      - 高烧并已知有带状疱疹爆发
      - 新发的认知混乱或谵妄
      - 眼睛周围疼痛、红肿或皮疹
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 面部带有水泡的皮疹
      - 水泡迅速扩散到身体其他部位
      - 伴有寒战、发热或头痛的痛性水泡性皮疹
      - 新发条带状皮疹或水泡，伴有疼痛和当前/近期使用类固醇治疗、免疫系统受损或年龄>65岁的情况
      action: 立即前往急诊室
    C:
      criteria:
      - 1至3天内同一区域先痛后起皮疹或水泡
      - 广泛且疼痛的皮疹
      - 带状疱疹暴露，年龄>50岁，没有过去的水痘、带状疱疹爆发史或接种史
      - 持续严重瘙痒或对家庭护理措施无反应的疼痛
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 脓性水泡在10到12天内结痂
      - 2到3周后结痂脱落
      - 皮疹消失后同一区域持续疼痛
      action: 居家观察，按家庭护理指导
  home_care:
  - 在发作的最初几天，可以将冰袋敷于受影响区域10分钟。不要直接将冰放在皮肤上；使用湿布或其他织物作为隔离。
  - 用冷水和温和的肥皂清洗受累区域，并清洁后敷冷敷包。
  - 每天几次对开放性水泡进行20分钟的冷敷，以帮助干燥水泡。
  - 保持良好的手部卫生。通过直接接触传播。
  - 在病变处开放并有分泌物时，避免与使用类固醇、免疫系统受损、怀孕或没有患过水痘及新生儿的人接触。免疫力低下者应在72小时内接受治疗。
  - 避免抓挠。让水泡干燥后自然脱落结痂。
  - 将玉米淀粉、小苏打、布罗氏溶液或多姆博罗溶液涂抹在有水泡的区域，以保持干燥并促进愈合。尽可能让该部位暴露于空气中。
  - 为了控制瘙痒，可以尝试使用非处方药（如口服苯海拉明[Benadryl]、Caladryl、Cortaid、Cortizone[外用]），并遵循标签上的指示。
  - 服用您通常用于止痛的药物。遵循标签上的说明。
