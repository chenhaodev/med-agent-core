protocols:
- id: skin_rash_wound_001
  topic_zh: 成人皮疹
  topic_en: Rash Adult
  source_file: STCC/Rash_Adult.md
  key_questions:
  - 姓名
  - 年龄
  - 起始时间
  - 原因
  - 位置
  - 病史
  - 伴随症状
  - 用药情况
  triage_levels:
    A:
      criteria:
      - 突发严重荨麻疹或皮疹，呼吸困难，胸闷，喉咙后部或舌头肿胀，或意识改变
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 突然发病并迅速发展为广泛红斑、鳞屑、发热和淋巴结肿大
      - 紫色或血色的平点或小点，头痛，颈部僵硬，呕吐，意识混乱或发热
      - 严重的面部或眼部肿胀
      action: 立即前往急诊室
    C:
      criteria:
      - 新药物相关的皮疹，停止使用该药物。如果是处方药，请联系PCP。
      - 按照容器上的指示服用抗组胺药（如苯海拉明、氯雷他定、阿勒维特或氯-曲美通），直到皮疹和瘙痒消失。前列腺肿大者不要服用抗组胺药。
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 使用炉甘石洗剂或1%氢化可的松软膏。
      - 每2至3小时无肥皂冷浴或淋浴以缓解症状，自然晾干。
      - 在受影响区域使用婴儿爽身粉。
      - 尽可能在暴露后1小时内清洗受暴露区域。
      - 用冷水浸泡或冰敷20分钟，按需进行。
      - 清洗所有与这些植物接触过的衣物和动物。
      - 如果怀孕，请联系PCP。
      - 在皮疹消失前留在家中，以免将疾病传染给他人。
      - 在受影响区域使用抗汗剂、非处方抗真菌霜或Gold Bond Medicated粉末。
      - 用肥皂和水轻轻清洗该区域，然后拍干或用电吹风干燥该区域。
      action: 居家观察，按家庭护理指导
  home_care: []
  callback_criteria: []
  related_protocols: []
- id: skin_rash_wound_002
  topic_zh: 荨麻疹
  topic_en: Hives
  source_file: STCC/Hives.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 疑似原因
  - 皮肤上的红肿痒斑块
  - 过敏史
  - 用药情况
  - 病史
  - 伴随症状
  triage_levels:
    A:
      criteria:
      - 呼吸困难、胸闷或喘息
      - 吞咽困难或舌头或喉咙后部肿胀
      - 困惑、激动或意识水平下降
      - 有蜂蜇史及对蜂蜇过敏
      - 对同一抗原的严重过敏反应史
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 眩晕或头晕
      - 剧烈腹痛
      - 恶心或呕吐
      - 咳嗽快速发作
      - 突然声音嘶哑
      action: 立即前往急诊室
    C:
      criteria:
      - 身体多处迅速出现红肿痒皮疹
      - 脸部或四肢肿胀
      - 服用抗组胺药两天后仍有荨麻疹
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 腹泻或发热
      - 关节肿胀或疼痛
      - 过去接触过需要激素治疗的林木植物（如毒葛、毒橡树或毒漆树）
      - 新用药物
      - 饮食中新添加的食物
      - 使用新的肥皂、洗发水、洗衣粉、衣物、化妆品、牙膏或其他个人护理用品
      - 最近接触了植物或动物，或有新的昆虫叮咬史
      - 间歇性荨麻疹
      - 持续超过7天且影响活动的荨麻疹
      action: 居家观察，按家庭护理指导
  home_care:
  - 对于广泛分布的荨麻疹，可服用非处方抗组胺药（如苯那君、开瑞坦、阿拉维特），直到荨麻疹消失。请按照说明书上的指示使用。服药后不要驾驶或从事需要集中注意力的活动。如有其他产品建议，请咨询药师。
  - 如果怀疑药物是引起反应的原因，应停止使用并联系家庭医生。
  - 冷水浴、小苏打水浴或燕麦粉水浴可能有助于缓解瘙痒和不适感。
  - 涂抹Caladryl或炉甘石洗剂可帮助控制瘙痒和干燥病灶。请按照说明书上的指示使用。限制对幼儿使用Caladryl，因为它可能导致嗜睡。
  - 避免阳光直射。寻找阴凉处并洗澡以冷水为宜，这有助于缓解不适感。
  callback_criteria:
  - 持续超过7天的荨麻疹
  - 服用抗组胺药24小时后仍持续瘙痒
  - 【立即急诊】呼吸困难、胸闷或喘息
  - 【立即急诊】吞咽困难，或舌头或喉咙肿胀
  - 【立即急诊】困惑、激动或意识水平下降
  - 【立即急诊】呼吸困难
  - 【立即急诊】嘴唇或口腔肿胀
  related_protocols: []
