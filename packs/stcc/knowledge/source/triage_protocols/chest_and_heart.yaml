protocols:
- id: chest_and_heart_001
  topic_zh: 胸痛
  topic_en: Chest Pain
  source_file: STCC/Chest_Pain.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 既往心肌梗死史
  - 冠状动脉疾病史
  - 糖尿病史
  - 肺栓塞史
  - 深静脉血栓形成史
  - 伴随症状
  - 用药情况
  - 疼痛评分
  - 病史
  - 胸部植入装置
  triage_levels:
    A:
      criteria:
      - 持续或间歇性疼痛、紧绷感、压迫感或不适伴随有：
      - 呼吸短促
      - 头晕或无力
      - 皮肤湿冷
      - 恶心或呕吐
      - 颈部、肩部、下颚、背部或手臂的疼痛
      - 脸部、嘴唇、耳垂或指甲呈蓝色或灰色
      - 心悸或颤动
      - 胸痛持续存在，休息、止痛药、抗酸剂或每隔5分钟服用一次硝酸甘油（连续3次）均不能缓解
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 近期有创伤，且疼痛随活动加剧。将热敷袋放在受影响区域，每天4次，每次20分钟。
      - 咳嗽持续或加重，采取上述措施后无改善。
      action: 立即前往急诊室
    C:
      criteria:
      - 没有明显的创伤或其他原因，且疼痛在休息时减轻但在活动时加剧。服用硝酸甘油（按医生指示）；如果3-5分钟后仍无缓解，再服用一次，并有人陪同前往急诊室或呼叫救护车。
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 疼痛与已知的创伤或其他原因相符，且采取上述措施后有所改善。继续观察症状并在需要时重复使用热敷或止痛药。
      action: 居家观察，按家庭护理指导
  home_care: []
  callback_criteria:
  - 【立即急诊】持续或间歇性的疼痛、紧绷感、压迫感或不适伴随：
  - 【立即急诊】呼吸短促
  - 【立即急诊】皮肤湿冷
  - 【立即急诊】恶心或呕吐
  - 【立即急诊】颈部、肩部、下颚、牙齿、背部或手臂的疼痛
  - 【立即急诊】脸部、嘴唇、耳垂或指甲呈蓝色或灰色
  - 【立即急诊】心悸或颤动
  - 【立即急诊】连续两次每隔5分钟服用一次硝酸甘油后仍无缓解
  - 【立即急诊】植入体内除颤器反复放电
  - 【立即急诊】剧烈疼痛
  related_protocols:
  - 焦虑
  - 呼吸问题
  - 普通感冒症状
  - 充血
  - 心力衰竭
  - 咳嗽
  - 头晕
  - 胃灼热
  - 心率问题
  - 消化不良
  - 成人呕吐
  - 过度出汗
  - 无力
- id: chest_and_heart_002
  topic_zh: 心率问题
  topic_en: Heart Rate Problems
  source_file: STCC/Heart_Rate_Problems.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 心率
  - 药物
  - 病史
  - 胸部植入装置
  triage_levels:
    A:
      criteria:
      - 胸部、颈部、下颌或手臂疼痛或不适
      - 呼吸困难
      - 皮肤冷湿或热而干燥
      - 脸部或嘴唇发蓝、灰暗或非常苍白
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 持续快速心率>150次/分钟超过30分钟
      - 头晕目眩或晕厥
      - 持续快速心率和有甲状腺疾病或心脏病史
      - 植入体内除颤器反复电击
      - 缓慢的心率并极度疲劳或频繁出现缓慢的心率
      - 持续的慢速心率和间歇>3秒（数1,001，1,002，1,003）
      action: 立即前往急诊室
    C:
      criteria:
      - 频繁出现快速心率
      - 持续缓慢的心率并有心脏病史、全身不适或频繁跌倒
      - 最近有持续呕吐或腹泻的病史
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 之前有过治疗快速心率的历史
      - 最近服用利尿剂、减肥药、去充血剂、感冒药物、β受体阻滞剂、甲状腺药物、新药物或娱乐性毒品
      - 有使用支气管扩张剂的历史，且有新的处方或剂量增加
      - 过量摄入咖啡因、烟草、酒精或草本兴奋剂
      - 睡眠困难或持续疲劳
      - 压力增大
      - 症状出现前<30分钟内进行了运动
      - 频繁漏跳
      - 不明原因的体重增加、疲劳和感到寒冷
      action: 居家观察，按家庭护理指导
  home_care:
  - 减慢心率：
  - 深呼吸；屏住呼吸同时捏紧鼻子。轻轻尝试通过鼻子呼气
  - 深呼吸，像排便一样用力
  - 试图吹起一个气球
  - 洗冷水澡，让冷水溅到脸上和头上
  - 尽量保持冷静
  - 休息放松
  - 试着找出诱因，并如果问题持续，请与主治医生讨论
  - 避免使用似乎会加重问题的药物
  - 避免摄入咖啡因和酒精
  callback_criteria:
  - 问题持续或恶化
  - 头晕目眩
  - 【立即急诊】胸部、颈部、下颌或手臂疼痛
  - 【立即急诊】呼吸困难
  - 【立即急诊】皮肤冷湿
  - 【立即急诊】脸部或嘴唇发蓝、灰暗或非常苍白
  - 【立即急诊】意识丧失或精神状态改变
  related_protocols:
  - 酒精问题
  - 焦虑
  - 呼吸问题
  - 胸痛
  - 头晕
  - 疲劳
  - 头痛
  - 高血压
  - 过度换气
  - 低血压
  - 无力
- id: chest_and_heart_003
  topic_zh: 心力衰竭
  topic_en: Congestive Heart Failure
  source_file: STCC/Congestive_Heart_Failure.md
  key_questions:
  - 姓名
  - 年龄
  - 心力衰竭的发病时间
  - 是否正在接受心力衰竭治疗
  - 服用药物情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 突发严重呼吸困难
      - 胸痛或压迫感
      - 精神状态改变
      - 唇部、舌头或指甲发绀（蓝紫色）
      - 面色苍白或灰暗
      - 因呼吸困难无法说出>2-3个词的句子
      - 极度疲劳
      - 咳出泡沫状粉红色或大量白色痰液
      - 感觉窒息
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 焦虑加剧
      - 平躺或活动时呼吸困难逐渐加重
      - 劳力性呼吸困难
      - 说话断句
      - 有发热和咳嗽的上呼吸道感染
      - 1至4天内体重突然增加3到4磅
      - 腿部、脚部或腹部突然肿胀加剧
      action: 立即前往急诊室
    C:
      criteria:
      - 睡眠困难
      - 踝部水肿加重
      - 疲劳或无力加剧
      - 频繁干咳
      - 1天内体重增加>3磅
      - 喘息加剧
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 充血、打喷嚏、咳嗽但无发热
      - 看护者或个人担心，但无其他症状
      - 踝部间歇性肿胀
      action: 居家观察，按家庭护理指导
  home_care:
  - 按处方服药。
  - 与主治医生和实验室检测保持定期约见。
  - 每日早餐前排便后测量体重。记录下来，并在就诊时携带。
  - 遵循医护人员指导的低盐饮食。
  - 安排活动，如果活动导致呼吸困难加剧，请减慢速度。
  - 避免饮酒和吸烟。
  callback_criteria:
  - 呼吸困难、喘息、咳嗽或疲劳加重
  - 因呼吸问题或尿量增加而睡眠困难
  - 1天内体重增加>3磅
  - 踝部肿胀加剧
  - 病情恶化或无改善
  - 突发严重呼吸困难
  - 胸痛或压迫感
  - 精神状态改变
  - 唇部、舌头、面部或指甲发绀（蓝紫色）
  - 无法说话
  - 极度疲劳
  - 咳出泡沫状粉红色或大量白色痰液
  - 感觉窒息
  related_protocols:
  - 踝部问题
  - 呼吸困难
  - 胸痛
  - 咳嗽
  - 头晕
  - 疲劳
  - 腿部疼痛/肿胀
  - 水肿
  - 无力
  - 喘息
- id: chest_and_heart_004
  topic_zh: 高血压
  topic_en: Hypertension
  source_file: STCC/Hypertension.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 已知高血压情况
  - 最后一次升高的血压读数
  - 服用的药物
  - 病史（如果怀孕
  - 请参阅妊娠高血压协议）
  triage_levels:
    A:
      criteria:
      - 除高血压外还有胸痛
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 有主动脉或腹主动脉夹层病史
      - 剧烈头痛、视力模糊、恶心或呕吐
      - 嗜睡或意识混乱
      - 手脚持续麻木和刺痛感
      - 咳血或带血的痰
      - 呼吸困难
      - 鼻出血经家庭护理措施无法缓解
      - 舒张压 >110 mm Hg
      - 严重乏力
      - 正在接受血压控制治疗，且持续血压 >160/100 mm Hg
      - 头晕或轻度头昏
      action: 立即前往急诊室
    C:
      criteria:
      - 开始新的降压药后出现间歇性眩晕期
      - 偶发鼻出血
      - 血压升高且最近改变了降压药物
      - 血压升高且服用非处方感冒药
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 持续血压读数 >140/90 mm Hg
      - 近期压力增大
      - 酒精消耗量增加
      - 血压升高且漏服药物
      action: 居家观察，按家庭护理指导
  home_care:
  - 如果血压 >140/90 mm Hg，每周测量一次。
  - 避免吸烟和饮酒。
  - 均衡饮食，低脂肪、低盐。如体重超标，开始减肥计划。停止使用咖啡因、尼古丁和甘草。
  - 定期锻炼。从散步开始。
  - 学习有效管理压力的方法。阅读、锻炼、参加减压课程、冥想、做瑜伽。
  - 如果正在服用降压药，避免使用含有抗组胺剂和去充血剂的感冒药。在服用此类药物前请咨询家庭医生。
  - 规律服用血压药物。不要漏服剂量。未经家庭医生同意不得擅自停药或改药。
  - 出现高血压症状时，不要驾车。
  callback_criteria:
  - 开始新的降压药后出现间歇性眩晕、便秘、阳痿或舌肿胀期
  - 正在接受血压控制治疗且持续升高血压 >160/100 mm Hg
  - 血压 >140/90 mm Hg 持续超过3个月
  related_protocols: []
- id: chest_and_heart_005
  topic_zh: 低血压
  topic_en: Hypotension
  source_file: STCC/Hypotension.md
  key_questions:
  - 姓名
  - 年龄
  - 起始时间
  - 最近的收缩压读数
  - 用药情况
  - 病史
  triage_levels:
    A:
      criteria: []
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 冷、苍白、湿润的皮肤
      - 嗜睡或意识模糊
      - 发热和快速脉搏
      - 肩部或腹部疼痛
      - 最近受伤、跌倒或受到钝力冲击
      - 快速脉搏>120 bpm
      - 发热，快速脉搏，低血压
      action: 立即前往急诊室
    C:
      criteria:
      - 坐起或从坐位起身时感觉要昏倒
      - 持续出血
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 开始使用新的降压药物后出现头晕期
      - 在服用降压药物或利尿剂期间，低血压和症状持续存在
      - 持续的收缩压<90 mm Hg且无其他症状
      - 来电者对低血压感到担忧但没有其他症状
      action: 居家观察，按家庭护理指导
  home_care:
  - 改变姿势时动作要缓慢，如从坐位到站起。
  - 按照医生的处方服用药物。
  - 节食或减肥过程中避免突然显著减轻体重；在减肥中使用利尿剂时也要注意这一点。
  - 如果正在服用降压药，应避免使用含有抗组胺和去充血成分的感冒药。在服用这类药物前咨询主治医师（PCP）。
  - 定期服用血压药，不要漏服。
  callback_criteria:
  - 开始使用新的降压药物后出现头晕期
  - 在接受医疗护理以控制血压的情况下，持续的收缩压<90 mm Hg
  - 反复发生昏厥
  - 【立即急诊】冷、苍白、湿润的皮肤
  - 【立即急诊】嗜睡或意识模糊
  - 【立即急诊】发热和快速脉搏
  - 【立即急诊】胸部或腹部疼痛
  - 【立即急诊】快速脉搏>120 bpm
  - 【立即急诊】发热，低血压，或快速脉搏
  related_protocols:
  - 成人
  - 儿童
  - 胸痛
  - 寒冷暴露问题
  - 意识模糊
  - 头晕
  - 昏厥
  - 心率问题
  - 无力
- id: chest_and_heart_006
  topic_zh: 休克，疑似
  topic_en: Shock Suspected
  source_file: STCC/Shock_Suspected.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 用药情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 心跳微弱且快速
      - 呼吸急促而浅表
      - 焦虑不安
      - 昏厥、头晕、无力、精神状态改变、无反应
      action: 立即呼叫救护车（120）
    B:
      criteria: []
      action: 立即前往急诊室
  home_care:
  - 清理气道，并在必要时提供心肺复苏。
  - 让患者平躺，头部垫枕头，双腿抬高约12英寸（30厘米）。
  - 如果怀疑头部、颈部、背部或胸部受伤，则保持腿部平直并支撑颈部。
  - 通过直接按压出血部位来控制任何出血。
  - 保暖；用毯子覆盖。在炎热的气候中，让患者保持凉爽。
  - 如发生呕吐，将患者侧向一侧躺下，保持头颈和身体成一直线。
  - 即使患者口渴也不要给予任何饮料。
  - 提供安慰和支持以帮助缓解焦虑。
  callback_criteria: []
  related_protocols:
  - 精神状态异常
  - 焦虑
  - 严重出血
  - 呼吸困难
  - 意识混乱
  - 电击伤害
  - 心率问题
  - 热暴露问题
  - 低血压
  - 无力
- id: chest_and_heart_007
  topic_zh: 胸部创伤
  topic_en: Chest Trauma
  source_file: STCC/Chest_Trauma.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 用药情况
  - 疼痛评分
  - 既往史
  triage_levels:
    A:
      criteria:
      - 严重呼吸困难
      - 意识改变
      - 嘴唇或面部发绀、非常苍白或灰暗
      - 吸气时胸伤口有气泡
      - 胸部或胸骨上方的剧烈疼痛
      - 异物刺入胸壁
      - 呼吸困难，疼痛，以及吸气时胸廓内陷，呼气时外突
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 移动或呼吸时疼痛加剧
      - 呼吸困难加重
      - 咳血或粉红色泡沫痰
      action: 立即前往急诊室
    C:
      criteria:
      - 持续性疼痛 >48 小时
      - 绿、黄或棕色痰 >48 小时
      - 24小时后出现头晕
      action: 当天内联系医生/诊所
  home_care:
  - 对于吸吮性胸伤口，用塑料薄膜或几层胶带覆盖伤口以防止空气进入。在患者呼气时密封。
  - 不要移除刺入胸部的异物。
  - 服用常规止痛药（阿司匹林、对乙酰氨基酚或布洛芬）。不要给儿童服用阿司匹林。如果年龄 <20 岁，避免使用类似阿司匹林的产品。如果有肝病，避免使用对乙酰氨基酚。如果有肾病、胃部问题或怀孕的情况，避免使用布洛芬。按照标签上的指示服用。
  - 如果移动时疼痛加剧，可用枕头支撑疼痛的肋骨。
  callback_criteria:
  - 呼吸困难加重、发热、疼痛或头晕
  - 绿、黄或棕色痰
  - 【立即急诊】意识改变
  - 【立即急诊】突然剧烈疼痛或呼吸困难
  - 【立即急诊】皮肤湿冷苍白
