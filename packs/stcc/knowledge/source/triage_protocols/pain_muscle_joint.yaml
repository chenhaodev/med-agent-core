- id: pain_muscle_joint_005
  topic_zh: 手指和脚趾问题
  topic_en: Finger and Toe Problems
  source_file: STCC/Finger_and_Toe_Problems.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 导致原因
  - 过敏情况
  - 用药历史
  - 病史
  triage_levels:
    A:
      criteria:
      - 截肢或接近截肢
      - 畸形伴有皮肤破裂或骨头穿透皮肤
      - 手指或脚趾比其他手指和脚趾冷或发蓝
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 明显的畸形或脱位
      - 剧烈疼痛
      - 无法取下戒指，且手指开始变苍白、白色或蓝色
      - 发烧或寒战
      - 指甲松动或脱落
      - 高压射钉枪伤害
      - 关节穿刺伤
      - 无法通过压迫止血
      action: 立即前往急诊室
    C:
      criteria:
      - 肿胀且触痛的手指垫
      - 感染迹象：疼痛增加、肿胀、红斑、发热、红色条纹或分泌物
      - 受伤处最近的关节活动困难
      - 手指和脚趾比其他手指和脚趾麻木
      - 指甲下有血液，伴有疼痛加剧或压力感
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 无外伤的情况下出现疼痛或肿胀
      - 按照家庭护理指导后仍无法取下戒指
      - 中度肿胀
      - 糖尿病患者伤口愈合缓慢
      - 指甲变色和增厚
      action: 居家观察，按家庭护理指导
  home_care:
  - 受伤后24至48小时内间歇性冰敷，并抬高该肢体。不要直接将冰块放在皮肤上，应在冰与皮肤之间放置一条湿布或其他织物屏障。
  - 立即在受伤后取下戒指，以防止肿胀发生。使用肥皂、润肤露、凡士林或其它润滑剂。
  - 通过将其绑在相邻的手指上来固定受伤的手指或脚趾。
  - 服用您平时的止痛药（阿司匹林、对乙酰氨基酚、布洛芬）。不要给儿童服用阿司匹林。20岁以下者避免使用类似阿司匹林的产品。肝病患者应避免使用对乙酰氨基酚。肾病、胃部问题或怀孕的情况下应避免使用布洛芬。遵循标签上的指示。
  - 如果无已知伤害出现肿胀或疼痛，或存在感染迹象，抬高该肢体，并每天4次每次20分钟用温水浸泡患处。
  - 在指甲愈合过程中注意观察感染迹象。一天多次将手指或脚趾浸入温水中以缓解疼痛并促进愈合。
  callback_criteria:
  - 感染迹象：疼痛增加、肿胀、红斑、发热、红色条纹、发烧或分泌物
  - 冰敷和抬高措施无法缓解的剧烈疼痛和肿胀
  - 无法取下戒指，且手指开始变苍白、白色或蓝色
  - 剧烈疼痛且无法执行释放指甲下血液的操作
  - 家庭护理措施48小时后疼痛、肿胀或使用该肢体的能力没有改善
  - 治疗一周以上问题仍然存在
  - 【立即急诊】与其它手指和脚趾相比，手指或脚趾变冷或发蓝
  related_protocols: []
- id: pain_muscle_joint_006
  topic_zh: 足部问题
  topic_en: Foot Problems
  source_file: STCC/Foot_Problems.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 过敏史
  - 糖尿病或血管疾病史
  - 用药情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 脚比另一只冷或发蓝
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 无法行走或移动脚
      - 发烧且脚趾关节红肿痛
      - 糖尿病患者且有开放性伤口或家庭护理措施无效的感染
      action: 立即前往急诊室
    C:
      criteria:
      - 超过1周未愈合的伤口
      - 持续超过1周的肿胀
      - 脚趾关节红、肿、痛且发热，没有已知的受伤史
      - 足底有红、肿、痛区域
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 行走或跑步后的疼痛
      - 脚趾周围有红、肿、热区
      - 受伤后脚趾肿胀且淤青
      - 长时间行走或站立后双脚疼痛
      - 持续瘙痒
      - 足间或足底皮肤软、红、脱皮
      - 过多出汗或异味
      - 足底有硬的扁平痛性结节
      - 脚趾和脚侧有硬皮结块
      - 早晨起床时足底疼痛
      - 皮肤干裂
      action: 居家观察，按家庭护理指导
  home_care:
  - 出现感染迹象（疼痛、肿胀、红斑、红线、分泌物或温暖），每天4至6次，每次20分钟，在受影响区域使用湿热敷包。
  - 受伤后，抬高脚并每天4至6次，每次20分钟，将冰袋放在该区域。在最初的24到48小时内用弹性绷带包裹以减少肿胀。不要直接将冰放在皮肤上，应在冰和皮肤之间放置一块洗布或其他织物屏障。
  - 用胶带将受伤的脚趾固定到相邻的脚趾7至10天，提供支撑并促进愈合。
  - 在疼痛硬结周围应用海绵环，以减少鞋子对区域的压力。
  - 穿合适的鞋。
  - 晚上使用非处方药（DuoFilm, DuoPlant, Wart-Off）治疗足底疣。遵循标签上的指示。小心避免将药物涂到周围的敏感皮肤上。
  - 对于脱皮和刺激的皮肤，经常清洗并干燥。穿着棉或其他天然纤维的袜子和透气鞋或凉鞋。在受影响区域应用非处方抗真菌霜、喷雾或粉末。
  - 沿直线修剪脚趾甲，但不要剪得太短。
  - 每天两次将保湿手或身体乳液（Alpha-Keri, Curel, Vaseline Intensive Care）涂抹到干燥开裂的皮肤上。遵循标签上的指示。避免赤脚行走。
  - 休息并抬高双脚以缓解不适和肿胀。在温水和泻盐中浸泡疼痛的双脚。
  - 减少负重活动，直到无痛为止。
  - 对于跟部疼痛，每天4次每次20分钟使用冰敷，并在负重活动后应用。不要直接将冰放在皮肤上，应在冰和皮肤之间放置一块洗布或其他织物屏障。
  - 对于持续性足底或跟部疼痛，在早晨起床时及全天进行足部锻炼。坐姿下，用受影响的脚画出字母表中的每个字母。
  - 服用常规止痛药（阿司匹林、对乙酰氨基酚或布洛芬）。不要给儿童使用阿司匹林。<20岁的避免使用类似阿司匹林的产品。<存在肝病时避免使用对乙酰氨基酚。存在肝病时，避免使用对乙酰氨基酚。
  callback_criteria:
  - 【立即急诊】脚比另一只冷或发蓝
  related_protocols:
  - 踝关节问题
  - 肢体损伤
  - 手指和脚趾问题
  - 关节疼痛/肿胀
- id: pain_muscle_joint_007
  topic_zh: 手/腕部问题
  topic_en: HandWrist Problems
  source_file: STCC/HandWrist_Problems.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 用药情况
  - 破伤风免疫状态
  - 疼痛评分
  - 病史
  triage_levels:
    A:
      criteria:
      - 无法通过加压止血或有喷射性出血
      - 骨头穿透皮肤
      - 意识改变
      - 受伤部位远端没有脉搏
      - 呼吸困难
      - 胸闷和疼痛放射至颈部、下颌或肩部
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 受影响肢体的手指发冷、变蓝且麻木
      - 挤压伤
      - 穿刺伤：子弹、刀子、钉子等
      - 高压注射伤害
      - 明显的畸形，但远端脉搏存在
      - 体力劳动后突然出现手臂或手部疼痛
      action: 立即前往急诊室
    C:
      criteria:
      - 突然严重肿胀
      - 石膏或夹板固定，并且颜色、感觉或运动减弱
      - 深割伤，已止血
      - 突发剧烈疼痛
      - 包扎的肢体在手指活动时感到疼痛
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 中度疼痛
      - 无法从伤口清除泥土或其他异物
      - 活动时疼痛
      - 发烧、肿胀、伤口有分泌物或红纹
      - 不能握拳
      - 受伤区域上方或下方的关节无法移动
      - 手指或手部无法使用
      - 对伤害的解释存疑
      - 大的裂伤
      - 重复运动时疼痛加剧
      - 逐渐肿胀
      - 逐渐淤青
      - 关节活动时疼痛
      - 割伤或穿刺伤口且破伤风疫苗接种时间超过10年（污染伤口则为5年以上）
      - 3天后疼痛或肿胀没有改善，对家庭护理措施无反应
      - 持续2周以上的疼痛或肿胀
      - 慢性疼痛
      - 无已知伤害且疼痛或活动受限超过3天
      - 关节痛或肿胀且活动范围有限
      - 受伤后30分钟内出现肿胀或淤青
      - 夜间手部麻木或刺痛
      action: 居家观察，按家庭护理指导
  home_care:
  - 从受影响的肢体上取下所有戒指。
  - 将手抬高至心脏以上，以帮助减少肿胀。
  - 在受伤部位敷冰袋24小时内以减轻肿胀和疼痛。之后交替使用冷热敷。不要直接将冰放在皮肤上；应在冰与皮肤之间放置湿布或其他布料屏障。
  - 对腕部和手部施加压力绷带，并在最初24至48小时内固定，以减少肿胀。如果应用后出现麻木或刺痛，请松开绷带。
  - 让受影响区域休息。
  - 用抗菌肥皂和流动水清洗伤口，并覆盖无菌敷料。
  - 服用常规止痛药来缓解不适。不要给儿童服用阿司匹林。20岁以下者不应使用阿司匹林。根据需要选择其他药物。
  callback_criteria: []
  related_protocols:
  - 肢体或手的问题
  - 关节炎问题
  - 石膏/夹板问题
  - 肢体损伤
  - 麻木和刺痛感
  - 无力
- id: pain_muscle_joint_008
  topic_zh: 髋部疼痛/损伤
  topic_en: Hip PainInjury
  source_file: STCC/Hip_PainInjury.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 用药情况
  - 破伤风免疫状态
  - 病史
  - 疼痛程度评分
  triage_levels:
    A:
      criteria:
      - 骨骼穿出皮肤
      - 患肢较另一侧短
      - 明显畸形
      - 跌倒后无法负重站立
      - 足部外旋或内旋
      - 运动或感觉减退
      - 受伤侧足趾发绀或灰暗
      - 新出现，一侧脚温度低于另一侧
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 行走时剧烈疼痛
      - 严重瘀伤
      - 麻木或刺痛感
      - 损伤及有出血障碍病史
      action: 立即前往急诊室
    C:
      criteria:
      - 近期损伤或跌倒后，行走或移动时中等程度疼痛
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 通常止痛措施无法缓解的慢性疼痛
      - 损伤、运动或跌倒后的间歇性疼痛
      action: 居家观察，按家庭护理指导
  home_care:
  - 尽可能在48小时内让受伤部位休息。
  - 前24小时将腿抬高放在枕头上。
  - 在前24至48小时内，每3到4小时对受伤区域应用冰袋20到30分钟，之后交替使用热敷。不要直接将冰块放在皮肤上；在冰和皮肤之间放置一块湿布或其他织物屏障。
  - 按常规服用止痛药。不要给儿童服用阿司匹林。年龄<20岁者避免使用类似阿司匹林的产品。肝病患者避免使用对乙酰氨基酚。肾病、胃部问题或孕妇应避免使用布洛芬。遵循药品标签上的说明。
  - 避免引起疼痛的活动。
  - 运动前热身并拉伸。
  - 如果运动时疼痛加剧，频繁休息。
  callback_criteria:
  - 【立即急诊】呼吸困难
  - 【立即急诊】运动或感觉减退
  - 【立即急诊】受伤侧足趾发绀或灰暗
  - 【立即急诊】新出现，一侧脚温度低于另一侧
  related_protocols:
