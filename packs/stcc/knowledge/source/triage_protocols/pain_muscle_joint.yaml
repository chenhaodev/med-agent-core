- id: pain_muscle_joint_013
  topic_zh: 肌肉痉挛
  topic_en: Muscle Cramps
  source_file: STCC/Muscle_Cramps.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 过敏史
  - 既往病史
  - 疼痛评分
  - 用药情况
  triage_levels:
    A:
      criteria:
      - 受伤后出现痉挛，无法移动或使用肢体
      - 小腿无明显外伤但触痛且肿胀
      - 四肢苍白、发蓝或感觉冷，与其他四肢相比，或者四肢麻木
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 小腿无明显外伤但有红肿区域
      - 服用新药后突然发作
      - 痉挛干扰了日常活动
      - 频繁使用利尿剂
      action: 立即前往急诊室
    C:
      criteria:
      - 剧烈运动期间或之后几小时内出现痉挛
      - 过度出汗且未能充分补充水分
      - 经常在运动时感到小腿疼痛，休息后症状消失
      - 长时间坐着、站立或保持不自然的姿势
      - 夜间发生腿部痉挛
      action: 当天内联系医生/诊所
  home_care:
  - 在剧烈运动前进行15到20分钟的伸展练习。
  - 剧烈运动或过度出汗后，在凉爽的地方休息并补充流失的水分。可以喝含1/4茶匙盐的一夸脱水、运动饮料、果汁、汽水或清水。
  - 与医生讨论利尿剂的使用情况。服用非处方利尿剂时，确保充分补充流失的水分。遵循标签上的指示。
  - 长时间坐着、站立或保持不自然姿势后，通过伸直腿部并拉回脚部来缓解肌肉痉挛，或者站起并将脚压在地板上。
  - 对于肌肉痉挛应用温热敷布，对于受伤部位则用冰袋冷敷20分钟，每天4到6次，在最初的24小时内。不要直接将冰块放在皮肤上。使用湿布或其他屏障保护皮肤免受冻伤。不要在加热垫上入睡。如果患有糖尿病，请小心使用热或冷。
  - 服用常规的止痛药（阿司匹林、对乙酰氨基酚、布洛芬）。不要给儿童服用阿司匹林。20岁以下者避免使用类似阿司匹林的产品。存在肝病时避免使用对乙酰氨基酚。存在肾病或胃部问题，或者怀孕的情况下应避免使用布洛芬。遵循标签上的指示。
  callback_criteria: []
  related_protocols:
  - 背痛
  - 关节和组织损伤
  - 四肢损伤
  - 关节疼痛/肿胀
  - 腿部疼痛/肿胀
- id: pain_muscle_joint_014
  topic_zh: 颈痛
  topic_en: Neck Pain
  source_file: STCC/Neck_Pain.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 相关症状
  - 药物使用情况
  - 病史
  - 疼痛程度评分
  triage_levels:
    A:
      criteria: []
      action: 立即呼叫救护车（120）
    B:
      criteria: []
      action: 立即前往急诊室
    C:
      criteria:
      - 心脏病或心绞痛病史
      - 颌部疼痛
      - 出汗、心悸、恶心和/或呕吐
      - 呼吸困难
      - 低头时疼痛加剧并伴有以下任何情况：
      - 意识模糊/嗜睡
      - 严重头痛
      - 紫色或血色皮疹
      - 双臂和双腿的麻木、刺痛或无力感
      - 排便或排尿控制变化
      - 头部不自主地转向一侧
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 单侧手臂无力或麻木
      - 感染迹象：疼痛、肿胀、红斑、渗出物、温热感或红色条纹
      - 体温>103°F (39.4°C)
      - 体温>101°F (38.3°C) 且有糖尿病史、老年人、免疫抑制或静脉药物滥用者
      - 淋巴结肿大疼痛 >1英寸（2.5厘米）
      - 淋巴结肿胀疼痛并伴有吞咽困难
      - 颈痛伴随咽喉痛
      - 疼痛影响睡眠或活动
      - 颈部一侧或双侧肿胀
      - 睡觉姿势不正确
      - 新的运动或活动
      - 最近携带了重型包、手提包或其他物品，使用肩带
      - 侧面移动时疼痛加剧
      - 有长时间坐在电脑终端或工作站前的病史
      - 间歇性疼痛且有先前的颈部问题病史
      action: 居家观察，按家庭护理指导
  home_care:
  - 每2小时使用热敷袋在颈部加热20分钟。糖尿病患者小心使用热疗，不要睡在电热垫上。
  - 睡觉时用毛巾折叠围绕颈部以减少颈部活动。
  - 携带手提包或公文包时放在手臂下，而不是肩上。
  - 避免长时间坐着。经常伸展和移动身体。
  - 定期锻炼以增强颈肌。
  - 泡热水澡或漩涡浴缸。
  - 按照医生的指示服用常用的止痛药（阿司匹林、对乙酰氨基酚、布洛芬）。不要给儿童服用阿司匹林。年龄<20岁者避免使用类似阿司匹林的产品。肝病患者避免使用对乙酰氨基酚。肾病或胃问题存在时，或者怀孕期间，避免使用布洛芬。遵循标签上的指示。
  - 保持良好的姿势和正确的身体对齐。
  callback_criteria:
