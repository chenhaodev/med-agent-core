- id: pain_muscle_joint_012
  topic_zh: 腿痛/肿胀
  topic_en: Leg PainSwelling
  source_file: STCC/Leg_PainSwelling.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 病史
  - 药物（如果腿痛和肿胀是由近期受伤引起的
  - 请参见肢体损伤协议。）
  triage_levels:
    A:
      criteria:
      - 咳血或粉红色泡沫状痰
      - 严重呼吸困难
      - 突然发作且脚或脚趾发冷或变蓝
      - 突然发作且受影响腿部的脚没有脉搏，并伴有麻木或刺痛
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 大腿、小腿、踝部或脚趾严重肿胀和疼痛
      - 无法行走
      - 儿童不愿意使用或移动该腿
      - 踝部、小腿或大腿区域触感温暖；从该区域延伸出的红色条纹
      - 一条腿或踝部突然肿胀
      - 感染迹象且免疫功能低下
      action: 立即前往急诊室
    C:
      criteria:
      - 疼痛持续或在下列情况下加剧：
      - 行走或站立时
      - 休息时
      - 抬高腿部时
      - 屈曲脚部时
      - 新处方药物
      - 晚上肿胀加重
      - 孕期且近期出现症状
      - 家庭护理后无改善
      - 最近体重增加>10磅（4.5公斤）
      - 有血栓、癌症、糖尿病、心脏病、免疫抑制、肝病或肾病史
      - 感染迹象，如肿胀、疼痛、发热、引流、红色条纹
      - 儿童跛行且膝部或髋部疼痛
      - 活动时疼痛加剧，影响日常活动
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 其他关节疼痛
      - 全身不适感
      - 运动后小腿胫骨前方疼痛
      - 持续性疼痛但不影响活动
      - 睡眠中因肌肉痉挛醒来
      - 截肢后持续的幻痛
      action: 居家观察，按家庭护理指导
  home_care:
  - 将腿抬高放在枕头上，使脚高于心脏。不要在膝盖下方放任何东西。将枕头放在小腿下。
  - 减少饮食中的盐分摄入。
  - 休息并减少活动量。
  - 对患处应用热敷。如果运动后胫骨疼痛，使用冰块冷敷。不要直接将冰块放在皮肤上。在冰块和皮肤之间放置一块湿布或其他织物作为屏障。
  - 不要按摩该区域。
  - 避免长时间坐着或站着，但如果这些活动不可避免，请频繁移动脚趾和小腿肌肉。
  - 白天试穿弹性支撑袜。
  - 尝试通常用于缓解不适的药物。不要给儿童服用阿司匹林。如果年龄<20岁，避免使用类似阿司匹林的产品。如果存在肝病，则避免使用对乙酰氨基酚。如果有肾病或胃部问题，或者在孕期，避免使用布洛芬。按照标签上的指示用药。
  - 与医生讨论截肢后的幻痛。有许多治疗选项，包括药物、针灸、脊髓刺激器、镜箱疗法、注射、植入装置、生物反馈和按摩疗法。
  - 联系美国残肢者联盟 @ www.amputee-coalition.org 获取国家同伴网络的信息。
  callback_criteria:
