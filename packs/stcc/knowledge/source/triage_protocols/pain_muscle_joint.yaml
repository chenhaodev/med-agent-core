- id: pain_muscle_joint_015
  topic_zh: 肩部疼痛/损伤
  topic_en: Shoulder PainInjury
  source_file: STCC/Shoulder_PainInjury.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 过敏史
  - 用药情况
  - 病史
  - 疼痛评分
  triage_levels:
    A:
      criteria:
      - 肩部、颈部、下巴或胸部突然疼痛，并伴有呼吸短促或出汗
      - 受伤后肩部出现畸形、瘀伤和活动受限
      - 月经延迟超过4周的女性出现肩部和腹部突然疼痛
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 最近有肩部、腹部或背部钝挫伤史
      - 发热，关节肿胀、红润或温暖，并伴有近期疾病
      - 无法抬起手臂或移动肩部
      - 腹痛放射到肩部
      action: 立即前往急诊室
    C:
      criteria:
      - 其他关节突然疼痛
      - 最近肩部受伤，且在冰敷、热疗和休息超过3天后疼痛未改善
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 肩部进行性酸痛，活动时加剧
      - 进行性疼痛和僵硬
      - 疼痛到一天结束或重复使用或侧向伸展手臂时加重
      - 腹腔镜手术后肩部或上胸部疼痛
      action: 居家观察，按家庭护理指导
  home_care:
  - 初次受伤后，24至48小时内每次20到30分钟，每天4到6次使用冰敷。之后可使用湿热敷。休息肩膀24至48小时。不要直接将冰放在皮肤上。不要在加热垫上睡觉。
  - 避免提、拉或推重物。
  - 对于无损伤的疼痛，每次20到30分钟，每天4到6次使用湿热敷。
  - 如无已知损伤，可通过缓慢逐渐伸展来活动关节，尽量抬高手臂。向下、向前、向上及向两侧伸展。
  - 服用常规止痛药（阿司匹林、对乙酰氨基酚或布洛芬）缓解不适，并遵循标签上的指示。不要给儿童服用阿司匹林。肝病患者避免使用对乙酰氨基酚。
  - 如果在电脑或其他重复运动活动中工作，若肩部疼痛持续到一天结束时加重，可以考虑进行工作站的工效学评估。
  callback_criteria:
