protocols:
- id: pain_muscle_joint_001
  topic_zh: 背痛
  topic_en: Back Pain
  source_file: STCC/Back_Pain.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 疼痛部位
  - 药物使用情况
  - 疼痛程度评分
  - 既往病史
  triage_levels:
    A:
      criteria:
      - 双腿进行性无力
      - 新发突发的腿部或脚部麻木刺痛感，或膀胱/肠道控制丧失
      - 新发的会阴或肛门区域麻木
      - 60岁以上人群的新发迅速加重疼痛
      - 头晕、眩晕或腹部胀满感
      - 4小时以上无法排尿且感觉膀胱充盈
      - 皮肤凉湿
      - 疼痛放射至颈部、肩部、下颌或手臂
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 伴有血尿的剧烈疼痛
      - 腿部、脚部或脚趾活动困难
      - 女性发热伴恶心呕吐
      - 长时间卧床或轮椅使用后突发疼痛，或年龄>60岁
      - <60岁人群的新发迅速加重疼痛
      - 疼痛放射至会阴或生殖器区域
      - 已知癌症史且突然出现新的背痛
      action: 立即前往急诊室
    C:
      criteria:
      - 疼痛放射至臀部或四肢
      - 持续性剧烈疼痛
      - 排尿频繁或排尿时疼痛
      - 因不适行走困难
      - 非处方药无效
      - 男性发热伴恶心呕吐
      - 创伤史超过48小时
      - 糖尿病、免疫系统受损或使用类固醇的历史
      - 癌症史或不明原因的体重减轻
      - 静脉药物滥用
      - 夜间或躺下时疼痛加剧
      - 同一区域出现水泡或皮疹和疼痛
      - 持续性膀胱/肠道控制丧失
      - 持续性的腿部或脚部麻木刺痛感
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 慢性背痛、背部问题、背部手术、肾结石或肾脏疾病史
      - 无放射性或活动受限的轻微疼痛
      - 发热伴流感症状
      action: 居家观察，按家庭护理指导
  home_care:
  - 限制轻度活动2至3天。
  - 使用硬床垫，或者在软床垫下放置木板。
  - 避免长时间坐着、举重或跳跃等活动直到疼痛缓解（不要卧床不起）。
  - 按照医嘱服用常规止痛药。儿童禁用阿司匹林。<20岁者避免使用类似阿司匹林的产品。肝病患者避免使用对乙酰氨基酚。肾病或胃部问题患者以及孕妇避免使用布洛芬。请遵循药物标签上的指示。
  - 如果疼痛与损伤有关，在最初24小时内使用冰敷，之后改用湿热疗法。不要直接将冰块放在皮肤上，以免造成冻伤。
  - 可以洗个温水澡或淋浴，或坐在热水浴缸或漩涡浴中以缓解不适。
  callback_criteria:
  - 3天内无改善
  - 疼痛加剧
  - 疼痛放射至四肢、会阴或生殖器区域
  - 排尿困难、频繁排尿、发热或血尿
  related_protocols:
  - 腹痛
  - 背部/颈部损伤
  - 胸痛
  - 麻木和刺痛感
  - 妊娠问题
  - 排尿困难
  - 尿色异常
  - 无力
- id: pain_muscle_joint_002
  topic_zh: 踝关节问题
  topic_en: Ankle Problems
  source_file: STCC/Ankle_Problems.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 既往病史
  - 用药情况
  - 疼痛评分（如果疼痛和肿胀与近期受伤有关
  - 请参阅踝部损伤协议[32]。）
  triage_levels:
    A:
      criteria:
      - 突然出现严重呼吸困难
      - 踝部或足部冷或发绀
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 大腿/小腿肿胀和疼痛
      - 剧烈疼痛
      - 无法行走
      - 踝部、小腿或大腿的皮肤触摸时感觉热或发红
      - 单腿/踝部突然肿胀
      action: 立即前往急诊室
    C:
      criteria:
      - 有心脏病、肝病、肾病、癌症、近期疾病、喉咙痛、皮肤感染或腿部手术的病史
      - 正在使用新的处方药
      - 双侧踝部肿胀
      - 关节或大脚趾基底部剧烈疼痛
      - 关节上方的皮肤发红且光亮
      - 怀孕期间体重突然增加
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 家庭护理后无改善
      - 近期体重增加超过10磅
      - 其他关节疼痛
      - 全身不适
      action: 居家观察，按家庭护理指导
  home_care:
  - 将腿抬高，使脚高于心脏。不要在膝盖下垫任何东西。在小腿下方放置枕头。
  - 减少饮食中的盐分。
  - 休息。
  - 对患处加热。不要直接睡在电热毯上。使用电热毯时，务必在皮肤和电热毯之间放置布料隔层。
  - 不要按摩患处。
  - 避免长时间站立或坐着。如果无法避免，请频繁活动脚趾和小腿肌肉，并穿着全长支撑袜。
  - 避免穿紧身衣物。
  callback_criteria:
  - 情况未改善或恶化
  - 疼痛加剧
  - 移动能力下降
  - 【立即急诊】呼吸困难
  - 【立即急诊】踝部或足部变冷或发绀
  related_protocols: []
- id: pain_muscle_joint_003
  topic_zh: 胳膊或手部问题
  topic_en: Arm or Hand Problems
  source_file: STCC/Arm_or_Hand_Problems.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 位置
  - 用药情况
  - 既往史
  - 疼痛程度
  triage_levels:
    A:
      criteria:
      - 在或紧接用力后突然出现手臂疼痛
      - 胸闷、胸痛
      - 疼痛放射至颈部、下颌和肩部
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 手臂、手或手指冰冷或发绀
      - 受影响的手臂无脉搏
      - 突然出现一侧手臂无力
      - 深度切割伤
      - 无法移动深度切割伤以上的部分手臂或手
      action: 立即前往急诊室
    C:
      criteria:
      - 无法移动受伤区域上方或下方的关节
      - 剧烈疼痛
      - 无法使用受影响的身体部位
      - 可疑的原因，特别是在儿童中
      - 受影响区域红、热、痛或肿胀，但无已知损伤
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 关节疼痛或肿胀，且活动受限
      - 48小时后肿胀或瘀伤加剧
      - 受伤后30分钟内出现疼痛、肿胀或变色
      - 颈部僵硬伴手臂或手部疼痛、麻木或刺痛
      - 弯曲手臂或手时肘部、腕部或手指关节疼痛
      - 夜间尤其是手部的麻木或刺痛感
      - 手或臂截肢手术后1至6个月内，出现新发于截肢部位以下的疼痛
      action: 居家观察，按家庭护理指导
  home_care:
  - 在受伤后的头24到48小时，每两小时将冰袋敷于受伤区域20至30分钟。不要直接将冰放在皮肤上，应在冰袋和皮肤之间放置一条薄毛巾或袜子。未开封的冷冻蔬菜包装或密封塑料袋中的碎冰也很合适。
  - 将受影响部位抬高至心脏水平以上以帮助减轻肿胀。
  - 与医生讨论截肢后的幻痛问题。有多种治疗选项，包括药物、针灸、脊髓刺激器、镜箱疗法、注射、植入装置、生物反馈和按摩疗法。
  - 让受影响的部位休息。
  - 如果无已知损伤，可用热敷袋或浸热水的毛巾敷于受影响区域。受伤后48小时后再使用热疗。
  callback_criteria:
  - 【立即急诊】手臂、手或手指冰冷或发绀
  - 【立即急诊】受影响的手臂无脉搏
  - 【立即急诊】一侧手臂突然无力
  - 【立即急诊】疼痛放射至颈部、下颌和肩部
  related_protocols: []
