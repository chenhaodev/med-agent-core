protocols:
- id: toxin_exposure_001
  topic_zh: 毒物中毒，疑似
  topic_en: Poisoning Suspected
  source_file: STCC/Poisoning_Suspected.md
  key_questions:
  - 姓名
  - 年龄
  - 起病时间
  - 原因
  - 既往史
  - 相关症状
  - 用药情况
  triage_levels:
    A:
      criteria:
      - 意识状态改变或无反应
      - 严重呼吸困难或呼吸频率<10次/分钟
      - 自杀企图
      - 惊厥发作
      - 意识水平变化
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 大量出汗或唾液分泌过多
      - 喘息或呼吸困难
      - 嘴唇、口腔或指甲床发绀
      action: 立即前往急诊室
    C:
      criteria:
      - 恶心、呕吐、腹泻
      - 唇部、舌头或皮肤烧伤
      - 头痛、烦躁或发热
      - 有精神疾病史
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 儿童周围有敞开的溢出容器、药瓶，或面部、皮肤、衣物上有物质
      - 呼吸或衣物上可闻到产品气味
      - 怀疑摄入了阿司匹林、对乙酰氨基酚或其他非处方药物、致幻剂或未知蘑菇
      action: 居家观察，按家庭护理指导
  home_care:
  - 按照毒物控制中心的指示行事。向中心提供以下信息：
  - 确认摄入的物质。从容器标签上读取准确名称。
  - 描述摄入量或容器中缺失的数量。
  - 指出物质被摄入的时间。
  - 阅读容器上的意外摄入说明。
  - 带容器、剩余内容物、植物或蘑菇前往医院。
  - 如果无法及时联系到毒物控制中心，请呼叫救护车。
  - 不要在人员意识状态改变或吞咽困难时诱导呕吐。除非毒物控制中心指示，否则不要诱导呕吐。以下物质摄入后不应诱导呕吐：酸性、碱性或石油产品；电池、硫酸或盐酸；漂白剂；下水道或烤箱清洁剂；汽油；家具抛光剂；煤油；打火机燃料。
  - 除非毒物控制中心认为无需担心，否则所有过量情况都应由医生评估。
  - 不要试图通过将受害者放在淋浴中或强迫其喝咖啡来唤醒。
  - 未经毒物控制中心指示，不要给予任何食物或饮料。
  callback_criteria:
  - 【立即急诊】大量吞咽或唾液分泌过多
  - 【立即急诊】喘息或呼吸困难
  - 【立即急诊】嘴唇、口腔或指甲床发绀
  related_protocols: []
- id: toxin_exposure_002
  topic_zh: 涉嫌食物中毒
  topic_en: Food Poisoning Suspected
  source_file: STCC/Food_Poisoning_Suspected.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 伴随症状
  - 病史
  - 用药情况
  - 疑似来源
  triage_levels:
    A:
      criteria:
      - 精神状态改变
      - 呼吸困难、吞咽困难或视力模糊
      - 呕吐带血
      - 便中带血
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 疼痛严重、加剧或持续>4小时
      - 恶心和呕吐超过12小时且对家庭治疗或非处方药无反应
      - 腹泻超过48小时且对家庭治疗或非处方药无反应
      - 便中带血
      - 脱水迹象：
      - 尿量减少
      - 眼睛凹陷
      - 皮肤松弛干燥
      - 极度口渴、口腔干燥
      - 孩子哭泣时没有眼泪
      - 站立时头晕
      action: 立即前往急诊室
    C:
      criteria:
      - 食用未冷藏的肉类、禽类、鱼类、蛋黄酱或鸡蛋制品后出现恶心、呕吐、腹泻或腹痛
      - 同餐的其他人也感到不适
      action: 当天内联系医生/诊所
  home_care:
  - 频繁（每5到10分钟）小口喝清液（苹果汁、茶、肉汤、运动饮料、透明汽水、姜汁汽水），直到恶心和呕吐缓解。在呕吐缓解后的头24小时内，根据耐受情况逐渐增加量。
  - 腹泻时避免食用乳制品。
  - 呕吐和腹泻缓解后48小时内避免食用辛辣食物、酒精、乳制品和咖啡。
  - 避免服用阿司匹林。
  - 预防措施：
  - 避免食用已放置超过2小时的肉类、调料、酱料和蛋黄酱基食品。保持食品温度<40°F（4.4°C）或>140°F（60°C）。
  - 不要食用盖子鼓起的罐头或瓶装内容物。
  - 在冰箱或微波炉中解冻肉类，而不是在室温下解冻。
  - 频繁洗手、切菜板和台面，尤其是在处理生鸡肉或鸡蛋后。
  - 如果食物有异味或发臭，请勿食用。
  callback_criteria:
  - 症状持续>48小时或恶化
  - 粪便或呕吐物中带血（不仅仅是条纹或斑点）
  - 体温>101°F（38.3°C）
  - 【立即急诊】视力模糊
  - 【立即急诊】呼吸困难
  - 【立即急诊】吞咽困难
  - 【立即急诊】意识水平下降
  - 【立即急诊】脱水迹象
  related_protocols:
  - 成人
  - 儿童
  - 腹部膨胀
  - 接触
  - 脱水
  - 成人
  - 儿童
  - 直肠出血
  - 成人
  - 儿童
- id: toxin_exposure_003
  topic_zh: 血液/体液暴露
  topic_en: BloodBody Fluid Exposure
  source_file: STCC/BloodBody_Fluid_Exposure.md
  key_questions:
  - 姓名
  - 年龄
  - 起始时间
  - 原因
  - 来源
  - 风险
  - 暴露区域
  - 免疫状态
  - 用药情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 与已知感染 HIV 或乙型肝炎或感染风险高的人接触，并且发生了以下任何一种情况：
      - 无保护性接触
      - 开放性伤口（溃疡、割伤、擦伤）、眼睛或口腔接触到感染者的血液或体液
      - 被污染的针头刺伤
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 与 HIV 或乙型肝炎状态未知的人接触，并且发生了以下任何一种情况：
      - 被污染的针头刺伤
      - 人咬伤
      - 开放性伤口（溃疡、割伤、擦伤）、眼睛或口腔接触到感染者的血液或体液
      action: 立即前往急诊室
    C:
      criteria:
      - 与 HIV 或乙型肝炎状态未知的人接触，并且发生了以下任何一种情况：
      - 无保护性接触
      - 怀疑被药物迷奸
      - 受伤，且未接种破伤风疫苗、免疫状态不明或最后一次破伤风疫苗接种超过 5 年
      action: 当天内联系医生/诊所
  home_care:
  - 如果存在伤口，可用碘伏（贝塔迪恩）或肥皂和水清洗，并观察感染迹象：红肿加剧、疼痛、流脓、发热、温暖感或有条纹。
  - 用流动水冲洗暴露的眼睛或口腔 5 分钟。
  - 咨询初级保健医生或卫生部门（电话号码 ____________），以进行：
  - HIV 检测（自己和接触者）。
  - 乙型肝炎疫苗接种（如未接种过）。
  - 记住，日常接触不会传播疾病。
  - 与初级保健医生确认；如果发生针刺伤，可能需要破伤风加强剂。
  callback_criteria: []
  related_protocols:
  - 啮咬
  - 肝炎
  - 暴露
  - 穿刺问题
  - 纹身问题
  - 性侵犯
  - 性传播疾病
- id: toxin_exposure_004
  topic_zh: 异物吞咽
  topic_en: Foreign Body Swallowing of
  source_file: STCC/Foreign_Body_Swallowing_of.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 异物
  - 用药情况
  - 病史
  - 疼痛评分
  triage_levels:
    A:
      criteria:
      - 过多唾液、流口水或干呕
      - 吞咽困难
      - 咳嗽、窒息或呼吸困难
      - 自杀企图
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 喉咙或胸部疼痛不适
      - 异物为电池或尖锐物体
      action: 立即前往急诊室
    C:
      criteria:
      - 金属物体
      - 大于五分硬币的物体
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 木头或塑料物体
      - 暗淡的玻璃物体（如瓶子、杯子的一部分）
      - 小于一分钱硬币大小的物体
      - 已知吞下某种物质但无症状
      action: 居家观察，按家庭护理指导
  home_care:
  - 如果没有症状，试着喝一口水。如果没有困难，可以尝试吃面包或软食。
  - 暗淡的玻璃物体，如瓶子、杯子或戒指的一部分，通常在3到4天内会随粪便排出而无困难。
  - 不要给予泻药。增加饮食中的纤维（水果、蔬菜、全谷物）以帮助自然排泄。
  - 检查粪便中的异物。
  callback_criteria:
  - 间歇性呛咳或干呕
  - 7天内未见异物随粪便排出的证据
  - 【立即急诊】流口水、干呕、窒息、呼吸困难或吞咽困难
  related_protocols:
  - 成人腹痛
  - 儿童腹痛
  - 便秘
  - 成人腹泻
  - 儿童腹泻
  - 穿刺问题
  - 便血
  - 肛门问题
  - 成人呕吐
  - 儿童呕吐
- id: toxin_exposure_005
  topic_zh: HIV 暴露
  topic_en: HIV Exposure
  source_file: STCC/HIV_Exposure.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 用药情况
  - 病史
  - HIV 状态
  triage_levels:
    A:
      criteria:
      - 开放性伤口（如溃疡、割伤、擦伤）、眼睛或口腔接触到了感染者的血液或体液
      - 被污染的针头刺伤
      - 无保护的性接触
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 持续发热和夜间盗汗
      - 持续腹泻
      - 颈部、腋下或腹股沟淋巴结持续肿大
      - 异常溃疡及溃疡数量增加
      action: 立即前往急诊室
    C:
      criteria:
      - 无保护的性接触
      - 开放性伤口（如溃疡、割伤或擦伤）、眼睛或口腔接触到另一个人的血液或体液
      - 体重下降
      - 手脚麻木或疼痛
      action: 当天内联系医生/诊所
  home_care:
  - 如果有伤口，用肥皂和水清洗，并注意感染的迹象：红肿加剧、疼痛、流脓、发热、温热或从伤口发出红色条纹。
  - 用流动水冲洗暴露的眼睛或口腔5分钟。
  - 咨询初级保健医生或卫生部门（电话号码：___________）进行自我及接触者的 HIV 检测。
  - 了解非亲密接触不会传播疾病。
  - 如果咨询者怀疑 HIV/AIDS 感染，鼓励其跟进初级保健医生或诊所，或者拨打国家艾滋病热线1-800-232-4636。
  callback_criteria:
  - 知道与 HIV 感染者、甲型、乙型或丙型肝炎患者或性传播疾病患者的血液或体液接触
  - 持续发热和夜间盗汗
  - 持续腹泻
  - 颈部、腋下或腹股沟淋巴结持续肿大
  - 异常溃疡及溃疡数量增加
  - 严重疲劳
  - 体重下降
  related_protocols:
  - 血液/体液暴露
- id: toxin_exposure_006
  topic_zh: 药物过量
  topic_en: Overdose
  source_file: STCC/Overdose.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 药物或物质的名称
  - 剂量
  - 既往史
  - 所用药物
  triage_levels:
    A:
      criteria:
      - 严重呼吸困难或呼吸频率<10次/分钟
      - 自杀企图
      - 抽搐活动
      - 酒精和药物复合过量
      - 17岁以下受害者中毒
      - 使用可卡因/裂纹并伴有胸痛
      - 意识状态改变
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 喘息或呼吸短促
      - 严重腹痛
      action: 立即前往急诊室
    C:
      criteria:
      - 恶心、呕吐或腹泻
      - 服用阿司匹林、对乙酰氨基酚或其他非处方药、致幻剂或未知蘑菇
      - 受害儿童在打开的药物容器附近，如药瓶，或者面部、皮肤或衣物上有物质残留
      - 呼吸或衣物上有疑似摄入产品的气味
      action: 当天内联系医生/诊所
  home_care:
  - 按照毒物控制中心的指示行事。（电话：1-800-222-1222）。向中心提供以下信息：
  - 确定摄入的物质。从容器标签上读取准确名称，包括剂量，或描述药片或胶囊上的标记。
  - 说明摄入了多少量或容器中缺少多少。
  - 指出物质被摄入的时间。
  - 阅读容器上的意外摄入指导。
  - 带容器或蘑菇去医院。
  - 如果毒物控制中心电话不易获取，请呼叫救护车。
  - 如果患者意识水平改变或吞咽困难，不要催吐。除非毒物控制中心指示，否则不要催吐。如果摄入了酸、碱性物质或石油产品，包括电池液、硫酸或盐酸；漂白剂；Drano；下水道或烤箱清洁剂；汽油；家具抛光剂；煤油；打火机油，请不要催吐。可以用牛奶、水或氢氧化镁中和。
  - 除非毒物控制中心告知摄入的物质无需担心，否则所有过量都应由医生评估。
  - 不要尝试通过将患者置于淋浴下或将咖啡强灌给患者来唤醒药物过量者。
  - 除非毒物控制中心指示或如上所述在无法联系到毒物控制中心时指示，否则不要给予任何食物或饮料。
  callback_criteria: []
  related_protocols: []
