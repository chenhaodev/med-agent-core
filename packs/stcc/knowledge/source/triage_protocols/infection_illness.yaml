      criteria:
      - 已知或疑似接触风疹，且没有疾病史或未接种疫苗
      - 24小时内全身出现泛红皮疹
      - 颈部后方淋巴结肿大
      - 持续瘙痒
      action: 当天内联系医生/诊所
  home_care:
  - 避免将孕妇暴露在内。病情自皮疹首次出现后5天内具有传染性。
  - 育龄妇女应避免在3个月内怀孕。
  - 如有疼痛，可服用对乙酰氨基酚。不要给18岁以下的儿童服用阿司匹林。如果年龄<20岁，请避免使用类似阿司匹林的产品。如果存在肝病，则避免使用对乙酰氨基酚。如果存在肾病或胃部问题，或者在怀孕期间，应避免使用布洛芬。请按照标签上的说明服用。
  - 尝试苏打水浴或燕麦浴以缓解瘙痒。
  callback_criteria:
  - 孕期前三个月且接触过风疹
  - 关节疼痛
  - 持续发热超过3天
  - 皮疹持续超过5天
  related_protocols: []
- id: infection_illness_015
  topic_zh: 风疹（麻疹）
  topic_en: Rubeola Measles
  source_file: STCC/Rubeola_Measles.md
  key_questions:
  - 姓名
  - 年龄
  - 起病时间
  - 已知的风疹诊断或暴露史
  - 过敏情况
  - 用药情况
  - 既往史
  - 免疫状态
  triage_levels:
    A:
      criteria:
      - 呼吸困难
      - 严重头痛和/或颈部疼痛
      - 意识混乱
      - 难以唤醒
      - 意识水平下降
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 皮疹出现后发热超过4天
      - 黄色或绿色鼻涕超过48小时
      - 外观不佳
      action: 立即前往急诊室
    C:
      criteria:
      - 眼睛红、水汪汪或痒，咳嗽和流鼻涕
      - 早晨眼睛结痂或黄色分泌物
      - 对光敏感
      - 口腔内有蓝白色斑点
      - 从面部向下蔓延的红色斑丘疹持续超过7天
      - 过去12天内接触过麻疹且没有接种过麻疹疫苗
      action: 当天内联系医生/诊所
  home_care:
  - 对于发热和不适，可服用对乙酰氨基酚。不要给儿童使用阿司匹林。年龄<20岁者应避免使用类似阿司匹林的产品。肝病患者应避免使用对乙酰氨基酚。肾脏疾病或胃部问题的患者及孕妇应避免使用布洛芬。请按照标签上的说明服用。
  - 为了缓解咳嗽，可以给4岁以下的儿童服用1/2到1茶匙玉米糖浆；对于年龄较大的儿童，则可给予含片、硬糖或止咳糖浆。温热透明液体如苹果汁和草药茶对喉咙有舒缓作用，并且可以提供给4个月以上的儿童。
  - 用湿棉球清除眼部分泌物，使用后应丢弃。每只眼睛需使用单独的棉球。
  - 如果孩子的眼睛对光敏感，请将其置于黑暗或光线较暗的房间内。
  - 直到发热消退前强制休息。
  - 联系家庭医生进行确诊。
  - 在皮疹消失（大约7天）之前，让孩子远离未患过此病或未接种疫苗的人群。
  callback_criteria:
  - 耳痛或咽喉痛
  - 黄色或绿色鼻涕超过48小时
  - 皮疹出现后发热持续超过4天
  - 早晨眼睛结痂或黄色分泌物
  - 【立即急诊】呼吸困难
  - 【立即急诊】严重头痛
  - 【立即急诊】意识混乱
  - 【立即急诊】难以唤醒
  related_protocols: []
- id: infection_illness_016
  topic_zh: 严重急性呼吸综合征 (SARS)
  topic_en: Severe Acute Respiratory Syndrome SARS
  source_file: STCC/Severe_Acute_Respiratory_Syndrome_SARS.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 病因
  - 接触过SARS患者的历史
  - 前往或居住在已知SARS爆发地区的旅行史
  - 用药情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 意识改变
      - 严重呼吸困难
      - 高热 >104.9°F (40.5°C)
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - SARS接触后10天内出现咳嗽和发热
      - SARS接触后10天内出现呼吸困难
      action: 立即前往急诊室
    C:
      criteria:
      - SARS接触后10天内出现发热
      - SARS接触后10天内出现咳嗽
      - 过去10天内有SARS接触史并出现
      - 肌肉疼痛
      - 全身不适
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 无症状的SARS暴露
      action: 居家观察，按家庭护理指导
  home_care:
  - 如果在接触SARS后10天内出现咳嗽或发热，应进行隔离。在呼吸道症状消失后的10天内不要去工作、学校或其他公共场所。
  - 经常用肥皂和水洗手，或使用酒精基的手消毒剂。
  - 良好的呼吸道礼仪：咳嗽或打喷嚏时用纸巾捂住口鼻。与他人密切接触时佩戴外科口罩以防止飞沫传播。每天更换一次口罩，或在变脏或潮湿时更换。
  - 触摸体液时应使用一次性手套。
  - 不要共用餐具、床上用品、毛巾等。
  - 经常消毒厨房、浴室和其他可能被患者触碰的区域表面。
  callback_criteria:
  - 没有改善或病情恶化
  - 发热持续>72小时
  - 有痰咳嗽
  - 【立即急诊】严重呼吸困难
  - 【立即急诊】意识改变
  - 【立即急诊】高热 >104.9°F (40.5°C)
  related_protocols:
  - 呼吸困难
  - 普通感冒症状
  - 咳嗽
  - 成人发热
  - 儿童发热
  - 流感
- id: infection_illness_017
  topic_zh: 甲型H1N1流感（H1N1病毒）暴露
  topic_en: Swine Flu H1N1 Virus Exposure
  source_file: STCC/Swine_Flu_H1N1_Virus_Exposure.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 症状
  - 过去7天内已知或疑似接触过甲型H1N1流感病毒
  - 药物使用情况
  - 病史
  - 是否为医疗工作者
  - 公共卫生工作者或急救人员
  triage_levels:
    A:
      criteria:
      - 意识混乱、谵妄或难以唤醒
      - 非充血原因引起的严重呼吸困难
      - 面部或躯干出现扁平的紫色或深红色斑点，伴有发热、颈部僵硬疼痛或头痛
      - 严重的头痛
      - 皮肤或嘴唇变蓝或发灰
      - 大量出汗且感到头晕或虚弱
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 年龄大于60岁，免疫系统受损，糖尿病患者，卧床不起且体温>101°F（38.3°C）
      - 小于3个月的婴儿体温>100.4°F（38°C）
      - 老年人或儿童发热且显得非常病态、无精打采或易怒
      - 老年人、幼儿或免疫系统受损者出现脱水迹象
      - 年龄小于6周
      action: 立即前往急诊室
    C:
      criteria:
      - 疲劳、体温<103.1°F（39.5°C）、干咳、咽喉痛、胃肠道症状、流鼻涕或充血、肌肉疼痛
      - 儿童发热>104.9°F（40.5°C）
      - 有心力衰竭病史，免疫系统受损，年龄6周至23个月，年龄大于65岁，怀孕，长期护理设施居民，哮喘，慢性阻塞性肺疾病（COPD），或代谢障碍
      - 照顾已知患有甲型H1N1流感的人且无流感症状
      - 在过去7天内在医疗或公共卫生机构工作或作为急救人员有暴露史
      - 绿色、棕色或黄色痰液或鼻分泌物>72小时
      - 家庭护理后持续脱水迹象
      - 持续的耳痛
      action: 当天内联系医生/诊所
  home_care: []
  callback_criteria: []
  related_protocols:
  - 呼吸困难
  - 普通感冒症状
  - 充血
  - 咳嗽
  - 脱水
  - 成人发热
  - 儿童发热
  - 头痛
  - 流感
  - 成人皮疹
  - 儿童皮疹
  - 咽喉痛
- id: infection_illness_018
  topic_zh: 西尼罗河病毒
  topic_en: West Nile Virus
  source_file: STCC/West_Nile_Virus.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 病因
  - 用药情况
  - 病史（请考虑这些因素。）
  triage_levels:
    A:
      criteria:
      - 精神状态改变
      - 视力丧失
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 颈部僵硬
      - 高热 >104.9°F (40.5°C)
      - 无法褪色的紫色或深红色斑点
      - 呼吸困难
      action: 立即前往急诊室
    C:
      criteria:
      - 严重头痛
      - 严重的肌肉无力
      - 有免疫抑制史
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 身体疼痛
      - 恶心/呕吐
      - 躯干上的丘疹
      - 淋巴结肿大
      - 目前怀孕或哺乳的女性，或正在哺乳的婴儿
      - 没有其他症状但家长或患者感到担忧
      action: 居家观察，按家庭护理指导
  home_care:
  - 不要直接用手触摸死鸟。
  - 致电当地卫生部门 __________________ 获取如何报告和处理死亡鸟类进行测试和处置的指示。
  - 通过以下方式减少感染西尼罗河病毒的风险：
  - 使用驱虫剂；
  - 穿着长袖衬衫、长裤和袜子；
  - 尽量减少皮肤暴露；
  - 穿浅色衣物；
  - 避免在蚊子叮咬高峰期（从黄昏到黎明）外出；
  - 用纱窗覆盖敞开的门窗，并修理或更换有孔或不合适的纱窗；
  - 通过排空您财产上的物体或区域来避免积水；
  - 清理堵塞的雨水槽。
  - 休息。
  - 多喝水。
  - 服用您的常规止痛药以减轻不适。不要给儿童服用阿司匹林。如果年龄<20岁，避免使用类似阿司匹林的产品。如果有肝病，则避免使用对乙酰氨基酚。如果有肾病或胃部问题存在的情况下，或怀孕时，避免使用布洛芬。请按照标签上的说明服用。
  callback_criteria:
  - 严重头痛
  - 严重的肌肉无力
  - 没有改善或病情恶化
  - 【立即急诊】精神状态改变
  - 【立即急诊】颈部僵硬
  - 【立即急诊】视力丧失
  - 【立即急诊】高热 >104.9°F (40.5°C)
  - 【立即急诊】无法褪色的深红色或紫色皮疹
  related_protocols: []
- id: infection_illness_019
  topic_zh: 寨卡病毒
  topic_en: Zika Virus
  source_file: STCC/Zika_Virus.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 病因
  - 药物使用情况
  - 病史
  - 怀孕状态
  - 近期是否前往寨卡病毒传播地区
  - 最近是否有蚊虫叮咬
  triage_levels:
    A:
      criteria:
      - 呼吸短促
      - 严重肌肉无力
      - 剧烈疼痛
      - 发热 >100.0°F (37.8°C) 且有免疫抑制史
      - 老年人发热 >101°F (38.3°C)
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 肌肉疼痛
      - 关节痛
      - 目前怀孕的女性出现新发皮疹、关节痛、发热或红眼
      action: 立即前往急诊室
    C:
      criteria:
      - 无其他症状但家长或相关人士担心
      - 怀孕，无症状，且近期前往寨卡病毒感染区或接触过感染者，与居住在或最近从寨卡病毒感染区返回的人进行过无保护性行为
      action: 当天内联系医生/诊所
  home_care:
  - 减少感染寨卡病毒的风险：
  - 避免接触感染者的体液、尿液或粪便，尤其是在怀孕期间。如果无法避免接触，使用手套和漂白剂。
  - 涂抹驱蚊剂。不要对 2 个月以下的婴儿使用驱蚊剂。可以使用蚊帐覆盖 2 个月以下婴儿的推车、童车或摇篮以保护他们免受蚊虫叮咬。不要给 3 岁以下儿童使用含有柠檬桉油或para-menthane-diol的产品。不要将驱蚊剂涂抹在孩子的手、眼睛、嘴巴以及任何割伤或刺激皮肤上。如果同时使用防晒霜，请先涂防晒霜再涂驱蚊剂。
  - 穿长袖衬衫、长裤和袜子。
  - 尽量减少裸露的皮肤面积。
  - 穿着浅色衣物。
  - 用纱窗覆盖敞开的门窗，并修复或更换有孔洞或不合适的纱窗。
  - 避免积水，排干你房产上的物体或区域内的积水。
  - 清理堵塞的雨水槽。
  - 避免与已知感染寨卡病毒或疑似感染者进行性行为。使用避孕套（男性或女性避孕套）。
  - 休息。
  - 多喝水。
  - 服用常规止痛药缓解不适。避免使用阿司匹林和类似产品（非甾体抗炎药）。如果存在肝病，避免使用对乙酰氨基酚。遵循药品标签上的说明。使用随药附带的剂量器、测量工具或药店提供的药物注射器。家庭茶匙往往无法准确量取药物。
  - 有关寨卡旅行信息和受影响地区的最新信息，请参阅 CDC 网站：cdc.gov/zika 或 wwwnc.cdc.gov/travel/page/zika-travel-information
  callback_criteria:
  - 剧烈疼痛
  - 严重肌肉无力
  - 无改善或病情恶化
  - 发热 >100.0°F (37.8°C) 且有免疫抑制史
  - 老年人发热 >101°F (38.3°C)
  - 【立即急诊】呼吸困难
  related_protocols: []
