  - 儿童
  - 肿大或触痛的腺体
  - 颈部疼痛
- id: infection_illness_012
  topic_zh: 百日咳
  topic_en: Pertussis Whooping Cough
  source_file: STCC/Pertussis_Whooping_Cough.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 暴露/免疫史
  - 用药情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 意识状态改变
      - 严重呼吸困难
      - 呼吸困难且无法说话
      - 呼吸暂停
      - 新出现流涎
      - 吞咽困难
      - 非压之不褪色的深红色或紫色皮疹、头痛、前倾头时疼痛或发热
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 咳嗽发作时皮肤、嘴唇或舌头变蓝
      - 有痰或严重咳嗽
      - 高热且对退烧措施无反应
      - 婴儿因咳嗽无法进食
      - 持续性鼻血
      - 发热并出现脱水迹象
      - 3个月及以下的婴儿（近期未接种疫苗）体温>100.4°F (38°C)
      - 咳嗽和感冒症状超过一周且伴有胸痛、无力或发热
      action: 立即前往急诊室
    C:
      criteria:
      - 家庭成员或同学接触过已知的百日咳患者并要求预防性治疗
      - 持续两周以上的咳嗽
      - 结膜下出血
      - 直肠脱垂或腹股沟疝且伴有持续咳嗽
      - 发热超过72小时且对退烧措施无反应
      - 正在使用抗生素治疗百日咳但仍有持续发热或病情恶化
      - 绿色、棕色或黄色痰液超过72小时
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 社区内爆发流行病且近期出现流鼻涕、咳嗽、眼睛流泪等症状
      action: 居家观察，按家庭护理指导
  home_care:
  - 保持良好的呼吸道卫生。咳嗽或打喷嚏时应捂住口鼻，并将纸巾丢弃在纸袋中。咳嗽时可向袖子内侧咳嗽以帮助防止飞沫传染给他人，弯曲肘部并抬起上臂以覆盖嘴巴。
  - 通过洗手预防疾病的传播。使用肥皂和水或酒精类手消毒剂进行清洁。
  - 按照处方服用抗生素，并完成整个疗程。
  - 小口喝温热液体以缓解咳嗽痉挛。
  - 少量多次喂食。
  - 避免接触咳嗽诱因（如烟雾、污染物等）。
  - 对于发热和肌肉疼痛，可以给2个月以上的婴儿使用对乙酰氨基酚，6个月以上的孩子可使用布洛芬。不要给儿童服用阿司匹林。18岁以下的患者应避免使用类似阿司匹林的产品。肝病患者不应使用对乙酰氨基酚。肾病或胃部问题患者以及孕妇不应使用布洛芬。请按照说明书上的指示使用。
  - 增加液体摄入量（果汁、茶、肉汤、果冻）。
  - 预期过程：1至2周的感冒症状后出现严重的咳嗽发作，可能持续长达6周。慢性咳嗽可以持续1到2个月。
  - 一旦确诊，在服用抗生素至少3天之前应避免公共接触。百日咳具有高度传染性。
  callback_criteria: []
  related_protocols:
  - 呼吸困难
  - 普通感冒症状
  - 充血
  - 咳嗽
  - 喉炎
  - 成人发热
  - 儿童发热
