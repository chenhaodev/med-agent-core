protocols:
- id: infection_illness_001
  topic_zh: 流感
  topic_en: Influenza
  source_file: STCC/Influenza.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 症状
  - 已知接触史或社区疫情
  - 用药情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 精神状态改变
      - 因非鼻塞原因导致的呼吸困难
      - 体温>104.9°F (40.5°C)
      - 面部或躯干出现紫斑或暗红色斑点，颈部僵硬或疼痛
      - 严重头痛
      - 皮肤或嘴唇发绀
      - 新出现流涎或吞咽困难
      - 年龄<6周
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 颈部僵硬或疼痛
      - 体温>103.1°F (39.5°C)
      - 发热，且儿童或老年人显得非常病态、昏睡或极度烦躁
      - 脱水迹象
      action: 立即前往急诊室
    C:
      criteria:
      - 已知接触史，并伴有以下任何症状：疲劳、体温<103.1°F (39.5°C)、干咳、咽痛、胃肠道症状、流鼻涕或鼻塞、肌肉酸痛
      - 有心力衰竭病史、免疫抑制、6周至23个月大的婴儿、年龄>65岁、怀孕、长期护理机构居民、哮喘、慢性阻塞性肺疾病（COPD）、代谢障碍
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 轻微症状
      - 无症状，但父母或个人表示担忧
      action: 居家观察，按家庭护理指导
  home_care:
  - 经常用肥皂和水洗手，或使用酒精基手部消毒剂。
  - 强调流感具有高度传染性。保持良好的呼吸道礼仪；咳嗽或打喷嚏时用纸巾遮住口鼻。
  - 避免与生病的人接触。
  - 如果感到不适，避免与其他人接触。咳嗽和打喷嚏时，在与人近距离接触时佩戴外科口罩以防止飞沫传播。如果口罩变脏或湿润，请更换。
  - 充分休息并多喝水。
  - 不要给儿童服用阿司匹林。年龄<20岁的人应避免使用类似阿司匹林的产品。肝病患者避免使用对乙酰氨基酚。存在肾病、胃部问题或怀孕的情况下，避免使用布洛芬。请遵循标签上的指示。
  - 在症状出现后的48小时内给予抗病毒药物。
  callback_criteria:
  - 颈部僵硬或疼痛
  - 体温>103.1°F (39.5°C)
  - 发热，且儿童或老年人显得非常病态、昏睡或极度烦躁
  - 脱水迹象
  - 精神状态改变
  - 呼吸困难
  - 体温>104.9°F (40.5°C)
  - 面部或躯干出现紫斑或暗红色斑点，颈部僵硬或疼痛
  - 严重头痛
  - 皮肤或嘴唇发绀
  - 新出现流涎或吞咽困难
  related_protocols: []
