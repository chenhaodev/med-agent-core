- id: infection_illness_003
  topic_zh: 水痘
  topic_en: Chickenpox
  source_file: STCC/Chickenpox.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 水痘接触史
  - 暴露日期
  - 怀孕状况
  - 免疫接种状态
  - 皮损描述及位置
  - 病史
  - 用药情况
  triage_levels:
    A:
      criteria:
      - 难以唤醒
      - 意识模糊或谵妄
      - 呼吸困难
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 严重头痛
      - 呼吸急促
      - 颈部僵硬
      - 红痛的皮肤区域或红色条纹
      - 面部剧烈疼痛或肿胀
      - 1个月以下婴儿且有皮损
      - 发热 >104.9°F (40.5°C)
      - 当前/近期使用激素治疗或免疫功能低下
      action: 立即前往急诊室
    C:
      criteria:
      - 咳嗽或发热对家庭护理措施无反应
      - 呕吐超过3到4次
      - 干燥的棕色结痂变软和金色，或排出脓液
      - 发热持续 >4天
      - 严重瘙痒对家庭护理措施无反应
      - 没有水痘病史或免疫接种且怀孕
      - 家庭内出现继发病例
      - 没有水痘病史或免疫接种且暴露 <5天
      - 婴儿母亲在分娩前<5天或分娩后<2天患有水痘
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 发热和全身疲倦
      - 皮疹从红斑发展到水泡
      - 肿胀和触痛的淋巴结
      action: 居家观察，按家庭护理指导
  home_care:
  - 增加液体摄入量。
  - 每3至4小时洗一次凉浴，并服用常规药物（对乙酰氨基酚）退热。请遵循标签上的说明，不要服用阿司匹林。
  - 为了控制瘙痒，可以尝试非处方药（如口服的苯海拉明、Caladryl、外用的Cortaid或Cortizone），并遵循标签上的指示，或者洗燕麦浴（Aveeno）。
  - 患者应留在家中，直到所有皮损干燥。
  - 避免与孕妇接触。
  - 新出现的疹子会持续5到6天
  - 传染期通常为7天
  - 症状在暴露后10至14天出现
  callback_criteria:
  - 感染迹象：红肿加剧、疼痛、分泌物、脓液、红色条纹
  - 瘙痒影响睡眠
  - 持续发热 >4天
  - 咳嗽或呼吸困难
  - 【立即急诊】颈部僵硬或严重头痛
  - 【立即急诊】意识模糊或精神状态改变
  - 【立即急诊】呼吸困难
  related_protocols:
  - 呼吸困难
  - 附录M
  - 咳嗽
  - 成人发热
  - 儿童发热
  - 免疫反应
  - 瘙痒
  - 成人皮疹
  - 儿童皮疹
  - 疑似或暴露史
- id: infection_illness_004
  topic_zh: 普通感冒症状
  topic_en: Common Cold Symptoms
  source_file: STCC/Common_Cold_Symptoms.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 流鼻涕或鼻塞
  - 喉咙痛
  - 发热
  - 咳嗽
  - 头痛
  - 用药情况
  - 病史
  triage_levels:
    A:
      criteria: []
      action: 立即呼叫救护车（120）
    B:
      criteria: []
      action: 立即前往急诊室
    C:
      criteria:
      - 脱水迹象：
      - 尿量减少
      - 眼窝凹陷
      - 皮肤捏起后不能迅速恢复
      - 极度口渴或口腔干燥
      - 哭泣时无泪
      - 发热和前倾头部导致的颈部疼痛
      - 精神状态改变，行为或反应变化
      - 免疫力低下，年龄 >60岁，有糖尿病史或镰状细胞贫血病史，或卧床不起且体温 >101°F (38.3°C)
      - < 3个月大的婴儿体温 >100.4°F (38.0°C)
      - 儿童体温 >105°F (40.6°C)
      - 成人体温 >103°F (39.4°C)
      - 发热且儿童看起来非常虚弱
      - 呼吸模式改变：呼吸困难、声音嘶哑、喘息或胸腔凹陷 >30分钟
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 喉咙痛或发热持续 >2天
      - 喘息且年龄 <4岁
      - 家庭护理措施无法缓解的持续性喘息
      - 耳部疼痛或分泌物
      - 鼻窦疼痛 >24小时
      - 有哮喘、癌症、慢性阻塞性肺疾病（COPD）、充血性心力衰竭（CHF）、糖尿病、心脏病或肾脏病史且发热
      - 鼻孔或耳道内及口周出现蜜黄色结痂
      - 年龄 >65岁且发热
      - 绿色、棕色或黄色的痰或鼻分泌物持续 >7天且状况恶化
      - 绿色、棕色或黄色的痰或鼻分泌物 <7天
      - 痰中带血丝
      - 有哮喘、癌症、慢性阻塞性肺疾病（COPD）、充血性心力衰竭（CHF）、糖尿病、心脏病或肾脏病史
      - 使用加湿器保持空气湿润，特别是在夜间，并且每天更换水。
      - 如果喉咙痛，可以多次用温水漱口。如果年龄 >4岁，还可以使用冷冻止咳糖或硬糖，或者喝热鸡汤以获得额外的缓解。
      - 用清水冲洗红眼并用浸湿的棉球擦拭。每只眼睛使用后丢弃棉球。
      - 喂母乳或瓶装奶前清理儿童的鼻子。
      - 记住，感冒非常具有传染性，潜伏期为2至5天。保持良好的卫生习惯，勤洗手，及时处理用过的纸巾，并在打喷嚏或咳嗽时遮住口鼻。
      - 避免吸烟和接触二手烟。
      action: 居家观察，按家庭护理指导
  home_care: []
  callback_criteria:
  - 【立即急诊】除鼻塞外的原因导致的呼吸困难
  - 【立即急诊】严重的胸痛
  related_protocols: []
- id: infection_illness_005
  topic_zh: 禽流感（“禽流”）暴露
  topic_en: Avian Influenza “Bird Flu” Exposure
  source_file: STCC/Avian_Influenza_“Bird_Flu”_Exposure.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 过去10天内是否前往疑似地点（已知的家禽或人类中存在禽流感感染）
  - 最近是否有接触过家禽或家养鸟类（如家禽农场
  - 养有家禽的家庭或鸟市）
  - 频繁接触死亡家禽的情况
  - 当前所在地近期是否发生疫情及可能暴露情况
  - 所用药物
  - 既往病史
  triage_levels:
    A:
      criteria:
      - 出汗且伴有头晕或虚弱感
      - 严重呼吸困难
      - 面色苍白或发灰，并有病毒性肺炎病史
      - 意识混乱、谵妄或难以唤醒
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 可能接触过受污染的鸟类，包括被分泌物/排泄物污染的表面，并伴有结膜炎和发热、咳嗽、喉咙痛或身体疼痛等症状
      - 不褪色的暗红色或紫色皮疹
      - 照顾已知患有禽流感的人后出现结膜炎
      - 儿童体温 >105°F (40.6°C)
      - 成人体温 >103°F (39.4°C)
      - 有免疫抑制病史、年龄>60岁、镰状细胞贫血、糖尿病或卧床不起且体温 >101°F (38.3°C) 的情况
      - 婴儿 <3 个月大，体温 >100.4°F (38°C)
      - 老年人或免疫力低下者出现脱水迹象
      action: 立即前往急诊室
    C:
      criteria:
      - 照顾已知患有禽流感的人并伴有类似流感的症状或结膜炎
      - 喉咙痛持续超过2天或发热 > 2 天
      - 发热且有哮喘、癌症、慢性阻塞性肺病（COPD）、充血性心力衰竭（CHF）、糖尿病、心脏病或肾病史
      - 绿色、棕色或黄色痰液或鼻分泌物 >72 小时
      - 脱水迹象
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 绿色、棕色或黄色痰液或鼻分泌物 <72小时
      - 痰中带血丝
      - 对潜在的禽流感暴露有担忧但无其他症状（或轻度症状）
      action: 居家观察，按家庭护理指导
  home_care:
  - 出现类似流感症状的人应在最后一次发热后24小时内留在家中（除非看医生）。
  - 接触患者及其环境（包括洗衣物）的护理人员应经常用肥皂和水或含酒精的手部消毒剂洗手。
  - 咳嗽和打喷嚏时要遮住口鼻，并将纸巾丢入袋子中。
  - 脏盘子和餐具应用洗碗机清洗或使用温水和肥皂手洗。
  - 避免接触死亡的鸟类或被分泌物/排泄物污染的表面。
  callback_criteria:
  - 护理人员出现类似流感的症状
  - 喉咙痛持续超过2天或发热 > 2 天
  - 绿色、棕色或黄色痰液或鼻分泌物 >72 小时
  - 脱水迹象
  - 没有好转或病情恶化
  - 【立即急诊】出汗且伴有头晕或虚弱感
  - 【立即急诊】严重呼吸困难
  - 【立即急诊】面色苍白或发灰，并有病毒性肺炎病史
  - 【立即急诊】意识混乱、谵妄或难以唤醒
  related_protocols:
  - 呼吸困难
  - 普通感冒症状
  - 鼻塞
  - 咳嗽
  - 脱水
  - 眼部问题
  - 成人发热
  - 儿童发热
  - 咽喉疼痛
- id: infection_illness_006
  topic_zh: 埃博拉：已知或疑似暴露
  topic_en: 'Ebola: Known or Suspected Exposure'
  source_file: STCC/Ebola:_Known_or_Suspected_Exposure.md
  key_questions:
  - 名字
  - 年龄
  - 与埃博拉患者的接触史
  - 前往或居住在已知埃博拉疫情爆发地区的旅行史
  - 药物使用史
  triage_levels:
    A:
      criteria:
      - 没有反应或精神状态改变
      - 呼吸极度困难
      - 发热>100.4°F (38.0°C)，严重头痛、肌肉疼痛、腹痛、呕吐、腹泻、无法解释的异常出血
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 无发热>100.4°F (38.0°C)，严重头痛、肌肉疼痛、腹痛、呕吐、腹泻、无法解释的异常出血等症状
      action: 立即前往急诊室
    C:
      criteria:
      - 无已知接触史，但存在发热>100.4°F (38.0°C)，严重头痛、肌肉疼痛、腹痛、呕吐、腹泻、无法解释的异常出血等症状，并对埃博拉感染感到担忧
      action: 当天内联系医生/诊所
  home_care:
  - 如果前往急诊科或拨打911，提前通知提供者以便他们能够准备好适当的防护装备和隔离地点。不要使用公共交通工具。
  - 如果在过去的21天内接触了埃博拉患者，在保持无症状的21天期间避免公共接触。
  - 照顾者或其他附近人员应避免与感染者的体液（包括血液、呕吐物、粪便、精液、唾液、尿液、汗水）接触。
  - 安慰他们，告知埃博拉的主要传播途径是通过体液接触，并非空气传播。作为额外的防护措施，如果埃博拉感染者咳嗽或打喷嚏，请保持6英尺的距离以避免接触到喷出的唾液。经常洗手。
  - 每天早晚各监测一次体温，并向家庭医生和卫生部门报告发热或其他新症状。
  - 即使没有症状也应通知卫生部门接触史，以便他们可以协助监控。
  - 如果无暴露但出现发热>100.4°F (38.0°C)，严重头痛、肌肉疼痛、腹痛、呕吐、腹泻、无法解释的异常出血等症状。使用其他考虑中的协议进行分诊。使用最困扰的症状的相应协议。
  callback_criteria:
  - 如果呼叫者同意给出的建议，记录通话，并鼓励呼叫者在问题恶化时回拨或咨询家庭医生。
  - 如果呼叫者不同意给出的建议，重新评估并建议呼叫者跟进家庭医生、诊所或急诊科。
  related_protocols: []
- id: infection_illness_007
  topic_zh: 疲劳
  topic_en: Fatigue
  source_file: STCC/Fatigue.md
  key_questions:
  - 姓名
  - 年龄
  - 起病时间
  - 用药情况
  - 既往史
  triage_levels:
    A:
      criteria: []
      action: 立即呼叫救护车（120）
    B:
      criteria: []
      action: 立即前往急诊室
    C:
      criteria:
      - 持续黑便或血便
      - 呕血或排出类似咖啡渣的呕吐物
      - 身体一侧突然无力
      - 新发心率不齐或缓慢（<50）
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 突然极度疲劳
      - 原因不明的肌肉无力
      - 异常阴道、直肠或鼻出血
      - 逐渐加重，影响日常活动的疲劳
      - 持续发热且退热措施无效
      - 突发无法解释的体重下降
      - 抑郁或心理问题
      - 间歇性或持续性疲劳
      - 睡眠障碍
      - 饮食不良
      - 慢性过敏症
      - 从疾病中恢复
      - 贫血、心脏问题、肾脏疾病、糖尿病、甲状腺问题或中风病史
      - 最近压力或活动量增加导致的起病
      action: 居家观察，按家庭护理指导
  home_care:
  - 合理膳食，均衡饮食。避免食用甜食以“提神”。
  - 按需补充维生素。
  - 保持规律的运动习惯。如果剧烈活动过于吃力，则可尝试短途散步。
  - 保证充足的睡眠。尽量建立固定的作息模式。
  - 增加休息、放松和娱乐时间，减轻压力。
  - 限制可能引起疲劳的药物使用，如安眠药或感冒过敏药物。如果处方药物导致疲劳，请联系您的PCP。
  - 限制咖啡因、吸烟和酒精的摄入量。
  callback_criteria: []
  related_protocols: []
- id: infection_illness_008
  topic_zh: 腺体，肿胀或触痛
  topic_en: Glands Swollen or Tender
  source_file: STCC/Glands_Swollen_or_Tender.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 过敏史
  - 用药情况
  - 病史
  - 位置
  triage_levels:
    A:
      criteria:
      - 肿大的淋巴结大于2英寸
      - 肿大淋巴结附近有红色条纹
      - 淋巴结处发热或发红
      - 剧烈疼痛
      - 淋巴结影响呼吸、吞咽或颈部活动
      - 淋巴结流脓
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 肿大的淋巴结1到2英寸大小
      - 持续发热且退热措施无效
      - 腹股沟、后颈或腋窝区域有肿大的淋巴结
      - 肿大淋巴结附近或远端区域的感染迹象
      - 身体其他部位的持续性皮疹、瘙痒或肿胀
      - 持续疲劳
      - 夜间盗汗
      action: 立即前往急诊室
    C:
      criteria:
      - 间歇性的淋巴结肿大史
      - 伴有发热、咽喉痛或鼻塞的颈部淋巴结肿大
      - 有过敏史
      - 月经前腋下区域肿胀和触痛
      action: 当天内联系医生/诊所
  home_care:
  - 不要挤压肿大的淋巴结。
  - 根据需要服用常规止痛药（阿司匹林、对乙酰氨基酚、布洛芬）以缓解不适或发热。不要给儿童使用阿司匹林。20岁以下者避免使用类似阿司匹林的产品。肝病患者避免使用对乙酰氨基酚。肾病、胃部问题患者或孕妇避免使用布洛芬。遵循药物说明书上的指示。
  - 注意感染的迹象。
  callback_criteria: []
  related_protocols:
  - 流行性腮腺炎
  - 风疹
  - 麻疹
  - 凸起和疮口
- id: infection_illness_009
  topic_zh: 乙型肝炎
  topic_en: Hepatitis
  source_file: STCC/Hepatitis.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 乙型肝炎或其他类型肝炎（A
  - B或C）的已知或疑似暴露情况
  - 用药史
  - 病史
  - 暴露类型
  - 免疫状态
  triage_levels:
    A:
      criteria:
      - 严重腹痛
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 有胃肠道出血迹象
      - 意识混乱或精神状态下降
      action: 立即前往急诊室
    C:
      criteria:
      - 严重呕吐
      - 容易出现淤青或流血
      - 站立时感到头晕
      - 免疫功能低下
      - 体重增加并伴有呼吸困难
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 眼睛或皮肤发黄
      - 腹部疼痛，尤其是右上腹痛
      - 大便呈粘土色
      - 尿液颜色深
      - 年龄小于10岁或大于70岁
      - 糖尿病
      - 已知肝炎暴露史
      - 食欲下降
      - 恶心或偶尔、间歇性呕吐
      - 上呼吸道感染症状
      - 流感样症状，全身酸痛
      action: 居家观察，按家庭护理指导
  home_care:
  - 充分休息，保持良好的饮食习惯（尝试一天吃几顿小餐）。
  - 增加水分摄入：果汁、肉汤、运动饮料、水、茶和每天至少8杯（每杯8盎司）的水。
  - 在排便后、吃饭前或准备食物前彻底洗手。
  - 餐具应在洗碗机中清洗，或在200°F (93.3°C) 的烤箱中烘烤15到20分钟，并用最热的温度设置清洗衣物和床上用品。
  - 不要为他人做饭或共享牙刷或餐具。
  - 不要饮酒或服用对乙酰氨基酚。
  - 关于暴露情况及可能需要治疗的信息，联系当地公共卫生部门或初级保健医生（PCP）。A、B型肝炎疫苗可提供预防。
  - 如果任何一方感染了乙肝，则不应在不使用安全套的情况下进行性行为。
  - 任何疑似患有肝炎的人都应由初级保健医生（PCP）或当地卫生部门或诊所进行医学评估。
  - 甲型肝炎通过粪-口途径传播，通常是食物污染。患者在感染后2到3周内具有传染性。
  - 乙型肝炎通过血液、唾液、精液或阴道分泌物传播，具有高度传染性。
  - 丙型肝炎通过血液和血浆传播，通常与针头暴露有关。在症状出现前1周即具有传染性。
  callback_criteria:
  - 眼白或皮肤发黄且为新出现的情况
  - 腹痛、粘土色大便或深色尿液
  - 因呕吐而出现脱水迹象
  related_protocols: []
- id: infection_illness_010
  topic_zh: 葡萄球菌性脓疱病
  topic_en: Impetigo
  source_file: STCC/Impetigo.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 已知的葡萄球菌性脓疱病诊断或接触史
  - 有蜜黄色结痂的伤口
  - 用药情况
  - 历史
  triage_levels:
    A:
      criteria:
      - 红色或可乐色尿液
      - 鲜红且疼痛的脸部
      - 侧腹痛
      - 非常快速地扩散
      - 腹部肿胀
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 水泡或伤口直径>1英寸（约2.5厘米）
      - 从伤口延伸出的红色条纹
      - 糖尿病、类固醇治疗、癌症、HIV或其他免疫抑制病史
      action: 立即前往急诊室
    C:
      criteria:
      - 1岁以下儿童
      - 两个或以上的家庭成员有伤口
      - 超过两处伤口
      - 鼻孔、耳道或嘴周的伤口
      - 靠近伤口区域的淋巴结肿大
      - 体温>100°F（37.8°C）或喉咙痛
      - 治疗2天后伤口数量增加
      - 从伤口排出红色、黄色、棕色、绿色或白色分泌物
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 伤口直径<1英寸（约2.5厘米）
      - 小红点变成浑浊的水泡或痘痘，然后成为有黄褐色结痂的伤口
      action: 居家观察，按家庭护理指导
  home_care:
  - 去除结痂时，可将浸泡在漂白水溶液中的布（1杯漂白剂兑入4杯水中）敷于结痂处。轻轻擦拭结痂，不要用力搓洗。
  - 用抗菌肥皂清洗伤口。
  - 每天3次在清洁后的伤口上涂抹抗生素软膏（如Mycitracin、Neosporin、Polysporin）。请遵循标签上的说明。
  - 避免触摸、抓挠或挑破伤口以防止扩散和感染。
  - 接触伤口后要洗手。
  - 保持指甲短，经常用抗菌肥皂洗手。
  - 不要与家庭其他成员共用毛巾。葡萄球菌性脓疱病具有高度传染性，容易在家庭成员间传播。
  - 孩子在接受抗生素治疗超过24小时之前不要上学，或者对于轻度感染，在彻底清洁并用抗生素软膏覆盖结痂后，再送孩子去学校或托儿所。
  callback_criteria:
  - 水泡或伤口直径>1英寸（约2.5厘米）
  - 从伤口延伸出的红色条纹
  - 体温>100°F（37.8°C）或喉咙痛
  - 其他家庭成员也出现了类似症状
  - 家庭治疗两天后伤口数量增加
  - 治疗一周后没有改善
  - 【立即急诊】红色或颜色异常的尿液
  - 【立即急诊】鲜红且疼痛的脸部
  - 【立即急诊】侧腹痛
  - 【立即急诊】腹部肿胀
  related_protocols:
  - 成人
  - 儿童
  - 皮肤病变
- id: infection_illness_011
  topic_zh: 流行性腮腺炎
  topic_en: Mumps
  source_file: STCC/Mumps.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 已知或疑似流行性腮腺炎
  - 病史
  - 用药情况
  triage_levels:
    A:
      criteria:
      - 颈部僵硬或严重头痛
      - 反复呕吐
      - 剧烈腹痛
      - 意识混乱
      - 意识水平下降
      - 呼吸困难
      - 站立时严重头晕
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 腺体肿胀超过8天
      - 发热超过5天
      - 腺体上方皮肤发红
      - 睾丸疼痛
      - 剧烈疼痛
      action: 立即前往急诊室
    C:
      criteria:
      - 耳前及下颌周围的腺体肿大且触痛
      - 咀嚼时疼痛加剧
      - 未接种过流行性腮腺炎疫苗
      - 16至18天前接触过流行性腮腺炎
      action: 当天内联系医生/诊所
  home_care:
  - 隔离流行性腮腺炎患者，直至肿胀消退。
  - 发热时休息。
  - 为了缓解不适，可将冰领或冰袋敷在肿大的腺体上。不要直接将冰放在皮肤上；应在冰和皮肤之间放置一层布料。
  - 服用常规止痛药（阿司匹林、对乙酰氨基酚、布洛芬）。不要给儿童使用阿司匹林。20岁以下者避免使用类似阿司匹林的产品。肝病患者避免使用对乙酰氨基酚。肾病或胃部问题存在，或怀孕的情况下避免使用布洛芬。请按照说明书上的指示服用。
  - 在疼痛消退前食用流质或软食。避免酸性或柑橘类食物。
  - 避免让免疫功能低下的人（包括接受化疗的个体和艾滋病患者）接触流行性腮腺炎。
  callback_criteria:
  - 腺体肿胀超过8天
  - 发热超过5天
  - 腺体上方皮肤发红
  - 睾丸疼痛
  - 【立即急诊】颈部僵硬或严重头痛
  - 【立即急诊】反复呕吐
