- id: pediatric_specific_003
  topic_zh: 包皮环切术后护理
  topic_en: Circumcision Care
  source_file: STCC/Circumcision_Care.md
  key_questions:
  - 姓名
  - 年龄
  - 包皮环切日期
  - 症状出现时间
  - 病史
  triage_levels:
    A:
      criteria:
      - 包皮环切部位难以控制持续出血
      - 阴茎头部呈深蓝色或黑色
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 超过8小时仅有少量尿液或无尿液排出
      - 年龄小于12周且体温高于100.4°F（38.0°C）
      - 出现新的水泡
      - 阴茎部有红色条纹延伸
      action: 立即前往急诊室
    C:
      criteria:
      - 包皮环切部位有分泌物或引流液
      - 塑料环超过14天仍未脱落
      - 塑料环移至阴茎部
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 包皮环切部位发红
      action: 居家观察，按家庭护理指导
  home_care:
  - 每次更换尿布时，在阴茎头部涂抹凡士林，以防止头4天内的结痂粘附到尿布上。
  - 每天两次和弄脏时用温水轻轻清洗阴茎，并用柔软的毛巾拍干。将尿布松散地系好，以防摩擦和出血。
  - 不要使用婴儿湿巾或酒精清洁包皮环切部位。
  - 如果包皮环切处发红，可正常使用抗生素软膏（如新霉素或多粘菌素）。请按照标签上的说明使用。
  - 塑料环将在7到14天内自然脱落。即使它已经松动并几乎脱离，请也不要强行拉下。
  callback_criteria:
  - 包皮环切部位出血
  - 阴茎部有红色条纹延伸
  - 阴茎头部呈深蓝色或黑色
  - 超过8小时仅有少量尿液或无尿液排出
  - 年龄小于12周且体温高于100.4°F（38.0°C）
  - 出现新的水泡
  related_protocols:
  - 男性生殖器问题
  - 伤口愈合和感染
- id: pediatric_specific_004
  topic_zh: 喉炎
  topic_en: Croup
  source_file: STCC/Croup.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 咳嗽描述
  - 先前治疗
  - 用药情况
  - 伴随症状
  - 病史
  triage_levels:
    A:
      criteria:
      - 流口水，吞咽困难，孩子看起来病态
      - 嘴唇发绀或呈灰暗色
      - 严重呼吸困难
      - 呼吸时胸部凹陷
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 吸气时有鸡鸣样声音，经过20分钟的蒸汽处理后仍未缓解，或者在过去24小时内出现三次以上此类症状
      - 孩子看起来非常病态
      action: 立即前往急诊室
    C:
      criteria:
      - 肺炎或其他肺部疾病史
      - 哮喘史且在家使用呼吸治疗和常规支气管扩张剂后无改善
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 躺下时病情加重
      - 影响睡眠
      - 体温 >104°F (40°C)
      - 犬吠样咳嗽超过5天
      - 夜间咳嗽加剧
      - 白天听到犬吠样咳嗽
      action: 居家观察，按家庭护理指导
  home_care:
  - 温湿空气可能有助于病情：通过覆盖在口鼻上的温暖湿润的毛巾呼吸，或者坐在充满蒸汽的浴室中20到30分钟。
  - 持续的冷雾可能有所帮助。使用冷雾加湿器或外出进入凉爽的夜晚空气中。
  - 喝温热透明液体以缓解咳嗽。
  - 按照常规剂量给发热的孩子服用药物（儿童美林、布洛芬、儿童泰诺、对乙酰氨基酚）。不要给孩子服用阿司匹林。如果年龄小于20岁，避免使用类似阿司匹林的产品。如果有肝病，避免使用对乙酰氨基酚。如果有肾病或胃部问题存在，或者在怀孕的情况下，避免使用布洛芬。请遵循标签上的指示。
  callback_criteria:
  - 无改善或病情加重
  - 呼吸困难
  - 体温 >104°F (40°C)
  - 哮喘儿童在家进行呼吸治疗后病情持续存在
  - 【立即急诊】流口水、吞咽困难且孩子看起来病态
  - 【立即急诊】嘴唇变蓝或发暗
  - 【立即急诊】严重呼吸困难
  - 【立即急诊】孩子看起来非常病态
  - 【立即急诊】呼吸时胸部凹陷
  - 【立即急诊】经过20分钟的家庭护理措施后鸡鸣样声音未缓解，或者在24小时内出现三次以上此类症状
  related_protocols:
  - 呼吸困难
  - 充血
  - 咳嗽
  - 成人发热
  - 儿童发热
  - 流感
  - 百日咳
  - 咽喉痛
- id: pediatric_specific_005
  topic_zh: 婴儿过度哭闹
  topic_en: Crying Excessive in Infants
  source_file: STCC/Crying_Excessive_in_Infants.md
  key_questions:
  - 姓名
  - 年龄
  - 起始时间
  - 原因
  - 用药情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 呼吸困难
      - 极度疲倦
      - 筋疲力尽的家长表示有伤害婴儿的恐惧
      - 12周以下婴儿体温超过38°C（100.4°F）
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 喷射性呕吐
      - 持续哭闹超过2小时，且家庭护理措施无效
      - 间歇性的疲倦或烦躁
      - 12周以上婴儿体温超过40°C（104°F）
      action: 立即前往急诊室
    C:
      criteria:
      - 新发哭闹
      - 家长认为婴儿看起来生病了
      - 伴有发热、呕吐或拉耳朵的哭闹
      - 烦躁不安超过48小时
      - 夜间不喂食无法入睡
      - 尝试入睡时哭泣
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 母亲正在母乳喂养且饮食无限制
      - 12周以下婴儿主要在晚上6点到午夜期间哭闹
      - 近期接种疫苗后伴有发热
      - 体温超过38.3°C（101°F）
      - 出牙期，牙龈红肿，婴儿4至8个月大
      action: 居家观察，按家庭护理指导
  home_care:
  - 当婴儿开始哭泣时，检查其是否需要食物、换尿布、拥抱或是否有发热。
  - 不要每次婴儿哭泣都喂食；尝试安抚15到20分钟。如果哭声持续，让婴儿平躺15至20分钟后重复此过程。寻找其他原因：拉耳朵、腹泻、眼睫毛在眼睛里或手指、脚趾、阴茎周围有头发。抱起、安慰并拍嗝婴儿。烦躁不安是正常的。
  - 如果主要是在晚上或夜间哭泣，婴儿可能患有肠绞痛。节奏性的安抚活动如摇晃、摆动或怀抱通常会有帮助。用烘干机加热的毯子或毛巾放在婴儿的肚子上；给婴儿洗个温水澡，提供奶嘴，并播放单调的声音。保持白天喂养间隔不超过3小时，以帮助增加夜间睡眠时间。让婴儿坐在汽车安全座椅中行驶，或听吸尘器、洗碗机、烘干机或洗衣机的声音可能有助于安抚婴儿。
  - 如果正在母乳喂养，请避免过量摄入咖啡因和吸烟。按需哺乳，而不是严格按照固定的时间表哺乳。
  - 可以给予对乙酰氨基酚用于止痛或退烧。不要给婴儿或儿童使用阿司匹林。20岁以下者应避免使用类似阿司匹林的产品。肝病患者避免使用对乙酰氨基酚。肾病、胃部问题存在或孕妇情况下，避免使用布洛芬。请遵循标签上的指示。
  - 如果婴儿正在出牙期，可以提供冷的咬胶环、用布包裹的冰块、冷冻香蕉或冷冻面包圈（根据年龄适当选择）供婴儿咀嚼。避免使用含有苯佐卡因的出牙凝胶，因为它们可能会使喉咙麻木并导致窒息或药物反应。
  - 6个月以上的婴儿可能发现布洛芬有帮助。请遵循标签上的指示。
  - 如果正在服用止咳或感冒药，请停止使用。
  callback_criteria:
  - 哭闹变得严重、持续，并且影响婴儿睡眠超过2小时
  - 任何新的症状或体征
  - 哭闹两天后仍未缓解
  - 家长/照顾者感到筋疲力尽
  - 【立即急诊】呼吸困难
  - 【立即急诊】极度疲倦
  - 【立即急诊】筋疲力尽的家长表示有伤害婴儿的恐惧
  related_protocols:
  - 母乳喂养问题
  - 耳朵疼痛及流脓
  - 咽喉痛
  - 出牙期
- id: pediatric_specific_006
  topic_zh: 尿布疹
  topic_en: Diaper Rash
  source_file: STCC/Diaper_Rash.md
  key_questions:
  - 姓名
  - 年龄
  - 起始时间
  - 病史
  - 药物
  - 皮疹描述
  triage_levels:
    A:
      criteria:
      - 大面积疼痛性水泡或开放性伤口
      - 脓液、疖子、丘疹或结痂
      - 影响睡眠的不适
      - 皮疹扩散到尿布区域之外
      - 鲜红色固定皮疹
      - 阴茎末端溃疡或结痂
      - 无法解释的体温 >100.4°F (38°C)
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 皮疹超过3天
      - 腹股沟和尿布区域红或渗出性皮疹
      action: 立即前往急诊室
  home_care:
  - 尽可能让皮肤暴露于空气中—每天至少1小时。
  - 频繁更换尿布。每小时检查一次湿或脏情况。
  - 每次换尿布时用温水清洁该区域。每日使用温和的肥皂清洗一次并晾干。
  - 皮肤干燥后，涂抹保护层，例如非处方A和D软膏、迪塞汀或氧化锌。这有助于保护皮肤，尤其是在腹泻的情况下。
  - 松散地包裹尿布。将尿布前后固定在T恤上，并保持尿布两侧开放。
  - 使用布尿布时，避免使用塑料裤直到皮疹消失。
  - 让无尿布的婴儿靠近窗户的日光下以帮助治愈皮疹。频繁检查婴儿确保热量不会烧伤皮肤。
  - 夜间使用能将湿气保持在尿布内的可处理尿布，远离皮肤。
  - 避免使用尿布湿巾。
  - 如果红色皮疹涉及皮肤褶皱或已持续 >3天，在受影响区域涂抹非处方洛特林。
  callback_criteria: []
  related_protocols: []
- id: pediatric_specific_007
  topic_zh: 婴儿睡眠呼吸暂停
  topic_en: Sleep Apnea Infant
  source_file: STCC/Sleep_Apnea_Infant.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 用药情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 婴儿停止呼吸
      - 皮肤变蓝
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 呼吸暂停超过1分钟
      - 皮肤曾变为灰色或蓝色但现已恢复正常颜色
      - 发作后出现异常呼吸
      - 需要进行人工呼吸
      action: 立即前往急诊室
    C:
      criteria:
      - 呼吸暂停少于1分钟
      - 没有皮肤颜色变化
      - 发作后婴儿正常呼吸
      - 不需要进行人工呼吸
      action: 当天内联系医生/诊所
  home_care:
  - 给予安慰。有些婴儿在快速呼吸几次之后会有不到15秒的停顿。
  - 强调让婴儿仰睡的重要性。
  - 与初级保健医生讨论使用呼吸监测器的问题。
  - 获取心肺复苏培训。快速识别呼吸暂停并及时进行心肺复苏可以成功使婴儿复苏，避免严重问题的发生。
  - 持续的呼吸暂停发作
  - 婴儿停止呼吸
  - 皮肤变蓝
  - 正在进行心肺复苏
  callback_criteria: []
  related_protocols:
  - 新生儿问题
  - 婴儿吐奶
- id: pediatric_specific_008
  topic_zh: 婴儿溢奶
  topic_en: Spitting Up Infant
  source_file: STCC/Spitting_Up_Infant.md
  key_questions:
  - 姓名
  - 年龄
  - 起始时间
  - 用药情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 呼吸困难
      - 面部、嘴唇、指甲或耳垂呈蓝色或灰色
      - 反应迟钝
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 持续呕吐
      - 之后有窒息或咳嗽
      - 吐出物中有血液或深绿色胆汁
      - 体温 >100.4°F (38°C) 且年龄 <3 个月
      - 脱水迹象：
      - 尿量减少
      - 眼窝凹陷
      - 皮肤弹性差（捏起后不能迅速恢复）
      - 极度口渴或口腔干燥
      - 哭时无泪
      - 前囟门凹陷
      - 新生儿无排便
      - 喷射性呕吐
      action: 立即前往急诊室
    C:
      criteria:
      - 持续烦躁
      - 家长担心婴儿体重增长不足
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 体温升高且年龄 >3 个月
      - 婴儿摄入超过1到2口食物后频繁溢奶
      - 体重减轻
      - 便秘加剧
      - 持续溢奶
      - 家长担忧
      action: 居家观察，按家庭护理指导
  home_care:
  - 请记住，喂食后不久非剧烈地吐出少量胃内容物是婴儿的常见情况。婴儿开始坐立后应该会自然好转。
  - 在喂养期间多次拍嗝。
  - 给予小而频繁的喂养，避免过度喂养或喂养过快。
  - 喂食后让婴儿处于直立位置，如放在摇篮或婴儿背带中。避免喂养后紧抱或晃动婴儿。
  - 抬高床头并使婴儿侧卧。
  - 更换尿布时避免使用过紧的尿布或束缚婴儿。
  - 如果进行母乳喂养，尝试每次只用一侧乳房哺乳，并泵出另一侧的奶。避免使用安抚奶嘴。
  callback_criteria:
  - 家庭护理措施无效或情况恶化
  - 体重减轻或未能正常增重
  - 便秘加剧
  - 持续溢奶
  - 吐出物中有血液或深绿色胆汁
  - 脱水迹象
  related_protocols:
  - 母乳喂养问题
  - 脱水
  - 儿童呕吐
- id: pediatric_specific_009
  topic_zh: 长牙
  topic_en: Teething
  source_file: STCC/Teething.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 药物使用情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 极度烦躁不安、间歇性嗜睡及高烧
      - 持续哭闹超过2小时且与肠绞痛无关
      - 持续高烧
      - 孩子看起来病态
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 烦躁不安超过2天
      - 哭闹影响孩子的睡眠
      - 孩子拉扯耳朵
      action: 立即前往急诊室
    C:
      criteria:
      - 长牙，牙龈红肿，且孩子年龄在4到8个月之间
      - 体温<101°F (38.3°C)
      - 食欲不振
      action: 当天内联系医生/诊所
  home_care:
  - 用手指按摩肿胀或发炎的牙龈2分钟。
  - 给予对乙酰氨基酚缓解不适。不要给儿童服用阿司匹林。如果年龄<20岁，避免使用类似阿司匹林的产品。如果有肝病，避免使用对乙酰氨基酚。如果有肾病、胃部问题或怀孕的情况下，避免使用布洛芬。请按照标签上的指示。
  - 提供冷的牙胶圈、调味冰块、冷冻香蕉或冷冻贝果供婴儿咀嚼。
  - 避免食用咸或酸的食物。
  - 避免使用含有苯佐卡因的出牙凝胶，因为它们可能会使喉咙麻木并导致窒息或药物反应。
  - 记住3到8个月大的婴儿即使没有实际长牙时也可能出现长牙症状（流涎、咀嚼）。
  - 如果没有牙齿或牙龈肿胀的情况，请与初级保健医生讨论长牙治疗方法。
  callback_criteria:
  - 极度烦躁不安、间歇性嗜睡及高烧
  - 持续哭闹超过2小时
  - 持续高烧
  - 婴儿停止进食
  related_protocols:
  - 婴儿哭闹过多
  - 耳痛及流脓
  - 儿童发热
- id: pediatric_specific_010
  topic_zh: 脐带护理
  topic_en: Umbilical Cord Care
  source_file: STCC/Umbilical_Cord_Care.md
  key_questions:
  - 名字
  - 年龄
  - 病史
  triage_levels:
    A:
      criteria:
      - 体温<97.5°F (36.4°C) 或 >100.4°F (38°C)
      - 脐周感染迹象：红肿、疼痛、肿胀、恶臭分泌物、红线或温热感
      - 疼痛、呕吐和脐部膨出
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 肚脐内的组织看起来异常
      - 脐带脱落后出血超过3天
      - 治疗2天后仍湿润的肚脐
      action: 立即前往急诊室
    C:
      criteria:
      - 婴儿哭闹时新发现的脐部膨出
      - 脐带脱落后少量出血（几滴）或分泌物
      - 1个月内脐带未脱落
      action: 当天内联系医生/诊所
  home_care:
  - 在脐带干燥之前：每天用酒精清洁一次。直到脐带掉落前，只能进行局部擦洗。
  - 保持尿布和塑料裤低于脐部。
  - 记住，脐带通常在1到3周内脱落，少量渗血是正常的。
  - 记住，当婴儿哭泣或用力时，脐部膨出是很常见的。这种疝气会随着时间的推移而自行恢复。
  - 如果脐带看起来感染了，请用抗菌肥皂清洗，冲洗后，再用双氧水清洗并再次冲洗；每天进行此程序两次。每天6次用70%的酒精浸泡的棉签擦拭脐带。
  - 尽可能让脐带暴露在空气中。
  - 不要在脐带上使用软膏或粉末。
  callback_criteria: []
  related_protocols:
  - 新生儿问题
  - 伤口愈合和感染
