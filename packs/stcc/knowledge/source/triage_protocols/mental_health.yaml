protocols:
- id: mental_health_001
  topic_zh: 自杀未遂、威胁
  topic_en: Suicide Attempt Threat
  source_file: STCC/Suicide_Attempt_Threat.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 住址
  - 电话号码
  - 用药情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 无意识
      - 严重的呼吸困难、胸痛或腹痛
      - 自杀未遂，如身体伤害或药物过量
      - 正在进行中的自杀企图
      - 威胁要伤害自己或他人
      - 有具体的自杀计划（可用的方法如武器或药片）
      - 新发的混乱或妄想思维
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 拒绝继续交谈且被认为是高自杀风险
      - 有先前自杀未遂的历史
      - 有自杀念头但无计划或伤害
      - 最近药物变化
      action: 立即前往急诊室
  home_care:
  - 所有涉及自杀念头的电话都应转介给适当的精神健康专业人士。
  - 如果来电者独自一人且风险高，尽可能长时间保持电话联系或在不中断连接的情况下将电话转移到自杀热线。必要时追踪电话。获取来电者的地址和电话号码。
  - 所有表示有自杀念头的电话都应被视为紧急情况，直到由精神健康专业人士或急诊医生确认无误为止。
  - 注意背景噪音。
  - 持续的自杀念头
  - 有具体计划的自杀念头（可用方法：武器或药片）
  - 自杀未遂（身体伤害或药物过量）
  callback_criteria: []
  related_protocols:
  - 意识障碍
  - 酒精问题
  - 焦虑
  - 呼吸困难
  - 混乱
  - 抑郁
  - 割伤
  - 过量服用药物
  - 使用或暴露
- id: mental_health_002
  topic_zh: 抑郁症
  topic_en: Depression
  source_file: STCC/Depression.md
  key_questions:
  - 姓名
  - 年龄
  - 起病时间
  - 诱因
  - 最近的相关事件
  - 既往自杀未遂情况及最后一次尝试的日期
  - 历史
  - 药物使用情况
  triage_levels:
    A:
      criteria:
      - 有自杀念头，并且有实施计划和手段
      - 意图伤害他人
      - 有自杀念头并且已经自伤
      - 服药过量
      - 精神状态改变：混乱，妄想，精神病性症状
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 有自杀念头但没有实施计划或手段
      - 新发的妄想想法
      - 因抑郁症曾住院治疗
      - 青少年行为叛逆、挑衅或冒险行为
      - 抑郁新发作，最近改变了药物或新增了药物
      action: 立即前往急诊室
    C:
      criteria:
      - 有既往自杀尝试史
      - 抑郁症影响工作能力或功能
      - 食欲下降且吃得少
      - 突然停止服用非处方药、处方药、酒精或咖啡因
      - 药物或酒精滥用
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 难以集中注意力
      - 睡眠困难
      - 对性活动的兴趣减少或勃起功能障碍
      - 月经不规律或缺失
      - 对活动缺乏兴趣
      - 人际关系的变化
      - 酒精或药物使用/滥用增加
      - 怀孕或产后不久
      - 近期发生重大生活变化
      - 有抑郁症史
      action: 居家观察，按家庭护理指导
  home_care:
  - 如果正在接受咨询，给咨询师打电话预约。
  - 联系当地危机干预 ___________________________________
  - 社区咨询服务 ______________________________
  - 家庭服务 ___________________________________________
  - 药物和酒精服务 ___________________________________
  - AA ____________________________________________________
  - 联系朋友或家人寻求支持。
  - 增加锻炼和令人愉悦的活动。
  - 保持均衡饮食，充分饮水，并按需休息。
  - 饮酒或其他娱乐性药物可能会加重抑郁。如果大量使用这些物质，请联系咨询师或家庭医生以减少消费。
  callback_criteria:
  - 有自杀念头但没有实施计划或手段
  - 抑郁症影响日常活动
  - 持续无法入睡
  - 【立即急诊】有自杀念头，并且有实施计划和手段
  - 【立即急诊】自伤或伤害他人
  - 【立即急诊】精神状态改变：混乱，妄想，精神病性症状
  related_protocols:
  - 酒精问题
  - 精神状态改变
  - 焦虑
  - 成人食欲下降
  - 儿童食欲下降
  - 家庭暴力
  - 老年人虐待
  - 疲劳
  - 使用或暴露
  - 威胁
- id: mental_health_003
  topic_zh: 酒精问题
  topic_en: Alcohol Problems
  source_file: STCC/Alcohol_Problems.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 饮酒习惯（量和频率）
  - 上次饮酒后的时间（小时/天数）
  - 服用药物情况
  - 既往史
  - 其他摄入物质
  - 街头毒品或药丸
  - 酒精戒断史
  - 疼痛评分（如果发生受伤
  - 请参见适当的受伤处理方案。）
  triage_levels:
    A:
      criteria:
      - 新发听觉（声音、嗡嗡声、咔嗒声）、感觉（虫子爬行）或视觉幻觉或妄想
      - 呕血或咖啡色样呕吐物
      - 停酒24至48小时后，出现戒断症状如心跳加速或不规则、出汗、呼吸困难、颤抖或震颤
      - 极度焦虑、恐惧感、激动或偏执
      - 意识状态改变(AMS)
      - 呼吸暂停或呼吸困难
      - 面色苍白、多汗、头晕或无力
      - 自杀或杀人的念头
      - 无反应
      - 面部、嘴唇或舌头呈蓝色或灰色
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 过去戒断时有抽搐或震颤谵妄(DTs)的病史
      - 欲伤害自己或他人
      - 新发黑色或带血的大便
      - 急性焦虑
      - 感知扭曲
      - 持续呕吐超过24小时，且家庭措施无效
      action: 立即前往急诊室
    C:
      criteria:
      - 胃部不适、腹泻、胃灼热或睡眠困难
      - 近期突然停止饮酒
      - 请求帮助以停止饮酒
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 恶心、呕吐或腹泻
      - 总体感觉不适
      - 停酒12小时后，出现轻微震颤或焦虑、食欲不振、恶心或呕吐、无力或身体疼痛
      action: 居家观察，按家庭护理指导
  home_care:
  - 确保饮酒者安全，不允许其驾驶或从事可能导致跌倒或受伤的高风险行为。
  - 增加非酒精饮料的摄入量，直到尿液呈淡黄色（这可能是适当水分补充的标志，可能需要长达2天的时间）。
  - 增加水果、蔬菜、土豆、米饭、谷物、全麦食品、鸡蛋、肉类、家禽和乳制品的摄入量。
  - 根据需要服用抗酸药以缓解消化不良。遵循标签上的说明。
  - 服用维生素B复合体补充剂，并按照标签上的指示进行。
  - 每天锻炼。
  - 保证充足的睡眠。
  - 不要给儿童使用阿司匹林。20岁以下者避免使用类似阿司匹林的产品。肝病患者应避免使用对乙酰氨基酚。存在肾脏疾病或胃问题的患者，或孕妇应避免使用布洛芬。出现任何不良反应时，请咨询医生。
  callback_criteria: []
  related_protocols: []
- id: mental_health_004
  topic_zh: 焦虑
  topic_en: Anxiety
  source_file: STCC/Anxiety.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 触发因素
  - 药物使用情况
  - 既往病史
  - 最近的药物或酒精使用或戒断情况
  triage_levels:
    A:
      criteria: []
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 幻觉（听觉、触觉或视觉）
      - 偏执狂（无根据地不信任他人），新发
      - 混乱，新发
      - 自杀威胁或行为
      action: 立即前往急诊室
    C:
      criteria:
      - 无法正常生活
      - 极度焦虑
      - 家庭护理措施无效的过度换气
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 大量出汗
      - 持续性胃部不适影响活动
      - 药物或酒精使用/滥用
      - 最近突然停止使用非处方药、处方药、酒精或咖啡因
      - 睡眠困难
      - 焦虑发作史
      - 长期的药物/酒精滥用史
      - 近期发病
      - 间歇性发作
      - 可能的原因，如压力；体重减轻；使用药物（包括减充血剂或非处方草药制剂）、咖啡因或烟草；工作、关系或财务的变化
      - 没有生理或心理症状
      action: 居家观察，按家庭护理指导
  home_care:
  - 如果已知原因，探索消除或减少诱因的方法。
  - 减少或停止摄入咖啡因、烟草、酒精、非法药物或不当使用兴奋剂、处方药或非处方草茶和补充剂。
  - 增加睡眠、休息和放松时间。在黑暗安静的房间中休息。
  - 洗个长时间的热水澡、淋浴或泡温泉。
  - 想象自己成功地面对并解决担忧或冲突。
  - 增加运动和定期活动，进行放松或视觉化练习及深呼吸。
  - 规律饮食，保持健康饮食。关注水果、全谷物和鱼（或鱼油），它们可能都有助于减轻焦虑。
  - 通过看电视、看电影、阅读书籍或其他愉快的活动来分散注意力。
  - 与支持性的人交谈。
  callback_criteria:
  - 【立即急诊】伤害自己或他人的风险
  - 【立即急诊】幻觉、偏执、定向障碍或混乱
  related_protocols: []
- id: mental_health_005
  topic_zh: 儿童虐待
  topic_en: Child Abuse
  source_file: STCC/Child_Abuse.md
  key_questions:
  - 姓名
  - 地址和电话号码
  - 年龄
  - 发生时间
  - 原因
  - 虐待史
  - 医疗史
  - 受伤部位及描述
  - 当前状况及儿童的行为
  - 儿童的当前位置
  - 儿童当前环境的安全性
  - 家庭或同住者中的其他儿童
  triage_levels:
    A:
      criteria:
      - 通话时正在发生虐待行为
      - 严重伤害
      - 无反应
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 不同愈合阶段的瘀伤或出现在不寻常部位，黄色瘀伤>18小时
      - （如香烟或热水造成的）烧伤
      - 四肢肿胀、触痛或变形
      - 疑似骨折或脱臼
      - 多处擦伤
      - 面部或身体上的咬痕、撞击或掌掴痕迹
      - 父母希望因危机或害怕虐待儿童而暂时将儿童安置在接待家庭中
      - 来电者怀疑受伤的儿童是虐待受害者
      - 来电者或其他人有伤害儿童的想法
      action: 立即前往急诊室
    C:
      criteria:
      - 疑似儿童虐待但没有明显的体征或症状
      - 请求与医疗专业人员讨论涉嫌虐待的情况
      action: 当天内联系医生/诊所
  home_care:
  - 记住必须为儿童提供一个安全的环境。
  - 将父母或看护者转介给当地资源：儿童保护服务；社会服务机构；县或州卫生部门；地区住房避难所；当地警察；儿童虐待登记热线；家庭服务；咨询服务；或危机热线。
  - 遵循报告涉嫌虐待或忽视的州法律要求。
  - 在1小时内对父母或看护者进行回访。
  - 如果建议来电者联系儿童保护服务，请在1小时内给来电者回电，确保已经向儿童保护服务致电。
  - 儿童受到虐待或怀疑受虐
  callback_criteria: []
  related_protocols:
  - 关节和组织损伤
  - 瘀伤
  - 化学烧伤
  - 电击伤
  - 热烧伤
  - 家庭暴力
  - 肢体损伤
  - 性侵犯
- id: mental_health_006
  topic_zh: 家庭暴力
  topic_en: Domestic Abuse
  source_file: STCC/Domestic_Abuse.md
  key_questions:
  - 姓名
  - 年龄
  - 药物或酒精问题
  - 起始时间
  - 原因
  - 虐待史
  - 用药情况
  - 家庭中其他成员的情况
  - 历史
  triage_levels:
    A:
      criteria:
      - 在通话时有人正在遭受虐待或受到威胁
      - 受害者严重受伤或无反应
      - 大量出血
      - 呼吸困难
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 有淤青，包括手印或指纹痕迹
      - 香烟、热水、摩擦或化学烧伤
      - 肢体肿胀、触痛或变形
      - 疑似骨折或脱位
      - 其他打击造成的伤害或割伤
      - 人咬或抓痕
      - 袭击中使用了武器
      - 受害者感到不安全
      - 儿童受到威胁或攻击
      action: 立即前往急诊室
    C:
      criteria:
      - 虐待发生在2天前以上且伤势不严重
      - 来电者请求帮助或转介
      action: 当天内联系医生/诊所
  home_care:
  - 需要问的重要问题：
  - 你现在是否在一个安全的环境中？
  - 你一个人吗？
  - 是否有处于危险中的儿童？
  - 你过去是否遭受过虐待？
  - 施暴者现在在哪里？
  - 你有可以帮忙的家庭成员或朋友吗？
  - 你是否已经联系了警察、成人保护服务或其他人寻求帮助？
  - 你需要家庭庇护所或家庭危机热线的电话号码吗？
  - 鼓励来电者联系过去的支持者。
  - 提供当地资源的转介电话，包括社会工作者、危机服务、受虐成年人庇护所、家庭服务和咨询服务中心。
  - 鼓励来电者通知成人保护服务机构和/或警察。
  - 给予安慰并重申没有人应该受到打击、虐待或攻击，并且施暴者很可能再次施加暴力。
  - 1小时后跟进电话。
  - 指示来电者将冰袋敷于受伤处，每次20分钟，每天4次，持续24至48小时以减轻肿胀和不适。
  - 疼痛或肿胀持续或加剧
  callback_criteria:
  - 【立即急诊】严重伤害
  - 【立即急诊】大量出血
  - 【立即急诊】呼吸困难
  - 【立即急诊】由于虐待导致的胸痛
  - 【立即急诊】来电者感到不安全
  related_protocols: []
- id: mental_health_007
  topic_zh: 老年人虐待
  topic_en: Elder Abuse
  source_file: STCC/Elder_Abuse.md
  key_questions:
  - 姓名
  - 地址和电话号码
  - 年龄
  - 初次出现时间
  - 原因
  - 虐待史
  - 医疗史
  - 伤害部位及描述
  - 目前状况及行为表现
  - 当前所在位置
  - 环境安全情况
  - 同住或同一设施内其他人员
  triage_levels:
    A:
      criteria:
      - 打电话时正在发生的虐待
      - 严重伤害
      - 无反应
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 处于不同愈合阶段或出现在不寻常区域的瘀伤，黄色瘀伤超过18小时
      - 烧伤（如香烟或热水造成的）
      - 四肢肿胀、触痛或变形
      - 疑似骨折或脱位
      - 多处擦伤
      - 面部或身体上的咬痕、压痕或掌掴痕迹
      - 看护者希望因危机或担心伤害该人而暂时将此人安置在寄养家庭中
      - 怀疑受伤人员是虐待受害者
      - 看护者或其他人有伤害此人的想法
      action: 立即前往急诊室
    C:
      criteria:
      - 疑似存在但无身体症状的虐待
      - 显著突然体重下降
      - 无法解释的瘀伤
      - 对家人或看护者的突然恐惧
      - 请求与医疗专业人员讨论疑似虐待的情况
      action: 当天内联系医生/诊所
  home_care:
  - 记住，必须为该人提供一个安全的环境。
  - 对于患有晚期痴呆症或某些类型阿尔茨海默病的人，如果存在被害妄想和攻击性行为，可能难以发现虐待。注意观察其基线行为的变化。此人是否更加内向、营养不良、行为改变、出现褥疮、蓬头垢面、不明原因的伤口或疤痕？
  - 记住，服用抗凝药物的人容易瘀伤。询问瘀伤的时间和方式。检查其他部位是否有瘀伤。
  - 如果你怀疑或发现虐待迹象，请私下与该人交谈以了解发生了什么，并采取措施报告并防止再次发生。
  - 如需更多信息，请联系：美国国家老年人虐待中心（1-855-500-3537）；ncea-info@aoa.hhs.gov；https://ncea.acl.gov
  - 将该人或看护者转介至当地资源：成人保护服务；社会服务机构；县或州卫生部门；区域住房庇护所；当地警察；老年人虐待登记热线；家庭服务；咨询服务；危机热线。
  - 遵循法律规定报告涉嫌的虐待或疏忽行为。
  - 在1小时内给该人或看护者回拨电话以跟进情况。
  - 如果建议呼叫成人保护服务（APS），请在1小时内再次联系呼叫者；确保已经与APS取得联系。次日再致电APS确认是否已提交报告。他们只会回答是或否，但不会提供详细信息。
  - 此人受到虐待或疑似被虐待。
  callback_criteria: []
  related_protocols:
  - 关节及组织损伤
  - 瘀伤
  - 化学性
  - 电击性
  - 热力性
  - 家庭暴力
  - 四肢伤害
  - 性侵犯
- id: mental_health_008
  topic_zh: 临终关怀问题
  topic_en: Hospice Problems
  source_file: STCC/Hospice_Problems.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 终末期状况
  - 确认临终关怀患者身份
  - 药物使用情况
  - 历史记录
  triage_levels:
    A:
      criteria:
      - 严重的无法控制的疼痛，即使采取了止痛措施也没有缓解
      - 在家意外死亡且没有不复苏指令（DNR）
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 呼吸困难、意识水平下降、尿量减少或无尿，家庭希望撤销家庭死亡计划
      - 没有DNR指令，且家属希望在家照顾临终患者或不确定如何行动
      - 无法服用药物
      - 新出现的不安、烦躁或混乱
      - 发热和感染症状
      - 最近停用抗生素后发热
      - 服药后持续不适
      action: 立即前往急诊室
    C:
      criteria:
      - 护理者焦虑且难以应对，或无法维持疼痛控制
      - 计划的死亡和DNR指令已到位
      - 昏睡且可能用药过量
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 对进食缺乏兴趣
      - 嘴唇开裂，口腔干燥
      - 高热、昏迷和呼吸变化
      action: 居家观察，按家庭护理指导
  home_care:
  - 按照处方给予止痛药和抗焦虑药物，确保最大程度的舒适。检查泵以确保其正常工作。
  - 联系宗教服务或精神社区领导者。
  - 记住，在临终过程中失去对食物的兴趣是正常的。
  - 记住，脱水有助于人在接近死亡时感到更加舒适。
  - 按护士指导提供口腔和皮肤护理。
  - 将床头抬高45度以帮助呼吸。
  - 打开窗户或使用风扇以增加房间内的空气流通。
  - 如果正在使用氧气，请检查管路和气瓶以确保其正常工作。
  - 如果出现发热、呼吸和意识变化，联系并告知希望在死亡时陪伴在旁的人。
  - 将冷敷包置于腋下、腹股沟及颈后部。
  - 调整体位以帮助呼吸和舒适。
  - 如果昏睡且怀疑用药过量，在疼痛、不安或烦躁再次发生前不要增加剂量。
  - 如果护理者对患者状况变化感到担忧或有疑问，应回电。
  callback_criteria:
  - 无法服用药物
  - 新出现的不安、烦躁或混乱
  - 发热和感染症状
  - 最近停用抗生素后发热
  - 服药后持续不适
  - 【立即急诊】严重的无法控制的疼痛，即使采取了止痛措施也没有缓解
  - 【立即急诊】在家意外死亡且没有DNR指令
  related_protocols:
  - 意识改变
  - 呼吸困难
  - 脱水
  - 抑郁
  - 喂食管问题
  - 成人发热
  - 儿童发热
- id: mental_health_009
  topic_zh: 失眠
  topic_en: Insomnia
  source_file: STCC/Insomnia.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 过敏史
  - 用药情况
  - 病史
  triage_levels:
    A:
      criteria:
      - 自杀念头
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 持续性的疼痛、瘙痒、咳嗽或发热影响睡眠且对家庭护理措施无效
      - 持续性抑郁、焦虑或压力
      action: 立即前往急诊室
    C:
      criteria:
      - 持续超过7天的睡眠困难
      - 连续无法入睡超过2到3小时
      - 请求开安眠药
      - 尿频或大便问题频繁打断睡眠
      - 问题影响工作、学习或其他日常活动
      - 摄入咖啡因产品
      - 间歇性发作持续3至5天
      - 最近戒断药物或酒精
      - 处方的安眠药无效
      - 服用新药物
      - 摄入非处方药
      - 感到不知所措
      action: 当天内联系医生/诊所
  home_care:
  - 增加日常运动。避免在睡前2至3小时内进行剧烈运动。睡前10分钟做轻柔的伸展运动。
  - 睡前阅读与工作无关的材料或听舒缓的音乐。
  - 睡前11小时避免摄入咖啡因和其他兴奋剂。
  - 睡前2小时洗个热水澡或淋浴。
  - 睡前喝温牛奶。
  - 如果之前有饮酒，睡前8盎司橙汁可以帮助加速酒精分解并减少几小时睡眠后的再次醒来。
  - 尝试放松技巧，例如深呼吸练习或想象充满花朵的草地。
  - 识别压力因素并试图减轻它们。如果醒来时担忧需要做的事情，制定一个行动计划，列出项目，并尝试回去睡觉。
  - 避免在睡前3小时内进食。晚餐后30分钟喝1汤匙用开水或果汁稀释的苹果醋，以帮助加速胃部食物通过速度和减少胃酸反流。
  - 如果睡眠困难是由于胃酸反流引起的，请尽量左侧卧睡，以助于加快胃排空并防止胃内容物反流入食道。
  - 如果压力、焦虑或抑郁影响睡眠，寻求当地咨询中心或心理健康服务的帮助。
  - 考虑短期内使用苯海拉明（Benadryl）或褪黑素。遵循标签上的指示。
  - 如果服用补充剂，请选择早晨的活力补充剂如B族维生素，夜晚则选择放松矿物质如钙和镁。
  - 插上红色、蓝色或绿色夜灯以避免夜间使用浴室时打开明亮的灯光。
  - 保持卧室黑暗、凉爽和安静。使用风扇或其他设备来屏蔽噪音。
  - 穿着宽松的睡衣。
  - 如果感到不知所措，请立即回电。
  callback_criteria:
  - 家庭护理措施无效或情况恶化
  - 问题影响工作、学习或其他日常活动
  - 感到无法承受
  - 【立即急诊】自杀念头
  related_protocols:
  - 酒精问题
  - 焦虑症
  - 抑郁症
  - 胃灼热
  - 使用或接触
  - 自杀企图或威胁
- id: mental_health_010
  topic_zh: 性侵犯
  topic_en: Sexual Assault
  source_file: STCC/Sexual_Assault.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 药物使用情况
  - 历史病史
  triage_levels:
    A:
      criteria:
      - 在电话时，性侵犯正在进行
      - 受害者严重受伤、失去意识或死亡
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 阴道或肛门撕裂或出血
      - 疑似骨折或脱臼
      - 擦伤、割伤、瘀伤、变色或肿胀
      - 呼吸困难、胸痛或腹痛
      - 受害者要求进行检查和收集证据
      - 受害者是未成年人
      action: 立即前往急诊室
    C:
      criteria:
      - 你现在是否处于安全环境中？
      - 你是否独自一人？
      - 施暴者现在在哪里？
      - 你是否有家人或朋友可以帮忙？
      - 你是否已经报警？
      - 你是否联系了强奸危机中心或热线？
      - 受害者服用过迷奸药物（如GHB、Rohypnol、Ketamine）并要求进行血液或尿液测试
      action: 当天内联系医生/诊所
  home_care:
  - 建议受害者留在安全和支持的环境中。
  - 鼓励受害者接受医学检查，包括性传播疾病和妊娠检测。
  - 鼓励受害者向警方报告事件。
  - 鼓励受害者联系强奸危机中心或热线。
  - 告知来电者在医疗检查前不要淋浴或更换衣物。
  callback_criteria:
  - 疼痛或出血持续或加剧
  - 感到愤怒、抑郁、自杀念头或无法控制的哭泣
  - 发热、分泌物或溃疡发展
  related_protocols: []
- id: mental_health_011
  topic_zh: 滥用、使用或接触物质
  topic_en: Substance Abuse Use or Exposure
  source_file: STCC/Substance_Abuse_Use_or_Exposure.md
  key_questions:
  - 姓名
  - 年龄
  - 发病时间
  - 原因
  - 首选药物及途径
  - 药物习惯（剂量和频率）
  - 上次使用后的小时数或天数
  - 心理健康史
  - 可能接触到的甲基苯丙胺实验室或化学品
  - 用药史
  triage_levels:
    A:
      criteria:
      - 意识状态改变
      - 呼吸暂停或呼吸困难
      - 面色苍白、出汗、头晕或虚弱
      - 自杀或杀人意念
      - 无响应
      - 面部、嘴唇或舌头呈现蓝色或灰色
      action: 立即呼叫救护车（120）
    B:
      criteria:
      - 青少年在使用药物或酒精后出现言语含糊不清、困惑、协调能力差
      - 头晕，呼吸困难，颤抖
      - 可能过量
      - 极度焦虑、激动、偏执或恐惧
      - 戒断症状：心跳加快或不规则，震颤，高血压，呕吐，不安，出汗
      - 在制备过程中接触到甲基苯丙胺蒸汽（特别是儿童和急救人员）
      action: 立即前往急诊室
    C:
      criteria:
      - 停用物质24到48小时后出现幻觉：听觉（声音、嗡嗡声、咔嚓声），感觉（虫爬感），或视觉幻觉
      - 难以完成简单任务
      - 有自杀想法但未采取行动
      - 怀疑摄入未知药物，无法回忆事件，可能发生性接触
      action: 当天内联系医生/诊所
    D:
      criteria:
      - 请求成瘾服务
      - 间歇使用史并有担忧
      - 接触后持续呕吐、腹泻、胃灼热
      - 暴露后的皮肤或眼睛刺激
      - 急性焦虑
      - 没有其他症状或问题，但父母或个人表示关切
      - 停用12小时后出现轻微震颤、焦虑、食欲不振、恶心或呕吐、无力、肌肉疼痛
      action: 居家观察，按家庭护理指导
  home_care:
  - 对于化学物质暴露，立即清洗暴露的皮肤表面。
  - 拨打毒物控制中心（1-800-222-1222）以获取处理甲基苯丙胺制备化学品的具体护理指南。
  - 联系当地资源寻求帮助：咨询、戒毒中心、住院和门诊治疗计划、AA 和 Al-Anon 会议等。
  - 服用常规的止痛药来缓解不适。不要给儿童服用阿司匹林。20岁以下避免使用类似阿司匹林的产品。存在肝病时避免使用对乙酰氨基酚。肾病或胃部问题存在时，或者怀孕期间避免使用布洛芬。请按照标签上的说明使用。
  callback_criteria:
  - 难以完成简单任务
  - 持续呕吐或腹泻
  - 【立即急诊】戒断症状：心跳加快、震颤、高血压、呕吐、不安、出汗
  - 【立即急诊】黑色或柏油样大便
  - 【立即急诊】类似深咖啡色的呕吐物
  - 【立即急诊】自杀或杀人意念
  - 【立即急诊】极度焦虑、激动或偏执
  - 【立即急诊】在制备过程中接触到甲基苯丙胺蒸汽
  related_protocols: []
