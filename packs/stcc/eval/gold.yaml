# gold.yaml — STCC 分诊助手 in-scope 金标评估集（114 题）
# 覆盖 18 类别 × A/B/C/D 各严重等级
#
# 字段说明：
#   id:               题目 ID
#   question:         自然语言提问（模拟来电者描述）
#   expected_severity: A / B / C / D
#   expected_category: router 应路由到的主类别
#   expected_must_ask: 模型应追问的关键问题（list，可为空）
#   must_warn:        必须包含的安全警示（list，支持 / 表示 OR）
#   source_files:     参考的 STCC 文件（list）
#   must_not:         回答中绝对不能出现的内容（list）

questions:
